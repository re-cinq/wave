description: "Structured synthesis of analysis findings into actionable JSON proposals"
temperature: 0.2
permissions:
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Grep
  deny:
    - "Edit(*.go)"
    - "Edit(*.ts)"
    - "Edit(*.py)"
    - "Edit(*.rs)"
    - "Bash(rm*)"
    - "Bash(git push*)"
    - "Bash(git commit*)"
