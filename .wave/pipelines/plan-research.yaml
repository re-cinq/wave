kind: WavePipeline
metadata:
  name: plan-research
  description: >-
    Research a GitHub issue using web search and codebase analysis, then post
    structured findings as an issue comment. Fetches the issue, extracts
    research topics, runs parallel web searches, synthesizes results, and
    publishes a summary. Use this as a standalone research step or as the
    first stage of impl-research.
  release: true

skills:
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  example: "re-cinq/wave 42"
  schema:
    type: string
    description: "GitHub repository and issue number (e.g. 'owner/repo number')"

chat_context:
  artifact_summaries:
    - report
    - comment-result
  suggested_questions:
    - "What were the key research findings?"
    - "What is the primary recommendation?"
    - "Was the research comment posted successfully?"
  focus_areas:
    - "Research findings and recommendations"
    - "Source quality and confidence"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  result:
    step: post-comment
    artifact: comment-result

steps:
  - id: fetch-issue
    persona: "{{ forge.type }}-analyst"
    model: cheapest
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Fetch a GitHub issue by its number and repository, parse its contents, and produce
        a structured JSON representation that downstream steps will use for research topic
        extraction and web research. The output must faithfully represent the issue content
        without modification or interpretation.

        INPUT: {{ input }}

        CONTEXT:
        You are the first step in a five-step research pipeline (fetch-issue, analyze-topics,
        research-topics, synthesize-report, post-comment). Your output feeds directly into
        the analyze-topics step, which will extract research questions from the issue content.
        The accuracy of the entire research pipeline depends on you faithfully capturing the
        issue's title, body, labels, and comments.

        REQUIREMENTS:
        1. Validate the input:
           - CRITICAL: If the input above is empty, blank, or missing, you MUST immediately
             fail. Write an error JSON to .wave/output/issue-content.json with issue_number: 0
             and title: "ERROR: No input provided -- expected a GitHub issue URL or owner/repo
             number". Do NOT guess, infer, or use any example values. Stop here.
           - Accepted formats (parse the actual input, never fabricate values):
             - Full URL: https://github.com/owner/repo/issues/123
             - Short form: owner/repo 123
           - Extract the repository (owner/repo) and issue number from the input.
        2. Fetch the issue with full details:
           {{ forge.cli_tool }} issue view <number> --repo <owner/repo> --json number,title,body,labels,state,author,createdAt,url,comments
        3. Parse the command output and construct a structured JSON object capturing:
           - issue_number: integer
           - title: string (exact title from the issue)
           - body: string (full issue body, preserving markdown formatting)
           - labels: array of label name strings
           - state: string (OPEN/CLOSED)
           - author: string (GitHub username)
           - created_at: ISO 8601 timestamp
           - url: full issue URL
           - comments: array of comment objects with author, body, and created_at
           - repository: object with owner and repo fields
        4. If the issue has more than 20 comments, include only the first 20 and note
           the total count in a comments_truncated field.

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT modify the issue body or title. Capture them exactly as returned by
          the API. Do not summarize, paraphrase, or clean up formatting.
        - Do NOT fabricate any values. If a field is missing from the API response,
          use null rather than guessing.
        - Do NOT proceed if the {{ forge.cli_tool }} command fails. Write the error
          message to the output JSON with issue_number: 0 and the error details.
        - Do NOT hardcode repository names or issue numbers from the example input.
          Parse the ACTUAL input value.

        OUTPUT FORMAT:
        Write the structured JSON to .wave/output/issue-content.json. The file must
        contain a single valid JSON object matching the issue-content schema.

        QUALITY BAR:
        A good fetch produces an exact, faithful representation of the issue that
        downstream steps can rely on. A bad fetch modifies content, omits comments,
        or fabricates data that causes the research to address the wrong questions.
    output_artifacts:
      - name: issue-content
        path: .wave/output/issue-content.json
        type: json
    retry:
      policy: aggressive
      max_attempts: 3
    handover:
      contract:
        type: json_schema
        source: .wave/output/issue-content.json
        schema_path: .wave/contracts/issue-content.schema.json
        on_failure: retry

  - id: analyze-topics
    persona: researcher
    thread: research
    model: cheapest
    dependencies: [fetch-issue]
    memory:
      inject_artifacts:
        - step: fetch-issue
          artifact: issue-content
          as: issue
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Analyze the fetched GitHub issue and extract a prioritized list of research topics
        with specific questions and search keywords. Each topic should represent a distinct
        area where external research (web searches, documentation lookups) would provide
        actionable insights for resolving the issue.

        CONTEXT:
        You are the second step in a five-step research pipeline. The fetch-issue step has
        already retrieved the GitHub issue and injected it as the "issue" artifact. The
        research-topics step that follows will use your output to execute parallel web
        searches. The quality of the research depends on you extracting the right questions
        and providing effective search keywords.

        REQUIREMENTS:
        1. Read the injected issue artifact completely. Understand the issue's core
           problem, any constraints mentioned, and what the author is trying to achieve.
        2. Identify research topics across these dimensions:
           - Key technical questions that need external research (e.g., "How does library X
             handle concurrent connections?")
           - Domain concepts that require clarification (e.g., "What is the difference
             between eventual and strong consistency in this context?")
           - External dependencies, libraries, or tools to investigate (e.g., "What are
             the current alternatives to library X for Go?")
           - Similar problems and solutions in the ecosystem (e.g., "How do other CLI
             tools handle plugin discovery?")
           - Security or compliance considerations if applicable
           - Performance characteristics or benchmarks if relevant
        3. For each topic, provide:
           - id: unique identifier (TOPIC-001, TOPIC-002, etc.)
           - title: concise, descriptive title (5-15 words)
           - questions: 1-5 specific questions to answer through research. Each question
             should be answerable (not rhetorical) and relevant to the issue.
           - search_keywords: array of 2-5 keyword strings optimized for web search.
             Include library names, version numbers, and technology-specific terms.
           - priority: critical (blocking issue resolution), high (important for a good
             solution), medium (useful context), or low (nice to know)
           - category: technical, documentation, best_practices, security, performance,
             compatibility, or other
        4. Rank topics by priority. Place critical and high-priority topics first.
        5. Limit to 10 most important topics. If the issue is simple, fewer is fine
           (minimum 2). Do not pad with low-value topics to reach 10.

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT generate topics that can be answered by reading the project's own codebase.
          Those are not research topics; they are exploration tasks already handled by
          other pipeline types.
        - Do NOT produce vague topics like "research best practices." Every topic must be
          specific to the issue at hand.
        - Do NOT include questions that the issue body already answers. Read carefully
          before extracting topics.
        - Do NOT use generic search keywords. "Go testing" is too broad; "Go table-driven
          test pattern testify assert" is actionable.
        - Do NOT duplicate topics. If two topics would produce overlapping search results,
          merge them into one topic with combined questions.

        OUTPUT FORMAT:
        Write structured JSON to .wave/output/research-topics.json matching the
        research-topics schema. The JSON must include: issue_reference (number, title, url),
        topics (array of topic objects as described above), total_topics (integer), and
        timestamp (ISO 8601).

        QUALITY BAR:
        Good research topics are specific, non-overlapping, and ordered by impact on
        resolving the issue. Each topic's search keywords should, when entered into a
        search engine, return relevant results on the first page. Bad topics are vague,
        redundant, or address questions already answered in the issue body.
    output_artifacts:
      - name: topics
        path: .wave/output/research-topics.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/research-topics.json
        schema_path: .wave/contracts/research-topics.schema.json
        on_failure: retry

  - id: research-topics
    persona: researcher
    thread: research
    model: cheapest
    max_concurrent_agents: 5
    dependencies: [analyze-topics]
    memory:
      inject_artifacts:
        - step: fetch-issue
          artifact: issue-content
          as: issue
        - step: analyze-topics
          artifact: topics
          as: research_plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Execute web research for each topic identified in the research plan, producing
        structured findings with source attribution, credibility assessment, and confidence
        ratings. The findings must be thorough enough to support a synthesis report that
        will be posted as a GitHub issue comment.

        CONTEXT:
        You are the third step in a five-step research pipeline. Two artifacts are injected:
        - issue: the original GitHub issue content
        - research_plan: the research topics with questions and search keywords
        Read both artifacts before starting. The research plan contains prioritized topics,
        each with specific questions and search keywords. Your job is to answer those
        questions through web research. Your findings will be consumed by the
        synthesize-report step to produce a coherent summary.

        REQUIREMENTS:
        1. Process topics in priority order (critical first, then high, medium, low).
        2. For each topic in the research plan:
           a. Execute web searches using the provided search keywords. Try multiple
              keyword combinations if initial results are poor.
           b. Evaluate source credibility using this hierarchy:
              - official_docs: Official documentation, specification documents, RFCs
              - authoritative: Peer-reviewed papers, established tech blogs (e.g.,
                official engineering blogs), conference talks
              - community: Stack Overflow answers, GitHub discussions, tutorials
              - unverified: Personal blogs, forum posts without supporting evidence
           c. Extract relevant findings that directly answer the topic's questions.
           d. For findings that contain specific technical claims, include direct
              quotes to preserve accuracy.
           e. Rate your confidence in the answer:
              - high: Multiple credible sources agree, clear evidence
              - medium: Some evidence but sources are limited or partially conflicting
              - low: Single source or indirect evidence only
              - inconclusive: No useful results found despite multiple searches
        3. For each finding, produce a structured object with:
           - id: unique identifier (FINDING-001, FINDING-002, etc.)
           - topic_id: reference to the TOPIC-### it addresses
           - summary: concise summary (20-2000 characters)
           - key_points: array of bullet point strings (2-10 per finding)
           - source: object with url, title, type (official_docs/authoritative/
             community/unverified), and accessed_at timestamp
           - relevance: float 0-1 indicating how directly this answers the topic
           - confidence: high/medium/low/inconclusive
           - direct_quotes: array of quoted strings (optional, include when precision
             matters)
        4. If a topic yields no useful results after at least 3 different search
           attempts, create a finding with confidence "inconclusive" explaining what
           was searched and why results were inadequate.
        5. Document research gaps: topics where the available information is outdated,
           contradictory, or insufficient for the issue at hand.

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT fabricate sources or URLs. Every source must be a real web page you
          accessed during research. If you cannot find a source, say so.
        - Do NOT provide findings without source attribution. Unsourced claims are
          worthless in a research report.
        - Do NOT include irrelevant findings just to pad the output. Each finding must
          directly address one of the topic's questions.
        - Do NOT copy entire web pages. Extract only the relevant sections and summarize.
        - Do NOT skip low-priority topics entirely. Give them at least one search attempt,
          even if the findings are brief.

        OUTPUT FORMAT:
        Write structured JSON to .wave/output/research-findings.json matching the
        research-findings schema. Include: topics_researched (array of topic_id + findings),
        total_findings (integer), research_gaps (array of gap descriptions), and timestamp.

        QUALITY BAR:
        Good findings are well-sourced, directly answer the research questions, and provide
        enough detail for the synthesis step to produce actionable recommendations. Bad
        findings are unsourced, tangential to the actual questions, or marked as
        "inconclusive" without evidence of genuine search effort.
    output_artifacts:
      - name: findings
        path: .wave/output/research-findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/research-findings.json
        schema_path: .wave/contracts/research-findings.schema.json
        on_failure: retry

  - id: synthesize-report
    persona: summarizer
    model: strongest
    dependencies: [research-topics]
    memory:
      inject_artifacts:
        - step: fetch-issue
          artifact: issue-content
          as: original_issue
        - step: research-topics
          artifact: findings
          as: research
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Synthesize all research findings into a coherent, publication-quality report that
        will be posted as a GitHub issue comment. The report must distill raw findings into
        actionable recommendations, properly attribute all sources, and be formatted as
        ready-to-post GitHub markdown.

        CONTEXT:
        You are the fourth step in a five-step research pipeline. Two artifacts are injected:
        - original_issue: the GitHub issue content (number, title, body, repository)
        - research: the structured research findings with sources and confidence ratings
        Read both artifacts completely. Your report will be posted as a comment on the
        original issue by the next step (post-comment), so the markdown_content field must
        be ready to post without further editing.

        REQUIREMENTS:
        1. Read both injected artifacts. Understand the original issue's question and the
           research findings that address it.
        2. Create a structured JSON report with these sections:
           a. Executive Summary:
              - overview: brief summary of what was researched and why (50-1000 chars)
              - key_findings: 1-7 bullet points highlighting the most important discoveries
              - primary_recommendation: the single most actionable takeaway
              - confidence: overall confidence assessment (high/medium/low)
           b. Detailed Findings:
              - Organize by topic/section from the research plan
              - Synthesize findings from multiple sources into coherent narratives
              - Include code examples where they clarify technical points
              - Reference sources using SRC-### IDs (defined in the sources section)
              - Resolve contradictions between sources, noting which source is more credible
           c. Recommendations:
              - Actionable items with IDs (REC-001, REC-002, etc.)
              - Each recommendation must have: description, priority (critical/high/medium/
                low), effort estimate (S/M/L/XL), and rationale
              - Maximum 10 recommendations, ordered by priority
              - Each recommendation must be traced back to specific findings
           d. Sources:
              - List all sources with IDs (SRC-001, SRC-002, etc.)
              - Each source: url, title, type (official_docs/authoritative/community/
                unverified), reliability (high/medium/low)
              - Include only sources actually referenced in the report
           e. Pre-rendered Markdown (markdown_content field):
              - Generate complete GitHub-flavored markdown ready for posting as a comment
              - Start with: "## Research Findings (Wave Pipeline)"
              - Use proper headers (###), bullet points, code blocks, and tables
              - Include inline source references as [SRC-###] citations
              - End with a formatted sources section listing all referenced URLs
              - Footer: "---\n*Generated by [Wave](https://github.com/re-cinq/wave)
                issue-research pipeline*"

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT include findings that are not supported by the research. If the research
          step marked a topic as "inconclusive," say so honestly rather than speculating.
        - Do NOT recommend actions that contradict the research findings. Every
          recommendation must be grounded in evidence from the sources.
        - Do NOT produce a markdown_content field that differs from the structured data.
          The markdown is a rendering of the same information, not a separate document.
        - Do NOT include raw JSON or data dumps in the markdown_content. Format
          everything for human readability.
        - Do NOT exceed 3000 words in the markdown_content. GitHub comments have practical
          length limits, and overly long reports are not read.

        OUTPUT FORMAT:
        Write the report as structured JSON to .wave/output/research-report.json matching
        the research-report schema. All sections described above must be present.

        QUALITY BAR:
        A good synthesis report is a document the issue author would find genuinely useful:
        clear recommendations backed by cited evidence, honest about uncertainty, and
        formatted for easy reading. A bad report is a data dump that restates raw findings
        without synthesis, makes unsupported recommendations, or is too long to read.
    output_artifacts:
      - name: report
        path: .wave/output/research-report.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/research-report.json
        schema_path: .wave/contracts/research-report.schema.json
        on_failure: retry

  - id: post-comment
    persona: "{{ forge.type }}-commenter"
    model: cheapest
    dependencies: [synthesize-report]
    memory:
      inject_artifacts:
        - step: fetch-issue
          artifact: issue-content
          as: issue
        - step: synthesize-report
          artifact: report
          as: report
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Post the synthesized research report as a comment on the original GitHub issue,
        then capture the result (comment URL or error details) as a structured JSON output.
        This is the final step that delivers the research to the issue author.

        CONTEXT:
        You are the fifth and final step in the research pipeline. Two artifacts are injected:
        - issue: the original GitHub issue content with number, repository, and URL
        - report: the synthesized research report containing a pre-rendered markdown_content
          field ready for posting
        The report's markdown_content field was specifically designed for GitHub comment
        posting and should be used as-is. Do not modify its content.

        REQUIREMENTS:
        1. Read the injected issue artifact to extract:
           - The issue number
           - The repository (owner/repo format)
        2. Read the injected report artifact to extract the markdown_content field.
           This contains the complete, pre-formatted GitHub comment body.
        3. Write the markdown content to a temporary file to avoid shell escaping issues
           with large markdown documents:
           ```bash
           cat > /tmp/comment-body.md << 'COMMENT_EOF'
           <markdown_content from the report artifact>
           COMMENT_EOF
           ```
        4. Post the comment using the forge CLI:
           ```bash
           {{ forge.cli_tool }} issue comment <number> --repo <owner/repo> --body-file /tmp/comment-body.md
           ```
        5. Verify the command succeeded by checking the exit code and output.
        6. If successful, extract the comment URL from the command output. The
           {{ forge.cli_tool }} typically outputs the comment URL after posting.
        7. If the post fails:
           - Capture the error message and exit code
           - Determine if the error is retryable (network issues, rate limits) or
             permanent (authentication failure, issue closed/locked)
           - Record the error details in the output
        8. Clean up the temporary file: `rm -f /tmp/comment-body.md`

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT modify the markdown_content before posting. It was pre-rendered by the
          synthesis step and should be posted exactly as-is.
        - Do NOT use echo or inline strings for the comment body. Large markdown with
          special characters will break shell escaping. Always use a heredoc to a temp
          file, then --body-file.
        - Do NOT retry posting if the error is a permanent failure (401 auth error,
          404 issue not found, 422 issue locked). Only retry on transient errors
          (network timeout, 429 rate limit, 500 server error).
        - Do NOT post multiple comments. If the first attempt succeeds, do not post
          again even if result capture fails.
        - Do NOT fabricate the comment URL. If you cannot extract it from the command
          output, set comment.url to null.

        OUTPUT FORMAT:
        Write the result as structured JSON to .wave/output/comment-result.json with:
        - success: boolean (true if comment was posted successfully)
        - issue_reference: object with number (integer) and repository (string)
        - comment: object with id (integer or null), url (string or null), and
          body_length (integer) if successful
        - error: object with code (string), message (string), retryable (boolean)
          if failed; null if successful
        - timestamp: current ISO 8601 timestamp

        QUALITY BAR:
        A good post-comment step delivers the research to the issue author with a single,
        clean comment and accurate result tracking. A bad step posts duplicate comments,
        corrupts the markdown formatting through bad shell escaping, or silently fails
        without recording the error.
    output_artifacts:
      - name: comment-result
        path: .wave/output/comment-result.json
        type: json
    outcomes:
      - type: url
        extract_from: .wave/output/comment-result.json
        json_path: .comment.url
        label: "Research Comment"
    retry:
      policy: aggressive
      max_attempts: 3
    handover:
      contract:
        type: json_schema
        source: .wave/output/comment-result.json
        schema_path: .wave/contracts/comment-result.schema.json
        on_failure: retry
