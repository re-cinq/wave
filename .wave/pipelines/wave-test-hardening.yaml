kind: WavePipeline
metadata:
  name: wave-test-hardening
  description: "Harden Wave's test suite — find gaps, add edge cases, improve coverage"
  release: false

skills:
  - wave
  - "{{ project.skill }}"

input:
  source: cli
  example: "harden tests in internal/pipeline and internal/contract"
  schema:
    type: string
    description: "Package or area to focus test hardening on, or empty for full scan"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: analyze-coverage
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Analyze test coverage and find gaps in Wave's test suite.

        Focus: {{ input }}

        ## Analysis

        1. **Run coverage analysis** (hardcoded Go commands — this is a Wave self-evolution
           pipeline that always targets Wave's own Go codebase):
           ```bash
           go test -coverprofile=coverage.out ./... 2>&1 || true
           go tool cover -func=coverage.out | tail -20
           ```

        2. **Identify uncovered code paths**: Look for functions with 0% coverage,
           especially in critical packages (pipeline, contract, workspace, adapter).

        3. **Check edge cases**: For each package, identify:
           - Error paths not exercised
           - Nil/empty input handling
           - Concurrent access scenarios
           - Boundary conditions (max retries, timeouts, large inputs)

        4. **Review existing test quality**:
           - Are tests table-driven where appropriate?
           - Do tests check error messages, not just error existence?
           - Are mocks/fakes used consistently?
           - Are tests isolated (no shared state between cases)?

        5. **Find missing integration tests**: Check for scenarios where multiple
           packages interact but there's no test covering the interaction.

        Produce a prioritized list of test improvements.
    output_artifacts:
      - name: coverage-analysis
        path: .wave/output/coverage-analysis.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/coverage-analysis.json
        schema_path: .wave/contracts/improvement-assessment.schema.json
        on_failure: retry

  - id: harden
    persona: craftsman
    dependencies: [analyze-coverage]
    thread: harden
    max_visits: 3
    max_concurrent_agents: 3
    memory:
      inject_artifacts:
        - step: analyze-coverage
          artifact: coverage-analysis
          as: findings
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        Add tests to cover the identified gaps.

        ## Rules

        1. Follow Go testing conventions: table-driven tests, descriptive names
        2. Each test should test ONE thing clearly
        3. Use `t.Helper()` for test helpers
        4. Use `t.TempDir()` for filesystem isolation
        5. Check error messages, not just error existence
        6. Run the project's test suite after adding tests
        7. Do NOT use `t.Skip()` without a linked issue
        8. Focus on the highest-impact gaps first

        After each batch of tests, run the full test suite.
    retry:
      policy: standard
      max_attempts: 3
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry

  - id: run-tests
    type: command
    dependencies: [harden]
    script: "{{ project.contract_test_command }}"

  - id: gate
    type: conditional
    dependencies: [run-tests]
    edges:
      - target: _complete
        condition: "outcome=success"
      - target: harden
