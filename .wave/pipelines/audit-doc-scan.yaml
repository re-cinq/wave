kind: WavePipeline
metadata:
  name: audit-doc-scan
  description: >-
    Lightweight documentation audit that verifies ADR decisions, guide accuracy,
    CLAUDE.md structure, and README correctness against the actual codebase.
    Produces JSON findings without creating branches, PRs, or issues. Use this
    as a building block in composition pipelines or for quick read-only doc
    health checks.
  release: true
  category: audit

input:
  source: cli
  example: "docs/"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What documentation inconsistencies were found?"
    - "Are ADR decisions still reflected in the code?"
    - "Is the README accurate?"
  focus_areas:
    - "Documentation accuracy vs code reality"
    - "Stale or missing documentation"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  findings:
    step: scan
    artifact: findings

steps:
  - id: scan
    persona: navigator
    model: cheapest
    max_concurrent_agents: 3
    contexts: [delivery, quality]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Audit documentation vs code reality in /project. Scope: {{ input }}

        Check:
        1. docs/adrs/*.md — are ADR decisions reflected in code?
        2. docs/guides/*.md — are instructions accurate?
        3. CLAUDE.md — does file structure match actual packages?
        4. README.md — are features and examples current?

        For each doc, verify 3-5 specific claims against the codebase using grep/read.

        Write your findings to .wave/output/findings.json (the contract schema defines the required structure).
        Max 25 findings.
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip
