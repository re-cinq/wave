kind: WavePipeline
metadata:
  name: ops-bootstrap
  description: >-
    Scaffold a greenfield project with language-appropriate directory structure,
    CI configuration, and initial source files. Use this when starting a new
    project from scratch. Detects the project flavour (Go, Rust, Node, Python,
    C#), generates idiomatic scaffolding, verifies the build passes, and commits
    the result to a feature branch.
  release: true

input:
  source: cli
  schema:
    type: string
    description: "Project description and intent (e.g. 'Rust CLI tool for processing CSV files')"
  example: "Rust CLI tool for processing CSV files"

chat_context:
  artifact_summaries:
    - assessment
  suggested_questions:
    - "What project structure was scaffolded?"
    - "Does the build pass?"
    - "What files were created?"
  focus_areas:
    - "Scaffold completeness"
    - "Build and test verification"

pipeline_outputs:
  assessment:
    step: assess
    artifact: assessment

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: assess
    persona: navigator
    model: strongest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        You are assessing a greenfield project directory to determine the correct scaffolding
        strategy. Your goal is to produce a comprehensive assessment JSON that captures the
        project flavour (language and framework), the user's intent, what already exists on
        disk, and a detailed scaffold recommendation. This assessment will be consumed by the
        next step, which will create all files — so accuracy and completeness here are critical.

        The user described this project as: {{ input }}

        ## Context

        This is the first step of the ops-bootstrap pipeline. No prior artifacts exist. You
        have read-only access to the project directory mounted at /project. The directory may
        be completely empty (true greenfield) or may already contain partial files such as a
        README, a dependency manifest, or a wave.yaml. Your job is to survey what exists and decide what
        needs to be created.

        ## Requirements

        Execute the following steps in order:

        1. Read `wave.yaml` (if it exists) and extract `project.language`,
           `project.build_command`, and `project.test_command`. If wave.yaml is missing or
           these fields are absent, record them as null — do not guess.
        2. List ALL files in the project directory recursively. Use `find /project -type f`
           or `ls -R /project` to get a complete inventory. Record every file path relative
           to the project root.
        3. Read any README, ADR, design documents, or specification files found in the
           directory. These may contain project intent, architectural decisions, or
           technology choices that should influence the scaffold.
        4. Determine the project flavour (language/framework) using this precedence:
           a. If `project.language` is explicitly set in wave.yaml, use that value.
           b. If characteristic files exist, infer from them: go.mod implies Go, Cargo.toml
              implies Rust, package.json implies Node (check for bun.lockb to prefer Bun),
              pyproject.toml or setup.py implies Python, *.csproj or *.sln implies C#,
              deno.json implies Deno (takes priority over Node).
           c. If no files provide a signal, infer from the user's description text. Look
              for explicit language mentions ("Rust CLI", "Python library", "Go service").
           d. If still ambiguous, default to Go.
        5. Based on the detected flavour, compile a scaffold recommendation that lists every
           file to create, the build system to use, the CI provider (default to
           github-actions), and gitignore patterns appropriate for the language.
        6. Cross-check the scaffold recommendation against existing files. Remove any file
           from `files_to_create` that already exists on disk. The scaffold step must never
           overwrite existing content.

        ## Constraints and Anti-patterns

        - Do NOT guess values for wave.yaml fields that are missing. Record them as null.
        - Do NOT recommend creating files that already exist in the project directory.
        - Do NOT choose a language based solely on your preference. Follow the precedence
          chain above strictly.
        - Do NOT read files outside the /project mount.
        - Do NOT attempt to create or modify any files — this step is read-only assessment.
        - Avoid recommending overly complex scaffolds (e.g., monorepo tooling) unless the
          user's description explicitly calls for it.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good assessment correctly identifies the flavour on the first try, lists every
        existing file without omissions, and produces a scaffold recommendation that the
        next step can execute without judgment calls. A bad assessment guesses the language
        when signals are available, misses existing files (causing the scaffold step to
        overwrite them), or recommends an incomplete set of files that leaves the project
        in a non-buildable state.
    output_artifacts:
      - name: assessment
        path: .wave/output/bootstrap-assessment.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/bootstrap-assessment.json
        schema_path: .wave/contracts/bootstrap-assessment.schema.json
        must_pass: true
        on_failure: retry

  - id: scaffold
    persona: craftsman
    thread: bootstrap
    model: strongest
    dependencies: [assess]
    memory:
      inject_artifacts:
        - step: assess
          artifact: assessment
          as: bootstrap_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        You are creating the initial project scaffold for a greenfield project. Using the
        assessment produced by the previous step, you will generate every file needed to
        make the project buildable, testable, and CI-ready from the first commit. After
        creating all files, you must verify that the project actually builds and tests pass.

        ## Context

        The previous "assess" step produced the injected `bootstrap_assessment` artifact.
        It contains:
        - `flavour`: the detected language/framework (e.g., "go", "rust", "node")
        - `project_intent`: a description of what the project should do
        - `existing_files`: files already on disk that must NOT be overwritten
        - `scaffold_recommendations.files_to_create`: the authoritative list of files to generate
        - `scaffold_recommendations.build_system`: which build tool to use
        - `scaffold_recommendations.ci_provider`: CI platform (typically "github-actions")
        - `scaffold_recommendations.gitignore_patterns`: patterns to include in .gitignore
        - `wave_config`: any language/build/test overrides from wave.yaml

        Read this artifact FIRST before doing anything else. Your work is driven entirely
        by this assessment — do not improvise additional files or deviate from the plan.

        ## Requirements

        Based on the detected flavour in the assessment, create the appropriate project
        structure. The following are flavour-specific guides. Only follow the section that
        matches the detected flavour.

        ### Go
        - `go.mod` with an appropriate module path derived from the project name or
          repository URL. Use Go 1.22+ as the minimum version.
        - `main.go` at the root, or `cmd/<name>/main.go` if the project intent describes
          a CLI tool. Include a minimal main() that prints a version or usage string.
        - `internal/` directory with at least one package containing a placeholder function
          and a corresponding `_test.go` file with one passing test.
        - `.github/workflows/ci.yml` using `actions/checkout@v4`, `actions/setup-go@v5`,
          and running `go build ./...` followed by `go test ./...`.

        ### Rust
        - `Cargo.toml` with project metadata (name, version, edition 2021).
        - `src/main.rs` for binary projects or `src/lib.rs` for libraries. Include a
          trivial function and a `#[test]` module with one passing assertion.
        - `tests/` directory with an integration test stub file.
        - `.github/workflows/ci.yml` using `actions/checkout@v4`, `dtolnay/rust-toolchain`
          with stable, and running `cargo build` followed by `cargo test`.

        ### Node / Bun
        - `package.json` with project metadata, a `"build"` script, a `"test"` script,
          and `"type": "module"` for ESM by default.
        - `src/index.ts` as the entry point with a minimal exported function.
        - `tsconfig.json` with strict mode enabled and appropriate target (ES2022+).
        - One test file under `src/` or `tests/` using the test runner appropriate for the
          runtime (vitest for Node, bun:test for Bun).
        - `.github/workflows/ci.yml` with install and test steps.

        ### Python
        - `pyproject.toml` with project metadata following PEP 621 (name, version,
          dependencies, optional-dependencies for dev tooling).
        - `src/<package_name>/__init__.py` with a `__version__` string and a placeholder
          function.
        - `tests/test_placeholder.py` with one passing test using pytest.
        - `.github/workflows/ci.yml` using `actions/setup-python@v5`, installing via pip,
          and running `pytest`.

        ### C#
        - `<ProjectName>.sln` solution file.
        - `src/<ProjectName>/<ProjectName>.csproj` targeting net8.0 with `Program.cs`
          containing a minimal entry point.
        - `tests/<ProjectName>.Tests/<ProjectName>.Tests.csproj` with a test project
          referencing xUnit and one passing test.
        - `.github/workflows/ci.yml` using `actions/setup-dotnet@v4`, `dotnet build`,
          and `dotnet test`.

        ### For ALL flavours (always create these)
        - `.gitignore` with language-appropriate patterns from the assessment's
          `gitignore_patterns` list, plus any standard patterns you know are needed.
        - `README.md` with: project name as H1, a 2-3 sentence description based on
          `project_intent`, a "Getting Started" section with build/test commands, and a
          "Development" section listing prerequisites.

        ## Verification

        After creating all files, you MUST verify the scaffold works:

        1. If the assessment's `wave_config.build_command` is set, run that command.
           Otherwise, run the default build command for the flavour (e.g., `go build ./...`
           for Go, `cargo build` for Rust).
        2. If the assessment's `wave_config.test_command` is set, run that command.
           Otherwise, run the default test command for the flavour (e.g., `go test ./...`
           for Go, `cargo test` for Rust).
        3. If either command fails, diagnose and fix the issue. Do not leave the project
           in a broken state.

        ## Constraints and Anti-patterns

        - Do NOT create files that already exist on disk. Check the assessment's
          `existing_files` list before writing any file. If a file exists, skip it entirely
          — do not append to or modify it.
        - Do NOT add dependencies beyond the minimum needed to build and test. Avoid
          pulling in frameworks, linters, or tooling unless the project intent requires them.
        - Do NOT create deeply nested directory structures. Keep the scaffold minimal and
          let the project grow organically.
        - Do NOT hardcode absolute paths, usernames, or machine-specific values in any
          generated file.
        - Do NOT generate placeholder code that does not compile or pass tests. Every
          generated file must be syntactically valid.
        - Use the project intent from the assessment to make README content meaningful —
          do not write generic "This is a project" boilerplate.

        ## Output Format

        There is no explicit output artifact for this step. The output is the set of files
        created on disk in the worktree. The handover contract will run the project's test
        suite to verify the scaffold is functional.

        ## Quality Bar

        A good scaffold compiles and tests pass on the first try, follows idiomatic
        conventions for the language ecosystem, and gives a developer everything they need
        to start writing real code immediately. A bad scaffold has compilation errors,
        missing imports, incorrect CI configuration, or a README that does not match the
        project's actual structure.
    retry:
      policy: standard
      max_attempts: 3
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: false
        on_failure: retry

  - id: commit
    persona: craftsman
    thread: bootstrap
    model: cheapest
    dependencies: [scaffold, assess]
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    memory:
      inject_artifacts:
        - step: assess
          artifact: assessment
          as: bootstrap_assessment
    exec:
      type: prompt
      source: |
        ## Objective

        You are creating the initial git commit for a newly scaffolded project and pushing
        it to the remote repository if one is configured. This step turns the scaffold
        output into a committed, potentially pushed state so the project is ready for
        development. You must stage only the project files, never Wave-internal files.

        ## Context

        The previous "scaffold" step created all project files in the worktree. The
        `bootstrap_assessment` artifact (injected from the "assess" step) contains the
        detected flavour and the list of recommended files from
        `scaffold_recommendations.files_to_create`. Use this to understand what was
        intended, but rely on `git status` for the authoritative list of what was actually
        created — the scaffold step may have created additional standard files (like
        .gitignore) not in the explicit list.

        ## Requirements

        Execute these steps in the exact order specified:

        1. Read the assessment artifact to extract the project flavour string and the
           expected file list from `scaffold_recommendations.files_to_create`.

        2. Run `git status --porcelain` to get the definitive list of new and modified
           files in the worktree. This is the ground truth for what to stage.

        3. Stage each project file individually by explicit path. For every file shown by
           `git status`, run `git add <filepath>` — but NEVER stage any of these paths:
           - `.wave/` (pipeline-internal files)
           - `.claude/` (Claude Code configuration)
           - `CLAUDE.md` (Claude Code instructions)
           You may stage files using a single `git add` command with multiple paths, but
           NEVER use `git add -A`, `git add .`, or `git add --all`.

        4. Verify the staging area looks correct by running `git diff --cached --stat`.
           Confirm that only project files are staged and no Wave-internal files leaked in.

        5. Create the initial commit with a conventional commit message:
           ```bash
           git commit -m "feat: scaffold <flavour> project"
           ```
           Replace `<flavour>` with the actual detected flavour from the assessment
           (e.g., "go", "rust", "node", "python", "csharp").

        6. Check if a remote is configured by running `git remote -v`.

        7. If a remote exists, push the branch:
           ```bash
           git push -u origin HEAD
           ```
           If the push fails due to authentication, missing remote, or network issues,
           that is acceptable — report that the commit was created locally and note the
           push failure reason.

        ## Constraints and Anti-patterns

        - NEVER use `git add -A`, `git add .`, or `git add --all`. This is the single
          most important constraint. These commands stage Wave-internal files which must
          never be committed.
        - Do NOT include Co-Authored-By, Signed-off-by, or any AI attribution lines in
          the commit message.
        - Do NOT commit `.wave/`, `.claude/`, or `CLAUDE.md`.
        - Do NOT amend, rebase, or force-push. Create exactly one new commit.
        - Do NOT create the commit if `git status` shows no changes to stage. Report
          that the scaffold step produced no files and exit cleanly.
        - Do NOT modify any files in this step. Your only job is to stage, commit, and
          optionally push.

        ## Output Format

        There is no explicit output artifact for this step. Success is determined by the
        git commit being created. If the commit fails (e.g., nothing to commit), report
        the failure clearly.

        ## Quality Bar

        A good commit stages exactly the scaffold files and nothing else, uses the correct
        conventional commit prefix, and pushes cleanly if a remote is available. A bad
        commit includes Wave-internal files, uses a vague message like "initial commit",
        or stages files with `git add -A`.
