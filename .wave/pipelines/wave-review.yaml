kind: WavePipeline
metadata:
  name: wave-review
  description: "Code review of Wave changes — quality, safety, test coverage, and architectural alignment"
  release: false

skills:
  - wave
  - "{{ project.skill }}"

requires:
  tools:
    - gh

input:
  source: cli
  example: "#42 — review the PR for the new contract validator"
  schema:
    type: string
    description: "PR number or branch name to review"

steps:
  - id: review
    persona: reviewer
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Review the code changes for: {{ input }}

        ## Fetch Changes

        If the input is a PR number (starts with # or is numeric):
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} diff {{ input }}
        {{ forge.cli_tool }} {{ forge.pr_command }} view {{ input }} --json title,body,files
        ```

        If the input is a branch name:
        ```bash
        git diff main...{{ input }}
        git log main...{{ input }} --oneline
        ```

        ## Review Checklist

        1. **Correctness**: Does the code do what it claims? Are edge cases handled?
        2. **Tests**: Are new features tested? Do tests cover error paths?
        3. **Security**: No injection vectors, no credential exposure, proper validation
        4. **Performance**: No unnecessary allocations, no O(n²) where O(n) suffices
        5. **Architecture**: Follows Wave's patterns (single responsibility, interfaces
           for testability, structured errors)
        6. **CLAUDE.md compliance**: Follows all rules in CLAUDE.md
        7. **Commits**: Conventional prefixes, no Co-Authored-By, focused changes

        ## Review Output Format

        For each file changed, note:
        - **Approved**: No issues found
        - **Suggestion**: Non-blocking improvement idea
        - **Request**: Must-fix issue before merge
        - **Question**: Something that needs clarification

        End with an overall verdict: APPROVE, REQUEST_CHANGES, or COMMENT.
    output_artifacts:
      - name: review
        path: .wave/output/review.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/review.md
