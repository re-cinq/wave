kind: WavePipeline
metadata:
  name: wave-evolve
  description: >-
    Self-evolution pipeline that analyzes Wave's own pipeline YAML, persona
    definitions, prompt templates, and contract schemas for improvement
    opportunities, then applies the highest-impact changes. Examines prompt
    clarity, contract accuracy, retry policies, and execution traces to identify
    where steps retry or produce inconsistent output. Use this to iteratively
    improve Wave's pipeline infrastructure without modifying Go source code.
  release: false

skills:
  - wave
  - "{{ project.skill }}"

input:
  source: cli
  example: "analyze last 5 pipeline runs and improve prompts that had retries"
  schema:
    type: string
    description: "Evolution focus: what aspect of Wave to analyze and improve"

chat_context:
  artifact_summaries:
    - evolution-analysis
    - verification
  suggested_questions:
    - "What improvements were applied to Wave's pipelines?"
    - "Which prompts or contracts were updated?"
    - "Did wave validate pass after changes?"
  focus_areas:
    - "Pipeline infrastructure improvements"
    - "Validation and verification results"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  result:
    step: verify
    artifact: verification

steps:
  - id: analyze
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Analyze Wave's own pipeline infrastructure for improvement opportunities.

        Focus: {{ input }}

        ## Analysis Scope

        1. **Pipeline YAML files** (`.wave/pipelines/`):
           - Are prompts clear and unambiguous?
           - Do contracts match what agents actually produce?
           - Are retry/failure policies appropriate?
           - Are artifact handoffs complete and correct?

        2. **Persona definitions** (`.wave/personas/`):
           - Are role descriptions focused and actionable?
           - Do permissions match actual needs?
           - Are constraints specific enough to prevent drift?

        3. **Prompt templates** (`.wave/prompts/`):
           - Are instructions structured for LLM comprehension?
           - Do they include concrete examples?
           - Are output format requirements explicit?

        4. **Contract schemas** (`.wave/contracts/`):
           - Do schemas match what steps actually produce?
           - Are required fields truly required?
           - Are validation errors actionable?

        5. **Execution patterns** — check `.wave/traces/` if available:
           - Which steps retry most often? Why?
           - Which contracts fail most? Schema mismatch?
           - Which prompts produce inconsistent output?

        Produce a prioritized list of improvements with impact assessment.
    output_artifacts:
      - name: evolution-analysis
        path: .wave/output/evolution-analysis.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/evolution-analysis.json
        schema_path: .wave/contracts/improvement-assessment.schema.json
        on_failure: retry

  - id: evolve
    persona: craftsman
    model: strongest
    dependencies: [analyze]
    memory:
      inject_artifacts:
        - step: analyze
          artifact: evolution-analysis
          as: findings
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        Apply the recommended improvements to Wave's pipeline infrastructure.

        IMPORTANT: Only modify files under `.wave/` — pipelines, personas, prompts,
        and contracts. Do NOT modify Go source code.

        ## Rules

        1. Make one improvement at a time
        2. Validate YAML syntax after each change
        3. Ensure contract schemas remain valid JSON
        4. Preserve backward compatibility with existing pipeline runs
        5. Focus on the highest-impact improvements first
        6. Skip changes rated as high-risk

        ## Validation

        After changes, run:
        ```bash
        wave validate
        ```

        If validation fails, fix the issue before proceeding.
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "wave validate"
        must_pass: true
        on_failure: retry

  - id: verify
    persona: reviewer
    model: strongest
    dependencies: [evolve]
    memory:
      inject_artifacts:
        - step: analyze
          artifact: evolution-analysis
          as: original_findings
    exec:
      type: prompt
      source: |
        Verify the evolution changes were applied correctly.

        1. Read modified `.wave/` files and confirm improvements match findings
        2. Check YAML syntax is valid
        3. Verify contract schemas are valid JSON
        4. Confirm no Go source code was modified
        5. Run `wave validate` to verify configuration integrity

        Produce a verification report.
    output_artifacts:
      - name: verification
        path: .wave/output/verification.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .wave/contracts/verification-criteria.md
        source: .wave/output/verification.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: warn
