kind: WavePipeline
metadata:
  name: audit-coverage
  description: >-
    Requirements coverage audit that parses issue acceptance criteria and validates
    implementation addresses each criterion. Lists unaddressed or partially addressed
    requirements. Produces structured findings in shared-findings format for
    cross-pipeline aggregation.
  release: true

skills:
  - software-design

input:
  source: cli
  example: "audit requirements coverage for the authentication feature"

chat_context:
  artifact_summaries:
    - findings
    - report
  suggested_questions:
    - "Which acceptance criteria are fully met?"
    - "What requirements are missing or partially implemented?"
    - "Is there any scope creep beyond the requirements?"
  focus_areas:
    - "Requirements traceability"
    - "Coverage gaps and missing features"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] coverage audit started run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-findings
    event: step_completed
    type: command
    command: "echo '[{{ pipeline_name }}] step completed: $WAVE_HOOK_STEP_ID' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: report
    artifact: report

steps:
  - id: scan
    persona: navigator
    contexts: [validation]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source_path: .wave/prompts/audit/coverage-scan.md
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip

  - id: report
    persona: summarizer
    model: cheapest
    contexts: [validation]
    dependencies: [scan]
    memory:
      inject_artifacts:
        - step: scan
          artifact: findings
          as: scan_findings
    exec:
      type: prompt
      source: |
        ## Objective

        Synthesize the requirements coverage scan findings into a concise, actionable
        report. Your audience is the engineering team that needs to understand which
        requirements are met and which have gaps.

        ## Context

        The injected `scan_findings` artifact contains structured findings from the
        coverage audit scan. Each finding has a type, severity, file reference, and
        description. Your job is to organize these into a clear traceability report.

        ## Requirements

        1. **Requirements Traceability Matrix**: Table mapping each acceptance criterion
           to its implementation status (complete, partial, missing) with file references.
        2. **Critical Gaps**: Core requirements that are completely unaddressed.
        3. **Partial Implementations**: Requirements that are partially addressed with
           details on what is missing.
        4. **Scope Assessment**: Any implementation beyond stated requirements (informational).
        5. **Recommendations**: Prioritized list of gaps to address, ordered by requirement
           priority and effort.

        ## Output Format

        A clean markdown report at the output artifact path. Use headers, tables, and
        bullet lists for scannability.
    output_artifacts:
      - name: report
        path: .wave/output/coverage-report.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .wave/contracts/quality-review-criteria.md
        source: .wave/output/coverage-report.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: warn
