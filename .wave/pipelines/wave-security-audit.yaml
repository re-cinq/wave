kind: WavePipeline
metadata:
  name: wave-security-audit
  description: >-
    Security audit tailored to Wave's own threat model. Builds a threat model
    covering prompt injection, sandbox escape, permission bypass, credential
    exposure, state corruption, and artifact tampering, then verifies each
    high/critical threat against the actual codebase with data flow tracing.
    Use this to validate Wave's security boundaries after changes to workspace
    isolation, persona enforcement, or adapter integration.
  release: false

skills:
  - wave
  - "{{ project.skill }}"

input:
  source: cli
  example: "audit persona permission enforcement and sandbox isolation"
  schema:
    type: string
    description: "Security audit focus area, or empty for full audit"

chat_context:
  artifact_summaries:
    - threat-model
    - security-report
  suggested_questions:
    - "What security threats were identified in Wave's architecture?"
    - "Were any threats confirmed as exploitable?"
    - "What is the remediation priority?"
  focus_areas:
    - "Threat model coverage"
    - "Confirmed vulnerabilities and mitigations"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: verify
    artifact: security-report

steps:
  - id: threat-model
    persona: navigator
    max_concurrent_agents: 3
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Build a threat model for Wave's security surface.

        Focus: {{ input }}

        ## Threat Categories

        1. **Prompt injection**: Can pipeline inputs or artifact contents manipulate
           persona behavior? Check system prompt assembly in CLAUDE.md generation.

        2. **Sandbox escape**: Can a persona break out of its workspace isolation?
           Check worktree creation, mount modes, path validation.

        3. **Permission bypass**: Can a persona exceed its declared deny/allow rules?
           Check how settings.json is generated and enforced.

        4. **Credential exposure**: Are API tokens, SSH keys, or environment variables
           accessible to personas that shouldn't have them?

        5. **State corruption**: Can a failing step corrupt the SQLite state DB
           or leave workspaces in an inconsistent state?

        6. **Artifact tampering**: Can a step inject malicious content into artifacts
           that downstream steps trust?

        Map each threat to specific code locations in `internal/`.
    output_artifacts:
      - name: threat-model
        path: .wave/output/threat-model.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/threat-model.json
        schema_path: .wave/contracts/security-scan.schema.json
        on_failure: retry

  - id: verify
    persona: auditor
    model: strongest
    dependencies: [threat-model]
    memory:
      inject_artifacts:
        - step: threat-model
          artifact: threat-model
          as: threats
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Verify each threat from the threat model against the actual codebase.

        For each HIGH/CRITICAL threat:
        1. Read the code at the reported location
        2. Trace the data flow from untrusted input to security boundary
        3. Confirm whether the threat is exploitable
        4. Check for existing mitigations (validation, sanitization, sandboxing)
        5. Propose specific fixes with code references

        Produce a security report with confirmed findings and remediation plan.
    output_artifacts:
      - name: security-report
        path: .wave/output/security-report.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/security-report.md
