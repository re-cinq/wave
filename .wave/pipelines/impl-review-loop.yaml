kind: WavePipeline
metadata:
  name: impl-review-loop
  description: "Implement → review → triage → rework loop until PR passes or max iterations"
  category: composition
  release: true

input:
  source: cli
  example: "https://github.com/owner/repo/issues/42"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

steps:
  - id: implement
    type: pipeline
    pipeline: impl-issue
    input: "{{ input }}"

  - id: review
    type: pipeline
    pipeline: ops-pr-review
    dependencies: [implement]
    input: "{{ implement.output.pr_url }}"

  - id: check-verdict
    type: conditional
    dependencies: [review]
    condition:
      artifact: review.verdict
      json_path: .verdict
    edges:
      - target: done
        condition: "outcome=APPROVE"
      - target: rework
        condition: "outcome=REQUEST_CHANGES"
      - target: done
        condition: "outcome=COMMENT"

  - id: rework
    type: pipeline
    pipeline: ops-pr-fix-review
    dependencies: [check-verdict]
    input: "{{ implement.output.pr_url }}"

  - id: re-review
    type: pipeline
    pipeline: ops-pr-review
    dependencies: [rework]
    input: "{{ implement.output.pr_url }}"

  - id: check-re-review
    type: conditional
    dependencies: [re-review]
    condition:
      artifact: re-review.verdict
      json_path: .verdict
    edges:
      - target: done
        condition: "outcome=APPROVE"
      - target: done
        condition: "outcome=REQUEST_CHANGES"
      - target: done
        condition: "outcome=COMMENT"

  - id: done
    type: command
    dependencies: [check-verdict, check-re-review]
    command: |
      echo "Review loop complete for {{ input }}"
