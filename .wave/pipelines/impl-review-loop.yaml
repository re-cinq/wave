kind: WavePipeline
metadata:
  name: impl-review-loop
  description: >-
    Implement a GitHub issue, review the PR, and rework if needed in a closed
    loop. Chains impl-issue into ops-pr-review, then conditionally triggers
    rework and re-review when changes are requested. The loop terminates on
    approval, comment-only feedback, or after one rework cycle. Use this for
    hands-off issue-to-merge workflows.
  category: composition
  release: true

input:
  source: cli
  example: "https://github.com/owner/repo/issues/42"

chat_context:
  artifact_summaries:
    - implement
    - review
  suggested_questions:
    - "What was the review verdict?"
    - "Were rework changes needed?"
    - "Is the PR ready to merge?"
  focus_areas:
    - "Review findings and rework status"
    - "PR merge readiness"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

steps:
  - id: implement
    type: pipeline
    pipeline: impl-issue
    input: "{{ input }}"

  - id: review
    type: pipeline
    pipeline: ops-pr-review
    dependencies: [implement]
    input: "{{ implement.output.pr_url }}"

  - id: check-verdict
    type: conditional
    dependencies: [review]
    condition:
      artifact: review.verdict
      json_path: .verdict
    edges:
      - target: done
        condition: "outcome=APPROVE"
      - target: rework
        condition: "outcome=REQUEST_CHANGES"
      - target: done
        condition: "outcome=COMMENT"

  - id: rework
    type: pipeline
    pipeline: ops-pr-fix-review
    dependencies: [check-verdict]
    input: "{{ implement.output.pr_url }}"

  - id: re-review
    type: pipeline
    pipeline: ops-pr-review
    dependencies: [rework]
    input: "{{ implement.output.pr_url }}"

  - id: check-re-review
    type: conditional
    dependencies: [re-review]
    condition:
      artifact: re-review.verdict
      json_path: .verdict
    edges:
      - target: done
        condition: "outcome=APPROVE"
      - target: done
        condition: "outcome=REQUEST_CHANGES"
      - target: done
        condition: "outcome=COMMENT"

  - id: done
    type: command
    dependencies: [check-verdict, check-re-review]
    command: |
      echo "Review loop complete for {{ input }}"
