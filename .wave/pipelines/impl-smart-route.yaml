kind: WavePipeline
metadata:
  name: impl-smart-route
  description: "Auto-route issues to the right implementation pipeline based on complexity"
  category: composition
  release: true

input:
  source: cli
  example: "https://github.com/owner/repo/issues/42"

steps:
  - id: assess
    persona: navigator
    model: claude-haiku
    exec:
      type: prompt
      source: |
        Assess the complexity of: {{ input }}
        Output JSON: {"complexity": "simple|medium|complex", "reason": "..."}
    output_artifacts:
      - name: assessment
        path: .wave/output/complexity.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .wave/output/complexity.json
        schema_path: .wave/contracts/issue-assessment.schema.json
        on_failure: retry
    retry:
      policy: patient
      max_attempts: 2

  - id: route
    dependencies: [assess]
    branch:
      on: "{{ assess.output.complexity }}"
      cases:
        simple: impl-issue
        medium: impl-issue
        complex: impl-speckit
