kind: WavePipeline
metadata:
  name: audit-unwired
  description: >-
    Find features that exist in code but have no runtime path from CLI commands,
    pipeline execution, WebUI routes, or adapter capabilities. Traces entry points
    through cmd/ and internal/ to identify exported functions and types with no
    callers. Use this to detect unwired functionality that was implemented but
    never connected to a user-facing surface.
  release: true
  category: audit

input:
  source: cli
  example: "internal/"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What unwired functionality was found?"
    - "Which features have no runtime path from any entry point?"
    - "Should unwired code be connected or removed?"
  focus_areas:
    - "Unwired exports and dead features"
    - "Entry point coverage gaps"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  findings:
    step: scan
    artifact: findings

steps:
  - id: scan
    persona: navigator
    model: cheapest
    max_concurrent_agents: 3
    contexts: [execution, configuration]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Audit for unwired functionality in the Go codebase at /project.
        Scope: {{ input }}

        Trace runtime entry points:
        1. CLI commands: /project/cmd/wave/commands/*.go
        2. Pipeline executor features: /project/internal/pipeline/executor.go
        3. WebUI routes: /project/internal/webui/routes.go
        4. Adapter capabilities: /project/internal/adapter/*.go

        For each exported function/type in internal/ packages, verify it has a caller from cmd/ or another package.

        Write your findings to .wave/output/unwired-findings.json (the contract schema defines the required structure).
    output_artifacts:
      - name: findings
        path: .wave/output/unwired-findings.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .wave/output/unwired-findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip
