# Wave Scope Audit — Composition Pipeline
#
# Exercises: iterate (parallel fan-out), aggregate (merge findings),
#            sub-pipeline, human gate, loop (revise until approved),
#            thread continuity, model routing, lifecycle hooks
#
# Execution flow:
#
#   run-audits              ← iterate (parallel, max_concurrent: 4): fan out
#   ├─ audit-dead-code      │  6 audit pipelines in parallel, each produces
#   ├─ audit-unwired        │  a findings JSON artifact
#   ├─ audit-duplicates     │
#   ├─ audit-doc            │
#   ├─ audit-junk-code      │
#   └─ audit-dx             │
#        │
#   merge-findings          ← aggregate: merge all findings into one JSON
#        │
#   synthesize              ← opus philosopher: unified report + scope document
#        │
#   approve-scope           ← human gate: review scope doc
#   ├─ approve → create-issues
#   └─ revise  → synthesize (loop back)

kind: WavePipeline
metadata:
  name: wave-scope-audit
  description: >-
    Deep composition audit that fans out dead-code, unwired, duplicate, and doc
    scans in parallel, merges all findings, and synthesizes a unified scope
    document defining what Wave is and is not. Gates on human approval before
    creating follow-up issues. Use this to establish or refine Wave's
    architectural boundaries and generate a prioritized cleanup backlog.
  category: composition
  release: false

input:
  source: cli
  example: "https://github.com/re-cinq/wave/issues/655"

chat_context:
  artifact_summaries:
    - audit-report
    - wave-scope
    - created-issues
  suggested_questions:
    - "What is Wave's defined scope?"
    - "What follow-up issues were created?"
    - "Which packages were flagged for removal?"
  focus_areas:
    - "Architectural boundary definition"
    - "Package and pipeline fleet assessment"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[wave-scope-audit] started run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-step
    event: step_completed
    type: command
    command: "echo '[wave-scope-audit] step=$WAVE_HOOK_STEP_ID completed' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  issues:
    step: create-issues
    artifact: created-issues

steps:
  # ── Phase 1: Fan out 6 audit pipelines in parallel ──────────────────────
  - id: run-audits
    pipeline: "{{ item }}"
    input: "{{ input }}"
    iterate:
      over: '["audit-dead-code-scan", "audit-unwired", "audit-duplicates", "audit-doc-scan"]'
      mode: parallel
      max_concurrent: 4

  # ── Phase 2: Merge all findings into one JSON ───────────────────────────
  - id: merge-findings
    dependencies: [run-audits]
    aggregate:
      from: "{{ run-audits.output }}"
      into: .wave/output/merged-findings.json
      strategy: merge_arrays

  # ── Phase 3: Synthesize unified report + scope document ─────────────────
  - id: synthesize
    persona: philosopher
    model: strongest
    thread: scope-audit
    contexts: [delivery, quality, configuration]
    dependencies: [merge-findings]
    memory:
      inject_artifacts:
        - step: merge-findings
          artifact: merged-findings
          as: merged_findings
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Four parallel audits have completed for Wave. Their merged findings are
        injected as .wave/artifacts/merged_findings. Read it.

        Also scan /project to verify findings against the actual codebase.

        Produce TWO artifacts:

        1. **.wave/output/audit-synthesis.md** — Unified audit report:
           - Executive summary (3 sentences)
           - Top 10 findings by impact
           - Package health matrix (every internal/ package: active/dead/partial)
           - Pipeline fleet assessment (59 pipelines: core/useful/remove)
           - Persona fleet assessment (31 personas: essential/specialized/remove)
           - Recommended consolidation actions (ordered by impact)

        2. **.wave/output/wave-scope.md** — Scope definition:
           - What Wave IS (5 bullet points — core identity)
           - What Wave IS NOT (explicit boundaries)
           - Package inventory table with verdict per package
           - Follow-up issue titles for each recommended action

        Be opinionated. This defines Wave's boundaries going forward.
        Run-ID: {{ run.id }}
    output_artifacts:
      - name: audit-report
        path: .wave/output/audit-synthesis.md
        type: markdown
      - name: wave-scope
        path: .wave/output/wave-scope.md
        type: markdown
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/wave-scope.md
        on_failure: retry

  # ── Phase 4: Human gate — approve scope before issue creation ───────────
  - id: approve-scope
    type: gate
    dependencies: [synthesize]
    gate:
      type: approval
      prompt: |
        Wave scope audit complete. Review .wave/output/wave-scope.md and .wave/output/audit-synthesis.md.

        Approve to create follow-up issues from the findings, or revise to loop back.
      choices:
        - key: approve
          label: "Approve and create follow-up issues"
          target: create-issues
        - key: revise
          label: "Revise — loop back to synthesis"
          target: synthesize
      freeform: true
      timeout: 24h

  # ── Phase 5: Create follow-up issues from approved scope ────────────────
  - id: create-issues
    persona: craftsman
    model: strongest
    contexts: [delivery]
    dependencies: [approve-scope]
    memory:
      inject_artifacts:
        - step: synthesize
          artifact: wave-scope
          as: scope
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        Read the approved scope document at .wave/artifacts/scope.

        For each "Follow-Up Issue" in the scope document, create a GitHub issue:
        ```
        {{ forge.cli_tool }} issue create --title "scope: ..." --body "From wave-scope-audit run {{ run.id }}. ..."
        ```

        Use label "scope-audit" on all issues.
        Write a summary to .wave/output/created-issues.md listing all created issues.
    output_artifacts:
      - name: created-issues
        path: .wave/output/created-issues.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/created-issues.md
        on_failure: skip
