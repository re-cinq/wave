kind: WavePipeline
metadata:
  name: full-impl-cycle
  description: >-
    Unified composition pipeline that orchestrates the complete implementation
    lifecycle: issue implementation, test generation, five-dimension parallel
    auditing (security, correctness, architecture, tests, coverage), intelligent
    rework gating with iterative fix loops, PR creation, and review/fix cycle.
    Use this for hands-off issue-to-merge workflows with comprehensive quality
    assurance.
  category: composition
  release: true

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  schema:
    type: string
    description: "GitHub repository and issue number"
  example: "re-cinq/wave 42"

chat_context:
  artifact_summaries:
    - implement
    - test-gen
    - audit-findings
    - rework-verdict
    - pr-result
    - review-verdict
  suggested_questions:
    - "What was the audit verdict?"
    - "Were rework iterations needed?"
    - "What was the review outcome?"
    - "Is the PR ready to merge?"
  focus_areas:
    - "Audit findings and rework status"
    - "PR review verdict"
    - "Implementation quality"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] full impl cycle started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  pr:
    step: create-pr
    artifact: pr-result

steps:
  # ─── Phase 1: Implementation ───────────────────────────────────────────
  - id: impl
    pipeline: impl-issue-core
    input: "{{ input }}"

  # ─── Phase 2: Test Generation ──────────────────────────────────────────
  - id: test-gen
    pipeline: test-gen
    input: "Generate tests for the changes made by the implementation step"
    dependencies: [impl]

  # ─── Phase 3: Five-Dimension Audit (parallel) ─────────────────────────
  - id: audit-security
    pipeline: audit-security
    input: "Audit security of the implementation for {{ input }}"
    dependencies: [test-gen]

  - id: audit-correctness
    pipeline: audit-correctness
    input: "Audit correctness of the implementation for {{ input }}"
    dependencies: [test-gen]

  - id: audit-architecture
    pipeline: audit-architecture
    input: "Audit architecture of the implementation for {{ input }}"
    dependencies: [test-gen]

  - id: audit-tests
    pipeline: audit-tests
    input: "Audit test quality of the implementation for {{ input }}"
    dependencies: [test-gen]

  - id: audit-coverage
    pipeline: audit-coverage
    input: "Audit requirements coverage of the implementation for {{ input }}"
    dependencies: [test-gen]

  # ─── Phase 4: Findings Aggregation ─────────────────────────────────────
  - id: merge-findings
    persona: navigator
    model: cheapest
    dependencies: [audit-security, audit-correctness, audit-architecture, audit-tests, audit-coverage]
    memory:
      inject_artifacts:
        - step: audit-security
          artifact: findings
          as: security_findings
        - step: audit-correctness
          artifact: findings
          as: correctness_findings
        - step: audit-architecture
          artifact: findings
          as: architecture_findings
        - step: audit-tests
          artifact: findings
          as: tests_findings
        - step: audit-coverage
          artifact: findings
          as: coverage_findings
    exec:
      type: prompt
      source_path: .wave/prompts/full-impl-cycle/audit-aggregate.md
    output_artifacts:
      - name: aggregated-findings
        path: .wave/output/aggregated-findings.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/aggregated-findings.json
        schema_path: .wave/contracts/aggregated-findings.schema.json
        on_failure: skip

  # ─── Phase 5: Rework Gate ──────────────────────────────────────────────
  - id: rework-gate
    persona: navigator
    model: cheapest
    dependencies: [merge-findings]
    memory:
      inject_artifacts:
        - step: merge-findings
          artifact: aggregated-findings
          as: aggregated_findings
    exec:
      type: prompt
      source_path: .wave/prompts/full-impl-cycle/rework-gate.md
    output_artifacts:
      - name: rework-verdict
        path: .wave/output/rework-gate-verdict.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/rework-gate-verdict.json
        schema_path: .wave/contracts/rework-gate-verdict.schema.json
        on_failure: skip

  # ─── Phase 6: Rework Loop (conditional on gate fail) ───────────────────
  - id: rework-loop
    dependencies: [rework-gate]
    loop:
      max_iterations: 3
      until: "{{ rework-loop.output.decision == 'pass' }}"
      steps:
        - id: rework
          persona: craftsman
          model: balanced
          rework_only: true
          memory:
            inject_artifacts:
              - step: rework-gate
                artifact: rework-verdict
                as: gate_verdict
          workspace:
            type: worktree
            branch: "{{ pipeline_id }}"
          exec:
            type: prompt
            source: |
              REWORK — fix the findings flagged by the audit gate.

              ## Objective

              The audit gate has flagged critical/major findings that must be resolved
              before this implementation can proceed to PR creation. Read the injected
              gate verdict to understand what needs fixing, then apply targeted fixes.

              ## Context

              The `gate_verdict` artifact contains:
              - `aggregated_feedback`: a structured list of blocking findings
              - `blocking_findings`: array with source_audit, severity, file, description

              Focus on the blocking findings only. Do NOT address minor/suggestion-level
              findings in this rework pass.

              ## Requirements

              1. Read each blocking finding and understand the root cause
              2. Apply the minimal fix for each finding
              3. Run tests to verify fixes don't introduce regressions
              4. Commit fixes with descriptive messages

              ## Constraints

              - Fix ONLY the flagged findings. Do not refactor or improve unrelated code.
              - Keep the diff as small as possible.
              - Do NOT delete tests. Fix the underlying issue instead.
          retry:
            policy: aggressive
            max_attempts: 2
          handover:
            contract:
              type: test_suite
              command: "{{ project.contract_test_command }}"
              must_pass: true
              on_failure: fail

        - id: re-test-gen
          pipeline: test-gen
          input: "Generate additional tests for rework fixes"
          dependencies: [rework]

        - id: re-audit-security
          pipeline: audit-security
          input: "Re-audit security after rework for {{ input }}"
          dependencies: [re-test-gen]

        - id: re-audit-correctness
          pipeline: audit-correctness
          input: "Re-audit correctness after rework for {{ input }}"
          dependencies: [re-test-gen]

        - id: re-audit-architecture
          pipeline: audit-architecture
          input: "Re-audit architecture after rework for {{ input }}"
          dependencies: [re-test-gen]

        - id: re-audit-tests
          pipeline: audit-tests
          input: "Re-audit test quality after rework for {{ input }}"
          dependencies: [re-test-gen]

        - id: re-audit-coverage
          pipeline: audit-coverage
          input: "Re-audit requirements coverage after rework for {{ input }}"
          dependencies: [re-test-gen]

        - id: re-aggregate
          persona: navigator
          model: cheapest
          dependencies: [re-audit-security, re-audit-correctness, re-audit-architecture, re-audit-tests, re-audit-coverage]
          memory:
            inject_artifacts:
              - step: re-audit-security
                artifact: findings
                as: security_findings
              - step: re-audit-correctness
                artifact: findings
                as: correctness_findings
              - step: re-audit-architecture
                artifact: findings
                as: architecture_findings
              - step: re-audit-tests
                artifact: findings
                as: tests_findings
              - step: re-audit-coverage
                artifact: findings
                as: coverage_findings
          exec:
            type: prompt
            source_path: .wave/prompts/full-impl-cycle/audit-aggregate.md
          output_artifacts:
            - name: aggregated-findings
              path: .wave/output/aggregated-findings.json
              type: json
          handover:
            contract:
              type: json_schema
              source: .wave/output/aggregated-findings.json
              schema_path: .wave/contracts/aggregated-findings.schema.json
              on_failure: skip

        - id: re-gate
          persona: navigator
          model: cheapest
          dependencies: [re-aggregate]
          memory:
            inject_artifacts:
              - step: re-aggregate
                artifact: aggregated-findings
                as: aggregated_findings
          exec:
            type: prompt
            source_path: .wave/prompts/full-impl-cycle/rework-gate.md
          output_artifacts:
            - name: rework-verdict
              path: .wave/output/rework-gate-verdict.json
              type: json
          handover:
            contract:
              type: json_schema
              source: .wave/output/rework-gate-verdict.json
              schema_path: .wave/contracts/rework-gate-verdict.schema.json
              on_failure: skip

  # ─── Phase 7: PR Creation ──────────────────────────────────────────────
  - id: create-pr
    pipeline: wave-land
    input: "{{ input }}"
    dependencies: [rework-gate, rework-loop]

  # ─── Phase 8: Review + Fix Loop ────────────────────────────────────────
  - id: review
    pipeline: ops-pr-review-core
    input: "{{ create-pr.output.pr_url }}"
    dependencies: [create-pr]

  - id: review-loop
    dependencies: [review]
    loop:
      max_iterations: 3
      until: "{{ review-loop.output.verdict == 'APPROVE' }}"
      steps:
        - id: fix
          pipeline: ops-pr-fix-review
          input: "{{ create-pr.output.pr_url }}"
        - id: re-review
          pipeline: ops-pr-review-core
          input: "{{ create-pr.output.pr_url }}"
          dependencies: [fix]
