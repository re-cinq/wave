kind: WavePipeline
metadata:
  name: audit-dead-code-review
  description: >-
    Scan only the files changed in a pull request for dead code and post a
    review comment with findings. Use this as a PR review gate to catch dead
    code introduced or exposed by a change before it merges. Scopes analysis
    to the PR diff, composes a summary, and publishes it as a PR comment.
  release: true

requires:
  tools:
    - go
    - gh

skills:
  - software-design

input:
  source: cli
  example: "https://github.com/re-cinq/wave/pull/42"

chat_context:
  artifact_summaries:
    - findings
    - publish-result
  suggested_questions:
    - "What dead code was found in the PR diff?"
    - "Were findings posted as a review comment?"
    - "Are any findings false positives?"
  focus_areas:
    - "Dead code in changed files"
    - "Review comment status"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: publish
    artifact: publish-result

steps:
  - id: scan
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Scan only the files changed in the specified pull request for dead or redundant code. This is a PR-scoped dead code review designed to catch dead code introduced or exposed by the PR's changes before it merges. The scope is intentionally narrow: only files in the PR diff are analyzed, but verification of findings is done against the full codebase to avoid false positives.

        ## Context

        This is the first step of a three-step pipeline (scan, compose, publish). The compose step will format findings into a PR review comment. The publish step will post the comment on the PR. The input is a PR URL or number. The codebase is mounted read-only at /project.

        PR to review: {{ input }}

        ## Requirements

        ### 1. Identify Changed Files

        Extract the PR number or URL from the input. Use the forge CLI to get the list of changed files:
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} diff {{ input }} --name-only
        ```
        If the command does not support `--name-only`, use `{{ forge.cli_tool }} {{ forge.pr_command }} view <number> --json files --jq '.files[].path'` or parse the diff output to extract file paths.

        Only analyze files that appear in the PR diff. Do NOT scan the entire codebase.

        ### 2. Scan Changed Files

        For each changed file, check for these dead code categories:

        1. **Unused exports**: Exported functions, types, constants, or variables added or modified by the PR that are never referenced outside their package. Use Grep across the entire codebase (not just the PR diff) to verify cross-references, since the symbol may be used elsewhere.

        2. **Unreachable code**: Code after unconditional return/panic/os.Exit, impossible branches, dead switch cases. Focus on code blocks that were added or modified in the PR diff.

        3. **Orphaned files**: New files added by the PR that are not imported by any other file in the project.

        4. **Redundant code**: Functions in the changed files that duplicate existing functions elsewhere in the codebase. This is particularly important for PRs that add new functionality -- check whether the functionality already exists.

        5. **Stale tests**: Test functions in the changed files that reference symbols that no longer exist, or tests that assert nothing meaningful.

        6. **Unused dependencies**: New imports added by the PR that are not actually used in the changed code.

        7. **Commented-out code**: Blocks of commented-out code introduced in the PR diff. New PRs should not introduce commented-out code.

        8. **Duplicate signatures**: Functions added by the PR with signatures identical to existing functions in other packages.

        ### 3. Verification Protocol

        For each candidate finding, verify it is truly dead by searching the FULL codebase (not just the PR diff):
        - Grep for all references to the symbol across internal/, cmd/, and test files
        - Check for reflect-based or string-based usage
        - Check if the symbol satisfies an interface
        - Check for build tag conditional compilation
        - Assign confidence: HIGH (zero external references after thorough search) or MEDIUM (edge cases like test-only usage)

        Only include findings with HIGH or MEDIUM confidence. Discard LOW confidence candidates.

        ## Constraints and Anti-patterns

        - Do NOT scan files outside the PR diff. The scope is the PR, not the full codebase.
        - Do NOT report pre-existing dead code in unchanged files. Only report dead code in files touched by this PR.
        - Do NOT report symbols that were removed by the PR as dead code (they are being cleaned up, which is good).
        - Do NOT modify any files. The workspace is read-only.
        - Do NOT report standard Go patterns (init(), interface implementations, blank imports for side effects) as dead code.
        - Keep findings actionable. Each finding should describe something the PR author can fix before merging.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good PR-scoped scan focuses tightly on the PR's changes, catches dead code the PR introduces (not pre-existing issues), and produces findings that the PR author can address with a follow-up commit. A bad scan reports pre-existing dead code in untouched files, flags symbols that are used in files not modified by the PR, or produces so many findings that the PR review comment becomes noise.
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip

  - id: compose
    persona: summarizer
    model: cheapest
    dependencies: [scan]
    memory:
      inject_artifacts:
        - step: scan
          artifact: findings
          as: findings
    exec:
      type: prompt
      source: |
        ## Objective

        Transform the structured JSON scan findings into a concise, well-formatted markdown summary suitable for posting as a PR review comment. The comment must be brief enough to read in context of a PR review but informative enough to act on each finding without consulting external artifacts. If no dead code was found, produce a clean one-liner.

        ## Context

        This is the second step of a three-step pipeline (scan, compose, publish). The scan step analyzed the PR's changed files and produced findings injected as the "findings" artifact. The publish step will post this markdown as a comment on the PR. The comment will appear alongside other review comments, so it must be concise and scannable.

        Read the injected findings artifact. Parse the findings array and summary statistics.

        ## Requirements

        ### Handle Zero Findings

        If the scan found zero findings (empty findings array or total_findings == 0):
        Write exactly this text to the output file:
        ```
        No dead code found in the changed files.
        ```
        This single line is the complete output. Do not add headers or formatting.

        ### Compose the Review Comment

        If findings exist, write a markdown summary to `.wave/output/review-comment.md` with these sections:

        1. **Findings count**: A bold line stating the total count and that they are in changed files.

        2. **Summary by Type**: A compact markdown table counting findings by type (dead-code, duplicate, etc.). Omit types with zero findings to keep the table short.

        3. **Findings list**: For each finding, sorted by confidence (HIGH first) then severity (high first), render a compact entry:
           ```
           - **[DC-001]** (`type`) `file:line` -- description
             Suggested action: `recommendation`
           ```
           Include the file:line location so the reviewer can navigate directly to the code. Keep descriptions to one line. Include the recommended action so the PR author knows what to do.

        4. **Footer**: Attribution line: `*Generated by [Wave](https://github.com/re-cinq/wave) dead-code-review pipeline*`

        ### Formatting Rules

        - Do NOT include a title/header line (e.g., "## Dead Code Review"). The publish step adds a title when posting the comment.
        - Keep the total comment under 100 lines. PR review comments that are too long get collapsed by GitHub and lose their impact.
        - Use inline code formatting for file paths, symbol names, and types.
        - Do not use nested lists or complex formatting that renders poorly in PR comment context.
        - Ensure all markdown is valid GitHub-flavored markdown.

        ## Constraints and Anti-patterns

        - Do NOT editorialize or rewrite finding descriptions. Use the scan results as-is.
        - Do NOT add remediation code examples. The comment should identify issues, not fix them.
        - Do NOT omit any findings. Every finding in the scan results must appear in the comment.
        - Do NOT add a top-level title header. The publish step wraps the content with its own title.
        - Do NOT use emoji or decorative formatting.

        ## Output Format

        Write the markdown to `.wave/output/review-comment.md`. The file content will be used directly as the body of a PR comment (after the publish step adds a title).

        ## Quality Bar

        A good review comment is scannable in under 30 seconds, gives the PR author clear action items for each finding, and includes file:line references for direct navigation. A bad review comment is longer than the PR diff itself, buries findings in prose, or omits locations that would help the author find the code.
    output_artifacts:
      - name: review_comment
        path: .wave/output/review-comment.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/review-comment.md

  - id: publish
    persona: "{{ forge.type }}-commenter"
    model: cheapest
    dependencies: [compose]
    memory:
      inject_artifacts:
        - step: compose
          artifact: review_comment
          as: review_summary
    exec:
      type: prompt
      source: |
        ## Objective

        Post the dead code review summary as a comment on the pull request, making the findings visible to the PR author and reviewers directly in the PR conversation. The comment must include a clear title, the full review content, and proper attribution. Capture the comment URL in a result JSON for pipeline outcomes.

        ## Context

        This is the third and final step of the audit-dead-code-review pipeline (scan, compose, publish). The compose step has produced a markdown review summary injected as the "review_summary" artifact. This step wraps it with a title header and posts it as a PR comment. The original input identifying the PR is available.

        The original input was: {{ input }}

        ## Requirements

        ### 1. Extract PR Identifier

        Parse the input to extract the PR number or URL. The input may be:
        - A full URL: `https://github.com/owner/repo/pull/42` -- extract the number (42)
        - A short reference: `#42` or just `42` -- use as-is
        - A URL with additional path segments -- extract the PR number from the path

        ### 2. Read the Review Content

        Read the injected review_summary artifact to get the markdown content produced by the compose step.

        ### 3. Compose and Post the Comment

        Write the complete comment to a temporary file, wrapping the review content with a title:

        ```bash
        cat > /tmp/dead-code-review-comment.md <<'REVIEW_EOF'
        ## Dead Code Review (Wave Pipeline)

        <insert the full review_summary content here>
        REVIEW_EOF
        ```

        Then post it as a PR comment:
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} comment <PR_NUMBER_OR_URL> --body-file /tmp/dead-code-review-comment.md
        ```

        If the comment command fails, retry once. If it fails again, record the error in the result JSON.

        ### 4. Capture Result

        Parse the output of the comment command to extract the comment URL. Write a result JSON to `.wave/output/publish-result.json` matching the gh-pr-comment-result contract schema. Include:
        - `comment_url`: the full URL to the posted comment
        - `pr_number`: the PR number
        - `finding_count`: the number of findings from the review (or 0 if clean)
        - `posted_at`: ISO 8601 timestamp

        ## Constraints and Anti-patterns

        - Do NOT modify the review content. Post it exactly as the compose step produced it, with only the title header added.
        - Do NOT post multiple comments. One comment per pipeline run.
        - Do NOT edit existing comments on the PR. Always create a new comment.
        - Do NOT include Co-Authored-By or AI attribution beyond the Wave attribution already in the review content footer.
        - Do NOT spawn Task subagents. Work directly in the main context.
        - Clean up the temporary file after posting.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good publish step produces a comment that appears cleanly formatted in the PR conversation, with a clear title distinguishing it from human review comments, and a result JSON that accurately captures the comment URL for pipeline outcome tracking. A bad publish step posts malformed markdown, fails silently without recording the error, or posts the comment on the wrong PR.

    output_artifacts:
      - name: publish-result
        path: .wave/output/publish-result.json
        type: json
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/publish-result.json
        schema_path: .wave/contracts/gh-pr-comment-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: url
        extract_from: .wave/output/publish-result.json
        json_path: .comment_url
        label: "Dead Code Review Comment"
