kind: WavePipeline
metadata:
  name: audit-tests
  description: >-
    Test quality audit that analyzes test coverage, test quality, missing tests,
    untested code paths, and gaps in error case coverage. Produces structured
    findings in shared-findings format for cross-pipeline aggregation.
  release: true

skills:
  - software-design

input:
  source: cli
  example: "audit test quality for the pipeline package"

chat_context:
  artifact_summaries:
    - findings
    - report
  suggested_questions:
    - "Which functions lack test coverage?"
    - "Are there happy-path-only tests?"
    - "What edge cases are missing from tests?"
  focus_areas:
    - "Test coverage gaps"
    - "Test quality and edge cases"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] test audit started run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-findings
    event: step_completed
    type: command
    command: "echo '[{{ pipeline_name }}] step completed: $WAVE_HOOK_STEP_ID' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: report
    artifact: report

steps:
  - id: scan
    persona: navigator
    contexts: [validation]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source_path: .wave/prompts/audit/tests-scan.md
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip

  - id: report
    persona: summarizer
    model: cheapest
    contexts: [validation]
    dependencies: [scan]
    memory:
      inject_artifacts:
        - step: scan
          artifact: findings
          as: scan_findings
          schema_path: .wave/contracts/shared-findings.schema.json
    exec:
      type: prompt
      source: |
        ## Objective

        Synthesize the test scan findings into a concise, actionable report.
        Your audience is the engineering team that needs to understand test
        coverage gaps and quality issues.

        ## Context

        The injected `scan_findings` artifact contains structured findings from the
        test audit scan. Each finding has a type, severity, file reference, and
        description. Your job is to organize these into a clear narrative.

        ## Requirements

        1. **Coverage Summary**: Table showing tested vs untested functions/methods
           with coverage assessment.
        2. **Critical Gaps**: Functions with zero test coverage or only happy-path
           tests that handle errors in production.
        3. **Quality Issues**: Weak assertions, implementation-detail tests, and
           test anti-patterns.
        4. **Missing Edge Cases**: Specific edge cases that should be tested,
           organized by function.
        5. **Recommendations**: Prioritized list of tests to add, ordered by risk.

        ## Output Format

        A clean markdown report at the output artifact path. Use headers, tables, and
        bullet lists for scannability.
    output_artifacts:
      - name: report
        path: .wave/output/tests-report.md
        type: markdown
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .wave/contracts/quality-review-criteria.md
        source: .wave/output/tests-report.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: warn
