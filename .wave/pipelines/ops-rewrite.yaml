kind: WavePipeline
metadata:
  name: ops-rewrite
  description: >-
    Issue quality improvement pipeline that analyzes under-specified or
    poorly documented issues, researches the codebase for context, and
    rewrites the issue body with clear acceptance criteria, technical
    details, and implementation guidance.
  release: true

skills:
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  example: "re-cinq/wave 42 or https://github.com/re-cinq/wave/issues/42"
  schema:
    type: string
    description: "GitHub repo with optional issue number, or full issue URL"

chat_context:
  artifact_summaries:
    - enhancement_results
  suggested_questions:
    - "Which issues were enhanced?"
    - "What quality improvements were applied?"
    - "Were all enhancements applied successfully?"
  focus_areas:
    - "Issue quality improvements"
    - "Enhancement success rate"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  result:
    step: apply-enhancements
    artifact: enhancement_results

steps:
  - id: scan-and-score
    persona: "{{ forge.type }}-analyst"
    model: cheapest
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Analyze one or more issues for quality, score each on a 0-100 scale across four
        dimensions (title clarity, description completeness, label hygiene, and acceptance
        criteria), and produce an enhancement plan for every issue scoring below the
        quality threshold. The plan must include rewritten titles, enriched body templates,
        suggested labels, and a specific list of enhancements. The apply-enhancements step
        will execute this plan via the forge CLI, so the plan must be concrete and
        actionable.

        Input: {{ input }}

        ## Context

        This is the first step of the ops-rewrite pipeline. No prior artifacts exist. You
        have access to a worktree and the forge CLI. The input can be:
        - A full issue URL: `https://github.com/OWNER/REPO/issues/NUM` (single mode)
        - An "owner/repo NUM" pair (single mode)
        - An "owner/repo" string without a number (batch mode — scan multiple issues)

        In single mode, you rewrite one specific issue. In batch mode, you scan the 10
        most recent open issues and rewrite those below the quality threshold.

        ## Requirements

        ### Step 1: Parse the Input

        Determine the input format and extract components:
        - **Full URL**: `https://github.com/OWNER/REPO/issues/NUM` — extract REPO and
          NUM. This is single-issue mode.
        - **Short form with number**: `owner/repo NUM` — extract REPO and NUM. Single
          mode.
        - **Repository only**: `owner/repo` with no number — extract REPO. This is batch
          mode.

        ### Step 2: Fetch Issues

        **Single mode**:
        ```bash
        {{ forge.cli_tool }} issue view <NUM> --repo <REPO> --json number,title,body,labels,url
        ```
        IMPORTANT: If the fetch fails (not found, permissions error), STOP immediately.
        Output JSON with `repository` set to REPO, `issues_to_enhance` as an empty array,
        and `total_to_enhance: 0`. Do NOT fall back to batch mode when a specific issue
        was requested. This prevents accidental bulk rewrites when the user meant to
        target one issue.

        **Batch mode**:
        ```bash
        {{ forge.cli_tool }} issue list --repo {{ input }} --limit 10 \
          --json number,title,body,labels,url
        ```

        ### Step 3: Score Each Issue

        For every fetched issue, score quality on a 0-100 scale using these four
        dimensions. Start at 100 and apply deductions.

        **Title clarity (max deduction: -35)**:
        - Title shorter than 10 characters: -20
        - Fewer than 3 words: -15
        - Vague opener ("Fix", "Update", "Issue with", "Problem", "Bug"): -10 if title
          under 30 characters
        - No component reference (the title does not mention a module, package, or
          feature name): -5

        **Description completeness (max deduction: -40)**:
        - Empty or null body: -40
        - Body under 50 characters: -25
        - Body under 100 characters: -10
        - No structured sections (missing any of: problem statement, expected behavior,
          acceptance criteria, technical context): -10

        **Label hygiene (max deduction: -10)**:
        - No labels assigned: -10

        **Acceptance criteria (max deduction: -15)**:
        - No acceptance criteria section or checklist: -15
        - Acceptance criteria present but vague (no testable conditions): -10

        Floor the score at 0. Record each deduction applied with its reason.

        ### Step 4: Create Enhancement Plans

        For each issue scoring below 70, create a detailed enhancement plan:

        - `issue_number`: the issue number
        - `current_score`: the computed quality score
        - `deductions`: array of {reason, points} for each deduction applied
        - `suggested_title`: a rewritten title that is specific, includes the affected
          component, and describes the desired outcome (not just the symptom). If the
          current title is fine (no title deductions), keep it unchanged.
        - `body_template`: a rewritten issue body that PRESERVES the original content
          (quote or incorporate it) while adding:
          - A clear problem statement section
          - Expected behavior
          - Acceptance criteria as a checkbox list with testable conditions
          - Technical context (relevant files, functions, or modules if known)
        - `suggested_labels`: labels to add based on the issue content (bug, enhancement,
          documentation, etc.)
        - `enhancements`: array of specific improvement descriptions

        For issues scoring 70 or above, do NOT include them in `issues_to_enhance`.

        ## Constraints and Anti-patterns

        - Do NOT modify any issues in this step. Scoring and planning only.
        - Do NOT discard the original issue content in the body_template. The rewrite
          must preserve all original information while adding structure.
        - Do NOT fall back to batch mode when a specific issue number was provided.
        - Do NOT score pull requests. If the fetched items include PRs (URL contains
          "/pull/"), skip them.
        - Do NOT fabricate acceptance criteria that are unrelated to the issue's actual
          scope. Derive criteria from the issue's existing content.
        - Avoid over-scoring: an issue with a clear title but empty body should still
          score poorly.

        ## Output Format

        JSON at `.wave/artifact.json` matching the contract schema. Must include:
        - `repository`: owner/repo string
        - `issues_to_enhance`: array of enhancement plan objects (only issues scoring < 70)
        - `total_to_enhance`: count of issues in the array

        ## Quality Bar

        A good enhancement plan rewrites titles to be specific and actionable, preserves
        all original content while adding structure, and suggests realistic acceptance
        criteria derived from the issue's scope. A bad plan discards original content,
        suggests generic acceptance criteria ("it should work"), or produces body templates
        that are shorter than the originals.
    output_artifacts:
      - name: enhancement_plan
        path: .wave/artifact.json
        type: json
        required: true
    retry:
      policy: none
      max_attempts: 1
    handover:
      contract:
        type: json_schema
        schema_path: .wave/contracts/enhancement-plan.schema.json
        validate: true
        must_pass: true
        on_failure: retry

  - id: apply-enhancements
    persona: "{{ forge.type }}-enhancer"
    model: strongest
    dependencies: [scan-and-score]
    memory:
      inject_artifacts:
        - step: scan-and-score
          artifact: enhancement_plan
          as: impl_plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Apply the enhancement plans from the scan-and-score step to the actual issues on
        the forge. For each issue in the plan, update the title, rewrite the body, and
        add suggested labels. Verify each update succeeded and produce a results report
        documenting what was changed. This is the step where the planned improvements
        become visible to the issue tracker users.

        ## Context

        The `impl_plan` artifact (injected at `.wave/artifacts/impl_plan`) contains the
        enhancement plan from the scan-and-score step, including:
        - `repository`: the owner/repo string for CLI commands
        - `issues_to_enhance`: array of enhancement plans, each with `issue_number`,
          `suggested_title`, `body_template`, `suggested_labels`, and `enhancements`
        - `total_to_enhance`: count of issues to process

        If `total_to_enhance` is 0, skip all processing, produce an output JSON with
        `total_attempted: 0` and `total_successful: 0`, and exit cleanly.

        ## Requirements

        ### Step 1: Read the Plan

        Read the `impl_plan` artifact and extract the `repository` field as REPO. Parse
        the `issues_to_enhance` array.

        ### Step 2: Apply Enhancements Sequentially

        For each issue in `issues_to_enhance`, apply the three updates in order:

        **Title update:**
        ```bash
        {{ forge.cli_tool }} issue edit <NUM> --repo <REPO> --title '<suggested_title>'
        ```
        Handle shell quoting carefully. If the title contains single quotes or special
        characters, use double quotes or escape appropriately.

        **Body update:**
        Write the `body_template` to a temporary file, then apply:
        ```bash
        cat > /tmp/issue-body.md <<'BODY_EOF'
        <body_template content>
        BODY_EOF
        {{ forge.cli_tool }} issue edit <NUM> --repo <REPO> --body-file /tmp/issue-body.md
        rm -f /tmp/issue-body.md
        ```

        **Label update:**
        ```bash
        {{ forge.cli_tool }} issue edit <NUM> --repo <REPO> --add-label "<label1>,<label2>"
        ```
        Only add labels that are in the `suggested_labels` array. Do NOT remove existing
        labels.

        **Capture result URL:**
        ```bash
        {{ forge.cli_tool }} issue view <NUM> --repo <REPO> --json url --jq .url
        ```

        ### Step 3: Handle Failures

        If any individual issue update fails (network error, permissions, issue locked),
        record the failure for that issue but continue processing remaining issues. Do
        NOT abort the entire batch because of one failure.

        ### Step 4: Produce Results

        Write a JSON result to `.wave/artifact.json` matching the contract schema:
        - `enhanced_issues`: array of objects, each with:
          - `issue_number`: the issue number
          - `success`: boolean
          - `changes_made`: array of strings describing what was changed (e.g., "title
            updated", "body rewritten with acceptance criteria", "labels added: bug")
          - `url`: the issue URL
          - `error`: error message if success is false, null otherwise
        - `total_attempted`: count of issues processed
        - `total_successful`: count of issues where all three updates succeeded

        ## Constraints and Anti-patterns

        - Do NOT modify issues that are not in the `issues_to_enhance` array.
        - Do NOT remove existing labels. Only add new ones.
        - Do NOT edit the same issue more than once. Apply all changes (title, body,
          labels) in a single pass per issue.
        - Do NOT use `git add -A` or modify the worktree's git state. This step only
          interacts with the forge API.
        - Do NOT continue if the repository field is missing from the plan. Report the
          error.
        - Handle shell quoting in titles and bodies carefully — this is the most common
          source of apply failures.

        ## Output Format

        JSON at `.wave/artifact.json` matching the contract schema.

        ## Quality Bar

        A good apply step successfully updates all planned issues, handles failures
        gracefully for individual issues without aborting the batch, and produces an
        accurate results report. A bad apply step fails on the first quoting issue and
        stops, leaving the remaining issues untouched, or reports success when the update
        was actually truncated or corrupted.
    output_artifacts:
      - name: enhancement_results
        path: .wave/artifact.json
        type: json
        required: true
    outcomes:
      - type: issue
        extract_from: .wave/artifact.json
        json_path: .enhanced_issues[*].url
        label: "Enhanced Issue"
    retry:
      policy: none
      max_attempts: 1
    handover:
      contract:
        type: json_schema
        schema_path: .wave/contracts/enhancement-results.schema.json
        validate: true
        must_pass: true
        on_failure: retry
