kind: WavePipeline
metadata:
  name: audit-duplicates
  description: >-
    Find overlapping or duplicate implementations across packages by comparing
    packages that may solve the same problem (sandbox backends, display layers,
    health checks, routing, state tracking, template variables). Produces JSON
    findings without creating branches or PRs. Use this as a building block in
    composition pipelines or to identify consolidation targets after feature
    sprawl.
  release: true
  category: audit

input:
  source: cli
  example: "internal/"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What duplicate implementations were found?"
    - "Which package pairs have the most overlap?"
    - "Are the duplicates intentional or accidental?"
  focus_areas:
    - "Overlapping functionality between packages"
    - "Consolidation targets"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  findings:
    step: scan
    artifact: findings

steps:
  - id: scan
    persona: navigator
    model: cheapest
    max_concurrent_agents: 3
    contexts: [configuration]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Audit for duplicate or overlapping implementations in the Go codebase at /project.
        Scope: {{ input }}

        Compare packages that might solve the same problem:
        - Sandbox: internal/sandbox/ (docker vs bubblewrap) — both maintained?
        - Display: internal/display/ vs internal/tui/ — overlap?
        - Health: internal/doctor/ vs internal/preflight/ — overlap?
        - Routing: internal/suggest/ vs internal/pipeline/routing.go — both route?
        - State: internal/state/ vs internal/deliverable/ — both track runs?
        - Templates: internal/pipeline/context.go vs internal/manifest/types.go ProjectVars

        Write your findings to .wave/output/duplicate-findings.json (the contract schema defines the required structure).
    output_artifacts:
      - name: findings
        path: .wave/output/duplicate-findings.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .wave/output/duplicate-findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip
