kind: WavePipeline
metadata:
  name: audit-dead-code-scan
  description: >-
    Lightweight dead code scan that produces JSON findings without creating
    branches, PRs, or issues. Checks for unused exports, packages with no
    external importers, and unreachable code paths. Use this as a building
    block in composition pipelines or for quick read-only analysis of a
    specific directory scope.
  release: true
  category: audit

input:
  source: cli
  example: "internal/"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What dead code was detected?"
    - "Which packages have the most unused exports?"
    - "Are there unreachable code paths?"
  focus_areas:
    - "Unused exports and dead branches"
    - "Packages with no external importers"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  findings:
    step: scan
    artifact: findings

steps:
  - id: scan
    persona: navigator
    model: cheapest
    max_concurrent_agents: 3
    contexts: [configuration]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Scan for dead code in the Go codebase at /project. Scope: {{ input }}

        Check each internal/ package for:
        1. Exported functions/types never called outside their package
        2. Packages with no external importers
        3. Unreachable code (dead branches, impossible conditions)

        Use grep to verify: `grep -rn "FunctionName" /project/internal/ /project/cmd/`

        Write your findings to .wave/output/findings.json (the contract schema defines the required structure).
        Max 25 findings. Focus on packages flagged as suspects: bench, browser, continuous, relay.
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip
