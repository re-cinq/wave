kind: WavePipeline
metadata:
  name: wave-bugfix
  description: >-
    Investigate and fix a bug in Wave's own codebase. Performs root cause analysis
    by tracing execution paths, applies a minimal fix, and adds a regression test
    that fails without the fix and passes with it. Loops the fix step through
    test verification until all tests pass. Use this for targeted bug fixes in
    Wave's Go source code.
  release: false

skills:
  - wave
  - "{{ project.skill }}"

input:
  source: cli
  example: "pipeline executor panics when step has nil workspace config"
  schema:
    type: string
    description: "Bug description or symptom to investigate"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What was the root cause of the bug?"
    - "Is the fix minimal and safe for production?"
    - "Are there similar patterns elsewhere that need the same fix?"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: investigate
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Investigate the reported bug in Wave.

        Bug report: {{ input }}

        ## Investigation Steps

        1. **Reproduce understanding**: Parse the bug report for symptoms, error
           messages, stack traces, or reproduction steps.

        2. **Search for the bug**: Use Grep to find relevant code paths, error
           strings, or function names mentioned in the report.

        3. **Trace the execution path**: Read the code from entry point to failure
           point. Map the call chain.

        4. **Identify root cause**: What specific condition triggers the bug?
           Is it a nil check, type assertion, race condition, logic error?

        5. **Assess blast radius**: What other code paths share the same pattern?
           Could the fix introduce regressions?

        6. **Check recent commits**: `git log --oneline -20` — was this recently
           introduced?

        Produce a findings report with root cause, affected files, and fix strategy.
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/bug-investigation.schema.json
        on_failure: retry

  - id: fix
    persona: craftsman
    model: strongest
    dependencies: [investigate]
    thread: bugfix
    max_visits: 3
    memory:
      inject_artifacts:
        - step: investigate
          artifact: findings
          as: investigation
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        Fix the bug based on the investigation findings.

        ## Rules

        1. Apply the MINIMAL fix — don't refactor surrounding code
        2. Add a regression test that reproduces the original bug
        3. The test must FAIL without the fix and PASS with it
        4. Run the project's test suite to verify no regressions
        5. If the fix touches concurrent code, add race detector coverage

        Run the full test suite before finishing.
    retry:
      policy: standard
      max_attempts: 3
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry

  - id: run-tests
    type: command
    dependencies: [fix]
    script: "{{ project.contract_test_command }}"

  - id: gate
    type: conditional
    dependencies: [run-tests]
    edges:
      - target: _complete
        condition: "outcome=success"
      - target: fix
