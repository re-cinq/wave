kind: WavePipeline
metadata:
  name: audit-consolidate
  description: >-
    Detect redundant implementations, parallel abstractions, and architectural
    drift across the codebase. Scans for duplicate logic, inconsistent patterns,
    dead abstractions, package boundary violations, and naming mismatches. Use
    this after rapid development periods to identify consolidation opportunities
    and restore architectural coherence.
  release: true

skills:
  - software-design

input:
  source: cli
  example: "internal/pipeline — check for redundant patterns"
  schema:
    type: string
    description: "Package or directory scope to analyze, or empty for full codebase"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What redundant implementations were found?"
    - "Which consolidation opportunities have the best effort-to-impact ratio?"
    - "Are there naming inconsistencies that should be unified?"
  focus_areas:
    - "Duplicate logic and parallel abstractions"
    - "Consolidation strategies and effort estimates"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  findings:
    step: scan
    artifact: findings

steps:
  - id: scan
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Scan for redundant implementations and architectural drift.

        Scope: {{ input }}

        ## What to Look For

        1. **Duplicate logic**: Functions doing the same thing in different packages.
           Search for similar function signatures and bodies.

        2. **Parallel abstractions**: Multiple interfaces or types representing
           the same concept (e.g., two different error types for the same domain).

        3. **Inconsistent patterns**: Same operation done differently in different
           places (e.g., file reading with os.ReadFile in one place, io.ReadAll in another).

        4. **Dead abstractions**: Interfaces with only one implementation,
           wrapper types that add no value.

        5. **Package boundary violations**: Packages reaching into each other's
           internals instead of using proper interfaces.

        6. **Naming inconsistencies**: Same concept with different names across
           packages (e.g., "workspace" vs "workdir" vs "cwd").

        ## Analysis

        For each finding:
        - List the affected file:line locations
        - Explain what's redundant or inconsistent
        - Propose a consolidation strategy
        - Assess effort (trivial/small/medium/large) and risk

        Write your findings to `.wave/output/findings.json` (the contract schema defines the required structure).

        Use `"type": "duplicate"` for duplicate logic and parallel abstractions, `"type": "style"` for naming
        inconsistencies, `"type": "other"` for package boundary violations and dead abstractions.
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip
