kind: WavePipeline
metadata:
  name: wave-test-forge
  description: "Cross-forge smoke test — validates forge detection, CLI auth, API access, and template resolution"
  release: false
  category: wave

input:
  source: cli
  example: "full forge validation"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[wave-test-forge] started run={{ pipeline_id }} forge={{ forge.type }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-step
    event: step_completed
    type: command
    command: "echo '[wave-test-forge] step=$WAVE_HOOK_STEP_ID completed' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  # Step 1: Detect forge and verify template variables resolve
  - id: detect-forge
    persona: navigator
    model: cheapest
    max_concurrent_agents: 3
    contexts: [configuration]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        You are validating Wave's forge detection. Report these values:

        1. Forge type: {{ forge.type }}
        2. CLI tool: {{ forge.cli_tool }}
        3. PR command: {{ forge.pr_command }}
        4. PR term: {{ forge.pr_term }}
        5. Pipeline prefix: {{ forge.prefix }}
        6. Host: {{ forge.host }}
        7. Owner: {{ forge.owner }}
        8. Repo: {{ forge.repo }}
        9. Run ID: {{ run.id }}

        Write a JSON report to .wave/output/forge-detect.json with these fields.
        If any value is empty, note it as "not_set" (this is expected for ForgeLocal).
    output_artifacts:
      - name: forge-detect
        path: .wave/output/forge-detect.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/forge-detect.json
        on_failure: retry

  # Step 2: Verify CLI tool is available (parallel with step 3)
  - id: verify-cli
    type: command
    script: |
      CLI="{{ forge.cli_tool }}"
      if [ -z "$CLI" ]; then
        echo '{"cli":"none","status":"skipped","reason":"no forge CLI (local mode)"}' > .wave/output/cli-check.json
        exit 0
      fi
      if command -v "$CLI" > /dev/null 2>&1; then
        VERSION=$($CLI --version 2>&1 | head -1)
        echo "{\"cli\":\"$CLI\",\"status\":\"found\",\"version\":\"$VERSION\"}" > .wave/output/cli-check.json
      else
        echo "{\"cli\":\"$CLI\",\"status\":\"not_found\",\"error\":\"$CLI binary not in PATH\"}" > .wave/output/cli-check.json
        exit 1
      fi
    dependencies: [detect-forge]
    output_artifacts:
      - name: cli-check
        path: .wave/output/cli-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/cli-check.json
        on_failure: skip

  # Step 3: Verify API authentication (parallel with step 2)
  - id: verify-auth
    type: command
    script: |
      FORGE="{{ forge.type }}"
      case "$FORGE" in
        github)
          if gh auth status 2>&1 | grep -q "Logged in"; then
            echo '{"forge":"github","auth":"ok"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"github","auth":"failed","error":"gh auth status failed"}' > .wave/output/auth-check.json
          fi
          ;;
        gitlab)
          if [ -n "$GITLAB_TOKEN" ]; then
            echo '{"forge":"gitlab","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"gitlab","auth":"failed","error":"GITLAB_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        gitea|forgejo)
          if [ -n "$GITEA_TOKEN" ]; then
            echo '{"forge":"gitea","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"gitea","auth":"failed","error":"GITEA_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        codeberg)
          if [ -n "$CODEBERG_TOKEN" ] || [ -n "$GITEA_TOKEN" ]; then
            echo '{"forge":"codeberg","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"codeberg","auth":"failed","error":"CODEBERG_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        bitbucket)
          if [ -n "$BITBUCKET_TOKEN" ]; then
            echo '{"forge":"bitbucket","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"bitbucket","auth":"failed","error":"BITBUCKET_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        local)
          echo '{"forge":"local","auth":"skipped","reason":"no forge in local mode"}' > .wave/output/auth-check.json
          ;;
        *)
          echo "{\"forge\":\"$FORGE\",\"auth\":\"unknown\"}" > .wave/output/auth-check.json
          ;;
      esac
    dependencies: [detect-forge]
    output_artifacts:
      - name: auth-check
        path: .wave/output/auth-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/auth-check.json
        on_failure: skip

  # Step 4: Test API access — list issues/PRs (depends on both CLI + auth)
  - id: test-api
    type: conditional
    dependencies: [verify-cli, verify-auth]
    edges:
      - target: synthesize
        condition: "{{ forge.type }} == local"
    script: |
      CLI="{{ forge.cli_tool }}"
      FORGE="{{ forge.type }}"
      if [ -z "$CLI" ] || [ "$FORGE" = "local" ]; then
        echo '{"api":"skipped","reason":"no forge CLI"}' > .wave/output/api-check.json
        exit 0
      fi

      case "$FORGE" in
        github)
          ISSUES=$(gh issue list --limit 1 --json number,title 2>&1) && STATUS="ok" || STATUS="failed"
          ;;
        gitea|forgejo|codeberg)
          ISSUES=$(tea issues list --limit 1 2>&1) && STATUS="ok" || STATUS="failed"
          ;;
        gitlab)
          ISSUES=$(glab issue list --per-page 1 2>&1) && STATUS="ok" || STATUS="failed"
          ;;
        bitbucket)
          ISSUES="bitbucket-cli-not-standard" && STATUS="skipped"
          ;;
      esac
      echo "{\"forge\":\"$FORGE\",\"api\":\"$STATUS\",\"sample\":\"$(echo $ISSUES | head -c 200)\"}" > .wave/output/api-check.json
    output_artifacts:
      - name: api-check
        path: .wave/output/api-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/api-check.json
        on_failure: skip

  # Step 5: Synthesize results — LLM reviews all checks
  - id: synthesize
    persona: navigator
    model: cheapest
    contexts: [quality]
    dependencies: [detect-forge, verify-cli, verify-auth, test-api]
    thread: forge-test
    memory:
      inject_artifacts:
        - step: detect-forge
          artifact: forge-detect
          as: detection
        - step: verify-cli
          artifact: cli-check
          as: cli
        - step: verify-auth
          artifact: auth-check
          as: auth
        - step: test-api
          artifact: api-check
          as: api
    exec:
      type: prompt
      source: |
        Review the forge validation results from all prior steps.

        Write a summary report to .wave/output/forge-report.md with:
        1. Overall status (PASS / PARTIAL / FAIL)
        2. Per-check results table
        3. Any issues found
        4. Recommendations

        Also write .wave/output/forge-report.json with structured results.
    output_artifacts:
      - name: forge-report
        path: .wave/output/forge-report.md
        type: markdown
      - name: forge-report-json
        path: .wave/output/forge-report.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/forge-report.json
        on_failure: retry
