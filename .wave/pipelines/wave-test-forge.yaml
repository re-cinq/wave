kind: WavePipeline
metadata:
  name: wave-test-forge
  description: >-
    Cross-forge smoke test that validates forge detection, template variable
    resolution, CLI tool availability, authentication status, and API access
    for the detected forge (GitHub, GitLab, Gitea, Codeberg, Bitbucket, or
    local). Use this to verify that Wave's forge abstraction layer works
    correctly in the current repository environment before running
    forge-dependent pipelines.
  release: false
  category: wave

input:
  source: cli
  example: "full forge validation"

chat_context:
  artifact_summaries:
    - forge-report
    - forge-report-json
  suggested_questions:
    - "Did forge detection work correctly?"
    - "Is CLI authentication configured?"
    - "Did the API access test pass?"
  focus_areas:
    - "Forge detection and template resolution"
    - "CLI and API connectivity status"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[wave-test-forge] started run={{ pipeline_id }} forge={{ forge.type }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-step
    event: step_completed
    type: command
    command: "echo '[wave-test-forge] step=$WAVE_HOOK_STEP_ID completed' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: synthesize
    artifact: forge-report

steps:
  # Step 1: Detect forge and verify template variables resolve
  - id: detect-forge
    persona: navigator
    model: cheapest
    max_concurrent_agents: 3
    contexts: [configuration]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Validate that Wave's forge detection system correctly identifies the forge type
        and resolves all template variables. Produce a structured JSON report capturing
        every forge-related template variable and its resolved value.

        CONTEXT:
        You are the first step in a five-step forge validation pipeline. The template
        variables below have been resolved by Wave's executor before this prompt reached
        you. Your job is to record their values and identify any that are missing or
        unexpected. Subsequent steps will verify CLI availability, authentication, and
        API access based on your report. You have read-only access to the project codebase.

        REQUIREMENTS:
        1. Record each resolved template variable value:
           - forge_type: {{ forge.type }}
           - cli_tool: {{ forge.cli_tool }}
           - pr_command: {{ forge.pr_command }}
           - pr_term: {{ forge.pr_term }}
           - prefix: {{ forge.prefix }}
           - host: {{ forge.host }}
           - owner: {{ forge.owner }}
           - repo: {{ forge.repo }}
           - run_id: {{ run.id }}
        2. Validate the values:
           - forge_type should be one of: github, gitlab, gitea, forgejo, codeberg,
             bitbucket, local. Flag any unexpected value.
           - cli_tool should be the CLI binary name for the detected forge (gh for github,
             glab for gitlab, tea for gitea/forgejo/codeberg, empty for local).
           - pr_command should match the forge convention (pr for github, mr for gitlab,
             pr for gitea/codeberg, empty for local).
           - owner and repo should be non-empty for all forges except local.
        3. Check the git remote configuration to verify forge detection is consistent:
           - Read .git/config or run `git remote -v` to see the remote URLs
           - Verify that the detected forge type matches the remote URL pattern
             (github.com -> github, gitlab.com -> gitlab, etc.)
        4. If any value is empty, note it as "not_set". For ForgeLocal, this is expected
           for cli_tool, pr_command, host, owner, and repo. For other forge types, empty
           values indicate a detection problem.
        5. Write the JSON report with all values and a validation_status field:
           - "pass": all values are consistent with the detected forge type
           - "warn": some values are empty but the forge is functional
           - "fail": forge type does not match remote URL, or critical values are missing

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT modify any template variable values. Report them exactly as resolved.
        - Do NOT assume the forge type. Read the actual resolved value, even if you
          can infer it from the repository URL.
        - Do NOT skip the git remote verification. The forge detection should match
          the remote URL; mismatches indicate a bug in forge detection.
        - Do NOT produce the report without the validation_status field. Downstream
          steps depend on knowing whether detection succeeded.

        OUTPUT FORMAT:
        Produce a JSON report with these fields:
        - forge_type, cli_tool, pr_command, pr_term, prefix, host, owner, repo, run_id:
          string values as resolved (use "not_set" for empty values)
        - git_remote_url: the actual git remote URL for verification
        - validation_status: "pass", "warn", or "fail"
        - validation_notes: array of strings describing any issues found
        - timestamp: ISO 8601 timestamp

        QUALITY BAR:
        A good detection report confirms that forge template variables resolve correctly
        and are consistent with the git remote configuration. The validation_status
        accurately reflects whether the forge abstraction layer is working. A bad report
        records values without validating them or misses the consistency check between
        detected forge type and actual remote URL.
    output_artifacts:
      - name: forge-detect
        path: .wave/output/forge-detect.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/forge-detect.json
        on_failure: retry
    edges:
      - target: verify-cli

  # Step 2: Verify CLI tool is available
  - id: verify-cli
    type: command
    script: |
      CLI="{{ forge.cli_tool }}"
      if [ -z "$CLI" ]; then
        echo '{"cli":"none","status":"skipped","reason":"no forge CLI (local mode)"}' > .wave/output/cli-check.json
        exit 0
      fi
      if command -v "$CLI" > /dev/null 2>&1; then
        VERSION=$($CLI --version 2>&1 | head -1)
        echo "{\"cli\":\"$CLI\",\"status\":\"found\",\"version\":\"$VERSION\"}" > .wave/output/cli-check.json
      else
        echo "{\"cli\":\"$CLI\",\"status\":\"not_found\",\"error\":\"$CLI binary not in PATH\"}" > .wave/output/cli-check.json
        exit 1
      fi
    dependencies: [detect-forge]
    output_artifacts:
      - name: cli-check
        path: .wave/output/cli-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/cli-check.json
        on_failure: skip
    edges:
      - target: verify-auth

  # Step 3: Verify API authentication
  - id: verify-auth
    type: command
    script: |
      FORGE="{{ forge.type }}"
      case "$FORGE" in
        github)
          if gh auth status 2>&1 | grep -q "Logged in"; then
            echo '{"forge":"github","auth":"ok"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"github","auth":"failed","error":"gh auth status failed"}' > .wave/output/auth-check.json
          fi
          ;;
        gitlab)
          if [ -n "$GITLAB_TOKEN" ]; then
            echo '{"forge":"gitlab","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"gitlab","auth":"failed","error":"GITLAB_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        gitea|forgejo)
          if [ -n "$GITEA_TOKEN" ]; then
            echo '{"forge":"gitea","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"gitea","auth":"failed","error":"GITEA_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        codeberg)
          if [ -n "$CODEBERG_TOKEN" ] || [ -n "$GITEA_TOKEN" ]; then
            echo '{"forge":"codeberg","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"codeberg","auth":"failed","error":"CODEBERG_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        bitbucket)
          if [ -n "$BITBUCKET_TOKEN" ]; then
            echo '{"forge":"bitbucket","auth":"ok","method":"env_token"}' > .wave/output/auth-check.json
          else
            echo '{"forge":"bitbucket","auth":"failed","error":"BITBUCKET_TOKEN not set"}' > .wave/output/auth-check.json
          fi
          ;;
        local)
          echo '{"forge":"local","auth":"skipped","reason":"no forge in local mode"}' > .wave/output/auth-check.json
          ;;
        *)
          echo "{\"forge\":\"$FORGE\",\"auth\":\"unknown\"}" > .wave/output/auth-check.json
          ;;
      esac
    dependencies: [verify-cli]
    output_artifacts:
      - name: auth-check
        path: .wave/output/auth-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/auth-check.json
        on_failure: skip
    edges:
      - target: test-api

  # Step 4: Test API access — list issues/PRs (depends on auth check)
  - id: test-api
    type: command
    dependencies: [verify-auth]
    edges:
      - target: synthesize
    script: |
      CLI="{{ forge.cli_tool }}"
      FORGE="{{ forge.type }}"
      if [ -z "$CLI" ] || [ "$FORGE" = "local" ]; then
        echo '{"api":"skipped","reason":"no forge CLI"}' > .wave/output/api-check.json
        exit 0
      fi

      case "$FORGE" in
        github)
          ISSUES=$(gh issue list --limit 1 --json number,title 2>&1) && STATUS="ok" || STATUS="failed"
          ;;
        gitea|forgejo|codeberg)
          ISSUES=$(tea issues list --limit 1 2>&1) && STATUS="ok" || STATUS="failed"
          ;;
        gitlab)
          ISSUES=$(glab issue list --per-page 1 2>&1) && STATUS="ok" || STATUS="failed"
          ;;
        bitbucket)
          ISSUES="bitbucket-cli-not-standard" && STATUS="skipped"
          ;;
      esac
      echo "{\"forge\":\"$FORGE\",\"api\":\"$STATUS\",\"sample\":\"$(echo $ISSUES | head -c 200)\"}" > .wave/output/api-check.json
    output_artifacts:
      - name: api-check
        path: .wave/output/api-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/api-check.json
        on_failure: skip

  # Step 5: Synthesize results — LLM reviews all checks
  - id: synthesize
    persona: navigator
    model: cheapest
    contexts: [quality]
    dependencies: [detect-forge, verify-cli, verify-auth, test-api]
    thread: forge-test
    memory:
      inject_artifacts:
        - step: detect-forge
          artifact: forge-detect
          as: detection
        - step: verify-cli
          artifact: cli-check
          as: cli
        - step: verify-auth
          artifact: auth-check
          as: auth
        - step: test-api
          artifact: api-check
          as: api
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Synthesize the results from all four preceding forge validation steps (detection,
        CLI check, auth check, API check) into a comprehensive summary report. Produce
        both a human-readable markdown report and a structured JSON report.

        CONTEXT:
        You are the final step in the forge validation pipeline. Four artifacts are injected:
        - detection: forge detection results with template variable values and validation status
        - cli: CLI tool availability check (found/not_found/skipped)
        - auth: authentication status check (ok/failed/skipped)
        - api: API access test results (ok/failed/skipped)
        Some of these may indicate "skipped" status (expected for ForgeLocal). Read all four
        artifacts before synthesizing.

        REQUIREMENTS:
        1. Read all four injected artifacts. For each, extract the key status information.
        2. Determine the overall status:
           - PASS: all checks passed (or were correctly skipped for ForgeLocal)
           - PARTIAL: some checks passed but others failed or were unexpectedly skipped
           - FAIL: critical checks failed (detection wrong, CLI missing, auth failed)
           Rules for ForgeLocal: CLI skipped, auth skipped, and API skipped are all
           expected. Only detection must pass. Overall status should be PASS if detection
           is valid.
        3. Write the markdown report with:
           - Title: "Forge Validation Report"
           - Overall status in a prominent header: PASS / PARTIAL / FAIL
           - Summary: 2-3 sentences explaining the overall result
           - Per-check results table with columns:
             | Check | Status | Details |
             Each row: detection, cli, auth, api with their status and key details
           - Issues found: list any checks that failed or returned unexpected results.
             For each issue, explain what went wrong and why it matters.
           - Recommendations: actionable items to fix any failures. For PASS status,
             note that no action is needed. For PARTIAL/FAIL, list specific steps
             (install CLI tool, configure auth token, fix remote URL, etc.)
        4. Write the structured JSON report with:
           - overall_status: "pass", "partial", or "fail"
           - forge_type: the detected forge type
           - checks: object with detection, cli, auth, api sub-objects, each containing
             status (pass/fail/skip) and details (string)
           - issues: array of issue descriptions (empty if all passed)
           - recommendations: array of recommendation strings
           - timestamp: ISO 8601 timestamp

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT report FAIL if checks were correctly skipped for ForgeLocal. Skipping
          CLI/auth/API checks is expected behavior for local forges.
        - Do NOT ignore failed checks. If auth failed, it means forge-dependent pipelines
          (scope, research, implement) will fail. This must be prominently reported.
        - Do NOT produce empty recommendations for PARTIAL or FAIL status. Every failure
          should have at least one actionable recommendation.
        - Do NOT duplicate information between the markdown and JSON reports. The markdown
          is for human reading; the JSON is for programmatic consumption. They should
          contain the same data in different formats.

        OUTPUT FORMAT:
        Produce exactly two files:
        - A human-readable markdown report
        - A structured JSON report for programmatic use

        QUALITY BAR:
        A good synthesis report gives a project operator a clear answer: "Is the forge
        integration working, and if not, what do I need to fix?" The per-check table
        should be scannable in 10 seconds. The recommendations should be copy-pasteable
        commands (e.g., "Run `gh auth login` to fix authentication"). A bad report buries
        the overall status in prose, omits actionable recommendations, or incorrectly
        reports FAIL when checks were legitimately skipped.
    output_artifacts:
      - name: forge-report
        path: .wave/output/forge-report.md
        type: markdown
      - name: forge-report-json
        path: .wave/output/forge-report.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/forge-report.json
        on_failure: retry
