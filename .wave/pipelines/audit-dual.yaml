# Independent Parallel Tracks Pattern
#
# This pipeline demonstrates two fully independent analysis tracks
# running simultaneously and converging at a final merge step.
# Unlike the fan-out pattern (used in ops-pr-review.yaml), these tracks
# have NO shared upstream step — they start independently and converge
# only at the end.
#
# Execution flow:
#
#   quality-scan     security-scan      ← both start immediately (no deps)
#       │                  │
#   quality-detail   security-detail    ← each track continues independently
#       └────────┬─────────┘
#             merge                     ← converges results from both tracks

kind: WavePipeline
metadata:
  name: audit-dual
  description: >-
    Parallel dual-track analysis that runs independent code quality and security
    scans simultaneously, deepens each track's findings, then merges both into a
    unified assessment with an executive summary and prioritized recommendations.
    Use this for a comprehensive module-level review that covers both
    maintainability and vulnerability concerns in a single run.
  release: true

skills:
  - software-design

input:
  source: cli
  example: "analyze the authentication module"

chat_context:
  artifact_summaries:
    - report
  suggested_questions:
    - "What were the most critical findings across quality and security?"
    - "What is the overall health rating?"
    - "Which recommendations have the highest impact?"
  focus_areas:
    - "Combined quality and security assessment"
    - "Prioritized recommendations"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: merge
    artifact: report

steps:
  # ── Track A: Code Quality ──────────────────────────────────────────
  - id: quality-scan
    persona: navigator
    thread: audit
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Perform a thorough code quality scan of the specified area, identifying duplication, complexity, style issues, documentation gaps, and dead code. This is the first step of the quality track in a dual-track parallel analysis pipeline. The findings produced here will be deepened in a subsequent detail step and eventually merged with security findings.

        ## Context

        This step runs in parallel with the security-scan step. They share no data and have no dependencies on each other. The codebase is mounted read-only at /project. The caller provides a scope describing what to analyze (a module name, directory path, or general description).

        Target: {{ input }}

        Interpret the input to identify the relevant source files. If the input names a module or component, use Glob and Grep to locate all files belonging to that module. If the input is a directory path, scan that directory tree. If the input is a general description (e.g., "the authentication module"), search for files related to that concept.

        ## Requirements

        Scan systematically for each of these quality dimensions:

        1. **Code duplication and copy-paste patterns**: Search for functions with identical or near-identical signatures across different files. Look for code blocks of 10+ lines that appear in multiple locations with minor variations. Use Grep to find repeated patterns. For each duplicate, identify the original and the copy, and note any behavioral drift between them.

        2. **Complexity hotspots**: Identify functions exceeding 50 lines. Look for deeply nested control flow (3+ levels of if/for/switch nesting). Check for functions with many parameters (6+) or return values (4+). Note cyclomatic complexity indicators: count the number of branching statements (if, switch cases, for loops) in each function.

        3. **Naming inconsistencies and style violations**: Check that names follow Go conventions (or the project's established conventions). Look for abbreviations used inconsistently, CamelCase vs snake_case mixing, and misleading names (e.g., a function named "Get" that modifies state). Verify that package names match directory names and are lowercase without underscores.

        4. **Missing or outdated documentation**: Check for exported functions without doc comments. Verify that existing doc comments accurately describe the current behavior. Look for TODO/FIXME comments that reference resolved issues or removed functionality.

        5. **Unused exports, dead code, and unreachable branches**: Search for exported symbols with no callers outside their package. Identify code after return/panic statements. Look for switch cases that can never be reached.

        For each finding, read the source code to confirm the issue is real and assess its severity based on maintainability impact.

        ## Constraints and Anti-patterns

        - Do NOT report standard Go idioms as style violations (e.g., single-letter loop variables, blank identifier usage).
        - Do NOT flag test files for complexity or naming unless they contain production logic.
        - Do NOT modify any files.
        - Focus on actionable findings. Reporting 50 trivial style nits dilutes the value of the analysis.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good quality scan reads the actual source code for each finding, provides specific file:line references, and distinguishes between high-impact issues (behavioral duplication, complex critical-path functions) and low-impact ones (minor style preferences). A bad scan lists generic categories without examining actual code or reports every function over 20 lines as "complex."
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/shared-findings.schema.json
        on_failure: skip

  - id: quality-detail
    persona: navigator
    thread: audit
    model: cheapest
    dependencies: [quality-scan]
    memory:
      strategy: fresh
      inject_artifacts:
        - step: quality-scan
          artifact: findings
          as: scan_results
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Deepen the code quality scan findings by verifying each one against the source code, assessing real-world impact, proposing concrete refactoring strategies, and discovering related patterns elsewhere in the codebase. Produce a prioritized markdown report that a developer can act on immediately.

        ## Context

        The quality-scan step has already produced initial findings in the injected scan_results artifact. This step reads those findings and performs deeper analysis on each. The codebase is mounted read-only at /project. This step runs independently within the quality track; the security track is running in parallel but shares no data with this step.

        ## Requirements

        For each finding in the injected scan_results artifact (.wave/artifacts/scan_results):

        1. **Verify the finding**: Read the actual source code at the reported location. Confirm the issue exists and is correctly categorized. Eliminate false positives by checking whether the reported pattern has a legitimate justification (e.g., a "complex" function that is necessarily complex due to protocol requirements).

        2. **Assess severity and impact**: Evaluate how the issue affects day-to-day development. Consider: Does this cause bugs? Does it slow onboarding? Does it increase the risk of future regressions? Does it make the code harder to test? Rate impact as critical (actively causing issues), high (will cause issues under growth), medium (annoying but manageable), or low (cosmetic).

        3. **Propose specific refactoring**: For each confirmed finding, describe a concrete fix. Include what to rename, what to extract, what to delete, or what to restructure. Where helpful, sketch the target code structure (function signature, type definition) to make the recommendation actionable. Estimate effort: trivial (< 30 min), small (< 2 hours), medium (< 1 day), large (multi-day).

        4. **Search for related patterns**: Use Grep to find similar issues elsewhere in the codebase. If a function is duplicated in two places, check if it appears in a third. If a naming inconsistency affects two packages, check all packages. Report the full extent of each pattern.

        5. **Prioritize**: Order the final report by impact, with critical and high-severity findings first.

        ## Constraints and Anti-patterns

        - Do NOT invent findings that were not in the scan results. Only deepen existing findings.
        - Do NOT propose rewrites that change public API surfaces without flagging the breaking-change risk.
        - Do NOT produce code patches or diffs. This is an analysis report, not an implementation step.

        ## Output Format

        Produce a markdown report at .wave/output/quality-detail.md with these sections:
        - **Summary**: Total findings verified, false positives eliminated, top 3 most impactful issues.
        - **Critical and High Findings**: Detailed analysis of each, with file:line references, impact assessment, refactoring proposal, and related pattern locations.
        - **Medium and Low Findings**: Briefer treatment with the same structure.
        - **Recommendations**: Ordered list of suggested actions, grouped by effort level.

        ## Quality Bar

        A good detail report transforms vague scan findings into actionable work items with specific file paths, concrete refactoring proposals, and honest effort estimates. A bad report parrots the scan findings without adding new information or proposes unrealistic rewrites without considering the blast radius.
    output_artifacts:
      - name: quality_report
        path: .wave/output/quality-detail.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/quality-detail.md

  # ── Track B: Security ──────────────────────────────────────────────
  - id: security-scan
    persona: navigator
    thread: audit
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Perform a security-focused scan of the specified area, identifying injection vulnerabilities, authentication gaps, credential exposure, insecure data handling, and input validation failures. This is the first step of the security track in a dual-track parallel analysis pipeline. The findings produced here will be deepened in a subsequent detail step and eventually merged with quality findings.

        ## Context

        This step runs in parallel with the quality-scan step. They share no data and have no dependencies on each other. The codebase is mounted read-only at /project. The caller provides a scope describing what to analyze.

        Target: {{ input }}

        Interpret the input to identify the relevant source files. Use Glob and Grep to locate all files related to the described module or directory.

        ## Requirements

        Perform a systematic security review covering these vulnerability categories:

        1. **Injection vulnerabilities**: Search for string concatenation or fmt.Sprintf used to build SQL queries, shell commands, file paths, or LDAP queries with untrusted input. Look for os/exec.Command calls where arguments come from user input without validation. Check for filepath.Join with user-controlled segments that could traverse directories. Verify that template rendering (html/template, text/template) uses the correct package for the context.

        2. **Authentication and authorization gaps**: Identify HTTP handlers or API endpoints that lack authentication middleware. Check whether authorization checks are performed at every access point or only at the entry point. Look for privilege escalation paths where a lower-privilege operation can reach higher-privilege functionality.

        3. **Hardcoded secrets or credentials**: Search for string literals that look like API keys, tokens, passwords, or connection strings. Check for credentials in configuration files, environment variable defaults, or test fixtures that could leak into production. Look for private keys or certificates committed to the repository.

        4. **Insecure data handling**: Check whether sensitive data (tokens, passwords, PII) is logged, included in error messages, or written to temporary files without protection. Verify that cryptographic operations use secure algorithms and parameters. Check for missing TLS configuration or certificate validation.

        5. **Input validation gaps**: Identify all system boundaries where external data enters the application (HTTP request bodies, CLI arguments, file reads, environment variables, IPC). For each boundary, verify that input is validated for type, length, format, and allowed values before use. Flag any boundary where raw input reaches a sensitive operation (file I/O, exec, database query) without validation.

        For each finding, trace the data flow from the untrusted source to the vulnerable sink. Note what validation exists (if any) and what is missing.

        ## Constraints and Anti-patterns

        - Do NOT report theoretical vulnerabilities that require an attacker to already have full system access.
        - Do NOT flag test-only code paths unless they demonstrate a pattern that could be copied into production.
        - Do NOT modify any files.
        - Focus on exploitable issues over theoretical completeness.

        ## Output Format

        Output a structured JSON report to .wave/output/security-scan.json. Include a findings array where each finding has: id, type (use "security"), severity (critical/high/medium/low), file, line, description (the vulnerability), evidence (the data flow from source to sink), and recommendation (the specific fix). Include a summary with total findings and severity breakdown.

        ## Quality Bar

        A good security scan traces data flow from untrusted input to vulnerable sink for each finding, distinguishing between exploitable vulnerabilities and defense-in-depth improvements. A bad scan lists generic vulnerability categories without checking whether they actually apply to the code being analyzed.
    output_artifacts:
      - name: security_scan
        path: .wave/output/security-scan.json
        type: json

  - id: security-detail
    persona: navigator
    thread: audit
    model: cheapest
    dependencies: [security-scan]
    memory:
      strategy: fresh
      inject_artifacts:
        - step: security-scan
          artifact: security_scan
          as: scan_results
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Deepen the security scan findings by verifying each vulnerability against the actual source code, performing detailed data flow tracing, assessing real-world exploitability, and proposing specific remediation strategies. Produce a severity-ordered markdown report that enables immediate action on confirmed vulnerabilities.

        ## Context

        The security-scan step has already produced initial findings in the injected scan_results artifact. This step reads those findings and performs deeper verification on each. The codebase is mounted read-only at /project. This step runs independently within the security track; the quality track is running in parallel but shares no data with this step.

        ## Requirements

        For each finding in the injected scan_results artifact (.wave/artifacts/scan_results):

        1. **Verify the vulnerability**: Read the actual source code at the reported location. Confirm the vulnerable pattern exists. Check whether the vulnerability has already been mitigated by validation, sanitization, or access control that the initial scan may have missed. Eliminate false positives by examining the full context around the flagged code.

        2. **Trace the complete data flow**: Starting from the entry point where untrusted data enters (HTTP request, CLI argument, file read, environment variable), follow every transformation, validation, and assignment until the data reaches the sensitive operation (exec, file write, database query, response body). Document each step in the flow with file:line references. Note where validation exists and where it is absent.

        3. **Assess exploitability**: Determine whether an attacker could realistically exploit this vulnerability. Consider: What access level is required (unauthenticated, authenticated, local)? What preconditions must be met? What is the impact of successful exploitation (data theft, code execution, denial of service, privilege escalation)? Assign a risk rating combining likelihood and impact.

        4. **Search for related patterns**: Use Grep to find similar vulnerable patterns elsewhere in the codebase. If command injection exists in one handler, check all handlers. If path traversal affects one file-serving endpoint, check all file-serving endpoints. Report the full extent of each vulnerability class.

        5. **Propose specific remediation**: For each confirmed vulnerability, describe the exact fix. Name the validation function to add, the sanitization library to use, or the architectural change to make. Where appropriate, describe the target code pattern (e.g., "use filepath.Clean followed by a prefix check against the allowed base directory"). Estimate effort for each fix.

        ## Constraints and Anti-patterns

        - Do NOT upgrade severity of findings without evidence. If the scan rated something as medium, only upgrade it if your deeper analysis reveals worse impact.
        - Do NOT propose fixes that break functionality without noting the trade-off.
        - Do NOT produce actual code patches. This is an analysis report, not an implementation step.
        - Do NOT spend excessive time on LOW severity findings. A brief confirmation is sufficient.

        ## Output Format

        Produce a markdown report at .wave/output/security-detail.md with these sections:
        - **Executive Summary**: Total confirmed vs false positive count, highest severity finding, overall risk assessment.
        - **Confirmed Vulnerabilities**: Ordered by severity (critical first). Each entry includes: description, data flow trace with file:line references, exploitability assessment, remediation proposal, and related pattern locations.
        - **False Positives Eliminated**: Findings from the scan that were determined to be non-issues, with explanation of why.
        - **Remediation Priority**: Ordered list of fixes by urgency, grouped by effort level.

        ## Quality Bar

        A good deep dive confirms or eliminates every finding from the scan, provides complete data flow traces for high-severity issues, and proposes fixes that are specific enough for a developer to implement without further research. A bad deep dive restates the scan findings without additional verification or proposes generic advice like "validate all input" without specifying what validation to add where.
    output_artifacts:
      - name: security_report
        path: .wave/output/security-detail.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/security-detail.md

  # ── Merge: Converge both tracks ────────────────────────────────────
  - id: merge
    persona: summarizer
    model: cheapest
    dependencies: [quality-detail, security-detail]
    memory:
      strategy: fresh
      inject_artifacts:
        - step: quality-detail
          artifact: quality_report
          as: quality_findings
        - step: security-detail
          artifact: security_report
          as: security_findings
    exec:
      type: prompt
      source: |
        ## Objective

        Synthesize the quality and security analysis reports from both parallel tracks into a unified assessment document. The merged report must present a holistic view of the codebase's health, highlight cross-cutting concerns where quality and security issues interact, and deliver a single prioritized action plan that the development team can execute sequentially.

        ## Context

        Two independent analysis tracks have completed: the quality track (quality-scan followed by quality-detail) and the security track (security-scan followed by security-detail). Their detailed reports have been injected as artifacts. This merge step is the convergence point where both tracks' findings are combined. No additional codebase analysis is needed; this step operates purely on the two injected reports.

        Read both reports:
        - .wave/artifacts/quality_findings (code quality detail report)
        - .wave/artifacts/security_findings (security detail report)

        ## Requirements

        1. **Executive summary with overall health rating**: Provide a one-paragraph assessment of the codebase's overall health. Assign a rating on a four-point scale: HEALTHY (no critical issues, few high-severity findings), FAIR (no critical issues but multiple high-severity findings), AT_RISK (one or more critical issues), or CRITICAL (multiple critical issues requiring immediate attention). Justify the rating by citing the most significant findings from each track.

        2. **Cross-cutting analysis**: Identify findings where quality and security concerns intersect. For example: a duplicated authentication handler (quality issue) where one copy lacks input validation (security issue), or a complexity hotspot in a security-critical function that makes it hard to verify correctness. These cross-cutting issues often represent the highest-value fixes.

        3. **Critical issues requiring immediate attention**: List all critical and high-severity findings from both tracks in a single prioritized list. For each issue, include: source track (quality or security), severity, one-line description, affected files, and recommended fix. Order by: critical security findings first, then critical quality findings, then high security, then high quality.

        4. **Top recommendations ordered by impact**: Select the 5-10 highest-impact improvements across both tracks. For each, describe: what to do, why it matters, estimated effort, and expected benefit. Consider that a single refactoring may address both quality and security concerns simultaneously.

        5. **Positive observations and strengths**: Identify what the codebase does well. Acknowledge good security practices, clean architecture, well-tested areas, and consistent patterns. This provides balance and highlights patterns to preserve and extend.

        6. **Metrics summary**: Provide a table or list with: total findings by track, findings by severity, false positives eliminated, and estimated total remediation effort.

        ## Constraints and Anti-patterns

        - Do NOT simply concatenate the two reports. The value of this step is synthesis, cross-referencing, and prioritization.
        - Do NOT introduce new findings. This step works only with what the detail steps produced.
        - Do NOT duplicate the full detail of each finding. Reference findings by their IDs and provide brief summaries. The detail reports remain available for full context.
        - Do NOT inflate severity. If both tracks rated an issue as medium, the merged report should not escalate it to high without justification.

        ## Output Format

        Produce a markdown report at .wave/output/dual-analysis-report.md with these sections in order:
        1. Executive Summary (with health rating)
        2. Cross-Cutting Concerns
        3. Critical and High-Priority Issues (unified from both tracks)
        4. Top Recommendations (ordered by impact-to-effort ratio)
        5. Positive Observations
        6. Metrics Summary Table

        ## Quality Bar

        A good merged report reveals insights that neither individual track could provide alone, particularly cross-cutting concerns where quality degradation creates security risk. It delivers a single, actionable priority list that a developer can follow top-to-bottom. A bad merged report is just the two reports pasted together with a generic summary, or it loses the detail of individual findings in overly abstract recommendations.
    output_artifacts:
      - name: report
        path: .wave/output/dual-analysis-report.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/dual-analysis-report.md
