kind: WavePipeline
metadata:
  name: ops-pr-fix-review
  description: >-
    Automated PR review-fix pipeline that fetches review comments, triages
    findings by severity, applies code fixes in priority order, pushes the
    changes, and replies to each review thread with resolution details.
  category: composition
  release: true

chat_context:
  artifact_summaries:
    - review-findings
    - triage-verdict
    - resolution-summary
  suggested_questions:
    - "What review findings were addressed?"
    - "Which findings were rejected and why?"
    - "Were all comments replied to?"
  focus_areas:
    - "Triage decisions and rationale"
    - "Fix completeness and test results"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  schema:
    type: string
    description: "Pull request URL"
  example: "https://github.com/owner/repo/pull/42"

pipeline_outputs:
  result:
    step: reply-comments
    artifact: resolution-summary

steps:
  - id: fetch-review
    persona: navigator
    contexts: [configuration]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Extract every piece of review feedback from a pull request — human reviews, bot
        reviews (including GitHub Copilot), inline comments, and PR-level comments — and
        structure them as a flat list of findings. This step is purely extractive: do not
        judge, filter, or prioritize any findings. The triage step downstream will make
        those decisions. Your job is completeness — every review comment must be captured
        with enough metadata to reply to it later.

        PR: {{ input }}

        ## Context

        This is the first step of the ops-pr-fix-review pipeline. No prior artifacts
        exist. You have read-only access to the project directory and access to the forge
        CLI tool. The input is a pull request URL. The downstream steps need three things
        from you: (1) complete review findings with file/line references for the triage
        step, (2) comment/review IDs for the reply-comments step to post responses, and
        (3) PR metadata (branch name, repo, number) for the apply-fixes step to check
        out the right branch.

        ## Requirements

        ### Step 1: Get PR Metadata

        Fetch the PR metadata to populate the output's `pr_metadata` section:
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} view {{ input }} --json number,headRefName,baseRefName,url,title,body
        ```
        Extract: number, head branch name (headRefName), base branch name (baseRefName),
        URL, title, and body. Parse the URL to derive the repository owner/name.

        ### Step 2: Collect All Review Feedback

        Gather every source of review feedback. This must be exhaustive.

        **PR-level comments and formal reviews:**
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} view {{ input }} --comments
        ```

        **If `{{ forge.type }}` is `github`, also fetch via API:**

        Inline code review comments (including bot reviewers):
        ```bash
        {{ forge.cli_tool }} api repos/{owner}/{repo}/pulls/{number}/comments \
          --jq '.[] | {id: .id, path: .path, line: .original_line, body: .body, user: .user.login, bot: (if .user.type == "Bot" then true else false end)}'
        ```

        All formal reviews (including bot reviews like Copilot):
        ```bash
        {{ forge.cli_tool }} api repos/{owner}/{repo}/pulls/{number}/reviews \
          --jq '.[] | {id: .id, state: .state, body: .body, user: .user.login, bot: (if .user.type == "Bot" then true else false end)}'
        ```

        Bot-specific inline suggestions (Copilot, GitHub Actions, Dependabot):
        ```bash
        {{ forge.cli_tool }} api repos/{owner}/{repo}/pulls/{number}/comments \
          --jq '.[] | select(.user.login | test("copilot|github-actions|dependabot"; "i")) | {id: .id, path: .path, line: .original_line, body: .body, user: .user.login, in_reply_to_id: .in_reply_to_id}'
        ```

        IMPORTANT: Include ALL reviewers, human and bot alike. GitHub Copilot reviews
        appear from `github-copilot[bot]` with `user.type == "Bot"`. Treat them
        identically to human reviews for extraction purposes.

        ### Step 3: Fetch the Diff

        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} diff {{ input }}
        ```
        The diff provides context for mapping comments to specific code changes. You need
        it to resolve line numbers and file paths referenced in review comments.

        ### Step 4: Structure All Findings

        For each review comment or inline code comment, extract a finding object with:
        - `id`: unique identifier (use the comment ID or synthesize one)
        - `source_type`: "inline_comment", "review_comment", "pr_comment", or "review_body"
        - `source_id`: the original comment or review ID (needed for replying later)
        - `reviewer`: login name of the reviewer
        - `is_bot`: boolean indicating whether this is a bot reviewer
        - `severity`: infer from language if possible (critical, high, medium, low, info)
          — but err toward "medium" if uncertain. Do NOT filter based on severity.
        - `file`: the file path the comment references (null for PR-level comments)
        - `line`: the line number (null for PR-level comments)
        - `description`: the full text of the review comment
        - `has_suggestion`: whether the comment contains a code suggestion block

        Deduplicate findings: if the same comment appears from multiple API calls,
        include it only once (match by comment ID).

        ### Step 5: Produce Output

        Produce the structured JSON matching the contract schema. The output must
        include `pr_number`, `repo`, `head_branch`, `base_branch`, `pr_url`, `pr_title`,
        and a `findings` array containing every extracted finding.

        ## Constraints and Anti-patterns

        - Do NOT filter, prioritize, or omit any findings. Extract everything. Triage
          happens in the next step.
        - Do NOT attempt to assess whether findings are valid. That is the triage step's
          job.
        - Do NOT modify the PR or post any comments. This step is read-only extraction.
        - Do NOT skip bot reviews. They are first-class findings.
        - Do NOT guess at file paths or line numbers. If a comment does not reference a
          specific file, set file and line to null.
        - Do NOT truncate comment bodies. Include the full text for accurate triage.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good extraction captures every review comment with correct IDs for replying,
        accurate file/line references, and no duplicates. A bad extraction misses inline
        code suggestions (especially from Copilot), loses comment IDs (making replies
        impossible), or silently filters out findings it deems unimportant.
    output_artifacts:
      - name: review-findings
        path: .wave/output/review-findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/review-findings.json
        schema_path: .wave/contracts/review-findings.schema.json
        on_failure: retry

  - id: triage
    persona: navigator
    contexts: [configuration, execution]
    model: balanced
    dependencies: [fetch-review]
    memory:
      inject_artifacts:
        - step: fetch-review
          artifact: review-findings
          as: raw_findings
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Make informed judgment calls on every review finding extracted from the PR. For
        each finding, decide whether to accept (fix it), reject (false positive), defer
        (valid but out of scope), or skip (too risky). For accepted findings, assess the
        blast radius, test coverage, and confidence level to guide the apply-fixes step.
        This is the critical decision-making step — the quality of these triage decisions
        directly determines whether the fixes improve or harm the codebase.

        PR: {{ input }}

        ## Context

        The previous "fetch-review" step produced the injected `raw_findings` artifact.
        It contains:
        - `pr_number`, `repo`, `head_branch`, `base_branch`, `pr_url`, `pr_title`
        - `findings`: array of review comments, each with `source_id`, `reviewer`,
          `is_bot`, `severity`, `file`, `line`, `description`, and `has_suggestion`

        You have read-only access to the project directory. You need to check out the PR
        branch to read the actual code at the referenced files and lines.

        ## Requirements

        ### Step 1: Checkout the PR Branch

        ```bash
        HEAD_BRANCH=$(cat .wave/artifacts/raw_findings | jq -r '.head_branch')  # reads the injected artifact
        git fetch origin "$HEAD_BRANCH"
        git checkout "$HEAD_BRANCH"
        ```

        This gives you the actual code state that the reviewers commented on.

        ### Step 2: Read Context for Each Finding

        For every finding that references a specific file and line, read that file and
        examine the surrounding context (at least 10 lines before and after). Understand
        what the code actually does before making a triage decision. Do not classify
        based on the review comment alone — always verify against the source.

        ### Step 3: Classify Each Finding

        For every finding, assign exactly one classification:

        - **accept**: The finding is valid, was introduced by this PR (not pre-existing),
          and is worth fixing. The fix will improve code quality, security, or
          correctness without undue risk.
        - **reject**: The finding is a false positive, a misunderstanding of the code's
          intent, or the suggested change would make things worse. Provide a specific
          rationale citing the actual code behavior.
        - **defer**: The finding is valid but the issue is pre-existing (not introduced
          by this PR), or fixing it is out of scope for this PR. Suggest creating a
          follow-up issue.
        - **skip**: The finding may be valid, but the fix is too risky — it would touch
          unrelated code, require a large refactor, or risk introducing regressions in
          areas without adequate test coverage.

        For each classification, record:
        - `finding_id`: reference to the original finding
        - `classification`: accept | reject | defer | skip
        - `rationale`: 1-3 sentences explaining why, referencing specific code
        - `action_detail`: (for accepted findings) what specific change to make

        ### Step 4: Risk-Assess Accepted Findings

        For each accepted finding, evaluate:
        - **blast_radius**: "minimal" (1 file, <10 lines changed), "moderate" (2-5 files
          or 10-50 lines), "large" (6+ files or 50+ lines). If large, consider
          reclassifying as defer.
        - **test_coverage**: "well-tested" (existing tests cover the affected code path),
          "partially-tested" (some coverage but not the specific scenario), "untested"
          (no relevant tests exist — higher risk)
        - **confidence**: "high" (clear fix, low ambiguity), "medium" (reasonable fix
          but some uncertainty), "low" (uncertain whether the fix is correct — consider
          reclassifying as skip)

        ### Step 5: Prioritize Accepted Findings

        Sort accepted findings by severity descending (critical first), then by
        confidence descending. This determines the order the apply-fixes step will use.

        ### Step 6: Produce Triage Verdict

        Output structured JSON with:
        - `head_branch`: the PR branch name (needed by apply-fixes)
        - `total_findings`: count of all findings triaged
        - `fixes`: array of accepted findings with classification, rationale,
          action_detail, blast_radius, test_coverage, confidence, and severity
        - `rejected`: array of rejected findings with rationale
        - `deferred`: array of deferred findings with rationale and suggested follow-up
        - `skipped`: array of skipped findings with risk assessment

        ## Constraints and Anti-patterns

        - Do NOT accept a finding without reading the actual code. Review comments can
          be wrong — especially bot-generated ones.
        - Do NOT reject findings just because they come from bots. Copilot findings are
          often valid.
        - Do NOT accept findings that would require refactoring code not changed by the
          PR. Classify those as defer.
        - Do NOT accept findings where the fix has low confidence and the affected code
          is untested. Classify those as skip.
        - Do NOT include rejected/deferred/skipped findings in the `fixes` array.
        - Avoid blanket accepting all findings. Critical thinking is the point of this
          step.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good triage correctly identifies which findings are worth fixing in this PR
        cycle, provides clear rationales grounded in actual code reading, and accurately
        assesses risk. A bad triage rubber-stamps everything as "accept", rejects valid
        findings without reading the code, or accepts high-risk changes in untested
        areas.
    output_artifacts:
      - name: triage-verdict
        path: .wave/output/triage-verdict.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/triage-verdict.json
        schema_path: .wave/contracts/triage-verdict.schema.json
        on_failure: retry

  - id: apply-fixes
    persona: craftsman
    thread: fix
    contexts: [execution, delivery]
    model: strongest
    dependencies: [triage]
    memory:
      inject_artifacts:
        - step: triage
          artifact: triage-verdict
          as: triage
        - step: fetch-review
          artifact: review-findings
          as: raw_findings
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Apply code fixes for all accepted review findings in priority order, verify the
        changes pass tests and lint, and commit/push the result as a new commit on the
        PR branch. Each fix must be minimal — addressing exactly the `action_detail`
        from the triage verdict and nothing more. After this step, the PR should have all
        accepted review findings resolved and the test suite passing.

        PR: {{ input }}

        ## Context

        Two artifacts are injected into your workspace:
        - `triage` (from the "triage" step): Contains the triaged verdict with
          `head_branch`, the `fixes` array (accepted findings sorted by priority), and
          the rejected/deferred/skipped lists. Each fix has `severity`, `action_detail`,
          `blast_radius`, `test_coverage`, and `confidence`.
        - `raw_findings` (from the "fetch-review" step): Contains the original PR
          metadata including branch name and repo.

        Read BOTH artifacts before starting. This step has read-write access to a worktree
        and will commit and push changes to the PR branch.

        ## Requirements

        ### Step 1: Checkout the PR Branch

        ```bash
        HEAD_BRANCH=$(cat .wave/artifacts/triage | jq -r '.head_branch')  # reads the injected artifact
        git fetch origin "$HEAD_BRANCH"
        git checkout "$HEAD_BRANCH"
        ```

        Verify you are on the correct branch before making any changes.

        ### Step 2: Understand the Triage Verdict

        Read the injected `triage` artifact and enumerate:
        - Total number of accepted fixes
        - The severity and priority order of each fix
        - The specific `action_detail` describing what to change
        - The `blast_radius` and `confidence` for risk awareness

        If the `fixes` array is empty (all findings were rejected/deferred/skipped), skip
        to Step 6 and commit nothing. Report that no fixes were needed.

        ### Step 3: Apply Fixes in Priority Order

        Process fixes in this strict order:
        1. **Critical findings first** — these block the PR from merging
        2. **High findings second** — these should all be resolved
        3. **Medium findings third** — fix if the action is straightforward
        4. **Low findings last** — fix only if trivial and risk-free

        For each fix:
        - Read the current file at the specified path and examine the code at and around
          the specified line
        - Apply the MINIMAL change that addresses the `action_detail`. This means
          changing only the lines necessary to fix the specific issue.
        - After applying each fix, verify the file still compiles/parses correctly by
          checking syntax (e.g., `go vet ./...` for Go, or equivalent)
        - Record which files and lines you modified for the commit message

        ### Step 4: Run the Full Test Suite

        ```bash
        {{ project.contract_test_command }}
        ```

        If any tests fail that were passing before your changes:
        - Determine whether the failure is caused by your fix
        - If yes, adjust the fix to not break existing tests
        - If the test was testing the wrong behavior (i.e., the review finding was about
          a genuine bug), update the test to match the corrected behavior
        - Re-run the test suite until it passes

        ### Step 5: Run the Linter

        ```bash
        {{ project.lint_command }} 2>&1 | head -50
        ```

        Fix any lint violations in files you modified. Do NOT fix lint issues in files
        you did not touch — that is scope creep.

        ### Step 6: Commit and Push

        ```bash
        # Stage only files you modified — NEVER .wave/, .claude/, or CLAUDE.md
        git diff --name-only
        git add $(git diff --name-only)
        git diff --cached --stat

        git commit -m "fix: address review findings

        $(cat .wave/artifacts/triage | jq -r '.fixes[] | "- [\(.severity)] \(.summary)"' | head -10)"  # reads the injected artifact

        git push origin "$HEAD_BRANCH"
        ```

        If the push fails due to new commits on the remote branch, pull first with
        `git pull --rebase origin "$HEAD_BRANCH"`, resolve any conflicts, and retry the
        push.

        ## Constraints and Anti-patterns

        - Do NOT force push. Ever. Add a new commit, do not rewrite history.
        - Do NOT rebase or squash the branch. The fix commit must be additive.
        - Do NOT modify files outside the triage verdict's `fixes` array. If you notice
          other issues, ignore them — they are out of scope.
        - Do NOT `git add -A`, `git add .`, or `git add --all`. Stage files by explicit
          path only.
        - Do NOT stage Wave-internal directories (`.wave/`, `.claude/`) or `CLAUDE.md`.
        - Do NOT refactor, rename, or "improve" surrounding code. Minimal fixes only.
        - Do NOT apply rejected, deferred, or skipped findings. Only the `fixes` array.
        - If a fix has `confidence: "low"`, proceed with extra caution — double-check the
          change against the test suite and consider adding a code comment explaining the
          fix rationale.

        ## Output Format

        There is no explicit output artifact for this step. Success is determined by the
        handover contract (test suite passes). The commit message serves as the record of
        what was fixed.

        ## Quality Bar

        A good fix commit changes only the files and lines needed to address the accepted
        findings, passes all tests on the first push, and has a clear commit message that
        lists every finding addressed. A bad fix commit touches unrelated files, introduces
        new test failures, includes Wave-internal files in the staging area, or applies
        fixes that were not in the triage verdict.
    retry:
      policy: aggressive
      max_attempts: 3
      on_failure: rework
      rework_step: retry-fixes
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry

  - id: retry-fixes
    persona: craftsman
    thread: fix
    model: balanced
    rework_only: true
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        The previous attempt to apply review fixes failed the test suite. Your job is to
        diagnose the specific test failure, apply a targeted correction, and get the tests
        passing. This is a recovery step — you must be surgical. Do not start over or
        rewrite the fixes from scratch. Focus exclusively on the error that caused the
        handover contract to fail.

        ## Context

        This step is only entered when the "apply-fixes" step fails its test suite
        contract. The failure context (test output, error messages) has been injected as
        an artifact from the retry mechanism. The worktree already contains the changes
        from the previous fix attempt — they are committed but the tests failed.

        ## Requirements

        1. **Read the failure context artifact.** Identify the exact test(s) that failed,
           the error messages, and the file(s) involved.

        2. **Diagnose the cause.** Determine whether the failure is:
           - A bug in the fix itself (the change broke something)
           - A test that needs updating (the fix is correct but the test asserted on the
             old behavior)
           - A compilation error (syntax or import issue in the modified file)
           - An unrelated flaky test (check if the same test passes on retry)

        3. **Apply the minimal correction.** Change only what is necessary to make the
           failing test pass. If the fix was wrong, revert or adjust it. If the test
           needs updating, update only the assertion that does not match the corrected
           behavior.

        4. **Re-run the test suite.** Execute `{{ project.contract_test_command }}` and
           verify all tests pass.

        5. **Commit and push.** Stage only the files you changed, commit with message
           `fix: correct test failure from review fix`, and push.

        ## Constraints and Anti-patterns

        - Do NOT rewrite all the fixes from the previous step. Fix only the specific
          failure. The previous commit's changes are intentional — they addressed review
          findings. Your job is to fix what broke, not redo the work.
        - Do NOT revert the previous commit unless the fix was fundamentally wrong and
          unfixable by incremental correction. Prefer adding a corrective change.
        - Do NOT touch files unrelated to the test failure. If you find yourself changing
          more than 2-3 files, reconsider whether you are addressing the right cause.
        - Do NOT use `git add -A`, `git add .`, or `git add --all`. Stage files by
          explicit path to avoid committing Wave-internal files.
        - Do NOT force push or rebase the branch. Add a new commit.
        - Do NOT stage Wave-internal directories (`.wave/`, `.claude/`) or `CLAUDE.md`.
        - Do NOT introduce new features, refactors, or improvements. This is a pure
          correction step.
        - If the test failure appears unrelated to the previous fix (a flaky test or
          pre-existing failure), note this in your assessment but still attempt to make
          it pass.

        ## Output Format

        No explicit output artifact. Success is determined by the handover contract
        running the test suite. The commit message should clearly describe what was
        corrected, referencing the original test failure.

        ## Quality Bar

        A good recovery identifies the exact cause of the test failure, applies a minimal
        correction (typically 1-10 lines changed), and results in a clean test run on the
        first attempt. A bad recovery reverts the entire previous commit (losing the
        review fix work), rewrites everything from scratch (wasting time and tokens),
        applies a broad change that accidentally fixes the symptom while introducing new
        issues, or introduces additional test failures while fixing the original one.
        The ideal correction is a single commit with a clear message like "fix: correct
        nil check placement in executor.go" that any reviewer can understand instantly.
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: fail

  - id: reply-comments
    persona: navigator
    contexts: [execution]
    model: cheapest
    dependencies: [apply-fixes]
    memory:
      inject_artifacts:
        - step: fetch-review
          artifact: review-findings
          as: raw_findings
        - step: triage
          artifact: triage-verdict
          as: triage
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Post resolution responses to every review finding on the PR. Each reviewer who
        left feedback should see a reply explaining what happened with their finding:
        fixed (with commit reference), rejected (with code-based rationale), deferred
        (with follow-up plan), or skipped (with risk explanation). Additionally, post a
        single top-level summary comment that gives any reviewer a quick overview of all
        resolutions. The goal is to close the review feedback loop cleanly and
        professionally.

        PR: {{ input }}

        ## Context

        Two artifacts are injected into your workspace:
        - `raw_findings`: Contains the original review data including `pr_number`, `repo`,
          and each finding's `source_id` (comment/review IDs needed for replying to
          specific comments).
        - `triage`: Contains the triage verdict with `fixes` (accepted findings),
          `rejected`, `deferred`, and `skipped` arrays, each with rationale.

        The apply-fixes step has already committed and pushed the code changes. This step
        is read-only — you only post comments, not modify code.

        ## Requirements

        ### Step 1: Extract PR Metadata

        ```bash
        PR_NUMBER=$(cat .wave/artifacts/raw_findings | jq -r '.pr_number')  # reads the injected artifact
        REPO=$(cat .wave/artifacts/raw_findings | jq -r '.repo')
        echo "PR: $REPO#$PR_NUMBER"
        ```

        Parse the owner and repo from the REPO field for API calls.

        ### Step 2: Map Findings to Triage Decisions

        Cross-reference the `raw_findings` with the `triage` verdict. For each original
        finding, determine its classification (accepted, rejected, deferred, skipped) and
        locate the corresponding `source_id` for replying.

        ### Step 3: Reply to Individual Review Comments

        For each finding, compose and post an appropriate reply:

        **Accepted and fixed:** Reply with a concise description of what was changed.
        Reference the fix commit if possible. Example: "Fixed in <commit-sha>. Added nil
        check before map access on line 42."

        **Deferred:** Reply explaining that the finding is valid but out of scope for
        this PR. Suggest creating a follow-up issue. Example: "Valid finding — this
        pre-dates this PR. Created as a follow-up item for the next cycle."

        **Rejected:** Reply with a respectful rationale grounded in the actual code
        context. Never dismiss a finding without explanation. Example: "After examining
        the code, this path is already guarded by the nil check on line 35. The function
        contract guarantees non-nil input via the caller validation in executor.go:120."

        **Skipped:** Reply explaining the risk assessment. Example: "Valid concern, but
        the fix would touch 8 files in the adapter package which has no test coverage.
        Deferring to a dedicated refactor pass with proper test scaffolding."

        Post replies using the appropriate forge API:

        For inline PR comments (replying to a specific comment thread):
        ```bash
        {{ forge.cli_tool }} api repos/{owner}/{repo}/pulls/comments/{comment_id}/replies \
          -f body="<resolution text>"
        ```

        For PR-level review comments:
        ```bash
        {{ forge.cli_tool }} api repos/{owner}/{repo}/pulls/{number}/reviews/{review_id}/comments \
          -f body="<resolution text>" --input -
        ```

        If individual replies fail (API error, wrong endpoint for the forge), fall back
        to including all resolutions in the summary comment.

        ### Step 4: Post a Summary Comment

        After individual replies, post a top-level PR comment summarizing all resolutions:

        ```
        ## Review Resolution Summary

        **Total findings reviewed**: N

        **Accepted and fixed** (N):
        - [severity] Finding description (commit reference)
        ...

        **Rejected** (N):
        - Finding description: rationale
        ...

        **Deferred** (N):
        - Finding description: follow-up plan
        ...

        **Skipped** (N):
        - Finding description: risk assessment
        ...

        **Test suite**: passing / failing
        ```

        Post via:
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} comment {{ input }} --body-file /tmp/resolution-summary.md
        ```

        ### Step 5: Produce Output Artifact

        Produce the result JSON with:
        - `pr_number`, `repo`
        - `total_findings`, `accepted`, `rejected`, `deferred`, `skipped` (counts)
        - `replies_posted`: count of individual replies successfully posted
        - `summary_comment_posted`: boolean

        ## Constraints and Anti-patterns

        - Do NOT modify code or push commits. This step posts comments only.
        - Do NOT be dismissive or condescending in replies. Professional and constructive
          tone only.
        - Do NOT post empty replies. Every reply must contain a substantive response.
        - Do NOT post more than one summary comment. If you need to retry, check whether
          a summary was already posted.
        - Do NOT skip individual replies and rely solely on the summary. Reviewers expect
          responses on their specific comments.
        - Keep replies concise — 1-3 sentences each. Save detail for the summary.

        ## Output Format

        Produce output matching the contract schema as described in Step 5.

        ## Quality Bar

        Good resolution replies close the feedback loop: every reviewer sees a response
        on their comment, and the summary gives a quick triage overview. Bad resolution
        replies are generic ("noted", "will fix"), skip findings without explanation, or
        post a wall of text that obscures the actual decisions made.
    output_artifacts:
      - name: resolution-summary
        path: .wave/output/resolution-summary.json
        type: json
    outcomes:
      - type: url
        extract_from: .wave/output/resolution-summary.json
        json_path: .comment_url
        label: "Review Comment"
    retry:
      policy: patient
      max_attempts: 2
