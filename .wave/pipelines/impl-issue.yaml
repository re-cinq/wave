kind: WavePipeline
metadata:
  name: impl-issue
  description: >-
    End-to-end GitHub issue implementation. Fetches the issue, assesses
    feasibility and complexity, generates an implementation plan, writes code
    in an isolated worktree, and opens a pull request. Use this as the default
    pipeline for issue-driven work that does not require upfront research or
    formal specification.
  release: true

chat_context:
  artifact_summaries:
    - assessment
    - impl-plan
    - pr-result
  suggested_questions:
    - "Would you like to review the changes in the pull request?"
    - "Are there any failing tests to investigate?"
    - "Should we refine the implementation or add more test coverage?"
  focus_areas:
    - "Code changes and implementation quality"
    - "Test results and coverage"
    - "PR status and review readiness"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  schema:
    type: string
    description: "GitHub repository and issue number"
  example: "re-cinq/wave 42"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: fetch-assess
    persona: implementer
    contexts: [configuration]
    model: cheapest
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/fetch-assess.md
    output_artifacts:
      - name: assessment
        path: .wave/output/issue-assessment.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/issue-assessment.json
        schema_path: .wave/contracts/issue-assessment.schema.json
        must_pass: true
        on_failure: retry

  - id: plan
    persona: implementer
    model: strongest
    dependencies: [fetch-assess]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
      base: main
    exec:
      type: prompt
      source_path: .wave/prompts/implement/plan.md
    output_artifacts:
      - name: impl-plan
        path: .wave/output/impl-plan.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/impl-plan.json
        schema_path: .wave/contracts/issue-impl-plan.schema.json
        must_pass: true
        on_failure: retry

  - id: implement
    persona: craftsman
    model: strongest
    contexts: [execution, delivery]
    thread: impl
    dependencies: [plan]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
        - step: plan
          artifact: impl-plan
          as: impl_plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/implement.md
    retry:
      policy: aggressive
      max_attempts: 3
      on_failure: rework
      rework_step: fix-implement
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: fix-implement
    persona: craftsman
    model: fastest
    rework_only: true
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        The implementation step failed. Review the error and fix it.
        The failure context is injected as an artifact.
        Focus on the specific error — don't rewrite everything.
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contracts:
        - type: test_suite
          command: "{{ project.contract_test_command }}"
          must_pass: true
          on_failure: fail
        - type: agent_review
          persona: navigator
          criteria_path: .wave/contracts/impl-review-criteria.md
          model: cheapest
          token_budget: 8000
          timeout: 90s
          context:
            - source: git_diff
          on_failure: warn

  - id: create-pr
    persona: "{{ forge.type }}-commenter"
    model: cheapest
    contexts: [delivery]
    dependencies: [implement]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/create-pr.md
    output_artifacts:
      - name: pr-result
        path: .wave/output/pr-result.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/pr-result.json
        schema_path: .wave/contracts/pr-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: pr
        extract_from: .wave/output/pr-result.json
        json_path: .pr_url
        label: "Pull Request"
