kind: WavePipeline
metadata:
  name: wave-smoke-test
  description: >-
    Minimal two-step pipeline for verifying that Wave's contract validation and
    artifact injection work end-to-end. Runs a single analysis step with a JSON
    schema contract, then summarizes the result via artifact injection. Use this
    as a quick smoke test after changes to the contract or artifact subsystems.
  release: false

input:
  source: cli
  example: "verify contract validation works"

chat_context:
  artifact_summaries:
    - analysis
    - summary
  suggested_questions:
    - "Did the smoke test pass?"
    - "Was contract validation working correctly?"
    - "Was artifact injection successful?"
  focus_areas:
    - "Contract validation status"
    - "Artifact subsystem health"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  summary:
    step: summarize
    artifact: summary

steps:
  - id: analyze
    persona: navigator
    model: strongest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Analyze the codebase for: {{ input }}

        Provide a structured analysis of your findings.
    output_artifacts:
      - name: analysis
        path: .wave/output/analysis.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/analysis.json
        schema_path: .wave/contracts/wave-smoke-test.schema.json
        on_failure: retry

  - id: summarize
    persona: summarizer
    model: cheapest
    dependencies: [analyze]
    memory:
      inject_artifacts:
        - step: analyze
          artifact: analysis
          as: analysis_data
    exec:
      type: prompt
      source: |
        Using the injected analysis data, write a brief markdown summary.

        Include:
        - What was analyzed
        - Key findings
        - Recommended next steps
    output_artifacts:
      - name: summary
        path: .wave/output/summary.md
        type: markdown
