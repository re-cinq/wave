kind: WavePipeline
metadata:
  name: wave-validate
  description: >-
    Self-test pipeline that exercises Wave's core capabilities in a single run:
    model routing, sub-pipeline composition, command steps, conditional edges,
    thread continuity, retry policies, lifecycle hooks, and LLM-as-judge
    contracts. Use this after changes to the executor or graph walker to verify
    that all feature subsystems still work end-to-end.
  release: false
  category: wave

input:
  source: cli
  example: "full validation run"

chat_context:
  artifact_summaries:
    - config-check
    - report
  suggested_questions:
    - "Did all feature subsystems pass validation?"
    - "Which features were verified vs untested?"
    - "Were there any failures in the validation run?"
  focus_areas:
    - "Feature subsystem verification status"
    - "End-to-end validation results"

# Lifecycle hooks — validates hook system
hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo 'wave-validate started at $(date)' >> .wave/output/hook-log.txt"
    blocking: false

  - name: log-step
    event: step_completed
    type: command
    command: "echo 'step completed: $WAVE_HOOK_STEP_ID' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: generate-report
    artifact: report

steps:
  # Step 1: Model routing — uses haiku for cheap analysis
  - id: check-config
    persona: navigator
    contexts: [configuration, delivery]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Validate Wave configuration. Check:
        1. wave.yaml exists and parses
        2. At least one adapter is configured
        3. At least one persona is defined
        4. .wave/pipelines/ contains pipeline files

        Output a JSON report with pass/fail for each check.
    output_artifacts:
      - name: config-check
        path: .wave/output/config-check.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/config-check.json
        schema_path: .wave/contracts/hello-world-result.schema.json
        on_failure: retry
    edges:
      - target: sub-pipeline-test

  # Step 2: Sub-pipeline composition — validates child pipeline invocation
  - id: sub-pipeline-test
    type: pipeline
    pipeline: ops-hello-world
    dependencies: [check-config]
    edges:
      - target: run-tests

  # Step 3: Command step — validates shell execution without adapter
  - id: run-tests
    type: command
    dependencies: [sub-pipeline-test]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    script: "test -f wave.yaml && echo 'Wave validate: project mount verified'"

  # Step 4: Conditional routing — validates graph walker
  - id: test-gate
    type: conditional
    dependencies: [run-tests]
    edges:
      - target: approval-gate
        condition: "outcome=success"
      - target: diagnose-failure

  # Step 5a: Fix path (only reached on test failure) — validates loop + thread
  - id: diagnose-failure
    persona: navigator
    model: cheapest
    thread: fix-loop
    dependencies: [test-gate]
    max_visits: 2
    exec:
      type: prompt
      source: |
        Tests failed. Read the test output and diagnose the top failure.
        Output a brief diagnosis.
    output_artifacts:
      - name: diagnosis
        path: .wave/output/diagnosis.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/diagnosis.md
    edges:
      - target: approval-gate

  # Step 6: Human gate — validates approval workflow (auto-approved)
  - id: approval-gate
    gate:
      type: approval
      prompt: "Approve validation report generation?"
      choices:
        - label: "Approve"
          key: "a"
          target: generate-report
        - label: "Abort"
          key: "q"
          target: _fail
      default: "a"
      timeout: "10s"

  # Step 7: LLM-as-judge — validates subjective quality assessment
  - id: generate-report
    persona: navigator
    model: cheapest
    dependencies: [approval-gate]
    exec:
      type: prompt
      source: |
        Generate a Wave feature validation report.

        Summarize which features were exercised in this pipeline run:
        - Model routing (haiku on check-config and diagnose steps)
        - Sub-pipeline composition (wave-smoke-test invoked as child pipeline)
        - Command steps (run-tests)
        - Conditional edges (test-gate routing)
        - Thread continuity (fix-loop thread on diagnose)
        - Retry policies (patient on check-config)
        - Lifecycle hooks (log-start and log-step)
        - LLM-as-judge (on this step's output)

        Rate each as VERIFIED or UNTESTED. Output as structured markdown.
    output_artifacts:
      - name: report
        path: .wave/output/validation-report.md
        type: markdown
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: llm_judge
        source: .wave/output/validation-report.md
        model: cheapest
        criteria:
          - "Report covers all 8 feature categories"
          - "Each feature has a clear VERIFIED or UNTESTED status"
          - "Report is structured and readable"
        threshold: 0.66
        on_failure: continue
