kind: WavePipeline
metadata:
  name: ops-pr-rework
  description: "Rework a PR based on review findings — fetch, triage, fix, push to same branch"
  release: true

chat_context:
  artifact_summaries:
    - review-findings
    - triage-verdict
  suggested_questions:
    - "What review findings were addressed?"
    - "Which findings were rejected and why?"
    - "Should we re-run the review pipeline?"
  focus_areas:
    - "Triage decisions and rationale"
    - "Fix completeness"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  schema:
    type: string
    description: "Pull request URL"
  example: "https://github.com/owner/repo/pull/42"

steps:
  - id: fetch-review
    persona: navigator
    contexts: [configuration]
    model: claude-haiku
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Extract all review findings for PR: {{ input }}

        ## Step 1: Get PR metadata

        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} view {{ input }} --json number,headRefName,baseRefName,url,title,body
        ```

        ## Step 2: Get all review feedback

        Collect every source of review feedback using the forge CLI:

        ```bash
        # PR-level comments and formal reviews
        {{ forge.cli_tool }} {{ forge.pr_command }} view {{ input }} --comments
        ```

        If `{{ forge.type }}` is `github`, also fetch inline code review comments:
        ```bash
        {{ forge.cli_tool }} api repos/{owner}/{repo}/pulls/{number}/comments --jq '.[] | {path: .path, line: .original_line, body: .body}'
        ```

        ## Step 3: Get the diff

        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} diff {{ input }}
        ```

        ## Step 4: Produce raw findings

        Extract EVERY finding from the review feedback — do not judge, filter, or prioritize.
        Just structure them. Include the PR head branch name (headRefName).

        Output a structured JSON matching the contract schema.
    output_artifacts:
      - name: review-findings
        path: .wave/output/review-findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/review-findings.json
        schema_path: .wave/contracts/review-findings.schema.json
        on_failure: retry

  - id: triage
    persona: navigator
    contexts: [configuration, execution]
    dependencies: [fetch-review]
    memory:
      inject_artifacts:
        - step: fetch-review
          artifact: review-findings
          as: raw_findings
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Triage the review findings for PR: {{ input }}

        The `raw_findings` artifact contains all review findings extracted from the PR.
        Your job is to make judgment calls on each one.

        ## Step 1: Checkout the PR branch and read the actual code

        Get the head branch from `raw_findings` artifact and checkout using plain git (forge-agnostic):
        ```bash
        HEAD_BRANCH=$(cat .wave/artifacts/raw_findings | jq -r '.head_branch')
        git fetch origin "$HEAD_BRANCH"
        git checkout "$HEAD_BRANCH"
        ```

        For each finding, read the referenced file and line to understand the real context.

        ## Step 2: Classify each finding

        For every finding, decide:

        **accept** — Valid finding, introduced by this PR, worth fixing.
        **reject** — False positive, misunderstanding, or would make things worse.
        **defer** — Valid but pre-existing (not introduced by this PR) or out of scope. File as follow-up.
        **skip** — Too risky to change. The fix would touch unrelated code or introduce regressions.

        ## Step 3: Assess risk for accepted findings

        For each accepted finding, assess:
        - **blast radius** — how many files/functions does the fix touch?
        - **test coverage** — are there existing tests that will catch regressions?
        - **confidence** — how certain are you the fix is correct?

        If a critical finding has high blast radius and low test coverage, flag it
        but still accept — critical means it blocks the merge.

        ## Step 4: Produce triage verdict

        Output a structured JSON matching the triage verdict schema.
        Include ONLY accepted findings in the `fixes` array — these are what apply-fixes will act on.
        Include rejected/deferred findings in separate arrays with rationale.
    output_artifacts:
      - name: triage-verdict
        path: .wave/output/triage-verdict.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/triage-verdict.json
        schema_path: .wave/contracts/triage-verdict.schema.json
        on_failure: retry

  - id: apply-fixes
    persona: craftsman
    contexts: [execution, delivery]
    dependencies: [triage]
    memory:
      inject_artifacts:
        - step: triage
          artifact: triage-verdict
          as: triage
        - step: fetch-review
          artifact: review-findings
          as: raw_findings
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/rework/apply-fixes.md
    retry:
      policy: aggressive
      max_attempts: 3
      on_failure: rework
      rework_step: retry-fixes
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry

  - id: retry-fixes
    persona: craftsman
    rework_only: true
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        The previous fix attempt failed tests. Review the error and fix it.
        The failure context is injected as an artifact.
        Focus on the specific error — don't rewrite everything.
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: fail
