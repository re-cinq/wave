kind: WavePipeline
metadata:
  name: bb-rewrite
  description: "Analyze and rewrite poorly documented Bitbucket issues"
  release: true

requires:
  tools:
    - curl
    - jq

input:
  source: cli
  example: "recinq/wave 42"
  schema:
    type: string
    description: "Bitbucket repo with optional issue number"

steps:
  - id: scan-and-score
    persona: bitbucket-analyst
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        Input: {{ input }}

        Step 1: Parse input format.
        - If "workspace/repo NUM" → single issue mode
        - If "workspace/repo" alone → batch mode

        Step 2: Fetch issues via the Bitbucket REST API.
        - Single issue:
          curl -s -H "Authorization: Bearer $BB_TOKEN" \
            "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues/NUM" \
            | jq '{id, title, content: .content.raw, kind, url: .links.html.href}'
        - Batch (list open issues):
          curl -s -H "Authorization: Bearer $BB_TOKEN" \
            "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues?pagelen=10" \
            | jq '[.values[] | {id, title, content: .content.raw, kind, url: .links.html.href}]'

        Step 3: Score each issue quality (0-100) on title clarity, description completeness, kind classification, and acceptance criteria.

        Step 4: For issues scoring below 70, create an enhancement plan with:
        - suggested_title, body_template (preserving original content), suggested_labels, enhancements list

        Note: Bitbucket uses "kind" (bug/enhancement/proposal/task) instead of labels. Map suggested_labels to the appropriate kind value.

        Output JSON with repository (workspace/repo string), issues_to_enhance array, and total_to_enhance.
    output_artifacts:
      - name: enhancement_plan
        path: .wave/artifact.json
        type: json
        required: true
    handover:
      max_retries: 1
      contract:
        type: json_schema
        schema_path: .wave/contracts/github-enhancement-plan.schema.json
        validate: true
        must_pass: true
        allow_recovery: true
        recovery_level: progressive
        progressive_validation: false

  - id: apply-enhancements
    persona: bitbucket-enhancer
    dependencies: [scan-and-score]
    memory:
      inject_artifacts:
        - step: scan-and-score
          artifact: enhancement_plan
          as: plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        Read the repository field from the plan artifact for API calls.

        For each issue in issues_to_enhance:
        1. Write the update payload to a temp file:
           cat > /tmp/bb-payload.json << 'EOF'
           {"title":"suggested_title","content":{"raw":"body_template","markup":"markdown"},"kind":"appropriate_kind"}
           EOF

        2. Apply the update via PUT:
           curl -s -X PUT -H "Authorization: Bearer $BB_TOKEN" -H "Content-Type: application/json" \
             -d @/tmp/bb-payload.json \
             "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues/NUM" \
             | jq '{id, title, state, kind}'

        3. Verify the update by re-fetching:
           curl -s -H "Authorization: Bearer $BB_TOKEN" \
             "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues/NUM" \
             | jq '{id, title, url: .links.html.href}'

        Note: Bitbucket uses "kind" (bug/enhancement/proposal/task) instead of labels.
        Map any suggested_labels to the appropriate kind value in the PUT payload.

        Output JSON with enhanced_issues (issue_number, success, changes_made, url),
        total_attempted, total_successful.
    output_artifacts:
      - name: enhancement_results
        path: .wave/artifact.json
        type: json
        required: true
    outcomes:
      - type: issue
        extract_from: .wave/artifact.json
        json_path: .enhanced_issues[*].url
        label: "Enhanced Issue"
    handover:
      max_retries: 1
      contract:
        type: json_schema
        schema_path: .wave/contracts/github-enhancement-results.schema.json
        validate: true
        must_pass: true
        allow_recovery: true
        recovery_level: progressive
        progressive_validation: false
