kind: WavePipeline
metadata:
  name: ops-implement-epic
  description: "Implement all subissues from a scoped epic, respecting dependency ordering"

requires:
  tools:
    - gh

input:
  source: cli
  schema:
    type: string
    description: "GitHub epic URL or 'owner/repo number' format"
  example: "re-cinq/wave 184"

steps:
  - id: fetch-scope
    persona: github-analyst
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
      base: main
    exec:
      type: prompt
      source_path: .wave/prompts/gh-implement-epic/fetch-scope.md
    output_artifacts:
      - name: scope_plan
        path: .wave/output/epic-scope-plan.json
        type: json
        required: true
    retry:
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/epic-scope-plan.json
        schema_path: .wave/contracts/epic-scope-plan.schema.json
        must_pass: true
        on_failure: retry

  - id: implement-subissues
    persona: implementer
    dependencies: [fetch-scope]
    strategy:
      type: matrix
      items_source: fetch-scope/.wave/output/epic-scope-plan.json
      item_key: subissues
      item_id_key: "number"
      dependency_key: "dependencies"
      child_pipeline: implement
      input_template: "{{ .repository }} {{ .number }}"
      max_concurrency: 3
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    memory:
      inject_artifacts:
        - step: fetch-scope
          artifact: scope_plan
          as: scope_plan
    exec:
      type: prompt
      source: "Implement subissues from epic"

  - id: report
    persona: github-commenter
    dependencies: [implement-subissues]
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
      ref: fetch-scope
    memory:
      inject_artifacts:
        - step: fetch-scope
          artifact: scope_plan
          as: scope_plan
    exec:
      type: prompt
      source_path: .wave/prompts/gh-implement-epic/report.md
    output_artifacts:
      - name: epic_report
        path: .wave/output/epic-report.json
        type: json
        required: true
    outcomes:
      - type: url
        extract_from: .wave/output/epic-report.json
        json_path: .summary.comment_url
        label: "Epic Summary"
    retry:
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/epic-report.json
        schema_path: .wave/contracts/epic-report.schema.json
        must_pass: true
        on_failure: retry
