kind: WavePipeline
metadata:
  name: ops-issue-quality
  description: >-
    Scan all open issues in a repository, score each for title clarity, body
    completeness, and label hygiene, then post actionable enhancement suggestions
    as comments on the worst-scoring issues. Use this to improve issue quality
    across a project. Scores issues on a 0-100 scale and targets those below
    the quality threshold for remediation.
  release: true

skills:
  - gh-cli

requires:
  tools:
    - gh

input:
  source: cli
  example: "re-cinq/wave"
  schema:
    type: string
    description: "Repository in owner/repo format"

chat_context:
  artifact_summaries:
    - quality-report
    - enhancement-summary
  suggested_questions:
    - "How many issues scored below the quality threshold?"
    - "What were the most common quality problems?"
    - "How many enhancement comments were posted?"
  focus_areas:
    - "Issue quality scores and patterns"
    - "Enhancement suggestions posted"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  report:
    step: enhance
    artifact: enhancement-summary

steps:
  - id: scan
    persona: "{{ forge.type }}-analyst"
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Scan all open issues in a repository, score each for quality across three
        dimensions (title clarity, body completeness, and label hygiene), and produce a
        structured quality report. The report identifies every issue scoring below the
        quality threshold and provides specific, actionable problems and recommendations
        for each. This report feeds the next step, which will post enhancement suggestions
        on the worst-scoring issues.

        Repository: {{ input }}

        ## Context

        This is the first step of the ops-issue-quality pipeline. No prior artifacts
        exist. You have read-only access to the project directory and access to the forge
        CLI tool ({{ forge.cli_tool }}). The input is a repository identifier in
        `owner/repo` format. You will fetch all open issues and apply a deterministic
        scoring rubric. The "enhance" step downstream will consume your report and post
        comments on the worst issues, so your scoring must be consistent and your
        recommendations must be specific enough to act on.

        ## Requirements

        ### Step 1: Parse Input

        Split the input on "/" to extract OWNER and REPO. Validate that both are non-empty
        strings.

        ### Step 2: Fetch Open Issues

        ```bash
        {{ forge.cli_tool }} issue list --repo {{ input }} --state open --limit 200 \
          --json number,title,body,labels,url,assignees,milestone,createdAt,updatedAt,comments
        ```

        If the fetch returns zero issues, produce an empty report and stop.

        ### Step 3: Filter Out Pull Requests

        Some forges return pull requests mixed with issues. Skip any item where the URL
        contains "/pull/" — these are pull requests, not issues. Record the count of
        skipped PRs for the report metadata.

        ### Step 4: Score Each Issue

        For every genuine issue, start at 100 points and apply the following deductions.
        Apply ALL matching deductions — they are cumulative. Floor the score at 0.

        **Title quality deductions:**
        - Title shorter than 10 characters: -20 points
        - Title is all lowercase and longer than 5 characters: -5 points
        - Title is all uppercase and longer than 5 characters: -10 points
        - Title contains vague terms ("issue", "problem", "help", "bug?", "question",
          "fix", "update", "thing") AND title is shorter than 30 characters: -10 points
        - Title has fewer than 3 words: -15 points

        **Body quality deductions:**
        - Body is empty or null: -40 points
        - Body is non-empty but shorter than 50 characters: -25 points
        - Body is between 50-100 characters: -10 points
        - Body has only one sentence (fewer than 2 sentence-ending punctuation marks)
          and body length exceeds 20 characters: -10 points
        - Body is longer than 100 characters but lacks structured sections (none of
          these keywords found case-insensitively: "steps to reproduce", "expected
          behavior", "actual behavior", "environment", "version", "screenshot",
          "reproduction", "acceptance criteria", "description"): -5 points

        **Label deductions:**
        - No labels assigned: -10 points

        ### Step 5: Generate Recommendations

        For each issue scoring below 70, produce:
        - A `problems` list naming each specific deduction that was applied (e.g.,
          "Title too short: 8 characters, minimum recommended is 20")
        - A `recommendations` list with actionable suggestions (e.g., "Add a descriptive
          title that includes the affected component and the symptom", "Add an
          'Expected behavior' section to the issue body")

        ### Step 6: Produce Output

        Sort poor-quality issues by score ascending (worst first). Truncate issue bodies
        to 500 characters in the output to keep the JSON manageable.

        ## Constraints and Anti-patterns

        - Do NOT modify any issues in this step. Scoring and reporting only.
        - Do NOT use subjective judgment. Apply the scoring rubric mechanically. The
          rubric is the source of truth — do not override scores based on your opinion
          of the issue's quality.
        - Do NOT fetch more than 200 issues. If the repository has more, the first 200
          are sufficient for this analysis.
        - Do NOT include issues with score >= 70 in the `poor_quality_issues` array.
        - Do NOT skip the label check for issues that already score poorly. All
          deductions apply regardless of current score.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good quality report applies the scoring rubric consistently across all issues,
        produces recommendations that are specific and actionable (not generic "improve
        the issue"), and correctly sorts by score. A bad report applies deductions
        inconsistently, generates vague recommendations ("make the issue better"), or
        includes issues above the threshold in the poor-quality list.
    output_artifacts:
      - name: quality-report
        path: .wave/artifacts/quality-report.json
        type: json
        required: true
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/artifacts/quality-report.json
        schema_path: .wave/contracts/github-issue-analysis.schema.json
        on_failure: retry

  - id: enhance
    persona: "{{ forge.type }}-commenter"
    model: strongest
    dependencies: [scan]
    memory:
      inject_artifacts:
        - step: scan
          artifact: quality-report
          as: quality_report
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Post constructive enhancement suggestions as comments on the worst-scoring issues
        identified in the quality report. Each comment must be specific, actionable, and
        helpful — not generic advice. After posting, produce a summary report documenting
        which issues received comments, which were skipped, and why. The goal is to
        improve issue quality across the repository without creating noise or annoying
        maintainers with excessive comments.

        Repository: {{ input }}

        ## Context

        The previous "scan" step produced the injected `quality_report` artifact. It
        contains:
        - `repository`: owner and name
        - `total_issues`: how many issues were fetched
        - `analyzed_count`: how many were analyzed (excluding PRs)
        - `poor_quality_issues`: array of issues scoring below 70, sorted by score
          ascending (worst first), each with `number`, `title`, `body`, `quality_score`,
          `problems`, `recommendations`, `labels`, and `url`
        - `quality_threshold`: 70

        Read this artifact FIRST. Your work is driven entirely by the quality report.

        ## Requirements

        ### Step 1: Read and Analyze the Quality Report

        Read the injected `quality_report` artifact. Parse the `poor_quality_issues` array.
        Count how many issues are available for enhancement.

        ### Step 2: Select Issues to Enhance

        Apply this selection logic in order:

        1. From `poor_quality_issues`, select all issues where `quality_score < 50`.
           If this yields more than 10 issues, take only the 10 worst (lowest scores).
        2. If no issues have score < 50, select the 5 worst issues from those with
           score < 70.
        3. If there are no poor quality issues at all (empty array), skip to Step 4
           and write a summary noting the repository has good issue quality.

        This tiered selection prevents comment spam on repositories where most issues
        are borderline (score 60-69) while ensuring the truly bad issues always get
        attention.

        ### Step 3: Post Enhancement Comments

        For each selected issue, compose and post a comment following this exact structure:

        1. Write the comment body to a temporary file:
           ```bash
           cat > /tmp/issue-enhance-<NUMBER>.md <<'COMMENT_EOF'
           ## Issue Quality Suggestions

           This issue has been automatically reviewed for clarity and completeness.

           **Quality Score**: <score>/100

           **Problems identified**:
           - <problem 1 — be specific, e.g., "Title is only 5 characters long">
           - <problem 2>
           ...

           **Recommendations**:
           - <recommendation 1 — be actionable, e.g., "Rename the title to include the affected component and symptom, such as 'Pipeline executor panics on nil state during resume'">
           - <recommendation 2>
           ...

           Consider updating this issue with the suggestions above to help maintainers
           triage and implement it more effectively.

           ---
           *Posted by [Wave](https://github.com/re-cinq/wave) ops-issue-quality pipeline*
           COMMENT_EOF
           ```

        2. Post the comment:
           ```bash
           {{ forge.cli_tool }} issue comment <NUMBER> --repo {{ input }} --body-file /tmp/issue-enhance-<NUMBER>.md
           ```

        3. Clean up the temp file:
           ```bash
           rm -f /tmp/issue-enhance-<NUMBER>.md
           ```

        4. Record whether the post succeeded or failed for the summary.

        ### Step 4: Write Summary

        Write the enhancement summary with these sections:

        - **H2: Repository** — owner/repo
        - **H2: Scan Results** — total issues scanned, total analyzed (excluding PRs),
          total below quality threshold
        - **H2: Comments Posted** — count of comments posted, list of issue numbers
          with their scores
        - **H2: Skipped Issues** — count and reason for each skip (score above cutoff,
          batch limit reached, post failed)
        - **H2: Per-Issue Details** — for each commented issue: number, title, score,
          and a one-line summary of the main problems addressed
        - **H2: Overall Assessment** — one paragraph characterizing the repository's
          issue quality (e.g., "Most issues are well-documented; 3 outliers need
          attention" vs. "Widespread quality issues suggest the project would benefit
          from an issue template")

        ## Constraints and Anti-patterns

        - Do NOT post more than 10 comments in a single run. This prevents flooding the
          issue tracker.
        - Do NOT post comments on issues scoring 70 or above. The threshold is firm.
        - Do NOT modify issue titles, bodies, or labels. Only post comments.
        - Do NOT post duplicate comments. If an issue already has a "Issue Quality
          Suggestions" comment (check via the comments field in the quality report),
          skip it.
        - Do NOT use harsh or condescending language. The tone must be constructive and
          helpful: "Consider adding..." not "This issue is poorly written."
        - Do NOT post generic recommendations. Every recommendation must reference the
          specific problem it addresses.

        ## Output Format

        Produce the enhancement summary as markdown with the sections described in
        Step 4 above.

        ## Quality Bar

        Good enhancement comments give the issue author a clear, specific action they can
        take in under 2 minutes to meaningfully improve the issue (e.g., "Add a 'Steps
        to Reproduce' section describing how to trigger the error"). Bad enhancement
        comments are generic ("improve the description"), condescending, or posted on
        issues that are actually fine. The summary should give a project maintainer a
        quick snapshot of issue health across the repository.
    output_artifacts:
      - name: enhancement-summary
        path: .wave/artifacts/enhancement-summary.md
        type: markdown
        required: true
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: non_empty_file
        source: .wave/artifacts/enhancement-summary.md
