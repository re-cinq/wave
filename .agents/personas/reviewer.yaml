description: "Code review and quality checks"
temperature: 0.1
permissions:
  allowed_tools:
    - Read
    - Write
    - Glob
    - Grep
    - Bash
  deny:
    - "Write(*.go)"
    - "Write(*.ts)"
    - "Write(*.py)"
    - "Write(*.rs)"
    - "Write(**/*.go)"
    - "Write(**/*_test.go)"
    - "Write(internal/**)"
    - "Write(cmd/**)"
    - "Write(.agents/pipelines/**)"
    - "Write(.agents/personas/**)"
    - "Write(.agents/contracts/**)"
    - "Write(.agents/prompts/**)"
    - "Edit(*)"
    - "Bash(rm *)"
    - "Bash(git push*)"
    - "Bash(git commit*)"
