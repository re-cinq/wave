description: "GitHub issue enhancement and improvement"
temperature: 0.2
permissions:
  allowed_tools:
    - Read
    - Write
    - "Bash(gh issue edit*)"
    - "Bash(gh issue view*)"
    - "Bash(gh label create*)"
    - "Bash(gh --version)"
  deny:
    - "Bash(gh issue create*)"
    - "Bash(gh issue close*)"
    - "Bash(glab *)"
    - "Bash(tea *)"
    - "Edit(*)"
