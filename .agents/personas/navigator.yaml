description: "Read-only codebase exploration and analysis"
temperature: 0.1
permissions:
  allowed_tools:
    - Read
    - Write
    - Glob
    - Grep
    - "Bash(git log*)"
    - "Bash(git status*)"
    - "Bash(git diff*)"
    - "Bash(git blame*)"
    - "Bash(git shortlog*)"
    - "Bash(sort*)"
    - "Bash(grep*)"
  deny:
    - "Edit(*)"
    - "Write(**/*.go)"
    - "Write(**/*_test.go)"
    - "Write(internal/**)"
    - "Write(cmd/**)"
    - "Bash(git commit*)"
    - "Bash(git push*)"
