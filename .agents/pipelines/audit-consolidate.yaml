kind: WavePipeline
metadata:
  name: audit-consolidate
  description: >-
    Detect redundant implementations, parallel abstractions, and architectural
    drift across the codebase. Scans for duplicate logic, inconsistent patterns,
    dead abstractions, package boundary violations, and naming mismatches. Use
    this after rapid development periods to identify consolidation opportunities
    and restore architectural coherence.
  release: true

skills:
  - software-design

input:
  source: cli
  example: "internal/pipeline — check for redundant patterns"
  schema:
    type: string
    description: "Package or directory scope to analyze, or empty for full codebase"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What redundant implementations were found?"
    - "Which consolidation opportunities have the best effort-to-impact ratio?"
    - "Are there naming inconsistencies that should be unified?"
  focus_areas:
    - "Duplicate logic and parallel abstractions"
    - "Consolidation strategies and effort estimates"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .agents/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .agents/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  findings:
    step: scan
    artifact: findings

steps:
  - id: scan
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Scan the codebase for redundant implementations, parallel abstractions, and architectural drift that have accumulated over time. Produce a structured JSON report identifying specific consolidation opportunities with effort estimates and risk assessments. This analysis helps restore architectural coherence after rapid development periods where expedient copy-paste and parallel solutions tend to proliferate.

        ## Context

        This is a single-step analysis pipeline. The codebase is mounted read-only at /project. The caller may provide a package or directory scope via the input variable, or leave it empty for a full codebase scan. No prior pipeline steps feed into this step. This pipeline is most valuable after feature sprints, large merges, or when multiple contributors have worked on similar functionality independently.

        Scope: {{ input }}

        If the scope is empty or blank, scan all packages under internal/ and cmd/. If a specific directory is provided (e.g., "internal/pipeline"), focus analysis on that subtree but still check for cross-package redundancies by searching the full codebase for similar patterns.

        ## Requirements

        Systematically search for each of the following categories of architectural drift:

        1. **Duplicate logic**: Identify functions in different packages that perform the same operation. Search for similar function signatures using Grep (e.g., functions that take the same parameter types and return the same result types). Read the function bodies to confirm behavioral duplication. Pay special attention to utility functions (file I/O, string manipulation, error wrapping, JSON marshaling) that tend to be reimplemented per-package rather than shared.

        2. **Parallel abstractions**: Find multiple interfaces or types that represent the same domain concept. For example, two different "Result" types in separate packages, two error-wrapping strategies, or two configuration-loading mechanisms. Use Grep to search for type definitions with similar names or field sets. Read the types to determine whether they model the same concept.

        3. **Inconsistent patterns**: Identify cases where the same operation is performed using different approaches in different locations. Common examples include: file reading (os.ReadFile vs io.ReadAll vs bufio), JSON handling (json.Unmarshal vs json.NewDecoder), error creation (fmt.Errorf vs errors.New vs custom types), context propagation (explicit parameter vs global). Use Grep to find all call sites of each variant and determine whether one pattern should be canonical.

        4. **Dead abstractions**: Find interfaces with only one implementation (premature abstraction), wrapper types that delegate every method without adding behavior, and factory functions that always return the same concrete type. Use Grep to count implementations of each interface and callers of each wrapper.

        5. **Package boundary violations**: Identify cases where one package reaches into another's internal details instead of using its public API. Look for imports that bypass intended abstraction layers, direct struct field access where accessor methods exist, and type assertions that defeat interface-based dispatch.

        6. **Naming inconsistencies**: Find the same concept referred to by different names across packages. Common examples include: "workspace" vs "workdir" vs "cwd," "config" vs "settings" vs "options," "run" vs "execution" vs "invocation," "step" vs "task" vs "job." Use Grep to search for each variant and map which packages use which term.

        For each finding, perform this analysis:
        - List all affected file:line locations on both sides of the redundancy.
        - Explain precisely what is redundant or inconsistent, citing specific code.
        - Propose a concrete consolidation strategy (which side to keep, what to extract, where to place the shared code).
        - Assess implementation effort: trivial (rename or delete), small (extract helper, update imports), medium (introduce shared interface, update callers), large (architectural restructuring across multiple packages).
        - Assess risk: what could break if the consolidation is done incorrectly.

        ## Constraints and Anti-patterns

        - Do NOT report intentional polymorphism as redundancy. Multiple implementations of a shared interface that serve different backends are by design.
        - Do NOT flag test utilities that duplicate production patterns for testing convenience.
        - Do NOT report standard library idiom variations unless they cause behavioral inconsistency.
        - Do NOT modify any files. The workspace is read-only.
        - Do NOT report findings without reading the actual source code of both locations. Name similarity alone is not sufficient evidence.
        - Avoid reporting trivially small functions (under 5 lines) as duplicates unless they appear in more than 3 locations.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good scan reads source code from both sides of each reported redundancy, explains the specific behavioral or structural overlap, and proposes a concrete consolidation path with realistic effort estimates. A bad scan reports surface-level name similarities without reading the code, flags intentional design patterns as redundancy, or provides vague recommendations like "these should be consolidated" without explaining how.
    output_artifacts:
      - name: findings
        path: .agents/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/findings.json
        schema_path: .agents/contracts/shared-findings.schema.json
        on_failure: skip
