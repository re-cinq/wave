kind: WavePipeline
metadata:
  name: wave-smoke-contracts
  description: >-
    Smoke test for contract validation. Creates test JSON data and schema,
    then validates them via a navigator step.
  release: false
  category: wave

input:
  source: cli
  type: string
  example: "verify contract validation works"

chat_context:
  suggested_questions:
    - "Did contract validation pass?"
    - "Were the test files created and validated?"

steps:
  - id: setup
    type: command
    script: |
      mkdir -p .agents/output
      echo '{"valid": true}' > .agents/output/test-data.json
      echo '{"type":"object","properties":{"valid":{"type":"boolean"}},"required":["valid"]}' > .agents/output/test-schema.json
    output_artifacts:
      - name: test-data
        path: .agents/output/test-data.json
        type: json
      - name: test-schema
        path: .agents/output/test-schema.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/test-data.json
        on_failure: fail

  - id: validate
    persona: navigator
    model: cheapest
    dependencies: [setup]
    memory:
      inject_artifacts:
        - step: setup
          artifact: test-data
          as: test-data
        - step: setup
          artifact: test-schema
          as: test-schema
    exec:
      type: prompt
      source: |
        Read the two injected input artifacts. Each must parse as valid JSON.
        Set `data_valid` true iff `test-data` parses; set `schema_valid` true
        iff `test-schema` parses. Set `checked_at` to the current RFC3339 UTC
        timestamp.
    output_artifacts:
      - name: contract-check
        path: .agents/output/contract-check.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .agents/output/contract-check.json
        schema_path: .agents/contracts/contract-check.schema.json
        on_failure: fail
