kind: WavePipeline
metadata:
  name: wave-smoke-contracts
  description: >-
    Smoke test for contract validation. Creates test JSON data and schema,
    then validates them via a navigator step.
  release: false
  category: wave

input:
  source: cli
  example: "verify contract validation works"

chat_context:
  suggested_questions:
    - "Did contract validation pass?"
    - "Were the test files created and validated?"

steps:
  - id: setup
    type: command
    script: |
      mkdir -p .agents/output
      echo '{"valid": true}' > .agents/output/test-data.json
      echo '{"type":"object","properties":{"valid":{"type":"boolean"}},"required":["valid"]}' > .agents/output/test-schema.json
    output_artifacts:
      - name: test-data
        path: .agents/output/test-data.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/test-data.json
        on_failure: fail

  - id: validate
    persona: navigator
    model: cheapest
    dependencies: [setup]
    exec:
      type: prompt
      source: |
        Read `.agents/output/test-data.json` and `.agents/output/test-schema.json`.
        Verify both exist and contain valid JSON. Write confirmation to
        `.agents/output/contract-check.json`:
        {"data_valid": true, "schema_valid": true, "checked_at": "<timestamp>"}
    output_artifacts:
      - name: contract-check
        path: .agents/output/contract-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/contract-check.json
        on_failure: fail
