kind: WavePipeline
metadata:
  name: wave-evolve
  description: >-
    Self-evolution pipeline that analyzes Wave's own pipeline YAML, persona
    definitions, prompt templates, and contract schemas for improvement
    opportunities, then applies the highest-impact changes. Examines prompt
    clarity, contract accuracy, retry policies, and execution traces to identify
    where steps retry or produce inconsistent output. Use this to iteratively
    improve Wave's pipeline infrastructure without modifying Go source code.
  release: false

skills:
  - wave
  - "{{ project.skill }}"

input:
  source: cli
  type: string
  example: "analyze last 5 pipeline runs and improve prompts that had retries"
  schema:
    type: string
    description: "Evolution focus: what aspect of Wave to analyze and improve"

chat_context:
  artifact_summaries:
    - evolution-analysis
    - verification
  suggested_questions:
    - "What improvements were applied to Wave's pipelines?"
    - "Which prompts or contracts were updated?"
    - "Did wave validate pass after changes?"
  focus_areas:
    - "Pipeline infrastructure improvements"
    - "Validation and verification results"

pipeline_outputs:
  result:
    step: verify
    artifact: verification
    type: findings_report

steps:
  - id: analyze
    persona: navigator
    model: balanced
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Analyze Wave's own pipeline infrastructure (YAML pipelines, persona definitions,
        prompt templates, and contract schemas) for improvement opportunities, producing
        a prioritized assessment of changes ranked by impact on pipeline reliability and
        output quality.

        FOCUS: {{ input }}

        CONTEXT:
        You are the first step in a three-step self-evolution pipeline (analyze, evolve,
        verify). Your analysis will be consumed by a craftsman persona who will apply
        the highest-impact improvements. Only .agents/ files will be modified -- Go source
        code is out of scope. You have read-only access to the full project.

        REQUIREMENTS:
        1. Analyze pipeline YAML files (`.agents/pipelines/`):
           - Read each pipeline file. For each step with a prompt, evaluate:
             - Clarity: Is the prompt unambiguous? Could an LLM misinterpret any instruction?
             - Structure: Does the prompt follow the Objective/Context/Requirements/
               Constraints/Output/Quality pattern?
             - Output specification: Is the expected output format explicitly defined with
               field names and types?
             - Contract alignment: Does the handover contract schema match what the prompt
               asks the agent to produce? Read both the prompt and the schema file.
           - For each pipeline, check retry/failure policies: are they appropriate for the
             step's nature? (patient for exploration, aggressive for API calls, standard
             for implementation)
           - Check artifact handoffs: does every step that consumes an artifact have it
             properly declared in memory.inject_artifacts?
        2. Analyze persona definitions (`.agents/personas/`):
           - Read each persona file. Evaluate:
             - Role clarity: Is the role description specific enough to guide behavior?
             - Permission scope: Do deny/allow rules match the persona's actual needs?
               (e.g., a navigator should not have Bash write permissions)
             - Constraints: Are behavioral constraints specific enough to prevent drift
               into other personas' responsibilities?
        3. Analyze prompt templates (`.agents/prompts/` if present):
           - Are instructions structured for LLM comprehension (numbered lists, clear
             sections, explicit constraints)?
           - Do templates include concrete examples where helpful?
           - Are output format requirements explicit (field names, types, structure)?
        4. Analyze contract schemas (`.agents/contracts/`):
           - For each schema, check: do required fields match what the step prompt asks
             the agent to produce? Are there required fields that agents consistently
             struggle to populate? Are there optional fields that should be required?
           - Cross-reference with actual step prompts to find mismatches.
        5. Analyze execution patterns if traces are available (`.agents/traces/`):
           - Which steps retry most often? What causes the retries (contract failure,
             timeout, error)?
           - Which contracts fail most? Is it a schema mismatch or agent output quality?
           - Which prompts produce inconsistent output across runs?
        6. Produce a prioritized list of improvements:
           - Each improvement must have: id (IMP-###), category (one of: error_handling,
             performance, testability, robustness, maintainability, code_quality),
             location (file path), title, description (what to change),
             impact (high/medium/low), risk (none/low/medium/high), effort (trivial/small/medium/large)
           - Sort by impact descending, then by effort ascending (high-impact, low-effort
             improvements first)

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT suggest changes to Go source code. This pipeline modifies only .agents/ files.
        - Do NOT suggest changes you cannot verify. Every finding must reference a specific
          file path and the specific issue observed.
        - Do NOT produce generic improvement advice ("improve prompts"). Every improvement
          must be specific: "In wave-bugfix.yaml step investigate, the prompt does not
          specify the JSON output schema fields, causing contract failures."
        - Do NOT prioritize cosmetic changes over functional ones. A prompt that works
          reliably but is ugly is lower priority than one that causes retries.
        - Do NOT suggest more than 20 improvements. Focus on the highest-impact ones.

        OUTPUT FORMAT:
        Produce the analysis as structured JSON matching the improvement-assessment
        contract schema. Include: target (string describing what was analyzed),
        findings (array of improvement objects as described above), summary (object
        with total_findings, by_category counts, quick_wins, high_impact, and
        overall_quality string), and timestamp (ISO 8601 format).

        QUALITY BAR:
        A good analysis identifies real problems that cause pipeline failures, retries, or
        low-quality output, with specific file references and actionable fixes. A bad
        analysis lists generic advice, misidentifies non-problems as issues, or suggests
        high-risk changes to working pipelines.
    output_artifacts:
      - name: evolution-analysis
        path: .agents/output/evolution-analysis.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/evolution-analysis.json
        schema_path: .agents/contracts/improvement-assessment.schema.json
        on_failure: retry

  - id: evolve
    persona: craftsman
    model: strongest
    dependencies: [analyze]
    memory:
      inject_artifacts:
        - step: analyze
          artifact: evolution-analysis
          as: findings
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Apply the highest-impact improvements identified in the analysis to Wave's pipeline
        infrastructure files. Each change must be validated before proceeding to the next.
        Only .agents/ files are in scope.

        CONTEXT:
        You are the second step in the self-evolution pipeline. The analysis artifact
        (injected as "findings") contains a prioritized list of improvements with file
        paths, descriptions, impact ratings, and risk levels. Apply improvements in
        priority order (highest impact, lowest risk first). You have read-write access
        to the project. Skip any improvement rated as high-risk.

        REQUIREMENTS:
        1. Read the findings artifact completely. Sort improvements by priority: apply
           high-impact/low-risk first, then high-impact/medium-risk, then medium-impact
           improvements. Skip all high-risk improvements entirely.
        2. For each improvement (in priority order):
           a. Read the target file to understand its current state
           b. Apply the change described in the improvement
           c. Validate the change:
              - For YAML files: ensure the file parses as valid YAML. Check that all
                required fields are present and template variables ({{ ... }}) are
                properly formatted.
              - For JSON schema files: ensure the file parses as valid JSON. Verify
                that $schema, type, properties, and required fields are consistent.
              - For persona files: ensure role, description, and permissions are present.
           d. Run `wave validate` after each change to verify configuration integrity.
              If validation fails, revert the change and move to the next improvement.
        3. Make one improvement at a time. Do not batch multiple changes before validation.
           This ensures that if a change breaks something, you know exactly which change
           caused it.
        4. Keep a running log of what was applied and what was skipped, with reasons.
        5. After all improvements are applied (or skipped), run a final `wave validate`
           to confirm the overall configuration is healthy.
        6. Preserve backward compatibility: do not rename pipeline steps, change artifact
           names, or modify contract schemas in ways that would break in-progress pipeline
           runs.

        CONSTRAINTS AND ANTI-PATTERNS:
        - IMPORTANT: Only modify files under `.agents/` -- pipelines, personas, prompts, and
          contracts. Do NOT modify Go source code, test files, or any file outside .agents/.
        - Do NOT apply high-risk improvements regardless of their impact. The verify step
          cannot catch all regressions from risky changes.
        - Do NOT batch changes. Apply one, validate, then proceed to the next.
        - Do NOT modify pipeline step IDs, artifact names, or schema file names. These are
          referenced by other pipelines and the executor. Renaming them breaks things.
        - Do NOT "improve" working prompts by rewriting them from scratch. Apply the
          specific improvement described in the findings.
        - Do NOT ignore validation failures. If `wave validate` fails after a change,
          revert and skip that improvement.

        OUTPUT FORMAT:
        The output is the modified .agents/ files. The handover contract validates by running
        `wave validate`. No explicit artifact is produced beyond the file changes and the
        validation passing.

        QUALITY BAR:
        A good evolution run applies several high-impact improvements that measurably
        improve pipeline reliability (fewer retries, clearer prompts, better-aligned
        contracts) without breaking anything. A bad run applies risky changes that break
        validation, batches changes making it impossible to isolate failures, or modifies
        Go source code outside the scope.
    output_artifacts:
      - name: evolution-log
        path: .agents/output/evolution-log.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "wave validate"
        must_pass: true
        on_failure: retry

  - id: verify
    persona: reviewer
    model: strongest
    dependencies: [evolve, analyze]
    memory:
      inject_artifacts:
        - step: analyze
          artifact: evolution-analysis
          as: original_findings
        - step: evolve
          artifact: evolution-log
          as: evolution_log
    exec:
      type: prompt
      source: |
        OBJECTIVE:
        Verify that all evolution changes were applied correctly, no unintended modifications
        were made, and the overall Wave configuration remains valid. Produce a structured
        verification report documenting what was changed and what was validated.

        CONTEXT:
        You are the third and final step in the self-evolution pipeline. The analysis
        artifact (injected as "original_findings") contains the prioritized list of
        improvements that the evolve step was instructed to apply. The evolve step has
        already modified .agents/ files. Your job is to verify correctness, not to make
        additional changes. You have read-only access to the codebase.

        REQUIREMENTS:
        1. Read the original_findings artifact to get the list of improvements that were
           planned for application.
        2. For each improvement in the findings:
           a. Read the target file to check if the improvement was applied
           b. Verify the change matches what was described in the improvement
           c. Record status: applied (change matches), skipped (file unchanged, which
              is expected for high-risk items), or divergent (change was made but does
              not match the described improvement)
        3. Validate all modified .agents/ files:
           a. YAML files: verify they parse as valid YAML. Check that template variables
              are properly formatted ({{ variable }} with spaces inside braces).
           b. JSON schema files: verify they parse as valid JSON. Check that required
              arrays reference only properties that are defined.
           c. Persona files: verify role, description, and permission fields are present.
        4. Check for unintended modifications:
           a. Run `git diff --name-only` to see all changed files
           b. Confirm ALL changed files are under .agents/. If any Go source files, test
              files, or files outside .agents/ were modified, flag this as a critical issue.
        5. Run `wave validate` to verify the overall configuration integrity.
        6. Produce the verification report as markdown with:
           - Summary: how many improvements applied, skipped, divergent
           - Per-improvement details: status, target file, what was verified
           - Validation results: YAML parsing, JSON parsing, wave validate output
           - Unintended changes: any files modified outside .agents/ (should be none)
           - Overall verdict: PASS (all validations succeed, no unintended changes) or
             FAIL (any validation failure or unintended change)

        CONSTRAINTS AND ANTI-PATTERNS:
        - Do NOT make any modifications to files. This step is verification only.
        - Do NOT skip the unintended modification check. Catching out-of-scope changes
          is one of the primary purposes of this step.
        - Do NOT report "PASS" if any validation fails or unintended changes are detected.
        - Do NOT verify superficially. Read the actual file content and compare against
          the improvement description, not just check that the file was modified.

        OUTPUT FORMAT:
        Produce the verification report as markdown. Use
        sections: ## Summary, ## Per-Improvement Verification, ## Validation Results,
        ## Unintended Changes, ## Verdict.

        QUALITY BAR:
        A good verification report gives confidence that the evolution changes are correct
        and safe. Each improvement is individually verified against the planned change, all
        files pass syntax validation, and no unintended modifications slipped through. A
        bad report rubber-stamps the changes without actually reading files or checking
        for out-of-scope modifications.
    output_artifacts:
      - name: verification
        path: .agents/output/verification.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .agents/contracts/verification-criteria.md
        source: .agents/output/verification.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: rework
