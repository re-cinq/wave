kind: WavePipeline
metadata:
  name: impl-prototype
  description: >-
    Prototype-driven development following a spec, docs, dummy, implement, PR
    cycle. Use this for greenfield features where requirements need to be
    captured before coding begins. Phases produce a formal specification,
    runnable documentation, a dummy scaffold, a full implementation, and finally
    a pull request with all artifacts.
  release: true

input:
  source: cli
  example: "build a REST API for user management with CRUD operations"

chat_context:
  artifact_summaries:
    - spec
    - implementation-plan
    - pr-info
  suggested_questions:
    - "Does the specification cover all requirements?"
    - "Is the prototype functional enough for stakeholder review?"
    - "What implementation tasks remain?"
  focus_areas:
    - "Specification completeness"
    - "Prototype fidelity and implementation progress"

pipeline_outputs:
  pr:
    step: pr-create
    artifact: pr-info

steps:
  # Phase 1: Spec - Requirements capture with speckit integration
  - id: spec
    persona: craftsman
    thread: prototype
    model: strongest
    exec:
      type: prompt
      source: |
        SPECIFICATION — capture complete requirements before any code is written.

        ## Objective

        Analyze the project description and create a comprehensive, technology-agnostic
        feature specification that fully describes what needs to be built. The specification
        must be detailed enough that a developer unfamiliar with the project could implement
        the feature correctly by reading only these documents. This is the foundation for
        every subsequent phase — ambiguity here cascades into every later step.

        Project description: {{ input }}

        ## Context

        You are the first step in a prototype-driven development pipeline. No prior
        artifacts exist. You have read-write access to the project workspace. The outputs
        of this step (spec.md and requirements.md) will be injected into the documentation
        phase and used throughout the rest of the pipeline. The specification must stand on
        its own as a complete description of the feature.

        ## Requirements

        1. **Analyze the project description**: Parse the input carefully. Identify the core
           user need, the key capabilities requested, and any constraints mentioned. If the
           description is vague, make reasonable assumptions and document them explicitly.

        2. **Create spec.md** with the following sections:
           - **Feature Overview**: 2-3 paragraphs describing the feature, its purpose, and
             the problem it solves
           - **Business Value**: Why this feature matters. What user pain does it address?
             What metric does it improve?
           - **User Stories**: At least 3 user stories in "As a [role], I want [action], so
             that [benefit]" format. Each must have numbered acceptance criteria that are
             objectively testable.
           - **Functional Requirements**: Numbered list of FR-001, FR-002, etc. Each
             requirement must be specific, measurable, and testable. Avoid vague language
             like "should be fast" — instead say "must respond within 200ms for the 95th
             percentile."
           - **Non-Functional Requirements**: Performance, security, accessibility,
             compatibility constraints
           - **Success Criteria**: How will we know the feature is complete and working?
             List measurable outcomes.
           - **Constraints and Assumptions**: Technology constraints, dependencies on other
             systems, assumptions about the environment

        3. **Create requirements.md** with extracted and categorized requirements:
           - Group requirements by functional area (e.g., UI, API, data, integration)
           - Include priority for each requirement (must-have, should-have, nice-to-have)
           - Include traceability back to spec.md user stories

        4. **Use speckit integration** where available to validate specification quality
           and structure.

        5. **Produce output matching the contract schema.**

        ## Constraints and Anti-patterns

        - Do NOT mention specific technologies, frameworks, or libraries in the spec. The
          specification must be technology-agnostic — it describes WHAT, not HOW.
        - Do NOT include implementation details, code snippets, or architecture decisions.
        - Do NOT leave requirements vague or subjective. Every requirement must be testable.
        - Do NOT skip edge cases. Think about error scenarios, empty states, boundary
          conditions, and concurrent access.
        - Do NOT write requirements that overlap or contradict each other.
        - Do NOT assume knowledge of the project — write for a newcomer.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good specification is one where two different developers, reading only the spec,
        would build substantially the same feature. Every user story has testable acceptance
        criteria. Every requirement is unambiguous. A bad specification leaves room for
        interpretation, uses vague language, omits edge cases, or conflates requirements
        with implementation details.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

    output_artifacts:
      - name: spec
        path: spec.md
        type: markdown
      - name: requirements
        path: requirements.md
        type: markdown
      - name: contract_data
        path: .agents/artifact.json
        type: json

    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        schema_path: .agents/contracts/spec-phase.schema.json
        must_pass: true
        on_failure: retry

  # Phase 2: Docs - Generate runnable documentation from specification
  - id: docs
    persona: philosopher
    model: cheapest
    dependencies: [spec]

    memory:
      inject_artifacts:
        - step: spec
          artifact: spec
          as: input-spec.md

    exec:
      type: prompt
      source: |
        DOCUMENTATION — create runnable docs and stakeholder materials from the spec.

        ## Objective

        Transform the feature specification into two distinct documentation artifacts: a
        comprehensive technical feature guide for developers, and a stakeholder summary
        for non-technical audiences. The developer documentation must be specific enough
        to serve as a usage guide once the feature is built. The stakeholder summary must
        communicate the value and scope without technical jargon.

        ## Context

        The injected `input-spec` artifact contains the specification from the previous step.
        Read it completely before starting. It contains:
        - Feature overview and business value
        - User stories with acceptance criteria
        - Functional and non-functional requirements
        - Success criteria and constraints

        You have read-write access to the project workspace. Your outputs will be used by
        the dummy/prototype phase to understand the expected user experience and by the
        implementation phase as a reference for feature behavior.

        ## Requirements

        1. **Create feature-docs.md** — the developer-facing documentation:
           - **Introduction**: What the feature does in plain language, with a one-paragraph
             elevator pitch
           - **Getting Started**: Step-by-step quick start guide showing the simplest
             possible usage
           - **Usage Examples**: At least 3 realistic usage scenarios with code examples
             (use pseudocode if the technology is not yet decided). Cover the happy path,
             error handling, and edge cases.
           - **Configuration**: All configuration options the feature exposes, with
             defaults and descriptions
           - **Integration Guide**: How developers integrate this feature into an existing
             project. What imports, what configuration, what prerequisites.
           - **API Reference**: If the feature exposes an API, document every endpoint or
             function with parameters, return values, and error codes
           - **Troubleshooting**: Common issues and their resolutions

        2. **Create stakeholder-summary.md** — the non-technical overview:
           - **What is being built**: 2-3 paragraphs in plain language
           - **Why it matters**: Business value, user impact, competitive advantage
           - **Who benefits**: Target users and how their experience improves
           - **Timeline indicators**: Which phases remain (prototype, implementation, PR)
           - **Success metrics**: How success will be measured, drawn from the spec

        3. **Format for VitePress compatibility**: Use standard markdown with:
           - YAML frontmatter (title, description)
           - Proper heading hierarchy (h1 for title, h2 for sections, h3 for subsections)
           - Code blocks with language identifiers
           - Admonition blocks for warnings, tips, and notes (using `:::` syntax)

        4. **Produce output matching the contract schema.**

        ## Constraints and Anti-patterns

        - Do NOT invent features not described in the specification. Document only what
          the spec defines.
        - Do NOT include implementation details (specific frameworks, database schemas,
          internal architecture). The docs should describe behavior, not implementation.
        - Do NOT write vague documentation. Every example must be concrete and runnable
          (or clearly pseudocode).
        - Do NOT use technical jargon in the stakeholder summary. A non-developer should
          understand every sentence.
        - Do NOT duplicate content between the two files. Each serves a different audience.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        Good documentation enables a developer to use the feature without reading the source
        code, and enables a stakeholder to understand the feature's value without reading
        the technical docs. Bad documentation is either too vague to be useful ("configure
        the settings as needed") or too detailed for its audience (showing database schemas
        to stakeholders).

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

    output_artifacts:
      - name: feature-docs
        path: feature-docs.md
        type: markdown
      - name: stakeholder-summary
        path: stakeholder-summary.md
        type: markdown
      - name: contract_data
        path: .agents/artifact.json
        type: json

    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        schema_path: .agents/contracts/docs-phase.schema.json
        must_pass: true
        on_failure: retry

  # Phase 3: Dummy - Build authentic functional prototype
  - id: dummy
    persona: craftsman
    thread: prototype
    model: strongest
    dependencies: [docs, spec]

    memory:
      inject_artifacts:
        - step: docs
          artifact: feature-docs
          as: feature-docs.md
        - step: spec
          artifact: spec
          as: spec.md

    exec:
      type: prompt
      source: |
        PROTOTYPE — build a functional scaffold with real I/O and stub business logic.

        ## Objective

        Create a working prototype that proves the feature's interface design and user
        flows are correct. The prototype must handle real input and output, implement all
        user-facing interfaces and endpoints, and use clearly marked stub implementations
        for business logic. A stakeholder should be able to run the prototype and
        experience the complete user flow, even though the underlying logic returns
        placeholder data.

        ## Context

        Two artifacts from prior steps have been injected:
        - `feature-docs` — the developer documentation with usage examples, API reference,
          and integration guide
        - `spec` — the feature specification with user stories, requirements, and acceptance
          criteria

        Read both before starting. The specification defines WHAT to build. The
        documentation defines how users will interact with it. Your prototype must be
        consistent with both.

        You have read-write access to the project workspace.

        ## Requirements

        1. **Create the prototype/ directory structure**: Organize the prototype code in a
           `prototype/` directory with clear file organization matching the feature's
           architectural layers (e.g., `prototype/api/`, `prototype/handlers/`,
           `prototype/models/`).

        2. **Implement all interfaces and endpoints**: Every user-facing interface described
           in the specification must be present and functional:
           - API endpoints must accept real requests and return properly structured responses
           - CLI commands must parse real arguments and flags
           - UI components must render and respond to user input
           - Configuration must be loadable from files or environment variables

        3. **Use stub business logic**: For each function that implements business logic:
           - Return realistic placeholder data (not empty or null)
           - Mark the function clearly with a comment: `// STUB: <description of real logic>`
           - Match the expected return type and structure exactly
           - Include realistic error paths (some stubs should simulate failures)

        4. **Make it runnable**: The prototype must start, accept input, and produce output
           without manual intervention. Include a README or startup instructions in the
           prototype/ directory.

        5. **Create interfaces.md**: Document all interfaces, types, and contracts:
           - Every public function signature with parameter and return types
           - Every data type/struct with field descriptions
           - Every interface with method signatures
           - Every API endpoint with request/response schemas
           - Every event or callback with trigger conditions

        6. **Validate against user stories**: Walk through each user story from the spec
           and verify the prototype supports the described flow. Note any gaps.

        7. **Produce output matching the contract schema.**

        ## Constraints and Anti-patterns

        - Do NOT implement real business logic. The entire point is to prove the interface
          design before investing in implementation.
        - Do NOT skip error handling in stubs. Stubs should demonstrate the error handling
          pattern that real implementations will follow.
        - Do NOT hardcode values that should be configurable. Use the configuration
          structure from the documentation.
        - Do NOT create a prototype that cannot actually run. It must be demonstrable.
        - Do NOT deviate from the interfaces described in the specification. If you see
          a better interface design, note it in interfaces.md but implement what the spec says.
        - Do NOT mix prototype code with project source code. Keep everything under
          `prototype/`.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good prototype can be started, demonstrated to a stakeholder, and accurately
        represents the complete user experience. Every endpoint returns realistic data.
        Every interface is documented. Every stub is clearly marked. A bad prototype is
        either non-runnable, returns empty data, or has interfaces that do not match the
        specification — forcing rework in the implementation phase.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

    output_artifacts:
      - name: prototype
        path: prototype/
        type: binary
      - name: interface-definitions
        path: interfaces.md
        type: markdown
      - name: contract_data
        path: .agents/artifact.json
        type: json

    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        schema_path: .agents/contracts/dummy-phase.schema.json
        must_pass: true
        on_failure: retry

  # Phase 4: Implement - Transition to full implementation
  - id: implement
    persona: craftsman
    thread: prototype
    model: strongest
    dependencies: [dummy, spec, docs]

    memory:
      inject_artifacts:
        - step: spec
          artifact: spec
          as: spec.md
        - step: docs
          artifact: feature-docs
          as: feature-docs.md
        - step: dummy
          artifact: prototype
          as: prototype/

    exec:
      type: prompt
      source: |
        IMPLEMENTATION — transition from prototype to production-quality code.

        ## Objective

        Replace all stub implementations in the prototype with real, production-quality
        business logic. Maintain full compatibility with the established interfaces. Every
        function marked with `// STUB:` must be replaced with a working implementation that
        passes the acceptance criteria from the specification. Additionally, produce an
        implementation plan and checklist to track progress.

        ## Context

        Three artifacts from prior steps have been injected:
        - `spec` — the feature specification with requirements and acceptance criteria
        - `feature-docs` — developer documentation with usage examples and API reference
        - `prototype` — the working prototype with stub implementations and interface
          definitions

        Read all three before starting. The prototype establishes the interface contract —
        your implementation must not break those interfaces. The specification defines the
        acceptance criteria — your implementation must satisfy every requirement. The
        documentation provides usage examples — your implementation must make those examples
        work as documented.

        You have read-write access to the project workspace.

        ## Requirements

        1. **Audit the prototype for implementation readiness**: Walk through every file in
           `prototype/` and catalog all stubs. For each stub, note:
           - The function name and location
           - What real logic must replace it (based on the specification)
           - Dependencies needed (external libraries, data sources, services)
           - Complexity estimate (simple, moderate, complex)

        2. **Create implementation-plan.md**: Write a detailed plan that orders the stub
           replacements. Dependencies first (if function B calls function A, implement A
           first). Group related stubs that should be implemented together. For each group:
           - Which stubs are being replaced
           - What tests to write before implementing (test-first where possible)
           - Expected complexity and risk
           - Definition of done

        3. **Create implementation-checklist.md**: A checkbox-style checklist that tracks
           the status of each stub replacement:
           - [ ] `function_name` in `file_path` — description of real logic
           Organized by implementation order from the plan.

        4. **Replace stub logic with real implementations**: For each stub:
           a. Write tests first (if not already covered by prototype tests)
           b. Implement the real logic
           c. Verify the implementation passes the new tests
           d. Verify existing tests still pass (interface compatibility)
           e. Update the checklist

        5. **Maintain interface compatibility**: Do NOT change any function signatures,
           struct fields, API endpoints, or response formats established in the prototype.
           If you discover an interface that needs to change, document the needed change
           in the implementation plan but do not make it without updating all consumers.

        6. **Ensure test coverage**: Every function that replaces a stub must have:
           - Unit tests covering the happy path
           - Unit tests covering error paths
           - Integration tests if the function interacts with external systems
           - Tests that match the acceptance criteria from the specification

        7. **Produce output matching the contract schema.**

        ## Constraints and Anti-patterns

        - Do NOT leave any stubs in place. Every `// STUB:` comment must be replaced with
          real logic or explicitly documented as out of scope.
        - Do NOT change the established interfaces without updating all consumers.
        - Do NOT skip error handling. Every error path must be handled appropriately.
        - Do NOT implement features not in the specification. Stick to the requirements.
        - Do NOT create circular dependencies between modules.
        - Do NOT mix the prototype directory with project source code unless the project
          structure requires it. Follow project conventions.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good implementation replaces every stub with production-quality code that passes
        all acceptance criteria, maintains interface compatibility, and has comprehensive
        test coverage. A bad implementation leaves stubs in place, breaks established
        interfaces, skips tests, or implements behavior not described in the specification.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

    output_artifacts:
      - name: implementation-plan
        path: implementation-plan.md
        type: markdown
      - name: progress-checklist
        path: implementation-checklist.md
        type: markdown
      - name: contract_data
        path: .agents/artifact.json
        type: json

    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        schema_path: .agents/contracts/implement-phase.schema.json
        must_pass: true
        on_failure: retry

  # Phase 5: PR-Cycle - Automated pull request lifecycle
  - id: pr-create
    persona: craftsman
    model: cheapest
    dependencies: [implement]

    memory:
      inject_artifacts:
        - step: implement
          artifact: implementation-plan
          as: implementation-plan.md

    exec:
      type: prompt
      source: |
        PR CREATION — push the branch and open a well-structured pull request.

        ## Objective

        Push the implementation branch to the remote repository and create a pull request
        that gives reviewers everything they need to evaluate the feature. The PR must have
        a clear title, a comprehensive description that summarizes the implementation, and
        links to any related issues. This is the bridge between implementation and review.

        ## Context

        The injected `implementation-plan` artifact contains the ordered plan for what was
        implemented, the stub replacement checklist, and the overall approach. Use this to
        compose the PR description.

        You are on the implementation branch with all code changes committed. The branch
        has not been pushed to the remote yet.

        ## Requirements

        1. **Push the branch**: Push to the remote with upstream tracking:
           ```bash
           git push -u origin HEAD
           ```

        2. **Compose the PR title**: Use conventional commit format. Extract the feature
           name from the implementation plan or commit history. Keep the title under 72
           characters. Example: `feat: add user authentication with JWT tokens`

        3. **Compose the PR body**: Include the following sections:
           - **Summary**: 2-3 sentences describing what this PR implements
           - **Changes**: Bulleted list of key changes, grouped by area
           - **Testing**: How to test the feature (commands to run, scenarios to verify)
           - **Checklist**: Standard PR checklist (tests pass, no lint warnings, docs updated)
           - **Related Issues**: Link to any related issues with `Closes #N` or `Relates to #N`

        4. **Create the PR using the forge CLI**: Use --title-file and
           --body-file flags to avoid shell injection. Write the title to a
           temporary file first, then pass it with --title-file.

        5. **Capture PR metadata**: Produce output matching the contract schema, including:
           - `pr_url`: Full URL of the created PR
           - `pr_number`: The PR number
           - `branch`: Branch name
           - `title`: PR title used
           - `status`: "created" or "failed"

        ## Constraints and Anti-patterns

        - Do NOT modify any source code in this step. This step is push-and-PR only.
        - Do NOT force-push or rebase the branch.
        - Do NOT add reviewers or labels programmatically unless project conventions
          require it — let project settings handle default reviewers.
        - Do NOT create a draft PR unless the implementation is explicitly incomplete.
        - Do NOT include raw file diffs in the PR body — keep it at the summary level.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good PR creation produces a PR that a reviewer can understand within 30 seconds
        of reading the title and first paragraph. The testing instructions are specific
        enough to follow without reading the code. A bad PR has a generic title, an empty
        body, or no testing instructions.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

    output_artifacts:
      - name: pr-info
        path: pr-info.json
        type: json
    outcomes:
      - type: pr
        extract_from: pr-info.json
        json_path: .pr_url
        label: "Pull Request"
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: pr-info.json
        schema_path: .agents/contracts/pr-result.schema.json
        must_pass: true
        on_failure: retry

  - id: pr-review
    persona: auditor
    model: cheapest
    dependencies: [pr-create]

    exec:
      type: prompt
      source: |
        PR REVIEW MONITORING — track review status and analyze feedback.

        ## Objective

        Monitor the pull request for review activity, collect all review comments and
        feedback, and produce a structured analysis of what reviewers are asking for.
        This analysis will be used by the response step to address reviewer concerns
        systematically. You are a facilitator, not a responder — gather and organize,
        do not act.

        ## Context

        The PR was created in the previous step. You have access to the project workspace
        and can use the forge CLI to query PR status. The PR number should be available
        from the previous step's output or from `git log` / branch name.

        ## Requirements

        1. **Find the PR**: Use the forge CLI to identify the PR associated with the
           current branch:
           ```bash
           {{ forge.cli_tool }} {{ forge.pr_command }} list --head $(git branch --show-current)
           ```

        2. **Check review status**: Poll for reviews using the forge CLI. Check whether
           automated reviews (CI checks, linters, Copilot review) have completed.

        3. **Collect all review comments**: Gather every comment, suggestion, and review
           from all reviewers. For each comment, record:
           - Reviewer name
           - File and line number (if applicable)
           - Comment text
           - Whether it is a blocking concern, suggestion, or question
           - Whether it requires a code change or just a response

        4. **Categorize the feedback**: Group comments by type:
           - **Blocking**: Must be addressed before merge (requested changes, failing checks)
           - **Suggestions**: Improvements that would be nice but are not required
           - **Questions**: Clarifications the reviewer is seeking
           - **Praise**: Positive feedback (no action needed)

        5. **Prepare a response strategy**: For each blocking comment and significant
           suggestion, draft a preliminary assessment of what action is needed:
           - Code change required? If so, which file and what kind of change?
           - Clarification needed? If so, what context should be provided?
           - Disagreement? If so, what technical reasoning supports the current approach?

        ## Constraints and Anti-patterns

        - Do NOT respond to review comments in this step. That is the response step's job.
        - Do NOT modify any code. This is a monitoring and analysis step only.
        - Do NOT dismiss or ignore any reviewer feedback, even if you disagree.
        - Do NOT poll indefinitely. If no reviews are available after a reasonable check,
          proceed with whatever feedback exists.

        ## Output Format

        No formal output artifact is required for the contract. The analysis will be
        available to the next step through the workspace state.

        ## Quality Bar

        A good review analysis captures every piece of feedback, correctly categorizes its
        severity, and provides enough context for the response step to address each comment
        without re-reading the entire review thread. A bad analysis misses comments, mis-
        categorizes blocking issues as suggestions, or provides no context for responses.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

  - id: pr-respond
    persona: philosopher
    model: strongest
    dependencies: [pr-review]

    exec:
      type: prompt
      source: |
        PR RESPONSE — address reviewer feedback with thoughtful, substantive replies.

        ## Objective

        Analyze each review comment from the monitoring step and craft a response that
        addresses the reviewer's concern directly. For code change requests, describe the
        proposed fix. For questions, provide clear technical explanations. For design
        challenges, defend the approach with evidence or acknowledge the concern and propose
        an alternative. Every reviewer should feel heard and every blocking comment should
        have a concrete resolution path.

        ## Context

        The review monitoring step has collected and categorized all reviewer feedback.
        Review the categorized comments in the workspace to understand what needs to be
        addressed. You have read-write access to the project workspace for composing
        responses.

        ## Requirements

        1. **Address every blocking comment**: For each comment categorized as blocking:
           - Acknowledge the reviewer's concern explicitly
           - If a code change is needed, describe the specific change you propose
           - If the current approach is correct, explain WHY with technical reasoning
             (reference the specification, codebase conventions, or performance data)
           - Provide a concrete resolution: "I will change X" or "I believe the current
             approach is correct because Y"

        2. **Address significant suggestions**: For each non-trivial suggestion:
           - Evaluate whether the suggestion improves the implementation
           - If accepting: describe the change that will be made
           - If deferring: explain why this is better handled as a follow-up and create
             a mental note for the fix step
           - If declining: provide a technical reason

        3. **Answer all questions**: For each question:
           - Provide a direct, complete answer
           - Reference relevant specification requirements, design documents, or code
             comments that support the answer
           - If the question reveals a documentation gap, note it as a follow-up

        4. **Maintain a professional tone**: Responses should be:
           - Direct and technical (no hedging or excessive politeness)
           - Evidence-based (reference code, specs, or data)
           - Concise (address the concern, then stop)
           - Respectful of the reviewer's expertise

        5. **Compile the response plan**: Organize all responses into a structured
           document that the fix step can use to prioritize code changes.

        ## Constraints and Anti-patterns

        - Do NOT dismiss reviewer feedback without a technical reason.
        - Do NOT be defensive. If a reviewer found a real problem, acknowledge it.
        - Do NOT make code changes in this step. This step is for composing responses only.
        - Do NOT use phrases like "I think" or "maybe" — be definitive in your assessments.
        - Do NOT respond to every comment with "will fix" — some comments deserve pushback.
        - Do NOT leave any blocking comment without a response.

        ## Output Format

        No formal output artifact is required. The response plan should be available in
        the workspace for the fix step to consume.

        ## Quality Bar

        Good responses make reviewers feel their feedback was carefully considered, provide
        clear resolution paths for every concern, and distinguish between genuine issues
        and subjective preferences. Bad responses are dismissive, vague ("will look into
        it"), or agree to every suggestion without evaluating impact.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

  - id: pr-fix
    persona: craftsman
    thread: prototype
    model: strongest
    dependencies: [pr-respond]

    exec:
      type: prompt
      source: |
        PR FIX — apply small, targeted fixes based on reviewer feedback.

        ## Objective

        Implement the code changes identified in the response step to address reviewer
        feedback. Focus exclusively on changes that are small, low-risk, and directly
        requested by reviewers. For larger changes that would expand the PR's scope, create
        follow-up issues instead. The goal is to get the PR to an approvable state with
        minimal additional churn.

        ## Context

        The response step has composed a response plan that categorizes reviewer feedback
        and identifies which comments require code changes. Review this plan to understand
        what needs to be fixed. You are on the same branch with all previous implementation
        commits.

        ## Requirements

        1. **Prioritize by reviewer severity**: Address blocking comments first, then
           accepted suggestions. Skip comments that were declined with technical reasoning
           in the response step.

        2. **Apply small, focused fixes**: For each accepted code change:
           a. Read the reviewer's comment and the proposed response
           b. Make the specific change requested
           c. Verify the code compiles
           d. Run relevant tests to ensure no regressions
           e. Stage and commit the change with a message referencing the review comment

        3. **Create follow-up issues for larger changes**: If a reviewer requests a change
           that would significantly expand the PR's scope (new features, major refactoring,
           architectural changes), do NOT implement it. Instead:
           - Note it as a follow-up item
           - Explain in the response that this will be addressed separately

        4. **Run the full test suite**: After all fixes are applied, verify all tests pass.

        5. **Push the fixes**: Push the new commits to the remote branch:
           ```bash
           git push
           ```

        ## Constraints and Anti-patterns

        - Do NOT expand the scope of the PR. Review fixes should be strictly contained to
          what was requested.
        - Do NOT refactor code that reviewers did not comment on.
        - Do NOT combine multiple review fixes into a single commit — each fix should be
          its own commit for traceability.
        - Do NOT force-push or rebase — add new commits on top.
        - Do NOT change the approach or architecture. Review fixes should be refinements,
          not redesigns.
        - If a fix would take more than 15 minutes, it belongs in a follow-up issue.

        ## Output Format

        No formal output artifact is required. The fixes are committed and pushed to the
        remote branch.

        ## Quality Bar

        Good review fixes are surgical, directly address the reviewer's concern, and do
        not introduce new issues. Each fix commit has a clear message explaining what was
        changed and why. Bad review fixes are sweeping, introduce new bugs, or expand the
        PR scope beyond what was originally intended.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"

  - id: pr-merge
    persona: craftsman
    model: cheapest
    dependencies: [pr-fix]

    exec:
      type: prompt
      source: |
        PR MERGE — complete the PR lifecycle by merging and cleaning up.

        ## Objective

        Verify that all CI checks pass and all review approvals are in place, then merge
        the pull request using the project's merge strategy. After merging, clean up the
        feature branch and confirm the merge was successful. This is the final step of the
        pipeline — the feature is shipped when this step completes.

        ## Context

        The PR has been created, reviewed, and all review feedback has been addressed in
        previous steps. You are on the feature branch and the PR should be in a mergeable
        state. Use the forge CLI to verify status and perform the merge.

        ## Requirements

        1. **Verify merge readiness**: Before merging, confirm:
           - All CI checks have passed (use forge CLI to check status)
           - All required reviews are approved
           - There are no merge conflicts with the base branch
           - No blocking review comments remain unresolved

        2. **Merge the PR**: Use the forge CLI to merge:
           ```bash
           {{ forge.cli_tool }} {{ forge.pr_command }} merge --squash
           ```
           Use squash merge unless the project conventions specify otherwise. If squash
           merge is not available, use regular merge.

        3. **Handle merge conflicts**: If the PR cannot be merged due to conflicts:
           - Rebase the branch on the latest base branch
           - Resolve conflicts
           - Push the updated branch
           - Retry the merge

        4. **Clean up the branch**: After successful merge, delete the remote feature
           branch:
           ```bash
           git push origin --delete $(git branch --show-current)
           ```

        5. **Verify the merge**: Confirm the merge was successful by checking the base
           branch for the merged commits.

        ## Constraints and Anti-patterns

        - Do NOT merge if CI checks are failing. Investigate and fix first.
        - Do NOT merge if there are unresolved blocking review comments.
        - Do NOT force merge or bypass branch protection rules.
        - Do NOT delete the branch before confirming the merge succeeded.
        - Do NOT modify any source code in this step. If code changes are needed to
          resolve conflicts, make the minimum necessary changes.

        ## Output Format

        No formal output artifact is required. The merged PR and the deleted remote branch
        are the deliverables. If the merge fails, output a brief description of why to the
        workspace log so the failure is visible in the pipeline run.

        ## Quality Bar

        A good merge step verifies all preconditions, merges cleanly on the first attempt,
        cleans up the remote branch, and leaves no orphaned artifacts. A bad merge step
        merges with failing CI checks, leaves the feature branch dangling on the remote,
        or fails to handle merge conflicts gracefully.

    workspace:
      type: worktree
      branch: "proto/{{ pipeline_id }}"
