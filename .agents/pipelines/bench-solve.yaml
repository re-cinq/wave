kind: WavePipeline
metadata:
  name: bench-solve
  description: >-
    Solve a single SWE-bench task with minimal, focused code changes. Designed
    for benchmarking Wave's implementation capability against standardized
    software engineering tasks. The solver reads the problem statement, applies
    the fix, and validates with tests. Not intended for production use.
  release: false

input:
  source: cli
  type: string
  schema:
    type: string
    description: "Problem statement describing the bug or feature to implement"

chat_context:
  artifact_summaries:
    - solve
  suggested_questions:
    - "Was the problem solved correctly?"
    - "Do all tests pass after the fix?"
  focus_areas:
    - "Solution correctness"
    - "Test validation"

pipeline_outputs:
  solution:
    step: solve
    artifact: solve
    type: findings_report

steps:
  - id: solve
    persona: craftsman
    model: strongest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source_path: .agents/prompts/bench/solve.md
    retry:
      policy: standard
      max_attempts: 2
