kind: WavePipeline
metadata:
  name: audit-unwired
  description: >-
    Find features that exist in code but have no runtime path from CLI commands,
    pipeline execution, WebUI routes, or adapter capabilities. Traces entry points
    through cmd/ and internal/ to identify exported functions and types with no
    callers. Use this to detect unwired functionality that was implemented but
    never connected to a user-facing surface.
  release: true
  category: audit

input:
  source: cli
  example: "internal/"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What unwired functionality was found?"
    - "Which features have no runtime path from any entry point?"
    - "Should unwired code be connected or removed?"
  focus_areas:
    - "Unwired exports and dead features"
    - "Entry point coverage gaps"

pipeline_outputs:
  findings:
    step: scan
    artifact: findings

steps:
  - id: scan
    persona: navigator
    model: cheapest
    max_concurrent_agents: 3
    contexts: [execution, configuration]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Identify exported functions, types, and capabilities in the codebase that exist in code but have no runtime path from any user-facing entry point. These are features that were implemented but never connected to a CLI command, pipeline step, WebUI route, or adapter capability. The goal is to surface unwired functionality so it can be either connected or removed. This is a read-only scan that must not create branches, PRs, or issues.

        ## Context

        This is a standalone, single-step pipeline for detecting functionality that was implemented but never wired into the product's user-facing surfaces. It is particularly useful after rapid feature development when new capabilities may have been coded but not yet connected to the CLI, WebUI, or pipeline system. The codebase is mounted read-only at /project. No prior pipeline steps feed into this step.

        Scope: {{ input }}

        If the scope is empty or blank, audit all packages under internal/. If a specific directory is provided, restrict the primary analysis to that subtree but still verify connectivity against the full codebase.

        ## Requirements

        Perform a systematic trace from every known runtime entry point inward, then compare against the set of exported symbols to find those with no path from any entry point.

        1. **Map all runtime entry points**: These are the surfaces through which users interact with the system:
           - CLI commands: Read /project/cmd/wave/commands/*.go to identify all registered commands and subcommands. Each command's Run/RunE function is an entry point.
           - Pipeline executor features: Read /project/internal/pipeline/executor.go to identify all capabilities the executor invokes (step types, hooks, composition primitives, retry policies).
           - WebUI routes: Read /project/internal/webui/routes.go (or the equivalent router registration file) to identify all HTTP handlers and API endpoints.
           - Adapter capabilities: Read /project/internal/adapter/*.go to identify all adapter interface methods and their implementations.
           - TUI entry points: Check /project/internal/tui/ for any interactive mode entry points.
           - Server mode: Check for any server/daemon entry points that register additional functionality.

        2. **Catalog exported symbols in scope**: For each package within scope, list all exported functions, types, methods, and constants. Focus on symbols that represent meaningful functionality (skip trivial getters, error variables, and type aliases).

        3. **Trace connectivity**: For each exported symbol, verify it is reachable from at least one entry point:
           - Use Grep to search for the symbol name in cmd/ and in other internal/ packages.
           - Follow the call chain: if SymbolA is called by SymbolB, and SymbolB is called from a CLI command, then SymbolA is wired.
           - Check for indirect usage: interface-based dispatch, function variables, and registration patterns (e.g., init() functions that register handlers).
           - Check for usage in pipeline YAML files: some functions may be invoked via template variables or step type dispatch.

        4. **Classify unwired symbols**: For each symbol with no detected caller path from an entry point, classify it:
           - "implemented_never_connected": Code is complete and tested but no entry point invokes it.
           - "partially_connected": Some methods of a type are wired but others are not.
           - "orphaned_after_refactor": The symbol was likely connected before a refactor removed the call site (check git log for the file to see if callers were recently removed).
           - "test_only": The symbol is only used in test files, which may be acceptable for test helpers but suspicious for production types.

        5. **Verify each candidate**: Before reporting, rule out these false positives:
           - Interface satisfaction: the exported method exists to satisfy an interface contract, even if not directly called.
           - Reflect-based or string-based dispatch: search for the symbol name as a string literal.
           - Build-tag gated code: check for conditional compilation.
           - Plugin or extension point: the symbol may be intended for external consumers or future use, but if there is no mechanism for external packages to import it, it is still unwired.

        ## Constraints and Anti-patterns

        - Do NOT report standard library patterns as unwired (e.g., String() methods, Error() methods, MarshalJSON/UnmarshalJSON).
        - Do NOT report symbols that are part of a well-known interface implementation (io.Reader, io.Writer, http.Handler, etc.) unless the implementing type itself is unwired.
        - Do NOT modify any files. The workspace is read-only.
        - Do NOT trace deeper than 4 levels of indirection. If a symbol is more than 4 calls away from any entry point, note the partial trace and move on.
        - Do NOT report init() functions, package-level variable initializations, or constants as unwired.
        - Avoid reporting recently-added symbols (check file modification dates via git log) that may simply be awaiting wiring in an in-progress feature branch.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good scan traces from concrete entry points inward and reports only symbols where the search for callers was thorough (covering cmd/, internal/, and YAML references). Each finding names the specific entry points checked and explains why no path was found. A bad scan simply lists exported symbols without verifying whether they are actually called, or reports interface methods and standard patterns as unwired.
    output_artifacts:
      - name: findings
        path: .agents/output/unwired-findings.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .agents/output/unwired-findings.json
        schema_path: .agents/contracts/shared-findings.schema.json
        on_failure: skip
