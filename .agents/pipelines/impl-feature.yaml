kind: WavePipeline
metadata:
  name: impl-feature
  description: >-
    Plan, implement, test, and commit a feature to a new branch. Use this for
    well-understood feature requests described in plain language. Steps include
    codebase exploration, structured planning, implementation with contract
    validation, and a verified commit on a dedicated branch.
  release: true

skills:
  - "{{ project.skill }}"
  - software-design

input:
  source: cli
  example: "add a --dry-run flag to the run command"

chat_context:
  artifact_summaries:
    - exploration
    - plan
    - result
  suggested_questions:
    - "What changes were made and why?"
    - "Are there any concerns with the implementation?"
    - "Is test coverage adequate for the new feature?"
  focus_areas:
    - "Code changes and implementation quality"
    - "Test coverage and PR readiness"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[impl-feature] started run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[impl-feature] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  pr:
    step: publish
    artifact: pr-result

steps:
  - id: explore
    persona: navigator
    max_concurrent_agents: 3
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        CODEBASE EXPLORATION — map the terrain before planning begins.

        ## Objective

        You must produce a comprehensive exploration document that maps every part of the
        codebase relevant to the requested feature. This exploration will be the sole input
        to the planning step — anything you miss here will be invisible to the planner. Your
        job is to be thorough, not creative. Discover, document, and organize.

        Feature request: {{ input }}

        ## Context

        You are the first step in a multi-step pipeline. No prior artifacts exist. You have
        read-only access to the full project codebase mounted at /project. The output of this
        step will be injected into the planning step as the `context` artifact. The planner
        will rely exclusively on your findings to design the implementation approach, so
        completeness and accuracy are critical.

        ## Requirements

        1. **Understand the request**: Parse the feature request carefully. Restate it in your
           own words to confirm understanding. Identify the core user-facing behavior change.
           Assess scope: small (1-2 files changed), medium (3-7 files), or large (8+ files).
           If the request is ambiguous, note the ambiguity and explore both interpretations.

        2. **Find related code**: Use Glob to discover files by naming patterns relevant to
           the feature domain. Use Grep to search for key terms, function names, type names,
           and constants. For each relevant file found, record:
           - Full file path
           - Why it is relevant (caller, callee, type definition, test, config)
           - Key symbols defined or used (exported functions, types, interfaces)
           - Approximate line count

        3. **Identify codebase conventions**: Read at least 3-5 key files in the affected
           area. Document the patterns that any new code must follow:
           - Naming conventions (function prefixes, variable casing, file naming)
           - Error handling patterns (sentinel errors, error wrapping, return conventions)
           - Logging patterns (structured logging, log levels, field conventions)
           - Dependency injection patterns (constructor injection, interfaces, factories)
           - Code organization (file-per-type, feature folders, layered architecture)

        4. **Map affected modules**: Build a dependency map showing which packages import
           which. Identify both direct dependencies (packages that will be modified) and
           indirect dependencies (packages that import modified packages and may need updates).
           Note any circular dependency risks.

        5. **Survey test coverage**: Find all test files related to the affected area.
           Document:
           - Existing test files and what they cover
           - Testing patterns used (table-driven tests, test fixtures, mocks, helpers)
           - Test infrastructure available (mock adapters, test factories, temp dir helpers)
           - Coverage gaps — areas with no tests that the feature will touch
           - Integration vs unit test balance

        6. **Assess risks and edge cases**: Identify potential problems:
           - Breaking changes to existing APIs or behavior
           - Performance implications (new allocations, N+1 queries, blocking calls)
           - Security concerns (input validation, authentication, authorization)
           - Concurrency issues (shared state, race conditions, lock ordering)
           - Migration or backward compatibility concerns

        7. **Catalog prior art**: Look for similar features already implemented in the
           codebase. If the project already has a pattern for this kind of feature, document
           it — the implementation should follow the same approach unless there is a strong
           reason not to.

        ## Constraints and Anti-patterns

        - Do NOT propose solutions or implementation approaches. That is the planner's job.
        - Do NOT skip files because they "look irrelevant" — when in doubt, include them.
        - Do NOT rely on file names alone; read file contents to confirm relevance.
        - Do NOT produce a shallow listing of files. Each entry must include WHY it matters.
        - Do NOT ignore test files — they are as important as production code for planning.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good exploration leaves the planner with zero questions about the codebase. Every
        file that will be touched is identified. Every convention is documented. Every risk
        is flagged. A bad exploration forces the planner to guess about code structure, miss
        dependencies, or violate conventions — causing rework in later steps.
    output_artifacts:
      - name: exploration
        path: .wave/output/exploration.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/exploration.json
        schema_path: .wave/contracts/feature-exploration.schema.json
        on_failure: retry

  - id: plan
    persona: planner
    model: strongest
    dependencies: [explore]
    memory:
      inject_artifacts:
        - step: explore
          artifact: exploration
          as: context
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        IMPLEMENTATION PLANNING — design the step-by-step approach.

        ## Objective

        Create a precise, ordered implementation plan that a developer can follow
        mechanically to implement the feature. The plan must be detailed enough that each
        step has clear entry criteria, exit criteria, and an unambiguous description of what
        to change. This plan will be the sole guide for the implementation step.

        Feature: {{ input }}

        ## Context

        The codebase exploration artifact has been injected into your workspace as the
        `context` artifact. Read the injected `context` artifact FIRST before doing anything
        else. It contains:
        - A restated understanding of the feature request
        - All relevant files with their paths, purposes, and key symbols
        - Codebase conventions that must be followed
        - A dependency map of affected modules
        - Existing test coverage and testing patterns
        - Identified risks and edge cases
        - Prior art from similar features in the codebase

        You have read-only access to the full project codebase. Use it to verify details
        from the exploration and fill in any gaps, but the exploration should be your
        primary source of truth about the codebase landscape.

        ## Requirements

        1. **Decompose the feature into ordered steps**: Break the work into the smallest
           meaningful units. Each step should be completable in isolation and verifiable
           independently. Order steps so that each builds on the previous one. Typical
           decomposition patterns:
           - Types and interfaces first, then implementations, then wiring, then tests
           - Core logic first, then edge cases, then integration points
           - Internal APIs first, then external-facing changes

        2. **For each step, specify**:
           - `title`: A short, descriptive name (e.g., "Add WorkspaceConfig struct")
           - `description`: What to do in 2-3 sentences
           - `files_to_modify`: Exact file paths to create or modify
           - `files_to_read`: Files to reference for patterns or context
           - `acceptance_criteria`: Bullet list of conditions that must be true when done
           - `dependencies`: Which other step IDs must be completed first
           - `complexity`: S (< 30 min), M (30-90 min), or L (90+ min)
           - `test_requirements`: What tests to write for this step

        3. **Design the test strategy**: For each step, specify which tests to write:
           - Unit tests for new functions and methods
           - Table-driven tests for functions with multiple input/output combinations
           - Integration tests for cross-package interactions
           - Characterization tests for any existing behavior being preserved
           Follow the testing patterns documented in the exploration artifact.

        4. **Plan the commit structure**: Suggest a commit message for the final commit
           that follows the project's conventional commit format. The message should
           reference the implementation steps (S01, S02, etc.) in the body.

        5. **Identify the critical path**: Which steps are on the critical path and which
           can be parallelized? Flag any steps that carry high risk of failure or rework.

        ## Constraints and Anti-patterns

        - Do NOT include vague steps like "implement the feature" or "add tests". Every
          step must specify exact files and exact changes.
        - Do NOT plan changes to files outside the scope identified in the exploration.
        - Do NOT skip error handling, logging, or documentation updates if the exploration
          identified conventions for them.
        - Do NOT create a plan with circular dependencies between steps.
        - Do NOT combine unrelated changes in a single step — keep steps atomic.
        - Do NOT plan for "placeholder" implementations that will be filled in later.
          Each step must produce working, tested code.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good plan can be executed by the implementation step without any ambiguity. Every
        file path exists or will be created. Every acceptance criterion is objectively
        verifiable. A bad plan leaves the implementer guessing about what to change, what
        patterns to follow, or how to test — leading to convention violations, missed edge
        cases, and failed contracts.
    output_artifacts:
      - name: plan
        path: .wave/output/plan.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/plan.json
        schema_path: .wave/contracts/feature-plan.schema.json
        on_failure: retry

  - id: implement
    persona: craftsman
    thread: impl
    model: strongest
    contexts: [execution, delivery]
    dependencies: [plan, explore]
    memory:
      inject_artifacts:
        - step: explore
          artifact: exploration
          as: context
        - step: plan
          artifact: plan
          as: impl_plan
    workspace:
      type: worktree
      branch: "feat/{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        IMPLEMENTATION — write production-quality code following the plan.

        ## Objective

        Implement the feature by following the implementation plan step by step. Every plan
        step must be completed, tested, and verified before moving to the next. When all
        steps are done, the full test suite must pass and all changes must be committed to
        the worktree branch. The result is a single, clean commit containing the complete
        feature implementation.

        Feature: {{ input }}

        ## Context

        Two artifacts have been injected into your workspace:
        - `context` — the codebase exploration from the explore step, containing relevant
          files, conventions, dependency maps, test patterns, and risks
        - `impl_plan` — the implementation plan from the plan step, containing ordered
          steps, acceptance criteria, test requirements, and commit message suggestion

        Read BOTH artifacts completely before writing any code. The plan is your primary
        guide — follow it in order. The exploration is your reference for codebase
        conventions and patterns.

        You are working on an isolated worktree branch (`feat/{{ pipeline_id }}`). You have
        full read-write access to modify, create, and delete files.

        ## Requirements

        1. **Follow the plan sequentially**: Execute each plan step in the order specified.
           For each step:
           a. Read the step description and acceptance criteria
           b. Read the files listed in `files_to_read` for context and patterns
           c. Modify or create the files listed in `files_to_modify`
           d. Follow the codebase conventions documented in the exploration artifact
           e. Write the tests specified in `test_requirements`
           f. Verify the code compiles after each change

        2. **Write tests alongside implementation**: Do not defer testing to the end. Each
           plan step specifies what tests to write. Write them as part of that step.
           Follow the testing patterns from the exploration:
           - Use table-driven tests where appropriate
           - Use existing test helpers and fixtures
           - Test both happy path and error cases
           - Test edge cases identified in the risk assessment

        3. **Verify continuously**: After each significant change (completing a plan step
           or group of related changes), run the relevant test package to catch regressions
           early. Do not wait until the end to discover compilation errors or test failures.

        4. **Run the full test suite**: After all plan steps are complete, run the full
           project test suite. Fix any failures before committing. If a test failure is
           unrelated to your changes, note it but do not modify unrelated test files.

        5. **Commit the changes**: Stage only the files you modified or created. Use the
           commit message suggestion from the plan, following conventional commit format:
           ```bash
           git add <specific-files>
           git commit -m "<commit_message_suggestion from plan>

           Implementation following plan:
           - S01: <title>
           - S02: <title>
           ..."
           ```

        6. **Write the result artifact**: After committing, produce a summary describing
           what was implemented, which plan steps were completed, and any deviations from
           the plan.

        ## Constraints and Anti-patterns

        - Do NOT deviate from the plan without documenting why. If a plan step is wrong
          or impossible, skip it and explain in the result artifact.
        - Do NOT create placeholder or stub implementations. Every function must be fully
          implemented with proper error handling.
        - Do NOT modify files outside the scope identified in the plan unless absolutely
          necessary (e.g., fixing an import path).
        - Do NOT skip writing tests. Tests are not optional.
        - Do NOT use `git add -A` or `git add .` — stage specific files only.
        - Do NOT commit generated files, build artifacts, or IDE configuration.
        - Do NOT add Co-Authored-By lines or AI attribution to commits.
        - Do NOT ignore linter warnings or compiler warnings — fix them.

        ## Output Format

        The primary output is the committed code on the worktree branch. Additionally,
        produce the result artifact containing:
        - Summary of what was implemented (2-3 sentences)
        - List of plan steps completed with status (done/skipped/modified)
        - Files created or modified (with brief description of each change)
        - Test results summary (packages tested, pass/fail counts)
        - Any deviations from the plan with justification

        ## Quality Bar

        A good implementation follows the plan faithfully, passes all tests on the first
        run, follows every codebase convention documented in the exploration, and produces
        clean, readable code that a human reviewer would approve without comments. A bad
        implementation deviates from conventions, skips tests, leaves TODO comments, or
        requires multiple rework cycles to pass the contract.
    retry:
      policy: standard
      max_attempts: 3
      on_failure: rework
      rework_step: fix-implement
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer
    output_artifacts:
      - name: result
        path: .wave/output/result.md
        type: markdown

  - id: fix-implement
    persona: craftsman
    thread: impl
    model: balanced
    rework_only: true
    workspace:
      type: worktree
      branch: "feat/{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        REWORK — fix the specific failure from the implementation step.

        ## Objective

        The implementation step failed its contract (test suite did not pass). Your job is
        to diagnose the specific failure and apply the minimum fix required to make the
        tests pass. You are NOT reimplementing the feature — you are surgically fixing what
        went wrong.

        ## Context

        The failure context has been injected as an artifact. It contains:
        - The error message or test failure output from the contract check
        - The state of the worktree at the time of failure
        You are working on the same worktree branch (`feat/{{ pipeline_id }}`) where the
        implementation was attempted. All previous changes are still present.

        ## Requirements

        1. **Read the failure context**: Understand exactly what failed. Is it a compilation
           error, a test failure, a linter error, or a runtime panic? Identify the specific
           file and line number.

        2. **Diagnose the root cause**: Do not guess. Read the failing code, trace the
           execution path, and understand WHY it failed. Common causes:
           - Missing error handling or nil checks
           - Incorrect function signatures or interface implementations
           - Import cycles or missing imports
           - Test assertions that do not match actual behavior
           - Race conditions in concurrent code

        3. **Apply the minimal fix**: Change only what is necessary to resolve the failure.
           If a test is failing because the implementation is wrong, fix the implementation.
           If a test is failing because the test expectation is wrong, fix the test (but
           only if the implementation behavior is correct).

        4. **Verify the fix**: Run the specific failing test first, then run the full test
           suite to ensure no regressions were introduced by the fix.

        5. **Commit the fix**: Stage only the changed files and commit with a descriptive
           message explaining what was fixed and why.

        ## Constraints and Anti-patterns

        - Do NOT rewrite the entire implementation. Fix the specific failure only.
        - Do NOT delete tests that are failing — fix the underlying issue instead.
        - Do NOT add broad try-catch or error-swallowing patterns to make tests pass.
        - Do NOT modify files unrelated to the failure.
        - Do NOT introduce new features or improvements — this is a fix-only step.
        - Keep the diff as small as possible. Every line changed must be justified by the
          failure diagnosis.

        ## Output Format

        No explicit output artifact is required beyond the committed fix. The contract
        will re-run the test suite to verify the fix. If you write to
        the result artifact, include a brief description of the failure, root cause,
        and fix applied.

        ## Quality Bar

        A good rework fixes the exact problem in 1-5 lines of code and passes all tests
        on the first try. A bad rework makes sweeping changes, introduces new failures,
        or masks the underlying problem instead of fixing it.
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
    output_artifacts:
      - name: result
        path: .wave/output/result.md
        type: markdown

  # ── Publish ─────────────────────────────────────────────────────────
  - id: publish
    persona: craftsman
    model: cheapest
    dependencies: [implement]
    memory:
      inject_artifacts:
        - step: implement
          artifact: result
          as: result
    workspace:
      type: worktree
      branch: "feat/{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        PUBLISH — push the branch and open a pull request for review.

        ## Objective

        Push the implementation branch to the remote and create a well-formed pull request
        that a human reviewer can evaluate efficiently. The PR must have a clear title
        following conventional commit format, a descriptive body summarizing the changes,
        and proper linkage to the feature context. This is the final step — the PR is the
        deliverable.

        ## Context

        The injected `result` artifact contains a summary of what was implemented, which
        plan steps were completed, files modified, and test results. Use this to compose
        the PR description.

        You are on the worktree branch `feat/{{ pipeline_id }}` with all implementation
        commits already made. The branch has not been pushed yet.

        ## Requirements

        1. **Push the branch**: Push to the remote with upstream tracking:
           ```bash
           git push -u origin HEAD
           ```
           If the push fails due to authentication or remote issues, log the error and
           retry once. If it fails again, report the failure.

        2. **Compose the PR title**: Extract the most recent commit subject and ensure it
           follows conventional commit format. If it already has a prefix (feat, fix, etc.),
           use it as-is. Otherwise, prepend `feat:`:
           ```bash
           COMMIT_SUBJECT=$(git log --format=%s -1)
           if echo "$COMMIT_SUBJECT" | grep -qE '^(feat|fix|docs|refactor|test|chore|ci|style|perf)(\(.*\))?!?:'; then
             echo "$COMMIT_SUBJECT" > /tmp/wave-pr-title.txt
           else
             echo "feat: $COMMIT_SUBJECT" > /tmp/wave-pr-title.txt
           fi
           ```

        3. **Create the pull request**: Use the forge CLI to open the PR with the
           implementation result as the body:
           ```bash
           {{ forge.cli_tool }} {{ forge.pr_command }} create --title "$(cat /tmp/wave-pr-title.txt)" --body-file .wave/artifacts/result
           ```

        4. **Capture the PR result**: After creating the PR, produce a JSON result
           containing:
           - `pr_url`: The full URL of the created pull request
           - `pr_number`: The PR number
           - `branch`: The branch name
           - `title`: The PR title used
           - `status`: "created" or "failed"

        ## Constraints and Anti-patterns

        - Do NOT modify any source code in this step. Publishing is push-and-PR only.
        - Do NOT force-push or rebase. The branch should be pushed exactly as committed.
        - Do NOT create draft PRs unless the implementation step flagged incomplete work.
        - Do NOT add labels, reviewers, or assignees — those are managed by project policy.
        - Do NOT squash commits before pushing — preserve the commit history as-is.
        - If the PR creation fails, capture the error in the result JSON with
          `status: "failed"` and the error message.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good publish step creates a PR on the first attempt with a clean title, a
        readable body that summarizes the feature for reviewers, and a valid result JSON.
        A bad publish step fails silently, creates PRs with generic titles like "Update
        files", or leaves the result artifact empty or malformed.
    output_artifacts:
      - name: pr-result
        path: .wave/output/pr-result.json
        type: json
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/pr-result.json
        schema_path: .wave/contracts/pr-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: pr
        extract_from: .wave/output/pr-result.json
        json_path: .pr_url
        label: "Pull Request"
