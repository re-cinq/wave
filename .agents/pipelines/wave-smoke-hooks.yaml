kind: WavePipeline
metadata:
  name: wave-smoke-hooks
  description: >-
    Smoke test for lifecycle hooks. Verifies run_start and run_completed
    hooks fire and write to the hook log.
  release: false
  category: wave

input:
  source: cli
  type: string
  example: "verify hooks fire correctly"

chat_context:
  suggested_questions:
    - "Did both hooks fire?"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "mkdir -p .agents/output && echo 'HOOK_START' >> .agents/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo 'HOOK_COMPLETE' >> .agents/output/hook-log.txt"
    blocking: false

steps:
  - id: work
    type: command
    script: |
      mkdir -p .agents/output
      echo '{"step":"work","status":"done"}' > .agents/output/work.json
    output_artifacts:
      - name: work
        path: .agents/output/work.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/work.json
        on_failure: fail

  - id: verify-hooks
    type: command
    dependencies: [work]
    script: |
      mkdir -p .agents/output
      if grep -q "HOOK_START" .agents/output/hook-log.txt 2>/dev/null; then
        echo '{"status":"pass","hook_start":true}' > .agents/output/hooks-verify.json
      else
        echo '{"status":"fail","error":"HOOK_START not found"}' > .agents/output/hooks-verify.json
      fi
    output_artifacts:
      - name: hooks-verify
        path: .agents/output/hooks-verify.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/hooks-verify.json
        on_failure: fail
