kind: WavePipeline
metadata:
  name: wave-smoke-gates
  description: >-
    Smoke test for gate steps. Creates a marker file, waits at a timer gate,
    then verifies the gate resolved before writing the result.
  release: false
  category: wave

input:
  source: cli
  type: string
  example: "verify gate steps work"

steps:
  - id: prepare
    type: command
    script: |
      mkdir -p .agents/output
      echo '{"gate_test": "pending", "created_at": "'$(date -Iseconds)'"}' \
        > .agents/output/gate-marker.json
      echo "Gate marker written"
    output_artifacts:
      - name: gate-marker
        path: .agents/output/gate-marker.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/gate-marker.json
        on_failure: fail

  - id: approval-gate
    dependencies: [prepare]
    gate:
      type: timer
      timeout: "5s"
      message: "Smoke-test timer gate — auto-resolves in 5 seconds"

  - id: verify
    type: command
    dependencies: [approval-gate]
    script: |
      if [ ! -f .agents/output/gate-marker.json ]; then
        echo "FAIL: gate-marker.json missing"
        exit 1
      fi
      echo '{"gate_test": "passed", "verified_at": "'$(date -Iseconds)'"}' \
        > .agents/output/gate-result.json
      echo "Gate smoke test passed"
    output_artifacts:
      - name: gate-result
        path: .agents/output/gate-result.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/gate-result.json
        on_failure: fail
