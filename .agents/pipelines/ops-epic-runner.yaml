kind: WavePipeline
metadata:
  name: ops-epic-runner
  description: >-
    End-to-end epic execution pipeline that scopes a parent epic into child
    issues, then implements each child sequentially using the speckit flow.
    Use this to take a high-level epic from scoping through implementation
    in a single pipeline run. Composes plan-scope and impl-speckit as
    sub-pipelines.
  category: composition
  release: false

input:
  source: cli
  type: string
  example: "re-cinq/wave 42"
  schema:
    type: string
    description: "GitHub epic reference (owner/repo number). Parsed by the scope sub-pipeline."

chat_context:
  artifact_summaries:
    - scope
  suggested_questions:
    - "How many child issues were scoped and implemented?"
    - "Did all implementations succeed?"
    - "Are there any remaining child issues?"
  focus_areas:
    - "Epic scoping and child issue status"
    - "Implementation completion rate"

pipeline_outputs:
  scope:
    step: scope
    artifact: scope
    type: scope_result

steps:
  - id: scope
    pipeline: plan-scope
    # Legacy string input is fine: plan-scope declares input.type: string.
    input: "{{input}}"

  - id: implement-all
    dependencies: [scope]
    pipeline: impl-issue
    # Typed wiring: input_ref.from resolves against scope's scope_result output.
    # The iterate primitive binds the current element as {{item}}; impl-issue's
    # declared input.type is issue_ref which matches the element schema of
    # scope_result.child_issues. See docs/adr/010-pipeline-io-protocol.md.
    iterate:
      over: "{{scope.output.child_issues}}"
      mode: sequential
    input: "{{item.owner}}/{{item.repo}} {{item.number}}"
