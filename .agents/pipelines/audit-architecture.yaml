kind: WavePipeline
metadata:
  name: audit-architecture
  description: >-
    Architecture audit that analyzes package structure, import graph, coupling
    issues, misplaced packages, and pattern violations. Produces structured
    findings in shared-findings format for cross-pipeline aggregation.
  release: true

skills:
  - software-design
  - software-architecture

input:
  source: cli
  type: string
  example: "audit the architecture of the pipeline package"

chat_context:
  artifact_summaries:
    - findings
    - report
  suggested_questions:
    - "Are there any circular dependencies or tight coupling?"
    - "Is code placed in the correct packages?"
    - "What pattern violations were found?"
  focus_areas:
    - "Package structure and coupling"
    - "Pattern consistency and violations"

pipeline_outputs:
  report:
    step: report
    artifact: report
    type: findings_report

steps:
  - id: scan
    persona: navigator
    contexts: [validation]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source_path: .agents/prompts/audit/architecture-scan.md
    output_artifacts:
      - name: findings
        path: .agents/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/findings.json
        schema_path: .agents/contracts/shared-findings.schema.json
        on_failure: skip

  - id: report
    persona: summarizer
    model: cheapest
    contexts: [validation]
    dependencies: [scan]
    memory:
      inject_artifacts:
        - step: scan
          artifact: findings
          as: scan_findings
          schema_path: .agents/contracts/shared-findings.schema.json
    exec:
      type: prompt
      source: |
        ## Objective

        Synthesize the architecture scan findings into a concise, actionable report.
        Your audience is the engineering team that needs to understand structural
        issues in the implementation.

        ## Context

        The injected `scan_findings` artifact contains structured findings from the
        architecture scan. Each finding has a type, severity, file reference, and
        description. Your job is to organize these into a clear narrative.

        ## Requirements

        1. **Architecture Health Summary**: Overall assessment of the implementation's
           structural quality — coupling, cohesion, and pattern adherence.
        2. **Structural Issues**: Package placement problems, import graph issues,
           and pattern violations that should be addressed.
        3. **Coupling Concerns**: Tightly coupled components that will hinder
           maintainability or testability.
        4. **Recommendations**: Prioritized list of structural improvements ordered
           by impact and effort.

        ## Output Format

        A clean markdown report at the output artifact path. Use headers, tables, and
        bullet lists for scannability.
    output_artifacts:
      - name: report
        path: .agents/output/architecture-report.md
        type: markdown
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .agents/contracts/quality-review-criteria.md
        source: .agents/output/architecture-report.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: warn
