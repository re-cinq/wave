kind: WavePipeline
metadata:
  name: ops-pr-respond
  description: >-
    Composition pipeline that takes a PR ref, fans out a parallel multi-axis
    review (six audit-* sub-pipelines), aggregates findings, triages them,
    applies per-finding fixes via the impl-finding sub-pipeline (parallel
    iterate), verifies the resulting branch with the project's contract test
    command, and posts a structured response comment back to the PR. Doubles
    as the canonical Wave-feature showcase: typed I/O, sub-pipeline
    composition, parallel iterate, aggregate, loop, agent_review, json_schema,
    test_suite, forge interpolation — every primitive in one workflow.
  category: composition
  release: false

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  type: pr_ref
  example: "https://github.com/owner/repo/pull/42"
  # Accepts any of:
  #   https://github.com/<owner>/<repo>/pull/<num>
  #   <owner>/<repo>#<num>
  #   <owner>/<repo> <num>
  #   <owner>/<repo>/<num>
  #   #<num>   (current repo only)
  #   <num>    (current repo only)
  # The fetch-pr step normalizes whichever form is supplied before invoking gh.

chat_context:
  artifact_summaries:
    - pr-context
    - merged-findings
    - triaged-findings
    - verify-verdict
    - comment-result
  suggested_questions:
    - "Which findings did the triage step accept, defer, or reject?"
    - "Did the verify step pass after the fixes were applied?"
    - "Where can I read the response comment posted to the PR?"
  focus_areas:
    - "Per-finding fix → commit-SHA mapping"
    - "Verify verdict and remaining manual-review items"

pipeline_outputs:
  comment:
    step: comment-back
    artifact: comment-result
    type: findings_report

steps:
  # ─── Phase 1: fetch PR context ───────────────────────────────────────────
  - id: fetch-pr
    persona: implementer
    contexts: [execution]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Fetch the pull request identified by the input ref and write a typed
        `pr-context.json` artifact that downstream steps consume. The artifact
        carries the PR number, head/base branches, head SHA, the list of
        changed files, and the unified diff blob — enough for the parallel
        audits to scope themselves and for the comment-back step to address
        the right PR.

        PR (raw input from the user, may be loose): {{ input }}

        ## Requirements

        ### Step 1 — Normalize the input to a `gh`-friendly ref

        Accept whichever shape the user supplied and reduce it to the
        canonical `<owner>/<repo>#<number>` form (or a full URL) before
        invoking `gh`. Common forms to handle:

        | Input shape | Example |
        |-------------|---------|
        | Pull URL | `https://github.com/re-cinq/wave/pull/1407` |
        | Cross-repo hash | `re-cinq/wave#1407` |
        | Space separated | `re-cinq/wave 1407` |
        | Slash separated | `re-cinq/wave/1407` |
        | Hash + number | `#1407` (current repo) |
        | Number only | `1407` (current repo) |

        Steps:
        1. Trim whitespace.
        2. If the input matches a `pull/<num>` URL, extract owner / repo /
           number from the URL.
        3. Otherwise, try in order: `^([^/\s]+/[^/\s#]+)[\s#/]+(\d+)$` →
           owner-repo + number; `^#?(\d+)$` → current repo + number (fall
           back to `gh repo view --json nameWithOwner` to discover the
           current repo).
        4. Compose `PR_REF="<owner>/<repo>#<num>"` for use below.
        5. Fail fast if no shape matches — write `error` field into the
           artifact and exit non-zero.

        ### Step 2 — Fetch PR metadata

        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} view "$PR_REF" \
          --json number,headRefName,baseRefName,headRefOid,url,title,changedFiles,files
        ```

        ### Step 3 — Capture the unified diff

        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} diff "$PR_REF" \
          > .agents/output/pr.diff
        ```

        ### Step 4 — Compose pr-context.json

        Write `.agents/output/pr-context.json` matching this shape:

        ```json
        {
          "forge": "{{ forge.type }}",
          "owner": "<owner>",
          "repo": "<repo>",
          "number": <int>,
          "url": "<url>",
          "branch": "<head_branch>",
          "head_sha": "<sha>",
          "title": "<title>",
          "changed_files": ["<path>", ...],
          "diff_path": ".agents/output/pr.diff"
        }
        ```

        Field rules:
        - `branch` is the PR head branch name (matches the `pr_ref` schema).
        - `changed_files` is the full list, no truncation.
        - Do NOT inline the diff — keep it on disk and reference via
          `diff_path` so triage / comment-back can stream it.

        ## Constraints

        - Do NOT modify the working tree.
        - Do NOT post any comments — that is comment-back's job.
        - If the PR does not exist or `gh` returns an error, fail loudly with
          the error captured in the artifact's `error` field rather than a
          half-written context.

        ## Quality bar

        A good pr-context lets every downstream step address the right PR
        without re-fetching metadata. A bad one drops fields the schema marks
        required, leaks credentials in the diff path, or truncates
        `changed_files`.
    output_artifacts:
      - name: pr-context
        path: .agents/output/pr-context.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/pr-context.json
        on_failure: fail

  # ─── Phase 2: parallel multi-axis review ─────────────────────────────────
  #
  # Iterate.parallel fans out six audit-* sub-pipelines. Each one scopes itself
  # to the PR via the input string. Outputs are propagated into the parent
  # template context under the parallel-review step ID for the next phase.
  - id: parallel-review
    pipeline: "{{ item }}"
    dependencies: [fetch-pr]
    input: "Audit the changes in PR {{ input }}. Focus on files listed in .agents/output/pr-context.json (changed_files). Treat .agents/output/pr.diff as the authoritative scope."
    # Inject pr-context into every audit-* child so each one receives
    # `.agents/artifacts/pr-context` and can scope its scan to changed_files
    # instead of walking the whole repo. Standalone audit-* runs (no parent
    # injection) keep their whole-repo behaviour — the audit prompts guard
    # the scope-narrowing on the artifact's existence.
    config:
      inject: ["pr-context"]
    iterate:
      over: '["audit-security", "audit-architecture", "audit-tests", "audit-duplicates", "audit-doc-scan", "audit-dead-code-scan"]'
      mode: parallel
      max_concurrent: 6

  # ─── Phase 3: aggregate audit outputs ────────────────────────────────────
  #
  # The six audits emit heterogeneous primary outputs (some JSON-shaped
  # findings, some markdown reports). aggregate.merge_arrays without a key
  # writes the raw JSON array to a file, which triage then normalizes.
  - id: merge-findings
    dependencies: [parallel-review]
    aggregate:
      from: "{{ parallel-review.out.collected-output }}"
      into: .agents/output/merged-findings.json
      strategy: merge_arrays

  # ─── Phase 3.5: deterministic file-scope filter ──────────────────────────
  #
  # Drop findings whose `file` is not in pr_context.changed_files BEFORE the
  # LLM-based triage step sees them. Pure jq, no model — set-membership is
  # not a judgement call. Empirically (#1411 baseline) ~80% of raw findings
  # are out-of-PR-scope; pre-filtering lets triage spend its tokens on
  # classification, not rejection.
  - id: filter-scope
    type: command
    dependencies: [merge-findings, fetch-pr]
    script: |
      set -o pipefail
      mkdir -p .agents/output

      MERGED=.agents/output/merged-findings.json
      CONTEXT=.agents/output/pr-context.json
      SCOPED=.agents/output/scoped-findings.json
      STATS=.agents/output/scope-filter-stats.json

      if [ ! -f "$MERGED" ] || [ ! -f "$CONTEXT" ]; then
        echo "filter-scope: missing input ($MERGED or $CONTEXT)" >&2
        exit 1
      fi

      # The aggregate step writes a JSON array whose elements are the raw
      # outputs of each audit child. Some are JSON objects with a `findings`
      # or `items` array, some are raw markdown strings. Flatten to a single
      # array of finding-shaped objects, tagging each with its source if
      # available.
      jq '[
        .[]
        | if type == "object" then
            (.findings // .items // [])
            | map(. + {source: (.source // (input_filename // "unknown"))})
          else
            []
          end
        ] | flatten' "$MERGED" > .agents/output/_flat-findings.json

      # Build a JSON array of the PR scope.
      jq -c '.changed_files // []' "$CONTEXT" > .agents/output/_changed-files.json

      # Drop findings whose `file` is not in changed_files.
      jq --slurpfile scope .agents/output/_changed-files.json \
        '[ .[] | select(.file as $f | $scope[0] | index($f)) ]' \
        .agents/output/_flat-findings.json > "$SCOPED"

      # Compute per-axis stats and a small dropped sample.
      TOTAL_IN=$(jq 'length' .agents/output/_flat-findings.json)
      TOTAL_KEPT=$(jq 'length' "$SCOPED")
      TOTAL_DROPPED=$((TOTAL_IN - TOTAL_KEPT))
      CHANGED_COUNT=$(jq '. | length' .agents/output/_changed-files.json)

      jq --slurpfile scope .agents/output/_changed-files.json \
         --argjson total_in "$TOTAL_IN" \
         --argjson total_kept "$TOTAL_KEPT" \
         --argjson total_dropped "$TOTAL_DROPPED" \
         --argjson changed_count "$CHANGED_COUNT" \
        '
        . as $all
        | ([ .[] | .source // "unknown" ] | unique) as $sources
        | {
            total_in: $total_in,
            total_kept: $total_kept,
            total_dropped: $total_dropped,
            changed_files_count: $changed_count,
            per_axis: [
              $sources[] as $s
              | {
                  source: $s,
                  kept:    ([ $all[] | select((.source // "unknown") == $s) | select(.file as $f | $scope[0] | index($f)) ] | length),
                  dropped: ([ $all[] | select((.source // "unknown") == $s) | select(.file as $f | ($scope[0] | index($f)) | not) ] | length)
                }
            ],
            dropped_sample: [
              $all[]
              | select(.file as $f | ($scope[0] | index($f)) | not)
              | { file: (.file // "unknown"), source: (.source // "unknown"), id: (.id // "") }
            ][:10]
          }
        ' .agents/output/_flat-findings.json > "$STATS"

      # Clean up scratch files; keep only declared artifacts.
      rm -f .agents/output/_flat-findings.json .agents/output/_changed-files.json
    output_artifacts:
      - name: scoped-findings
        path: .agents/output/scoped-findings.json
        type: json
      - name: scope-filter-stats
        path: .agents/output/scope-filter-stats.json
        type: json
    handover:
      contracts:
        - type: non_empty_file
          source: .agents/output/scoped-findings.json
          on_failure: fail
        - type: json_schema
          source: .agents/output/scope-filter-stats.json
          schema_path: .agents/contracts/scope-filter-stats.schema.json
          must_pass: true
          on_failure: warn

  # ─── Phase 4: triage ─────────────────────────────────────────────────────
  - id: triage
    persona: planner
    model: balanced
    dependencies: [filter-scope, fetch-pr]
    memory:
      inject_artifacts:
        - step: fetch-pr
          artifact: pr-context
          as: pr_context
        - step: filter-scope
          artifact: scoped-findings
          as: scoped_findings
        - step: filter-scope
          artifact: scope-filter-stats
          as: scope_stats
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Read the pre-scoped findings (`scoped_findings`) and the PR context
        (`pr_context`), then produce a triaged classification of every
        finding into actionable / deferred / rejected, plus an optional
        `design_questions[]` list for findings that are valid but need a
        design decision before any code can change. Each actionable entry
        carries a stable `id`, severity, file, description, remediation, and
        type — enough that the impl-finding sub-pipeline can fix it without
        re-reading the audit. Cap actionable at 25 to bound parallel resolve
        cost.

        ## Context

        - `scoped_findings` is a flat JSON array of finding-shaped objects.
          The upstream `filter-scope` step has already dropped findings
          whose `file` is not in `pr_context.changed_files`, so EVERY entry
          you see is in PR scope. You do NOT need to re-verify file scope.
        - `scope_stats` carries the filter's per-axis counts and a small
          dropped sample. Use it for the `summary` paragraph if helpful.
        - `pr_context` is the typed PR reference with `changed_files` and a
          `diff_path` pointing at the unified diff on disk.
        - You have read-only access to the project mount so you can verify
          a finding against actual code before classifying.

        ## Requirements

        ### Step 0 — Short-circuit on empty input

        If `scoped_findings` is an empty array, write
        `.agents/output/triaged-findings.json` with empty `actionable`,
        `deferred`, `rejected` arrays, `counts: {actionable:0, deferred:0,
        rejected:0}`, and a one-line `summary` like "No in-scope findings
        after file-scope filter; nothing to triage." Exit cleanly. Do NOT
        invent findings.

        ### Step 1 — Verify (lightweight)

        Spot-check the top 5 findings by reading the cited file. Drop
        findings that:
        - Reference symbols that no longer exist (stale).
        - Restate something already fixed in the PR.

        File-scope verification is NOT your responsibility — the
        `filter-scope` step already enforced that. Trust its output.

        ### Step 2 — Classify

        Each surviving finding becomes one of:
        - **actionable**: small, scoped, deterministic. Will be fixed by the
          impl-finding sub-pipeline this run. Assign `id: f1, f2, ...` in
          severity order. Pick the closest-matching `type` from
          `fix|delete|wire|rename|scrub|guard|doc`.
        - **deferred**: valid but out of scope (cross-cutting, blocked, too
          large for one run). Include `reason` and optional `follow_up`
          text.
        - **design_questions**: valid finding that cannot be actioned until
          a maintainer answers a specific design question (threat model,
          API contract, race-condition policy). Each entry needs `id`
          (`dq1, dq2, ...`), `description`, `question`, and optional
          `source_finding_id` + `suggested_followup`. Use this channel
          INSTEAD of `deferred` when the blocker is "we need a decision",
          not "we don't have time".
        - **rejected**: false positive or duplicate. Include `reason`.

        ### Step 3 — Cap and summarise

        - Cap `actionable` at 25 (highest severity + lowest blast_radius
          first).
        - Write `.agents/output/triaged-findings.json` matching the schema
          exactly. Include `counts` and a one-paragraph `summary`. Populate
          `counts.design_questions` if the array is non-empty.

        ## Constraints

        - Do NOT invent findings. Every actionable entry traces back to a
          source audit.
        - Do NOT touch the working tree. This step is read-only.
        - Do NOT bundle multiple distinct fixes under one `id` — one finding
          per actionable entry, so impl-finding can address each in parallel.
        - Do NOT re-filter by file scope — `filter-scope` already did this.
        - Do NOT route a finding to BOTH `deferred` and `design_questions` —
          pick the one that matches the blocker.

        ## Quality bar

        A good triage produces small, well-scoped actionable items the
        craftsman can fix in one commit each, and surfaces design-blocked
        items via `design_questions[]` so the maintainer can answer them
        inline in the PR comment. A bad triage emits sprawling items, lumps
        unrelated changes together, or buries design blockers in `deferred`
        with no question to answer.
    output_artifacts:
      - name: triaged-findings
        path: .agents/output/triaged-findings.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contracts:
        - type: json_schema
          source: .agents/output/triaged-findings.json
          schema_path: .agents/contracts/triaged-findings.schema.json
          must_pass: true
          on_failure: fail
        - type: agent_review
          persona: auditor
          source: .agents/output/triaged-findings.json
          model: cheapest
          token_budget: 8000
          timeout: 90s
          criteria:
            - "Every actionable item has a non-empty remediation that names a concrete edit."
            - "Severity classifications are calibrated — critical/high reserved for correctness or security risks."
            - "No actionable entry references a file outside the PR's changed_files scope."
            - "Deferred and rejected entries include a justification."
          on_failure: warn

  # ─── Phase 5: resolve + verify loop ──────────────────────────────────────
  #
  # The loop primitive runs resolve-each (parallel iterate over actionable
  # findings) followed by verify (test_suite + agent_review). max_iterations
  # is 2 — first pass applies fixes, optional second pass re-runs against any
  # findings that produced empty diffs. The until condition is omitted because
  # loop.until cannot reference step output values today (only pipeline
  # context placeholders); termination relies on max_iterations and on each
  # impl-finding being idempotent (re-running over an already-applied fix is
  # a no-op).
  - id: resolve-and-verify
    dependencies: [triage]
    loop:
      max_iterations: 2
      steps:
        - id: resolve-each
          pipeline: impl-finding
          input: "{{ item }}"
          # Inject pr-context so each impl-finding child can read the PR head
          # branch from .agents/artifacts/pr-context. With per-child worktree
          # workspaces (see impl-finding.yaml) the mount-based filesystem
          # handoff no longer applies, so injection is the supported path.
          config:
            inject: ["pr-context"]
          iterate:
            over: "{{ triage.out.triaged-findings.actionable }}"
            mode: parallel
            max_concurrent: 6

        - id: verify
          type: command
          dependencies: [resolve-each]
          workspace:
            mount:
              - source: ./
                target: /project
                mode: readonly
          script: |
            set -o pipefail
            mkdir -p .agents/output
            if {{ project.contract_test_command }} > .agents/output/verify.log 2>&1; then
              VERDICT=pass
              PASS=true
            else
              VERDICT=fail
              PASS=false
            fi
            jq -n \
              --arg verdict "$VERDICT" \
              --argjson pass "$PASS" \
              --arg command '{{ project.contract_test_command }}' \
              --arg log_path '.agents/output/verify.log' \
              '{verdict: $verdict, pass: $pass, command: $command, log_path: $log_path}' \
              > .agents/output/verify-verdict.json
            test "$VERDICT" = "pass"
          output_artifacts:
            - name: verify-verdict
              path: .agents/output/verify-verdict.json
              type: json
          handover:
            contracts:
              - type: test_suite
                command: "{{ project.contract_test_command }}"
                must_pass: false
                on_failure: warn
              - type: non_empty_file
                source: .agents/output/verify-verdict.json
                on_failure: fail

  # ─── Phase 6: post the structured response comment ───────────────────────
  - id: comment-back
    persona: "{{ forge.type }}-commenter"
    model: cheapest
    contexts: [delivery]
    dependencies: [resolve-and-verify]
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Post a single, structured response comment to the pull request that
        captures: (a) every audit finding the triage step classified, (b) the
        per-finding resolution (commit SHA, status), and (c) the verify
        verdict + a "manual review needed" callout for any findings that did
        not converge.

        PR: {{ input }}

        ## Context

        Read these artifacts from disk (the parent pipeline propagates them
        into the workspace):

        - `.agents/output/pr-context.json` — PR number, URL, head branch.
        - `.agents/output/triaged-findings.json` — actionable / deferred /
          rejected lists.
        - `.agents/output/verify-verdict.json` — `{verdict, pass, command,
          log_path}`.

        For each actionable finding, locate its resolution. The
        resolve-each iterate step ran impl-finding once per finding; each
        sub-pipeline wrote `.agents/output/resolution.md`. Read the most
        recent resolution per finding id by walking the run's artifact
        directory.

        ## Requirements

        ### Step 1 — Compose the comment

        First, allocate a private temp file. Do not hardcode `/tmp/ops-pr-respond.md`
        — concurrent runs would race on the same path, and a malicious local user
        could pre-create the path as a symlink. Use `mktemp` and capture the
        result in a variable that downstream steps reuse:

        ```bash
        BODY=$(mktemp -t ops-pr-respond.XXXXXX.md)
        ```

        Write the comment body into `"$BODY"` with this structure:

        ```markdown
        ## Wave PR Respond — Verdict: <pass | fail>

        <one-paragraph executive summary: how many findings, how many
        applied, verify outcome>

        ### Findings

        | id | severity | type | file | description |
        |----|----------|------|------|-------------|
        | f1 | high     | fix  | ...  | ...         |

        ### Resolutions

        | id | status   | commit  | files |
        |----|----------|---------|-------|
        | f1 | applied  | abc1234 | ...   |
        | f2 | skipped  | —       | ...   |

        ### Verify

        - Command: `<contract test command>`
        - Result: pass | fail
        - <pointer to verify.log if fail>

        ### Design Questions

        <Render this section ONLY if triaged-findings.json has a non-empty
        `design_questions` array. One bullet per entry:>

        - **dq1** — <question> (<description>) <em>suggested follow-up:
          <suggested_followup if present></em>

        ### Deferred / Rejected (no commits this run)

        - **deferred:** <id or summary> — <reason>
        - **rejected:** <summary> — <reason>

        ---
        *Posted by Wave `ops-pr-respond` — see run id `{{ run.id }}`.*
        ```

        ### Sanitisation rules (MANDATORY)

        Finding descriptions, remediation text, and resolution summaries are
        attacker-controllable: they originate from PR diff content (file
        names, code snippets, commit messages) that flowed through the audit
        sub-pipelines. Treat every interpolated string as untrusted before it
        lands in the comment body:

        - **Strip HTML tags** from every interpolated description, remediation,
          and summary string. Remove anything matching `<[^>]+>` so raw
          `<script>`, `<img>`, or `<iframe>` cannot reach the rendered
          comment. Also strip backtick-fence breakouts (` ``` ` inside a cell)
          by replacing with a single space.
        - **Truncate the description column to 80 characters** (hard cap, not
          "around 80"). Apply the same 80-char cap to the `files` column.
        - **Forbid `@`-mentions outside backticks.** Any `@username` token
          that is not already inside an inline-code span must be rewritten as
          `` `@username` `` so GitHub does not send a notification storm.
          Apply the same rule to `#1234` issue refs that could trigger
          cross-references.
        - **Cap individual cell length** at 200 characters; longer values get
          truncated with a trailing `…`.
        - **Cap total body length** at 16 KiB (16384 bytes). If composition
          would exceed that, shed sections in this order: (1) drop the
          deferred/rejected sections first, (2) shorten the resolutions
          table to id + status + commit only, (3) only as a last resort,
          drop the Design Questions section — these are higher signal than
          deferred/rejected because they ask the maintainer something
          actionable. The shell step below also enforces the 16 KiB ceiling
          with `head -c 16384` as a belt-and-braces guard against prompt
          drift.

        ### Step 2 — Post

        Apply a shell-side hard cap before posting so the LLM cannot exceed
        the 16 KiB budget even if Step 1 misbehaves:

        ```bash
        # Belt-and-braces: enforce 16 KiB body cap regardless of LLM output.
        CAPPED=$(mktemp -t ops-pr-respond.XXXXXX.md)
        head -c 16384 "$BODY" > "$CAPPED"
        mv "$CAPPED" "$BODY"

        {{ forge.cli_tool }} {{ forge.pr_command }} comment <PR_NUMBER> \
          --body-file "$BODY"
        ```

        Capture the comment URL.

        ### Step 3 — Write comment-result

        Write `.agents/output/comment-result.json` matching the
        gh-pr-comment-result schema (success, issue_reference, comment, ...).

        Clean up the temp body after posting:

        ```bash
        rm -f "$BODY"
        ```

        ## Constraints

        - One comment per run — do NOT spam multiple comments.
        - Do NOT include raw JSON in the comment body.
        - Do NOT pass through HTML, raw `@`-mentions, or oversized blobs from
          finding descriptions — apply the sanitisation rules in Step 1.
        - Body MUST be ≤ 16 KiB; the shell `head -c 16384` step is a hard
          guard, not an excuse to skip Step 1's truncation logic.
        - If verdict=fail, the comment opens with "Manual review needed" and
          surfaces the failing test names.
        - Do NOT modify the working tree.
        - If posting fails, the artifact must record `success: false` and the
          error code; the pipeline still completes so the run log is captured.

        ## Quality bar

        A good comment is skim-able: a reviewer reads the verdict, the
        findings table, the commit-SHA mapping, and knows what to do next in
        under 60 seconds. A bad comment buries the verdict in markdown soup
        or omits the finding-→-SHA mapping that justifies the fix.
    output_artifacts:
      - name: comment-result
        path: .agents/output/comment-result.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contracts:
        - type: json_schema
          source: .agents/output/comment-result.json
          schema_path: .agents/contracts/gh-pr-comment-result.schema.json
          must_pass: true
          on_failure: warn
        - type: agent_review
          persona: reviewer
          source: .agents/output/comment-result.json
          model: cheapest
          token_budget: 6000
          timeout: 60s
          criteria:
            - "The posted comment maps every actionable finding id to either a commit SHA or a clear skipped/failed status."
            - "Verdict line at the top matches verify-verdict.json."
            - "Tone is professional and constructive — no condescension or hostility."
            - "Comment does not include raw JSON or unformatted machine output."
          on_failure: warn
    outcomes:
      - type: url
        extract_from: .agents/output/comment-result.json
        json_path: .comment.url
        label: "Response Comment"
