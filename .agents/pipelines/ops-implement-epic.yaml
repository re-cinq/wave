# Epic Runner — Composition Primitives Example
#
# Demonstrates: iterate (sequential), gate (ci_pass), forge template variables
#
# Execution flow:
#
#   fetch-children          ← persona step: fetch parent issue, emit child URLs as JSON
#        │
#   implement-children      ← iterate (sequential): runs impl-issue for each child URL
#        │
#   ci-gate                 ← gate (ci_pass): block until CI is green across all PRs
#        │
#   summarise               ← persona step: post a completion comment on the epic

kind: WavePipeline
metadata:
  name: ops-implement-epic
  description: >-
    Epic implementation pipeline that iterates over all child issues of a
    parent epic, implementing each one sequentially. Gates on CI passing
    between issues, and produces a summary of all changes, PRs created,
    and any issues that were skipped or failed.
  category: composition
  release: true

requires:
  tools:
    - gh

input:
  source: cli
  example: "https://github.com/re-cinq/wave/issues/184"
  schema:
    type: string
    description: "Parent epic URL (e.g. https://github.com/owner/repo/issues/N)"

chat_context:
  artifact_summaries:
    - children
    - epic-summary
  suggested_questions:
    - "How many child issues were implemented?"
    - "Did CI pass for all PRs?"
    - "Were any child issues skipped or failed?"
  focus_areas:
    - "Child issue implementation status"
    - "CI gate results and merge readiness"

pipeline_outputs:
  summary:
    step: summarise
    artifact: epic-summary

steps:
  # ── Step 1: fetch parent issue, emit child issue URLs ─────────────────────
  - id: fetch-children
    persona: "{{ forge.type }}-analyst"
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Parse a parent epic issue URL, fetch its body from the forge, extract every child
        issue reference, verify which children are still open, and produce a structured
        JSON listing all open child issue URLs. This list drives the iterate primitive in
        the next step, which will implement each child issue sequentially — so accuracy
        and completeness are critical. A missed child means skipped work; a closed child
        means wasted work.

        Input: {{ input }}

        ## Context

        This is the first step of the ops-implement-epic pipeline. No prior artifacts
        exist. You have read-only access to the project directory and access to the forge
        CLI tool ({{ forge.cli_tool }}). The input is a parent epic URL in the format
        `https://github.com/OWNER/REPO/issues/N` (or the equivalent for the detected
        forge). The iterate step downstream will call `impl-issue` once per child URL in
        the `child_urls` array you produce, so ordering matters — place the most
        independent issues first and issues with dependencies last.

        ## Requirements

        1. **Parse the input URL.** Extract the repository identifier (owner/repo) and
           the issue number from the URL. Handle both full URLs
           (`https://github.com/owner/repo/issues/123`) and short-form inputs
           (`owner/repo 123`). If the URL format is unrecognized, fail with a clear error.

        2. **Fetch the parent epic.** Run:
           ```bash
           {{ forge.cli_tool }} issue view <NUMBER> --repo <REPO> --json number,title,body,url
           ```
           If the fetch fails (issue not found, permissions error, network issue), report
           the error and stop. Do not attempt to guess child issues.

        3. **Extract all child issue references.** Scan the epic body thoroughly for
           linked child issues. Look for ALL of these patterns:
           - Checkbox task lists: `- [ ] #123` or `- [x] #123`
           - Full URL references: `- [ ] https://github.com/owner/repo/issues/123`
           - Inline references: `Closes #N`, `Fixes #N`, `Part of #N`, `Relates to #N`
           - Markdown link references: `[issue title](https://github.com/.../issues/N)`
           - Bare issue numbers in bulleted lists: `- #123: description`
           For each reference, normalize to a full issue URL
           (`https://github.com/owner/repo/issues/N`).

        4. **Deduplicate.** The same issue may be referenced multiple ways in the epic
           body. Deduplicate by issue number so each child appears exactly once.

        5. **Verify each child is open.** For every extracted child URL, run:
           ```bash
           {{ forge.cli_tool }} issue view <NUMBER> --repo <REPO> --json state,url
           ```
           Include ONLY issues where `state` is "OPEN". Exclude closed, merged, or
           otherwise resolved issues. Log which issues were excluded and why.

        6. **Order the child list.** If the epic body presents children in a specific
           order (numbered list, task list from top to bottom), preserve that order.
           Otherwise, order by issue number ascending.

        ## Constraints and Anti-patterns

        - Do NOT include pull request URLs in the child list. If a reference points to
          `/pull/N` instead of `/issues/N`, skip it.
        - Do NOT include the parent epic itself in the child list.
        - Do NOT include issues from other repositories unless they are explicitly
          referenced with full URLs in the epic body.
        - Do NOT fabricate issue URLs. Every URL in `child_urls` must have been extracted
          from the epic body or its comments.
        - Do NOT silently drop issues that fail the state check. Log them so the summary
          step can report what was skipped.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good extraction finds every child issue referenced in the epic body, correctly
        filters to only open issues, and preserves the author's intended order. A bad
        extraction misses issues referenced via uncommon patterns (inline links, bare
        numbers), includes closed issues that will waste pipeline time, or changes the
        order in a way that creates dependency conflicts during sequential implementation.
    output_artifacts:
      - name: children
        path: .agents/output/epic-children.json
        type: json
        required: true
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/epic-children.json
        schema_path: .agents/contracts/epic-children.schema.json
        must_pass: true
        on_failure: retry

  # ── Step 2: iterate over child issues, run impl-issue for each ───────────
  - id: implement-children
    dependencies: [fetch-children]
    pipeline: impl-issue
    input: "{{ item }}"
    iterate:
      over: "{{ fetch-children.output.child_urls }}"
      mode: sequential
      max_concurrent: 3

  # ── Step 3: gate — wait for CI to pass across all opened PRs ─────────────
  - id: ci-gate
    dependencies: [implement-children]
    gate:
      type: ci_pass
      timeout: 2h
      message: "Waiting for CI to pass on all PRs opened by child-issue implementations"

  # ── Step 4: post a summary comment on the parent epic ────────────────────
  - id: summarise
    persona: "{{ forge.type }}-commenter"
    model: cheapest
    dependencies: [ci-gate]
    memory:
      inject_artifacts:
        - step: fetch-children
          artifact: children
          as: epic_children
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Post a comprehensive completion summary comment on the parent epic issue. This
        comment serves as the definitive record that all child issues have been
        implemented and CI has passed. It should give reviewers and the project maintainer
        a clear, actionable overview of what was done, what PRs were created, and what
        the next steps are (typically: review and merge the PRs in dependency order).

        Input: {{ input }}

        ## Context

        This is the final step of the ops-implement-epic pipeline. The previous steps
        have:
        1. Extracted child issue URLs from the parent epic (fetch-children step)
        2. Implemented each child issue sequentially, creating PRs (implement-children
           iterate step)
        3. Waited for CI to pass across all opened PRs (ci-gate step)

        The injected `epic_children` artifact contains the parent epic URL, the repository
        identifier, the parent title, and the list of child URLs that were processed.

        ## Requirements

        1. **Read the epic_children artifact.** Extract `parent_url`, `repo`,
           `parent_title`, and `child_urls`. Parse the parent URL to get the issue
           number.

        2. **Gather PR information.** For each child issue URL, check if a PR was created
           by searching for linked PRs:
           ```bash
           {{ forge.cli_tool }} issue view <CHILD_NUMBER> --repo <REPO> --json number,title,state,url
           ```
           Also search for PRs that reference each child:
           ```bash
           {{ forge.cli_tool }} {{ forge.pr_command }} list --repo <REPO> --search "closes #<CHILD_NUMBER>" --json number,title,url,state
           ```

        3. **Compose the summary comment.** Write the comment body to `/tmp/summary.md`
           with this structure:
           - **Header**: "## Epic Implementation Complete" followed by a one-line
             summary (e.g., "All N child issues have been implemented and CI is green.")
           - **Child Issue Status Table**: A checkbox list of every child URL that was
             processed. Mark each as done. Include the issue title and link to the
             associated PR if found.
             ```
             - [x] #A — Issue title ([PR #X](url))
             - [x] #B — Issue title ([PR #Y](url))
             ```
           - **Excluded Issues**: If any child issues were excluded (from the `excluded`
             array in the artifact), list them with reasons.
           - **Next Steps**: A clear note to reviewers:
             - Review and merge PRs in dependency order (list the suggested merge order)
             - Run final integration tests after all merges
             - Close the parent epic once all PRs are merged
           - **Footer**: A single line noting this comment was posted by the Wave
             ops-implement-epic pipeline.

        4. **Post the comment.** Run:
           ```bash
           {{ forge.cli_tool }} issue comment <NUMBER> --repo <REPO> --body-file /tmp/summary.md
           ```

        5. **Clean up and produce output.** Remove `/tmp/summary.md` after posting.
           Produce the result JSON including the comment URL.

        ## Constraints and Anti-patterns

        - Do NOT close the parent epic. That is the maintainer's decision after reviewing
          all PRs.
        - Do NOT modify any child issues. This step only posts a comment on the parent.
        - Do NOT include implementation details or code snippets in the comment. Keep it
          high-level and focused on status and next steps.
        - Do NOT post multiple comments. Write one comprehensive summary.
        - Do NOT fabricate PR URLs. If you cannot find a linked PR for a child issue, note
          it as "PR not found" rather than guessing.

        ## Output Format

        Produce a JSON file matching the contract schema with:
        ```json
        {
          "parent_url": "https://github.com/owner/repo/issues/N",
          "comment_url": "https://github.com/owner/repo/issues/N#issuecomment-XXXXX",
          "children_processed": 5,
          "children_with_prs": 5,
          "children_excluded": 0
        }
        ```

        ## Quality Bar

        A good summary comment gives a reviewer everything they need to start merging in
        under 30 seconds: which PRs to merge, in what order, and what to check. A bad
        summary is a wall of text that does not link to PRs, omits the merge order, or
        leaves the reviewer guessing about whether all children were actually handled.
    output_artifacts:
      - name: epic-summary
        path: .agents/output/epic-summary.json
        type: json
    outcomes:
      - type: url
        extract_from: .agents/output/epic-summary.json
        json_path: .comment_url
        label: "Epic Summary Comment"
    retry:
      policy: aggressive
      max_attempts: 2
