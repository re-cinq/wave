kind: WavePipeline
metadata:
  name: audit-doc
  description: >-
    Pre-PR documentation consistency gate that scans code changes,
    cross-references them against documentation (README, guides, ADRs, CLI
    reference), and creates a GitHub issue listing inconsistencies. Use this
    before merging to catch doc drift from code changes. Rates each
    inconsistency by severity and produces a task list for remediation.
  release: false

skills:
  - software-design

input:
  source: cli
  type: string
  example: "full -- scan all documentation for inconsistencies with the codebase"
  schema:
    type: string
    description: "Scan scope: empty for branch diff, 'full' for all files, or a git ref"

chat_context:
  artifact_summaries:
    - findings
    - issue-result
  suggested_questions:
    - "What documentation inconsistencies were found?"
    - "Which findings are most critical to fix?"
    - "Was the GitHub issue created with the report?"
  focus_areas:
    - "Documentation drift severity"
    - "Remediation priority and issue status"

pipeline_outputs:
  findings:
    step: publish
    artifact: issue-result
    type: findings_report

steps:
  - id: scan-changes
    persona: navigator
    max_concurrent_agents: 3
    model: cheapest
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Scan the repository to identify all changed files within the specified scope and capture a comprehensive snapshot of the current documentation state. This step produces two key outputs: a categorized inventory of changed files (so the analysis step knows what code changes to cross-reference) and a documentation snapshot (so the analysis step knows what documentation exists and what it claims).

        ## Context

        This is the first step of a four-step pipeline (scan-changes, analyze-consistency, compose-report, publish). The analyze-consistency step depends on this scan to know which files changed and what documentation currently exists. The codebase is available in a worktree workspace. No prior pipeline steps feed into this step.

        Input: {{ input }}

        ## Requirements

        ### 1. Determine Scan Scope

        Parse the input to determine the scan mode:

        - **Empty or blank input**: Use `git log --name-status main...HEAD` to find files changed on the current branch vs main. This is the most common mode for pre-PR documentation checks.
        - **"full"**: Skip the diff entirely. Treat ALL files as in-scope and scan all documentation. This mode is for periodic full-codebase documentation audits.
        - **Any other value**: Treat the input as a git ref and use `git log --name-status <input>...HEAD`. This mode allows auditing documentation drift since a specific point.

        Run `git log --oneline --name-status` with the appropriate range to get the list of changed files. If no commits are found (e.g., running on the main branch with no branch divergence), fall back to `git status --porcelain` for uncommitted changes. If both yield no results, note that no changes were detected and produce a minimal output.

        ### 2. Categorize Changed Files

        For each changed file, determine its category:
        - **source_code**: Source files matching the project language (*.go, *.ts, *.py, etc.), excluding test files
        - **tests**: Files with "test" or "spec" in the name, or files in test/ directories
        - **documentation**: Markdown files (*.md), files in docs/, doc/, or wiki/ directories, README, CONTRIBUTING, CHANGELOG
        - **configuration**: Config files (*.yaml, *.json, *.toml in config dirs), schema files, environment configs
        - **build**: Build scripts, CI/CD configs (.github/workflows/), Makefiles, Dockerfiles
        - **other**: Everything that does not fit the above categories

        Store the categorized file paths so the analysis step can cross-reference code changes against documentation.

        ### 3. Read Documentation Surface Area

        Discover and read ALL documentation files in the project. Adapt to the actual project structure rather than assuming a fixed layout. Check these common locations:
        - Project root: README.md, CONTRIBUTING.md, CHANGELOG.md, CLAUDE.md, AGENTS.md
        - Documentation directories: docs/, doc/, wiki/, guides/
        - Architecture records: docs/adrs/, ADR files
        - Configuration docs: any files documenting config options or environment variables
        - CLI/API docs: any files documenting commands, endpoints, or public interfaces
        - Inline documentation: significant godoc or JSDoc in source files (note the file paths, do not read full source)

        For each documentation file found, read it and produce a brief summary (2-3 sentences) of what it covers. Note whether it references specific code files, commands, configuration options, or API endpoints -- these references are what the analysis step will cross-check.

        ### 4. Write Output

        Produce the scan results as structured JSON.

        ## Constraints and Anti-patterns

        - Do NOT perform any cross-reference analysis in this step. This step only collects data; the analyze-consistency step performs the analysis.
        - Do NOT skip documentation files because they look unimportant. The analysis step needs the complete picture.
        - Do NOT truncate file lists. Include every changed file, even if the list is long.
        - For "full" mode, do NOT list every source file as "changed." Instead, note the mode as "full" and let the analysis step treat all code as in-scope.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good scan captures every documentation file in the project with accurate summaries, correctly categorizes all changed files, and handles edge cases (no changes found, full mode, custom ref). A bad scan misses documentation directories, miscategorizes test files as source code, or produces summaries too vague to be useful for cross-referencing.
    output_artifacts:
      - name: scan-results
        path: .agents/output/scan-results.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/scan-results.json
        schema_path: .agents/contracts/doc-scan-results.schema.json
        on_failure: retry

  - id: analyze-consistency
    persona: reviewer
    model: strongest
    dependencies: [scan-changes]
    memory:
      inject_artifacts:
        - step: scan-changes
          artifact: scan-results
          as: scan
          schema_path: .agents/contracts/doc-scan-results.schema.json
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Cross-reference code changes against the project's documentation to identify inconsistencies: features that exist in code but are not documented, documentation that describes non-existent or changed functionality, and configuration or environment variables that are undocumented. Produce severity-rated findings that the compose-report step will format into a publishable GitHub issue.

        ## Context

        This is the second step of a four-step pipeline (scan-changes, analyze-consistency, compose-report, publish). The scan-changes step has produced a scan results artifact (injected as "scan") containing: the categorized list of changed files, the documentation snapshot with summaries of each doc file, and the scan scope metadata. This step must read the scan results, then examine the actual source code and documentation files to identify inconsistencies.

        The codebase is available in a worktree workspace. Read the injected scan artifact first to understand what changed and what documentation exists.

        ## Requirements

        ### Cross-Reference Checks by Category

        For each category of changed files from the scan results, perform targeted cross-reference checks:

        **CLI/API surface** (files in cmd/ or API handler directories):
        - Read each changed command or handler file to extract the current set of flags, options, parameters, and subcommands.
        - Read the corresponding documentation (CLI reference docs, README command sections, help text in the code itself).
        - Compare: Are all current flags documented? Are documented flags still present in the code? Do documented descriptions match the actual behavior?
        - Check for new commands or endpoints added by the changes that have no documentation at all.
        - Verify that documented examples still work given the current flag names and defaults.

        **Configuration** (changed config schemas, parsers, or environment variable handling):
        - Read each changed config file to extract the current set of configuration options, their types, and defaults.
        - Read the corresponding documentation (config reference, README configuration section, environment variable docs).
        - Compare: Are all config options documented? Are documented options still valid? Do documented defaults match the actual defaults in code?
        - Check for new environment variables added by the changes. Search for `os.Getenv`, `viper.Get`, or equivalent patterns in the changed files.

        **Source code** (changed source files that are not CLI/config):
        - Check for new exported functions or types that represent public API surface and may need documentation.
        - Look for stale code comments that reference removed features, renamed types, or deleted files.
        - Verify that public API descriptions in docs/ match the actual function signatures and behavior in the changed files.
        - Check whether the documentation's architectural descriptions are still accurate given the changes.

        **Environment variables** (cross-cutting):
        - Scan ALL source code (not just changed files) for environment variable access patterns (os.Getenv, os.LookupEnv, viper.BindEnv, etc.).
        - Compare the full set of environment variables against documentation.
        - Flag any environment variable used in code that is not documented anywhere.
        - Flag any documented environment variable that is not referenced in code.

        **Tests** (changed test files):
        - If test files reference documentation (e.g., test descriptions mentioning doc sections), verify the references are still valid.
        - If test files demonstrate usage patterns, check whether those patterns are documented.

        ### Severity Rating

        Rate each inconsistency using this scale:
        - **CRITICAL**: A feature exists in code but is completely absent from documentation (users cannot discover it), OR documentation describes a feature that does not exist (users will try to use it and fail).
        - **HIGH**: Documentation contains incorrect information: wrong flag names, wrong descriptions, wrong behavior, wrong default values. Users who follow the docs will encounter errors.
        - **MEDIUM**: Documentation is outdated but not wrong: stale counts, missing new options from an otherwise-documented list, incomplete examples that work but do not show all capabilities.
        - **LOW**: Minor imprecision: slightly inaccurate wording, documentation that is technically correct but could be clearer, style inconsistencies between doc sections.

        ### Write Findings

        For each inconsistency, create a finding entry. If no inconsistencies are found, output an empty findings array with summary.clean=true.

        ## Constraints and Anti-patterns

        - Do NOT report documentation style issues (grammar, formatting, markdown lint) as findings. Only report factual inconsistencies.
        - Do NOT flag intentionally aspirational documentation (clearly marked as "planned" or "upcoming").
        - Do NOT check documentation that is unrelated to the changed files, unless running in "full" mode (check scan_scope.mode).
        - Do NOT modify any files.
        - For each finding, provide both the documentation location and the code location as evidence. A finding without both sides of the inconsistency is not actionable.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good consistency analysis finds the non-obvious inconsistencies: a flag renamed in code but not in docs, a new environment variable with no documentation, an ADR decision that was reversed in code. Each finding cites both the documentation passage and the code location. A bad analysis only catches the obvious (deleted files still mentioned in README) while missing subtle drift, or reports style issues as consistency findings.
    output_artifacts:
      - name: findings
        path: .agents/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/findings.json
        schema_path: .agents/contracts/shared-findings.schema.json
        on_failure: skip

  - id: compose-report
    persona: navigator
    model: cheapest
    dependencies: [analyze-consistency]
    memory:
      inject_artifacts:
        - step: analyze-consistency
          artifact: findings
          as: report
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Transform the structured JSON consistency findings into a polished, GitHub-ready markdown report suitable for publishing as a trackable issue. The report must organize inconsistencies by severity into a task list that developers can work through checkbox by checkbox, with enough context per item to make the fix without re-running the analysis. If no inconsistencies were found, produce a clean-bill-of-health message instead.

        ## Context

        This is the third step of a four-step pipeline (scan-changes, analyze-consistency, compose-report, publish). The analyze-consistency step has produced findings injected as the "report" artifact. The publish step will create a GitHub issue using this markdown as the issue body. The report format must be valid GitHub-flavored markdown, with task checkboxes (`- [ ]`) that become interactive in the GitHub issue interface.

        Read the injected report artifact first. Parse the findings array and summary statistics.

        ## Requirements

        ### Handle Clean Codebase

        If the consistency report has `summary.clean == true` (zero inconsistencies):
        - Write a short "No documentation inconsistencies found" message to the report file
        - Also produce an issue result JSON with skipped=true and reason="clean"
        - Exit early; do not compose the full report structure

        ### Compose the Full Report

        If inconsistencies exist, write the report as markdown with these sections:

        1. **Header and metadata**: Report title ("Documentation Consistency Report"), scan date (from the findings timestamp), total inconsistency count, and scan mode (diff vs full).

        2. **Summary by Severity**: A markdown table counting inconsistencies by severity level (Critical, High, Medium, Low). Omit rows with zero count.

        3. **Summary by Recommendation**: A markdown table counting inconsistencies by recommended action (fix, document, remove, investigate). This helps developers estimate the type of work needed.

        4. **Task List**: The core of the report. For each inconsistency, sorted by severity (Critical first, then High, Medium, Low), render a task checkbox line:
           ```
           - [ ] **[DOC-001]** (CRITICAL) Title -- `doc_location`
             Fix: description of what needs to change
             Code ref: `code_location`
           ```
           Each item must include:
           - The finding ID for reference in commits
           - The severity level in parentheses
           - A concise title describing the inconsistency
           - The documentation file path where the issue exists
           - The fix description (what the developer should change)
           - The code reference (where the correct information can be found)

        5. **Footer**: Attribution line with link to Wave.

        ### Formatting Rules

        - Use exact finding IDs (DOC-001, DOC-002, etc.) consistently for commit message references
        - Include both the documentation path and the code reference for every finding
        - Keep each task list item to 3 lines maximum (title, fix, code ref)
        - Use backtick formatting for file paths and code identifiers
        - Ensure the markdown renders correctly in GitHub

        ## Constraints and Anti-patterns

        - Do NOT rewrite or editorialize the findings. Use the descriptions from the analysis results.
        - Do NOT add findings that were not in the analysis results.
        - Do NOT omit any findings from the task list.
        - Do NOT use emoji or decorative formatting.
        - Do NOT nest task lists. Each finding gets a single top-level checkbox.

        ## Output Format

        The report must be valid GitHub-flavored markdown that renders correctly as a GitHub issue body.

        ## Quality Bar

        A good report allows a developer to open the issue and work through findings top-to-bottom, fixing documentation files based on the task descriptions and code references provided. Each item has enough context to make the edit without consulting the original analysis artifacts. A bad report uses vague descriptions ("some docs are outdated"), omits code references, or formats the task list in a way that does not render as interactive checkboxes.
    output_artifacts:
      - name: report
        path: .agents/output/report.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/report.md

  - id: publish
    persona: craftsman
    model: cheapest
    dependencies: [compose-report]
    memory:
      inject_artifacts:
        - step: compose-report
          artifact: report
          as: report
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Publish the documentation consistency report as a GitHub issue, making the findings trackable and assignable within the team's issue management workflow. The issue should have a descriptive title including the finding count, the documentation label (if available), and the full report as the issue body. If no inconsistencies were found, skip issue creation entirely.

        ## Context

        This is the fourth and final step of the audit-doc pipeline (scan-changes, analyze-consistency, compose-report, publish). The compose-report step has produced a markdown report injected as the "report" artifact. This step publishes the report to GitHub as a trackable issue and captures the result for pipeline outcomes.

        Read the injected report artifact first. Check whether it indicates a clean scan or contains the full task list report.

        ## Requirements

        ### Handle Clean Scan

        If the report content indicates no inconsistencies were found (contains "No documentation inconsistencies found" or similar clean message):
        - Do NOT create a GitHub issue
        - Produce the result JSON with skipped=true and reason="clean"
        - Exit early

        ### Detect Repository

        Run: `{{ forge.cli_tool }} repo view --json nameWithOwner --jq .nameWithOwner`

        Store the result for inclusion in the result JSON.

        ### Create the Issue

        Compose a descriptive issue title that communicates the scope at a glance:

        ```bash
        {{ forge.cli_tool }} issue create \
          --title "docs: documentation consistency report (N inconsistencies)" \
          --body-file .agents/artifacts/report \
          --label "documentation"
        ```

        Replace N with the actual inconsistency count from the report.

        If the `documentation` label does not exist on the repository, retry without the label:
        ```bash
        {{ forge.cli_tool }} issue create \
          --title "docs: documentation consistency report (N inconsistencies)" \
          --body-file .agents/artifacts/report
        ```

        If the forge CLI command fails for any other reason, log the error and record it in the result JSON.

        ### Capture Result

        Parse the output of the issue create command to extract the issue URL and number. Produce a JSON status report matching the doc-issue-result contract schema. Include:
        - `issue_url`: the full GitHub issue URL
        - `issue_number`: the issue number
        - `title`: the issue title as created
        - `inconsistency_count`: the total count from the report
        - `repository`: the owner/repo string
        - `skipped`: false
        - `created_at`: ISO 8601 timestamp

        ## Constraints and Anti-patterns

        - Do NOT modify the report content. Publish it exactly as composed.
        - Do NOT add assignees, milestones, or project board associations. Issue triage is a human decision.
        - Do NOT include Co-Authored-By or AI attribution in the issue.
        - Do NOT spawn Task subagents. Work directly in the main context.
        - Do NOT create the issue if the report says clean. Creating empty issues adds noise.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good issue creation produces an issue with a count-inclusive title, the full formatted report with interactive checkboxes as the body, and a result JSON capturing the issue URL. A bad issue creation uses a generic title without the count, fails silently without recording the error, or creates an issue even when the report says clean.
    output_artifacts:
      - name: issue-result
        path: .agents/output/issue-result.json
        type: json
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/issue-result.json
        schema_path: .agents/contracts/doc-issue-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: issue
        extract_from: .agents/output/issue-result.json
        json_path: .issue_url
        label: "Documentation Issue"
