kind: WavePipeline
metadata:
  name: wave-smoke-mount
  description: >-
    Smoke test for workspace mount. Verifies project files are accessible
    in mounted workspace directory via a navigator persona.
  release: false
  category: wave

input:
  source: cli
  type: string
  example: "verify workspace mount works"

chat_context:
  suggested_questions:
    - "Were project files accessible in the mount?"

steps:
  - id: check-mount
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Check if the directory `project/` exists and contains files.
        Run: ls project/ | head -10
        Verify AGENTS.md and wave.yaml are present.
        Write result to `.agents/output/mount-check.json`:
        {"status":"pass","agents_md":true,"wave_yaml":true,"file_count":N}
    output_artifacts:
      - name: mount-check
        path: .agents/output/mount-check.json
        type: json
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/mount-check.json
        on_failure: fail
