kind: WavePipeline
metadata:
  name: impl-improve
  description: >-
    Assess a codebase area for quality issues and apply targeted improvements.
    Use this when code works but could be better -- the pipeline audits error
    handling, performance, testability, and maintainability, then applies
    high-impact, low-risk fixes while preserving existing behavior.
  release: true

skills:
  - "{{ project.skill }}"
  - software-design

input:
  source: cli
  example: "improve error handling in internal/pipeline"

chat_context:
  artifact_summaries:
    - assessment
    - verification
  suggested_questions:
    - "What improvements were applied?"
    - "Were any high-risk items skipped?"
    - "Did the improvements introduce any regressions?"
  focus_areas:
    - "Applied improvements and quality delta"
    - "Skipped items and risk assessment"

pipeline_outputs:
  result:
    step: verify
    artifact: verification

steps:
  - id: assess
    persona: navigator
    max_concurrent_agents: 3
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        CODE QUALITY ASSESSMENT — find and prioritize improvement opportunities.

        ## Objective

        Conduct a systematic quality audit of the specified code area and produce a
        prioritized list of improvement opportunities. Each finding must include an
        impact/effort/risk assessment so the implementation step can apply fixes in the
        optimal order (highest impact, lowest risk first). Your assessment is the sole
        input to the implementation step — be thorough and precise.

        Target area: {{ input }}

        ## Context

        You are the first step in the improvement pipeline. No prior artifacts exist. You
        have read-only access to the full project codebase. Your output (the `assessment`
        artifact) will be injected into the implement step, which will apply fixes based
        entirely on your findings. Anything you miss will not be improved. Anything you
        mischaracterize may lead to a bad fix.

        ## Requirements

        1. **Scope the assessment area**: Parse the input to determine which files and
           packages are in scope. Use Glob to list all files in the target area. Count
           total lines of code. Identify the main entry points and key abstractions.

        2. **Audit code quality**: For each file in scope, check for:
           - **Readability**: Poor naming, inconsistent style, unclear control flow
           - **Duplication**: Copy-pasted code that should be extracted into shared functions
           - **Structure**: Functions doing too much, god objects, unclear responsibilities
           - **Dead code**: Unused functions, unreachable branches, stale comments

        3. **Audit error handling**: Check for:
           - **Swallowed errors**: Errors assigned to `_` or caught and ignored
           - **Missing checks**: Functions that return errors but callers do not check
           - **Unclear messages**: Error strings that do not identify what went wrong or where
           - **Missing context wrapping**: Errors propagated without adding context

        4. **Audit performance**: Check for:
           - **Unnecessary allocations**: Slices/maps created in hot paths without reuse
           - **N+1 patterns**: Loops that make repeated calls that could be batched
           - **Missing caching**: Repeated computation of the same result
           - **Blocking operations**: Synchronous I/O in performance-sensitive paths

        5. **Audit testability**: Check for:
           - **Hard-to-test code**: Functions that depend on global state or singletons
           - **Missing interfaces**: Concrete dependencies that should be interfaces
           - **Tight coupling**: Packages that import too many other packages directly
           - **Test coverage gaps**: Critical code paths with no test coverage

        6. **Audit robustness**: Check for:
           - **Missing nil checks**: Pointer dereferences without nil guards
           - **Race conditions**: Shared state accessed from multiple goroutines without sync
           - **Resource leaks**: Open files, connections, or goroutines not properly cleaned up
           - **Panic risks**: Index out of bounds, type assertion without comma-ok

        7. **Audit maintainability**: Check for:
           - **Complex functions**: Cyclomatic complexity too high (many branches/loops)
           - **Deep nesting**: More than 3 levels of indentation in business logic
           - **Magic numbers**: Unnamed constants scattered through the code
           - **Missing documentation**: Exported functions without doc comments

        8. **For each finding, produce a structured assessment**:
           - `id`: Unique identifier (IMP-001, IMP-002, etc.)
           - `category`: quality, error_handling, performance, testability, robustness, maintainability
           - `file`: Exact file path
           - `line_range`: Approximate line numbers
           - `description`: What the problem is, with a code snippet
           - `impact`: low, medium, or high — how much does fixing it improve the code?
           - `effort`: trivial (< 5 min), small (5-30 min), medium (30-90 min), large (90+ min)
           - `risk`: low (safe refactoring), medium (behavior-preserving but touches many callers),
             high (could change observable behavior)
           - `suggestion`: Brief description of the recommended fix

        ## Constraints and Anti-patterns

        - Do NOT propose fixes — only identify problems. The implement step handles fixes.
        - Do NOT flag style preferences that are not violations of the codebase's own
          conventions. Read existing code to understand what the conventions ARE.
        - Do NOT flag issues outside the specified target area.
        - Do NOT produce a single-finding assessment. Be thorough — audit every file.
        - Do NOT conflate severity with effort. A trivial fix can have high impact.
        - Do NOT include findings without concrete evidence (file path, line number, snippet).

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good assessment finds 10-30 actionable findings with precise file/line references,
        correctly categorized and prioritized so the implementer can work through them
        efficiently. A bad assessment is either too shallow (3 vague findings) or too noisy
        (50 style nits that do not materially improve the code), or lacks the precision
        needed for the implementer to act on the findings.
    output_artifacts:
      - name: assessment
        path: .agents/output/assessment.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/assessment.json
        schema_path: .agents/contracts/improvement-assessment.schema.json
        on_failure: retry

  - id: implement
    persona: craftsman
    model: strongest
    contexts: [execution, delivery]
    dependencies: [assess]
    memory:
      inject_artifacts:
        - step: assess
          artifact: assessment
          as: findings
    workspace:
      type: worktree
      branch: "improve/{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        APPLY IMPROVEMENTS — work through the assessment findings systematically.

        ## Objective

        Apply the improvement findings from the assessment step to the codebase. Work
        through findings in priority order (best impact-to-effort ratio first). Every
        change must be behavior-preserving — the code should do exactly the same thing
        after improvement, just better structured, more robust, or more maintainable.
        When done, all tests must pass.

        ## Context

        The injected `findings` artifact contains the assessment findings. Read it FIRST.
        It contains:
        - `findings`: Array of improvement opportunities, each with id, category, file,
          line_range, description, impact, effort, risk, and suggestion
        - `recommended_order`: The optimal order for applying fixes
        - `summary`: Totals by category and severity

        You have read-write access to the full project codebase. Follow the
        `recommended_order` from the assessment unless you have a strong reason to deviate.

        ## Requirements

        1. **Start with quick wins**: Apply trivial and small effort fixes first. These
           build confidence that the process is working and catch any unexpected issues
           with the assessment early.

        2. **One improvement at a time**: For each finding:
           a. Read the finding description and the cited code
           b. Apply the suggested improvement (or a better one if you see it)
           c. Verify the code compiles
           d. Run the relevant test package
           e. Move to the next finding only after the current one is verified

        3. **Preserve external behavior**: Improvements must NOT change what the code does
           from an external perspective. Function signatures, return values, error messages,
           log output, and side effects must remain identical unless the finding specifically
           identifies a bug being fixed. If you are unsure whether a change preserves
           behavior, err on the side of not making it.

        4. **Run tests continuously**: After each significant change (completing a finding
           or group of related findings), run the relevant test package. Do not batch all
           changes and test at the end — catch regressions early.

        5. **Skip high-risk items without test coverage**: If a finding is rated risk=high
           and there are no existing tests for the affected code path, do NOT apply it.
           Mark it as skipped with reason "no test coverage for high-risk change."

        6. **Track what you change**: For each finding you address, record:
           - Finding ID (IMP-xxx)
           - What was changed (files modified, nature of the change)
           - Whether the change was applied as suggested or modified
           - Whether the test suite still passes after the change

        7. **Stop if tests break**: If a change causes test failures that you cannot resolve
           within 5 minutes, revert the change (`git checkout -- <files>`) and mark the
           finding as skipped with reason "caused test failures." Move to the next finding.

        8. **Run the full test suite at the end**: After all improvements are applied (or
           attempted), run the complete test suite to verify no regressions.

        ## Constraints and Anti-patterns

        - Do NOT refactor beyond what was identified in the assessment. The assessment
          defines the scope — adding new improvements on the fly risks unreviewed changes.
        - Do NOT change function signatures unless the assessment specifically calls for it.
        - Do NOT combine multiple findings into a single change unless they are in the same
          file and affect adjacent lines.
        - Do NOT apply cosmetic changes (whitespace, import ordering) unless they are
          identified in the assessment.
        - Do NOT modify test files unless the assessment identifies a test improvement.
        - Do NOT add new dependencies or abstractions not suggested by the assessment.
        - Do NOT skip findings without recording why.

        ## Output Format

        No explicit output artifact is required for this step. The contract validates that
        the test suite passes. The verify step will inspect the changes and produce the
        final verification report.

        ## Quality Bar

        A good implementation applies 80%+ of the findings cleanly, in priority order,
        with all tests green throughout. Each change is minimal and clearly motivated by
        a specific finding ID. A bad implementation cherry-picks easy findings while
        skipping impactful ones, makes changes not in the assessment, or batches changes
        so that regressions are hard to isolate.
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: verify
    persona: reviewer
    model: strongest
    dependencies: [implement, assess]
    memory:
      inject_artifacts:
        - step: assess
          artifact: assessment
          as: original_findings
    exec:
      type: prompt
      source: |
        VERIFICATION — confirm improvements are correct and complete.

        ## Objective

        Independently verify that the improvements applied in the previous step are correct,
        complete, and behavior-preserving. Produce a verification report that serves as the
        final quality gate for this pipeline. Your job is to be skeptical — assume every
        change could be wrong until you confirm otherwise.

        ## Context

        The injected `original_findings` artifact contains the full list of findings with
        their IDs, descriptions, and priorities.
        The implement step has applied some or all of these findings to the codebase.

        You have read access to the codebase in its post-improvement state. Use `git diff`
        and `git log` to inspect what was changed.

        ## Requirements

        1. **List all changes made**: Run `git diff` (against the appropriate base) to see
           every modification. Group changes by the finding ID they address.

        2. **For each applied improvement, verify**:
           a. **Correctness**: Is the change technically correct? Does it actually fix the
              identified problem, or does it introduce a different approach that may have
              its own issues?
           b. **Completeness**: Was the full finding addressed, or was only part of it fixed?
              If a finding cited multiple locations, were all locations updated?
           c. **Behavior preservation**: Does the change maintain identical external behavior?
              Check function signatures, return values, error messages, and side effects.
           d. **No new issues**: Did the change introduce any new problems? For example, did
              fixing a nil check add a new early return that skips necessary cleanup?
           e. **Test coverage**: Are the changed code paths covered by tests?

        3. **For each skipped improvement, verify the skip is justified**:
           a. If skipped for "no test coverage" — confirm there really are no tests
           b. If skipped for "caused test failures" — is the finding actually valid or was
              the assessment wrong about this one?
           c. If skipped for any other reason — is the reason sound?

        4. **Check for unassessed changes**: Were any changes made that do NOT correspond to
           a finding in the assessment? These are scope creep and should be flagged.

        5. **Assess the overall quality delta**: Compare the code before and after improvements.
           Is the code meaningfully better? Quantify where possible:
           - Lines of dead code removed
           - Error handling gaps closed
           - Duplication eliminated
           - Test coverage added

        6. **Run the test suite**: Verify all tests still pass. If any fail, this is a
           verification failure.

        ## Constraints and Anti-patterns

        - Do NOT modify any files — this is a read-only verification step.
        - Do NOT suggest additional improvements. Your scope is verifying what was done.
        - Do NOT approve changes that alter external behavior, even if the new behavior
          seems better. Behavior changes require their own pipeline.
        - Do NOT rubber-stamp the work. Carefully read every diff hunk.

        ## Output Format

        Produce the verification report as markdown with the following
        sections:
        - **Summary**: One paragraph overall assessment
        - **Applied Improvements**: Table with finding ID, description, status (correct/
          incorrect/incomplete), and notes
        - **Skipped Improvements**: Table with finding ID, skip reason, and whether the
          skip was justified
        - **Unassessed Changes**: Any changes not tied to a finding (should be empty)
        - **Quality Delta**: Quantified improvement metrics
        - **Test Status**: Pass/fail with details
        - **Verdict**: PASS (all applied changes are correct) or FAIL (issues found)

        ## Quality Bar

        A good verification catches subtle issues like incomplete fixes (finding cited 3
        locations but only 2 were updated), behavior changes disguised as improvements, or
        unnecessary scope creep. A bad verification either approves everything without
        checking or rejects valid improvements based on subjective style preferences.
    output_artifacts:
      - name: verification
        path: .agents/output/verification.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .agents/contracts/verification-criteria.md
        source: .agents/output/verification.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: warn
