kind: WavePipeline
metadata:
  name: impl-finding
  description: >-
    Single-step implementation pipeline that takes one triaged finding (JSON
    blob) and applies a minimal, scoped fix on top of the currently checked-out
    branch. Used by ops-pr-respond as the inner pipeline of resolve-each. The
    fix is committed and pushed; the diff is captured for the verify step.
  category: composition
  release: false

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  type: string
  example: '{"id":"f1","severity":"medium","file":"internal/foo.go","line":42,"description":"...","remediation":"...","type":"fix"}'
  schema:
    type: string
    description: "JSON object describing one triaged finding (see triaged-findings.schema.json#actionable)."

chat_context:
  artifact_summaries:
    - resolution
  suggested_questions:
    - "What did the fix change?"
    - "Did the test_suite contract pass after the fix?"
  focus_areas:
    - "Per-finding minimal fix"
    - "Diff captured for the verify step"

pipeline_outputs:
  resolution:
    step: apply-fix
    artifact: resolution
    type: string

steps:
  - id: apply-fix
    persona: implementer
    contexts: [execution, delivery]
    model: balanced
    memory:
      inject_artifacts:
        # The parent pipeline (`ops-pr-respond`) produces `pr-context` from
        # its `fetch-pr` step. Declaring the input here makes the contract
        # explicit AND triggers the framework's auto-emitted
        # `## Input Artifacts` prompt block, so the persona never has to
        # hard-code the on-disk path.
        #
        # The reference uses `pipeline:` rather than `step:` because the
        # producer lives in a different pipeline (the parent) — there is no
        # in-pipeline producer step to point at. The framework propagates
        # the parent's already-produced output artifacts into the child's
        # crossPipelineArtifacts map at sub-pipeline launch (#1551), so
        # the cross-pipeline ref resolves the bytes directly without
        # needing the parent step to also list `config.inject: [pr-context]`.
        - pipeline: ops-pr-respond
          artifact: pr-context
          as: pr-context
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        ## Objective

        Apply a single, minimal, scoped fix to the currently checked-out branch
        that resolves exactly one triaged finding. Capture a structured
        resolution record (finding id, commit SHA, files touched, diff summary)
        so the parent pipeline (`ops-pr-respond`) can map findings to commits in
        the response comment.

        Finding (raw JSON): {{ input }}

        ## Context

        You are the inner pipeline of `resolve-each` in `ops-pr-respond`. The
        parent pipeline has already:

        1. Fetched the PR diff and head branch (the `pr-context` input
           artifact carries the head branch name, head SHA, changed-file list
           and a path to the unified diff).
        2. Aggregated audit findings into a flat array.
        3. Triaged that array into actionable / deferred / rejected.

        Your CWD is a per-child git worktree on a throwaway branch
        (`{{ pipeline_id }}`). The worktree shares its `origin` remote and ref
        database with the project repo, so `git fetch origin <pr-branch>` and
        `git push origin HEAD:<pr-branch>` reach the same remote the parent
        pipeline saw. The PR head branch is NOT yet checked out — Step 2 fetches
        it and switches the worktree onto it before any edits or tests run.

        The `pr-context` input artifact (declared in this step's
        `memory.inject_artifacts`) carries the PR head branch name as its
        `.branch` field. The framework places it in the workspace and tells
        you where via the auto-emitted `## Input Artifacts` block above —
        read it from that path. You must touch only the files implied by the
        finding's `remediation` field. Other findings run in parallel in
        their own worktrees — your edits cannot collide with theirs at the
        working-tree level, but you must still keep the commit minimal so
        reviewers can understand each fix in isolation.

        ## Requirements

        ### Step 1 — Parse the finding

        Parse the JSON `input`. Extract:
        - `id` (used in commit message and resolution record)
        - `file` (primary file to edit)
        - `line` (anchor — may be absent)
        - `type` (fix | delete | wire | rename | scrub | guard | doc)
        - `description` (problem)
        - `remediation` (fix instruction — your authoritative directive)

        If the JSON is malformed or missing `id`/`file`/`remediation`, write a
        resolution record with `status: "skipped"` and exit cleanly. Do NOT
        guess.

        ### Step 2 — Switch the worktree onto the PR head branch

        Your CWD is a per-child worktree currently on a throwaway branch
        (`{{ pipeline_id }}`). Before reading or editing files, switch onto the
        PR head branch so all subsequent edits, tests, and commits target the
        right tree.

        Read the `.branch` field from the `pr-context` input artifact (the
        framework wrote it to the path listed in the `## Input Artifacts`
        block above; use `jq -r .branch <that path>`). Capture the value into
        a `BRANCH` shell variable, then run:

        - `[ -n "$BRANCH" ] && [ "$BRANCH" != "null" ]` — refuse to proceed
          if the artifact was missing or didn't contain a branch.
        - `git remote get-url origin >/dev/null 2>&1` — refuse to proceed if
          the worktree has no `origin` remote.
        - `git fetch origin "$BRANCH"`
        - `git checkout -B "$BRANCH" "origin/$BRANCH"`

        After this step the working tree mirrors `origin/<pr-branch>` and the
        throwaway branch label is repointed onto that tip — subsequent commits
        chain cleanly on top of the real PR HEAD.

        ### Step 3 — Read the target file

        Open `file`. If `line` is present, read a window around it. Read enough
        surrounding context to understand the code before editing.

        ### Step 4 — Apply the fix

        Make the minimal change implied by `type` + `remediation`:

        - `fix`: correct buggy code per the remediation.
        - `delete`: remove the dead symbol/file/block.
        - `wire`: connect existing-but-orphaned code (add the missing call,
          export, or import).
        - `rename`: rename the symbol and update all references in the package.
        - `scrub`: remove sensitive data from logs/output/errors.
        - `guard`: add a nil/range/error check.
        - `doc`: update the doc/comment. No code changes.

        Do NOT bundle unrelated cleanups. Do NOT refactor surrounding code.
        One finding = one targeted edit (plus any necessary references).

        ### Step 5 — Verify locally

        Run `{{ project.contract_test_command }}` from the worktree CWD. If it
        fails, attempt one repair pass. If it still fails, capture the failure
        in the resolution record but commit anyway — the parent verify step
        will gate the loop.

        ### Step 6 — Commit and push from the worktree

        Step 2 already switched the worktree onto the PR head branch and
        confirmed `origin` is configured. Stage only the files you edited
        (no `git add -A`). Push to `origin/<pr-branch>` and verify the push
        actually landed by comparing local SHA with the remote ref before
        reporting success.

        If `$BRANCH` is no longer in scope (fresh shell), re-derive it the
        same way Step 2 did: read the `.branch` field from the `pr-context`
        input artifact at the path the `## Input Artifacts` block named.

        Then:

        - `git add <file1> [<file2>...]` — only the files you edited.
        - `git commit -m "fix({{ '<finding-id>' }}): <one-line summary from remediation>"`
        - `SHA=$(git rev-parse HEAD)`
        - `git push origin HEAD:"$BRANCH"`

        Verify the push landed on origin — fail loud if the SHA didn't reach
        the remote (e.g. push silently no-op'd, network drop, hooks rejected):

        - `REMOTE_SHA=$(git ls-remote origin "$BRANCH" | awk '{print $1}')`
        - if `$REMOTE_SHA` != `$SHA`, exit non-zero with a diagnostic.

        Capture the commit SHA from `git rev-parse HEAD`.

        ### Step 7 — Write the resolution record

        Write `.agents/output/resolution.md` with:

        ```markdown
        # Resolution: <finding-id>

        - **Finding type:** <type>
        - **Severity:** <severity>
        - **Status:** applied | skipped | failed
        - **Commit:** <SHA>
        - **Files touched:** <comma-separated list>
        - **Tests:** pass | fail | not-run

        ## Summary

        <2–4 sentence description of what the fix does.>

        ## Diff

        ```
        <output of `git show --stat HEAD`>
        ```
        ```

        ## Constraints

        - Do NOT touch files outside the finding's stated scope.
        - Do NOT amend prior commits or rebase the branch.
        - Do NOT run `git add -A` or stage the entire working tree.
        - Do NOT skip the commit even if the local test command fails — the
          parent's verify step is the source of truth.
        - Do NOT leave the working tree dirty after the commit.
        - Do NOT shell out to `{{ forge.cli_tool }} {{ forge.pr_command }} view`,
          `{{ forge.cli_tool }} {{ forge.pr_command }} diff`, or any other
          PR-metadata fetch. The `pr-context` input artifact already carries
          the head branch, head SHA, and `diff_path` — read it from the path
          the framework named in the `## Input Artifacts` block. That
          artifact is the authoritative source for PR metadata in this step;
          re-fetching wastes tokens, slows the run, and can race with
          concurrent siblings.

        ## Quality bar

        A good resolution applies exactly the change described by the
        remediation, leaves the working tree clean, and produces a commit that
        a reviewer can accept on its own. A bad resolution mixes unrelated
        edits, reformats unrelated lines, or leaves uncommitted changes behind.
    output_artifacts:
      - name: resolution
        path: .agents/output/resolution.md
        type: markdown
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contracts:
        - type: non_empty_file
          source: .agents/output/resolution.md
          on_failure: fail
        - type: test_suite
          command: "{{ project.contract_test_command }}"
          must_pass: false
          on_failure: warn
