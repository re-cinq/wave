kind: WavePipeline
metadata:
  name: wave-stress-test
  description: >-
    Deliberate failure pipeline for testing Wave's circuit breaker, failure
    classification, and conditional edge routing. Runs a successful step followed
    by a step that intentionally exits with an error code, exercising retry and
    conditional routing logic. Use this to validate error handling behavior after
    changes to the executor or graph walker.
  release: false
  category: wave

input:
  source: cli
  example: "test failure handling"

chat_context:
  artifact_summaries:
    - hello
  suggested_questions:
    - "Did the deliberate failure trigger correctly?"
    - "Was the conditional routing exercised?"
    - "Did the pipeline complete via the recovery path?"
  focus_areas:
    - "Error handling behavior"
    - "Circuit breaker and routing correctness"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: succeed
    type: command
    script: "echo 'hello' > .wave/output/hello.txt && echo 'Step succeeded'"
    output_artifacts:
      - name: hello
        path: .wave/output/hello.txt
        type: text
    edges:
      - target: deliberate-fail

  - id: deliberate-fail
    type: command
    dependencies: [succeed]
    script: "echo 'This step deliberately fails' && exit 1"
    max_visits: 2
    edges:
      - target: done
        condition: "outcome=success"
      - target: recover

  - id: recover
    type: command
    script: "echo 'Recovery path reached after deliberate failure'"
    edges:
      - target: done

  - id: done
    type: command
    dependencies: [recover]
    script: "echo 'Pipeline completed via recovery path'"
