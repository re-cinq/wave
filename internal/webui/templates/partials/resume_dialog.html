{{define "templates/partials/resume_dialog.html"}}
<dialog id="resume-dialog" class="resume-dialog" aria-labelledby="resume-dialog-title">
    <h3 id="resume-dialog-title">Resume from Step</h3>
    <p>Select a step to resume execution from:</p>
    <div class="resume-steps">
        {{range .Steps}}
        <button class="resume-step-btn {{statusClass .State}}"
                onclick="resumeFromStep('{{$.Run.RunID}}', '{{.StepID}}', this)"
                aria-label="Resume from {{.StepID}} ({{.State}})">
            <span class="step-id">{{.StepID}}</span>
            <span class="badge {{statusClass .State}}">{{.State}}</span>
        </button>
        {{end}}
    </div>
    <button class="btn" onclick="document.getElementById('resume-dialog').close()" aria-label="Close resume dialog">Cancel</button>
</dialog>
{{end}}
