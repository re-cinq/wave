description: "Bitbucket issue enhancement and improvement"
temperature: 0.2
permissions:
  allowed_tools:
    - Read
    - "Bash(curl *)"
    - "Bash(jq *)"
    - "Write(.wave/artifact.json)"
    - "Write(/tmp/*)"
  deny:
    - "Bash(curl *-X POST*)"
    - "Bash(curl *-X DELETE*)"
    - "Bash(gh *)"
    - "Bash(glab *)"
    - "Bash(tea *)"
    - "Edit(*)"
