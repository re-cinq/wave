description: "Bitbucket epic analysis, decomposition, and sub-issue creation"
temperature: 0.1
permissions:
  allowed_tools:
    - Read
    - "Bash(curl *)"
    - "Bash(jq *)"
    - "Write(.wave/artifact.json)"
    - "Write(/tmp/*)"
  deny:
    - "Bash(curl *-X DELETE*)"
    - "Bash(gh *)"
    - "Bash(glab *)"
    - "Bash(tea *)"
    - "Edit(*)"
