description: "Code review and quality checks"
temperature: 0.1
permissions:
  allowed_tools:
    - Read
    - Glob
    - Grep
    - "Write(.wave/artifact.json)"
    - "Write(.wave/artifacts/*)"
    - Bash
  deny:
    - "Write(*.go)"
    - "Write(*.ts)"
    - "Write(*.py)"
    - "Edit(*)"
    - "Bash(rm -rf /*)"
    - "Bash(git push*)"
    - "Bash(git commit*)"
