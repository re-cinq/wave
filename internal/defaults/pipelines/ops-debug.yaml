kind: WavePipeline
metadata:
  name: ops-debug
  description: >-
    Systematic debugging pipeline that reproduces a reported issue, forms ranked
    hypotheses about root cause, tests each hypothesis against the codebase, and
    applies a minimal fix with a regression test. Use this when a bug has a clear
    symptom but an unknown cause. Loops the fix step through test verification
    until all tests pass.
  release: true

skills:
  - "{{ project.skill }}"

input:
  source: cli
  example: "TestPipelineExecutor fails with nil pointer on resume"

chat_context:
  artifact_summaries:
    - reproduction
    - hypotheses
    - findings
    - fix
  suggested_questions:
    - "What was the root cause of the failure?"
    - "Could the same pattern cause issues elsewhere in the codebase?"
    - "Is the regression test sufficient to prevent recurrence?"

pipeline_outputs:
  fix:
    step: fix
    artifact: fix

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .agents/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .agents/output/hook-log.txt"
    blocking: false

steps:
  - id: reproduce
    persona: debugger
    model: cheapest
    thread: debug
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Reproduce and fully characterize the reported issue so that subsequent steps can
        form hypotheses and apply a fix with confidence. You must produce a structured
        reproduction report that captures the exact failure, the expected versus actual
        behavior, the minimal steps to trigger the bug, the relevant code paths, and any
        environmental factors that influence the outcome.

        Reported issue: {{ input }}

        ## Context

        This is the first step of the ops-debug pipeline. No prior artifacts exist. You
        have read-only access to the project directory mounted at /project. Your output
        will be consumed by the "hypothesize" step, which needs precise reproduction
        details to form ranked root-cause hypotheses. Vague or incomplete reproduction
        data will cascade into wasted investigation effort downstream.

        ## Requirements

        1. **Parse the issue description.** Extract the key signals: what component is
           affected, what operation triggers the failure, and what the symptom is (panic,
           wrong output, hang, crash, test failure, etc.).

        2. **Understand expected vs. actual behavior.** Read the relevant source code,
           tests, and documentation to determine what the correct behavior should be.
           Then describe the actual behavior observed or reported. Be specific — "returns
           nil" is better than "doesn't work".

        3. **Create minimal reproduction steps.** Write a numbered sequence of commands
           or actions that reliably trigger the bug. If a specific test fails, identify
           the exact test function name and the command to run it (e.g.,
           `{{ project.test_command }}` with a filter for the specific test). If the issue requires specific input
           data, describe that data. If you can reduce the reproduction to a smaller
           scope, do so.

        4. **Identify relevant code paths.** Trace the execution flow from the entry
           point to the failure site. List the specific files, functions, and line ranges
           involved. If the issue spans multiple packages or modules, map the call chain.
           Read the actual source files — do not guess at code paths.

        5. **Note environmental factors.** Record anything that might influence
           reproduction: language runtime version, OS, build tags, feature flags, configuration values
           from wave.yaml, presence or absence of specific environment variables,
           concurrency settings, or filesystem state.

        6. **Attempt the reproduction.** If the test suite is available, run the specific
           failing test to confirm the failure. Record the exact error output. If you
           cannot reproduce, note what you tried and what the result was.

        ## Constraints and Anti-patterns

        - Do NOT attempt to fix the bug in this step. Your only job is characterization.
        - Do NOT modify any source files. The workspace is read-only.
        - Do NOT skip the reproduction attempt — "I think this would fail" is not evidence.
          Run the test or command if at all possible.
        - Do NOT include speculation about root cause here. That belongs in the next step.
        - Avoid over-broad scope. If the report says "TestFoo fails", focus on TestFoo,
          not the entire test suite.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good reproduction report lets another developer (or the next pipeline step)
        trigger the bug in under 60 seconds by following the steps verbatim. It includes
        exact file paths, exact error messages, and a clear statement of expected vs.
        actual. A bad report uses vague language ("something breaks in the pipeline
        executor"), omits the test command, or speculates about cause instead of
        documenting symptoms.
    output_artifacts:
      - name: reproduction
        path: .agents/output/reproduction.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/reproduction.json
        schema_path: .agents/contracts/debug-reproduction.schema.json
        on_failure: retry

  - id: hypothesize
    persona: debugger
    model: strongest
    thread: debug
    dependencies: [reproduce]
    memory:
      inject_artifacts:
        - step: reproduce
          artifact: reproduction
          as: issue
    exec:
      type: prompt
      source: |
        ## Objective

        Form a ranked list of root-cause hypotheses for the reproduced bug. Each
        hypothesis must be specific enough to test — it should name a concrete mechanism
        (e.g., "nil pointer dereference because field X is not initialized when method Y
        is called during resume") rather than a vague category (e.g., "something wrong
        with error handling"). The investigation step will test these hypotheses in order,
        so ranking quality directly determines debugging efficiency.

        ## Context

        The previous "reproduce" step produced the injected `issue` artifact. It contains
        the reproduction report with:
        - The exact failure symptom and error output
        - The expected vs. actual behavior
        - The relevant code paths, files, and line ranges
        - The environment details and reproduction steps
        - Whether the reproduction was confirmed, partial, or unconfirmed

        Read this artifact thoroughly before forming any hypotheses. Every hypothesis
        must be grounded in the evidence from the reproduction report.

        ## Requirements

        1. **Analyze the error signature.** Look at the exact error message, stack trace,
           or test failure output from the reproduction. Identify the proximate cause —
           what line of code directly produces the error. This is your starting point,
           not your answer.

        2. **Trace backward from the failure site.** For each relevant code path
           identified in the reproduction, reason about what preconditions could lead to
           the observed failure. Consider: uninitialized state, race conditions, incorrect
           control flow, missing error propagation, wrong type assertions, stale caches,
           incorrect assumptions about caller/callee contracts.

        3. **Generate 3-7 hypotheses.** Each hypothesis must include:
           - `description`: A specific, testable statement of what is wrong and why
           - `mechanism`: The concrete code-level mechanism (which function, which field,
             which condition)
           - `evidence_for`: What existing evidence supports this hypothesis
           - `evidence_against`: What existing evidence argues against it
           - `test_plan`: Exactly how to confirm or refute this hypothesis (which file to
             read, which test to run, which log to add, which git bisect range to check)
           - `likelihood`: "high", "medium", or "low"
           - `test_difficulty`: "easy", "moderate", or "hard"

        4. **Rank hypotheses.** Sort by a combination of likelihood and ease of testing.
           A high-likelihood, easy-to-test hypothesis should always rank above a
           low-likelihood, hard-to-test one. When likelihood is equal, prefer the easier
           test. When test difficulty is equal, prefer the higher likelihood.

        5. **Consider systemic patterns.** After forming individual hypotheses, check
           whether the bug could be an instance of a known anti-pattern: missing nil
           checks after map lookups, thread-unsafe field access, incorrect error
           wrapping that loses context, or interface satisfaction gaps.

        ## Constraints and Anti-patterns

        - Do NOT investigate or test hypotheses in this step. Only form and rank them.
          The investigation happens in the next step.
        - Do NOT include "the code is wrong" as a hypothesis. Every hypothesis must name
          a specific mechanism.
        - Do NOT propose more than 7 hypotheses. If you have more ideas, keep only the
          7 most likely.
        - Do NOT include fix suggestions. This step is about diagnosis, not treatment.
        - Avoid anchoring bias: do not assume the first plausible explanation is correct.
          Deliberately consider at least one non-obvious alternative.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good hypothesis set correctly identifies the actual root cause in the top 2
        entries and provides test plans that can be executed in minutes, not hours. A bad
        hypothesis set contains only vague guesses ("might be a concurrency issue"),
        lacks test plans, or misses the actual root cause entirely because it anchored
        on the first plausible explanation.
    output_artifacts:
      - name: hypotheses
        path: .agents/output/hypotheses.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/hypotheses.json
        schema_path: .agents/contracts/debug-hypotheses.schema.json
        on_failure: retry

  - id: investigate
    persona: debugger
    model: strongest
    thread: debug
    dependencies: [hypothesize]
    memory:
      inject_artifacts:
        - step: reproduce
          artifact: reproduction
          as: issue
        - step: hypothesize
          artifact: hypotheses
          as: hypotheses
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Systematically test each hypothesis from the ranked list until the root cause is
        definitively identified. You must produce a detailed investigation report that
        documents what you tested, what you found, and which hypothesis (if any) was
        confirmed as the true root cause. This report is the sole input to the fix step,
        so it must be precise enough for a developer to implement the correct fix without
        re-investigating.

        ## Context

        Two prior artifacts are injected into your workspace:
        - `issue` (from the "reproduce" step): Contains the reproduction report with the
          exact failure, error output, relevant files, and environment details.
        - `hypotheses` (from the "hypothesize" step): Contains the ranked list of
          root-cause hypotheses, each with a description, mechanism, test plan, and
          likelihood rating.

        Read BOTH artifacts before starting. The hypotheses are pre-ranked — start with
        the highest-ranked hypothesis and work down. You have read-only access to the
        project codebase.

        ## Requirements

        1. **Test hypotheses in rank order.** For each hypothesis, execute the test plan
           described in the hypothesis artifact:
           - Read the specific files and lines mentioned in the hypothesis
           - Check whether the proposed mechanism actually exists in the code
           - Run targeted tests or add diagnostic print statements to trace execution
           - Examine variable state, control flow, and data transformations at the
             failure site

        2. **Document findings per hypothesis.** For each hypothesis tested, record:
           - `hypothesis_id`: which hypothesis (by index or description)
           - `status`: "confirmed", "refuted", or "inconclusive"
           - `evidence`: the specific code, test output, or trace data that confirms or
             refutes the hypothesis
           - `notes`: any additional observations or surprising findings

        3. **Use git bisect for regressions.** If the hypotheses suggest the bug was
           introduced by a recent change, use `git log` to identify candidate commits,
           then read the relevant diffs to pinpoint the introduction. If the project has
           a passing test for the expected behavior, note which commit broke it.

        4. **Add diagnostic tracing if needed.** If static analysis of the code is
           insufficient, describe what diagnostic logging or instrumentation you would
           add and what you expect to observe. Since the workspace is read-only, document
           these as proposed diagnostics rather than applied changes.

        5. **Examine data flow end-to-end.** Trace the values from input to the failure
           point. Look for: implicit type conversions, nil propagation through call
           chains, thread interleaving, map access patterns, interface method dispatch,
           and error swallowing.

        6. **Stop when root cause is found.** Once a hypothesis is confirmed, you do not
           need to test remaining hypotheses — but briefly note why the confirmed cause
           explains all the symptoms from the reproduction report.

        7. **Handle all-inconclusive case.** If no hypothesis is confirmed after testing
           all of them, synthesize what you learned into a new, more informed hypothesis
           and document it clearly. Do not leave the investigation without a conclusion.

        ## Constraints and Anti-patterns

        - Do NOT apply any fixes in this step. Investigation only.
        - Do NOT skip hypotheses because they seem unlikely — test at least the top 3
          regardless of your intuition.
        - Do NOT write vague findings like "the code looks wrong here". Every finding must
          reference a specific file, function, line, and observable behavior.
        - Do NOT assume a hypothesis is confirmed because it is plausible. Confirmation
          requires concrete evidence: a code path that demonstrably produces the observed
          error, a test that fails in the predicted way, or a trace that shows the
          predicted state.
        - Avoid tunnel vision: if early evidence contradicts your leading hypothesis,
          update your mental model and move to the next hypothesis.

        ## Output Format

        Produce a markdown report with the following
        structure:
        - **H1: Investigation Report**
        - **H2: Summary** — one paragraph stating the confirmed root cause (or that no
          cause was confirmed)
        - **H2: Hypothesis Testing** — one H3 subsection per tested hypothesis, each
          with status, evidence, and notes
        - **H2: Root Cause** — detailed description of the confirmed root cause,
          including the exact code path, the triggering condition, and why it produces
          the observed failure
        - **H2: Recommended Fix Direction** — a brief (3-5 sentence) sketch of what the
          fix should do, without implementation details

        ## Quality Bar

        A good investigation report lets the fix step implement the correct fix on the
        first attempt. It names the exact function and line where the bug lives, explains
        the triggering condition, and describes why the current code is wrong. A bad
        investigation report tests hypotheses superficially ("I looked at the file and it
        seems fine"), fails to find the root cause, or provides ambiguous conclusions that
        could lead the fix step in multiple directions.
    output_artifacts:
      - name: findings
        path: .agents/output/investigation.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/investigation.md

  - id: fix
    persona: craftsman
    model: strongest
    dependencies: [investigate]
    thread: debug
    max_visits: 3
    memory:
      inject_artifacts:
        - step: investigate
          artifact: findings
          as: root_cause
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        ## Objective

        Implement the minimal correct fix for the root cause identified in the
        investigation report, add a regression test that would have caught this bug
        before it shipped, and verify that the original reproduction no longer fails and
        the full test suite still passes. This step has read-write access to the project
        and may be re-entered up to 3 times via the conditional loop if tests fail.

        ## Context

        The injected `root_cause` artifact (from the "investigate" step) contains the
        investigation report with:
        - The confirmed root cause: exact file, function, and line where the bug lives
        - The triggering condition and why the current code is wrong
        - A recommended fix direction (brief sketch, not implementation)

        Read this artifact FIRST. Your fix must directly address the confirmed root cause
        — do not wander into unrelated improvements.

        ## Requirements

        1. **Implement the minimal fix.** Change only what is necessary to correct the
           root cause. If the bug is a missing nil check, add the nil check. If it is an
           incorrect condition, fix the condition. Count the lines you change — if you are
           changing more than ~20 lines for a single bug fix, reconsider whether you are
           doing something unnecessary.

        2. **Add a regression test.** Write a test that:
           - Fails on the current (unfixed) code by exercising the exact triggering
             condition identified in the investigation
           - Passes on the fixed code
           - Is placed in the appropriate test file for the package being fixed
           - Has a descriptive name that references the bug (e.g.,
             `TestResumeManager_NilState` not `TestFix`)
           - Covers the specific edge case, not a broad integration scenario

        3. **Remove diagnostic code.** If any temporary logging, print statements, or
           debugging instrumentation was added during the investigation (or by a prior
           visit to this step), remove it. The codebase should be clean of debugging
           artifacts.

        4. **Verify the original reproduction.** Run the specific test or command from
           the reproduction report to confirm the bug no longer manifests. Record the
           passing output.

        5. **Run the full test suite.** Execute `{{ project.contract_test_command }}` and
           verify no regressions. If any test fails that was passing before your changes,
           you must fix it before proceeding.

        6. **Check for similar issues.** Search the codebase for the same pattern that
           caused this bug. If you find other instances of the same anti-pattern (e.g.,
           other map lookups without nil checks in the same package), note them in the
           fix summary but do NOT fix them in this step. Scope discipline is critical.

        ## Constraints and Anti-patterns

        - Do NOT refactor surrounding code. Fix the bug, nothing more.
        - Do NOT rename variables, reorganize imports, or adjust formatting in files you
          did not need to touch for the fix.
        - Do NOT add TODO comments about other issues you noticed. Document them in the
          fix summary instead.
        - Do NOT skip the regression test. A fix without a test is incomplete.
        - Do NOT change test infrastructure, test helpers, or test configuration unless
          they are directly part of the bug.
        - If this is a re-entry (max_visits > 1), focus specifically on the test failures
          from the previous attempt. Do not start over.

        ## Output Format

        Produce a markdown summary with:
        - **H2: Fix Applied** — what was changed, which files, which lines
        - **H2: Regression Test** — the test name, what it exercises, its location
        - **H2: Verification** — the reproduction test result and full suite result
        - **H2: Similar Patterns** — any other instances of the same anti-pattern found
          (with file paths), left for future cleanup

        ## Quality Bar

        A good fix changes the minimum number of lines to correct the root cause, includes
        a focused regression test that exercises the exact triggering condition, and leaves
        the test suite fully green. A bad fix is a shotgun patch that changes many files,
        lacks a regression test, introduces new test failures, or fixes symptoms instead
        of the root cause.
    retry:
      policy: aggressive
      max_attempts: 2
    output_artifacts:
      - name: fix
        path: .agents/output/fix-summary.md
        type: markdown

  - id: run-tests
    type: command
    dependencies: [fix]
    script: "{{ project.contract_test_command }}"

  - id: verify-fix
    type: conditional
    dependencies: [run-tests]
    edges:
      - target: _complete
        condition: "outcome=success"
      - target: fix
