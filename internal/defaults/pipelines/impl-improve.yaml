kind: WavePipeline
metadata:
  name: impl-improve
  description: >-
    Assess a codebase area for quality issues and apply targeted improvements.
    Use this when code works but could be better -- the pipeline audits error
    handling, performance, testability, and maintainability, then applies
    high-impact, low-risk fixes while preserving existing behavior.
  release: true

skills:
  - "{{ project.skill }}"
  - software-design

input:
  source: cli
  example: "improve error handling in internal/pipeline"

chat_context:
  artifact_summaries:
    - assessment
    - verification
  suggested_questions:
    - "What improvements were applied?"
    - "Were any high-risk items skipped?"
    - "Did the improvements introduce any regressions?"
  focus_areas:
    - "Applied improvements and quality delta"
    - "Skipped items and risk assessment"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[impl-improve] started run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[impl-improve] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  result:
    step: verify
    artifact: verification

steps:
  - id: assess
    persona: navigator
    max_concurrent_agents: 3
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Assess the code for improvement opportunities: {{ input }}

        ## Assessment Areas

        1. **Code quality**: Readability, naming, structure, duplication
        2. **Error handling**: Missing checks, swallowed errors, unclear messages
        3. **Performance**: Unnecessary allocations, N+1 patterns, missing caching
        4. **Testability**: Hard-to-test code, missing interfaces, tight coupling
        5. **Robustness**: Missing nil checks, race conditions, resource leaks
        6. **Maintainability**: Complex functions, deep nesting, magic numbers

        For each finding, assess:
        - Impact: how much does fixing it improve the code?
        - Effort: how hard is the fix?
        - Risk: could the fix introduce regressions?
    output_artifacts:
      - name: assessment
        path: .wave/output/assessment.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/assessment.json
        schema_path: .wave/contracts/improvement-assessment.schema.json
        on_failure: retry

  - id: implement
    persona: craftsman
    model: strongest
    contexts: [execution, delivery]
    dependencies: [assess]
    memory:
      inject_artifacts:
        - step: assess
          artifact: assessment
          as: findings
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        Apply the recommended improvements to the codebase.

        ## Rules

        1. **Start with quick wins**: Apply trivial/small effort fixes first
        2. **One improvement at a time**: Make each change, verify it compiles,
           then move to the next
        3. **Preserve behavior**: Improvements must not change external behavior
        4. **Run tests**: After each significant change, run relevant tests
        5. **Skip high-risk items**: Do not apply changes rated risk=high
           without explicit test coverage
        6. **Document changes**: Track what was changed and why

        Focus on the findings with the best impact-to-effort ratio.
        Do NOT refactor beyond what was identified in the assessment.
    retry:
      policy: standard
      max_attempts: 3
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: verify
    persona: reviewer
    model: strongest
    dependencies: [implement]
    memory:
      inject_artifacts:
        - step: assess
          artifact: assessment
          as: original_findings
    exec:
      type: prompt
      source: |
        Verify the improvements were applied correctly.

        For each improvement that was applied:
        1. Is the fix correct and complete?
        2. Does it actually address the identified issue?
        3. Were any new issues introduced?
        4. Are tests still passing?

        For improvements NOT applied, confirm they were appropriately skipped.

        Produce a verification report covering:
        - Applied improvements (with before/after)
        - Skipped items (with justification)
        - New issues found (if any)
        - Overall quality delta assessment
    output_artifacts:
      - name: verification
        path: .wave/output/verification.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .wave/contracts/verification-criteria.md
        source: .wave/output/verification.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: warn
