kind: WavePipeline
metadata:
  name: impl-refactor
  description: >-
    Safe, behavior-preserving refactoring backed by comprehensive test coverage.
    The pipeline analyzes the refactoring scope and caller graph, establishes a
    test baseline with characterization tests for uncovered paths, applies the
    refactoring, and verifies that no regressions were introduced. Use this when
    restructuring code that must not change external behavior.
  release: true

skills:
  - "{{ project.skill }}"
  - software-design

input:
  source: cli
  example: "extract workspace manager from executor into its own package"

chat_context:
  artifact_summaries:
    - analysis
    - verification
  suggested_questions:
    - "What was refactored and how?"
    - "Was existing behavior preserved?"
    - "Did test coverage decrease?"
  focus_areas:
    - "Refactoring scope and safety"
    - "Test baseline comparison"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  result:
    step: verify
    artifact: verification

steps:
  - id: analyze
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Analyze refactoring scope for: {{ input }}

        1. Identify all code that will be affected
        2. Map all callers/consumers of the code being refactored
        3. Find existing test coverage
        4. Identify integration points
    output_artifacts:
      - name: analysis
        path: .wave/output/refactor-analysis.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/refactor-analysis.json
        schema_path: .wave/contracts/refactor-analysis.schema.json
        on_failure: retry

  - id: test-baseline
    persona: craftsman
    model: strongest
    dependencies: [analyze]
    memory:
      inject_artifacts:
        - step: analyze
          artifact: analysis
          as: scope
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        Before refactoring, ensure test coverage:

        1. Run existing tests and record baseline
        2. Add characterization tests for uncovered code paths
        3. Add integration tests for affected callers
        4. Document current behavior for comparison

        All tests must pass before proceeding.
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"

        must_pass: true
        on_failure: retry
    output_artifacts:
      - name: baseline
        path: .wave/output/test-baseline.md
        type: markdown
  - id: refactor
    persona: craftsman
    model: strongest
    dependencies: [test-baseline]
    thread: refactor
    memory:
      inject_artifacts:
        - step: analyze
          artifact: analysis
          as: scope
        - step: test-baseline
          artifact: baseline
          as: tests
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        Perform the refactoring: {{ input }}

        Guidelines:
        1. Make atomic, reviewable changes
        2. Preserve all existing behavior
        3. Run tests after each significant change
        4. Update affected callers as needed
        5. Keep commits small and focused

        Do NOT change behavior — this is refactoring only.
    retry:
      policy: standard
      max_attempts: 3
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: false
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: verify
    persona: reviewer
    model: strongest
    dependencies: [refactor]
    exec:
      type: prompt
      source: |
        Verify the refactoring:

        1. Compare before/after behavior — any changes?
        2. Check test coverage didn't decrease
        3. Verify all callers still work correctly
        4. Look for missed edge cases
        5. Assess code quality improvement

        Output: PASS (safe to merge) or FAIL (issues found)
    output_artifacts:
      - name: verification
        path: .wave/output/verification.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .wave/contracts/verification-criteria.md
        source: .wave/output/verification.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: warn
