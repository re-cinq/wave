kind: WavePipeline
metadata:
  name: impl-hotfix
  description: >-
    Investigate and fix a production issue with minimal, targeted changes.
    Designed for urgent bugs where speed matters. The pipeline investigates root
    cause and blast radius, applies the smallest safe fix, adds a regression
    test, and validates with the project test suite before committing.
  release: true

skills:
  - "{{ project.skill }}"
  - software-design

input:
  source: cli
  example: "fix panic in pipeline executor when step has nil context"

chat_context:
  artifact_summaries:
    - findings
    - verdict
  suggested_questions:
    - "What was the root cause of the issue?"
    - "Is the fix minimal and safe for production?"
    - "Are there similar patterns elsewhere that need the same fix?"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[impl-hotfix] started run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[impl-hotfix] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  verdict:
    step: verify
    artifact: verdict

steps:
  - id: investigate
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        INVESTIGATION — find the root cause and blast radius of a production issue.

        ## Objective

        Conduct a thorough investigation of the reported production issue. You must identify
        the root cause with certainty, determine the full blast radius of the bug, and
        produce a findings document that gives the fix step everything it needs to apply a
        safe, minimal correction. Speed matters — this is a hotfix pipeline — but accuracy
        matters more. A wrong diagnosis leads to a wrong fix.

        Production issue: {{ input }}

        ## Context

        You are the first step in the hotfix pipeline. No prior artifacts exist. You have
        read-only access to the full project codebase. Your output (the `findings` artifact)
        will be injected into the fix step as the sole guide for what to change. The fixer
        will trust your diagnosis — so it must be correct.

        ## Requirements

        1. **Reproduce the problem mentally**: Read the issue description carefully. What is
           the expected behavior? What is the actual behavior? Under what conditions does
           the bug manifest? Identify the trigger conditions — specific inputs, timing,
           concurrency, or configuration that cause the failure.

        2. **Search for the code path**: Use Grep and Glob to find the code that handles
           the described scenario. Trace the execution path from entry point to failure
           point. Read each function in the call chain. Note the exact file and line where
           the bug occurs.

        3. **Check recent commits**: Run `git log --oneline -20` on the affected files to
           see recent changes. Was the bug introduced by a recent commit? If so, identify
           the commit hash, author, and what it changed. This is critical for understanding
           whether a simple revert is appropriate.

        4. **Identify the root cause**: State the root cause precisely. Not "there's a nil
           pointer" but "function X on line Y dereferences `ctx.Step` without checking for
           nil, and `ctx.Step` is nil when the pipeline runs with a conditional step that
           was skipped." Include the exact code snippet that contains the bug.

        5. **Assess blast radius**: What else could be affected by this bug?
           - Are there other callers of the buggy function?
           - Are there similar patterns elsewhere that have the same vulnerability?
           - Could the fix break other code paths?
           - What is the worst-case user impact if the bug is not fixed?

        6. **Propose fix direction**: Without writing the actual fix, describe what needs to
           change. "Add a nil check for ctx.Step before line Y" or "Guard the map access
           with a mutex" or "Revert commit ABC123." This gives the fixer a starting point.

        7. **Identify regression test target**: Describe the test case that would have caught
           this bug. What inputs, what assertion, what package.

        ## Constraints and Anti-patterns

        - Do NOT write any fixes. Your job is investigation only.
        - Do NOT speculate about the root cause — verify it by reading the actual code.
        - Do NOT assume the bug is in the most obvious location. Trace the full call chain.
        - Do NOT skip the blast radius assessment. A fix that addresses one symptom while
          leaving the root cause in place is worse than no fix.
        - Do NOT ignore recent git history — the introduction point matters for understanding
          the fix scope.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good investigation pinpoints the exact line of code with the bug, explains why
        it fails under the specific conditions described, identifies all related code paths,
        and provides enough context for the fix step to apply a surgical correction. A bad
        investigation gives a vague diagnosis like "something is wrong with error handling"
        that forces the fixer to re-investigate from scratch.
    output_artifacts:
      - name: findings
        path: .wave/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/findings.json
        schema_path: .wave/contracts/bug-investigation.schema.json
        on_failure: retry

  - id: fix
    persona: craftsman
    model: strongest
    contexts: [execution, delivery]
    dependencies: [investigate]
    thread: hotfix
    memory:
      inject_artifacts:
        - step: investigate
          artifact: findings
          as: investigation
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        HOTFIX — apply the smallest safe fix for the production issue.

        ## Objective

        Apply a minimal, surgical fix to resolve the production issue identified in the
        investigation. The fix must address the root cause (not just the symptom), include
        a regression test that would have caught this bug before it shipped, and leave all
        existing tests passing. This is a hotfix — speed and safety are the priorities.
        Do not improve, refactor, or reorganize anything beyond what is strictly necessary.

        ## Context

        The injected `investigation` artifact contains the investigation findings. Read it
        FIRST. It contains:
        - `root_cause`: The exact file, line, and technical explanation of the bug
        - `trigger_conditions`: What inputs or conditions cause the failure
        - `blast_radius`: Other code paths that may be affected
        - `proposed_fix_direction`: The investigator's recommended approach
        - `regression_test`: Description of the test that should be written
        - `severity`: How critical the issue is

        You have read-write access to the full project codebase. This step operates on a
        thread named `hotfix`, which allows context to carry over to the fix-retry step
        if the contract fails.

        ## Requirements

        1. **Read the investigation findings**: Understand the root cause completely before
           touching any code. Verify the diagnosis by reading the cited code yourself. If
           the investigation points to line X of file Y, open that file and confirm.

        2. **Apply the minimal fix**: Follow the proposed fix direction from the investigation.
           The fix should be:
           - As few lines changed as possible (typically 1-10 lines)
           - Contained to the file(s) identified in the root cause
           - Addressing the root cause, not papering over the symptom
           - Safe for production deployment (no new feature flags, no behavioral changes)

        3. **Write a regression test**: Create a test that:
           - Reproduces the exact trigger conditions described in the findings
           - Fails without the fix applied (verify this mentally — the test should target
             the specific code path that was broken)
           - Passes with the fix applied
           - Lives in the appropriate test file following existing test patterns
           - Uses table-driven test format if the existing tests in that file use it

        4. **Check for similar patterns**: Review the blast radius from the investigation.
           If the same bug pattern exists in other locations, fix those too — but only if
           the pattern is identical and the fix is mechanical. If the other locations need
           different fixes, note them but do not address them here.

        5. **Run all tests**: Execute the full test suite. Every test must pass. If an
           existing test breaks because of your fix, investigate whether your fix exposed
           a pre-existing bug in the test, or whether your fix itself is incorrect.

        6. **Commit with a clear message**: Stage only the files you modified:
           ```bash
           git add <specific-files>
           git commit -m "fix(<component>): <concise description of the fix>

           Root cause: <one-line explanation>
           Regression test added in <test-file>"
           ```

        ## Constraints and Anti-patterns

        - Do NOT refactor surrounding code, even if it is messy.
        - Do NOT rename variables, reformat files, or adjust imports beyond what is needed.
        - Do NOT add new dependencies or abstractions.
        - Do NOT modify test infrastructure or test helpers.
        - Do NOT change function signatures unless the fix absolutely requires it. If it
          does, check all callers and update them.
        - Do NOT apply the fix without writing the regression test. Both are required.
        - Do NOT commit without running the full test suite first.

        ## Output Format

        No explicit output artifact is required. The contract validates that the test suite
        passes. If you want to leave notes for the verify step, you may write to
        a fix-notes file but this is optional.

        ## Quality Bar

        A good hotfix is 1-10 lines of production code plus a focused regression test,
        committed in under 5 minutes of wall time, with all tests green. A reviewer should
        look at the diff and immediately understand what was broken and how the fix addresses
        it. A bad hotfix makes broad changes, skips the regression test, or fixes the symptom
        while leaving the root cause intact.
    retry:
      policy: standard
      max_attempts: 2
      on_failure: rework
      rework_step: fix-retry
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: fix-retry
    persona: craftsman
    model: balanced
    rework_only: true
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readwrite
    exec:
      type: prompt
      source: |
        REWORK — fix the specific failure from the hotfix attempt.

        ## Objective

        The previous fix step failed its contract (the test suite did not pass). Your job
        is to diagnose why the fix attempt failed and apply the minimum correction needed
        to make all tests pass. You are not starting over — you are fixing what the previous
        attempt got wrong.

        ## Context

        The failure context has been injected as an artifact. It contains the error output
        from the contract check — typically test failure messages, compilation errors, or
        linter violations. You are on the same workspace with all previous changes still
        in place.

        The original investigation findings may also be available from the thread context
        (thread: hotfix). Use them to understand the original root cause if needed.

        ## Requirements

        1. **Read the failure context carefully**: What exactly failed? Is it:
           - A compilation error introduced by the fix?
           - A test assertion failure (existing test broken by the fix, or new regression
             test not matching actual behavior)?
           - A linter or formatting violation?
           Parse the error output to identify the exact file and line.

        2. **Diagnose the cause of failure**: Why did the previous fix not work? Common
           patterns:
           - The fix addressed the wrong code path
           - The fix was applied correctly but the regression test has wrong expectations
           - The fix broke an assumption in another part of the code
           - The fix introduced a new compilation error (missing import, wrong type)

        3. **Apply the minimal correction**: Fix only what is broken. If the previous fix
           was on the right track but had a small error, correct that error. If the previous
           fix was fundamentally wrong, revert it and apply the correct one — but keep the
           change set as small as possible.

        4. **Verify all tests pass**: Run the full test suite. Every test must pass. Do
           not proceed until the suite is green.

        5. **Commit the correction**: Stage only the changed files. Use a clear commit message
           that references the original fix attempt.

        ## Constraints and Anti-patterns

        - Do NOT rewrite the entire implementation from scratch.
        - Do NOT delete or skip failing tests — fix the underlying cause.
        - Do NOT broaden the scope of changes beyond what is needed for the fix.
        - Do NOT add error-swallowing patterns (empty catch blocks, ignored error returns)
          to silence failures.
        - Do NOT make cosmetic changes — focus exclusively on the test-passing contract.

        ## Output Format

        No explicit output artifact is required. The contract validates that the test suite
        passes. On success, the pipeline proceeds to the verify step.

        ## Quality Bar

        A good rework identifies the gap between the previous attempt and the correct fix
        in 1-3 line changes and gets to green tests immediately. A bad rework makes sweeping
        changes that obscure what was actually wrong, or introduces new failures in the
        process of fixing old ones.
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: fail

  - id: run-tests
    type: command
    dependencies: [fix]
    script: "{{ project.contract_test_command }}"

  - id: gate
    type: conditional
    dependencies: [run-tests]
    edges:
      - target: verify
        condition: "outcome=success"
      - target: fix

  - id: verify
    persona: reviewer
    model: strongest
    dependencies: [gate]
    exec:
      type: prompt
      source: |
        VERIFICATION — assess whether the hotfix is safe to ship.

        ## Objective

        Perform an independent review of the hotfix to determine whether it is safe for
        production deployment. You are the final gate before this fix reaches users. Your
        output is a go/no-go recommendation with detailed reasoning. If there is any doubt
        about safety, the answer is no-go.

        ## Context

        The fix step has completed successfully — all tests pass. However, passing tests
        does not guarantee the fix is correct or safe. You need to verify that:
        - The fix actually addresses the reported issue (not just silences the symptom)
        - The regression test is meaningful and would catch a recurrence
        - No unrelated changes were introduced
        - The fix does not create new risks

        You have read access to the codebase and can inspect the changes made by the fix
        step using `git diff` and `git log`.

        ## Requirements

        1. **Review the diff**: Run `git diff HEAD~1` (or appropriate range) to see exactly
           what was changed. For each changed file:
           - Is the change necessary for the fix?
           - Is any line changed that is not related to the bug?
           - Are there any formatting-only or cosmetic changes mixed in?

        2. **Verify the fix addresses the root cause**: Compare the changes to the reported
           issue. Does the fix target the actual root cause? Or does it merely prevent the
           symptom from manifesting? A symptom-level fix will recur under different
           conditions.

        3. **Evaluate the regression test**: Read the new test carefully.
           - Does it reproduce the exact trigger conditions from the bug report?
           - Would it fail without the fix? (Mentally revert the fix and trace the test.)
           - Does it test the right code path (not a different path that happens to pass)?
           - Is it well-named and clearly documented about what bug it prevents?
           - Does it follow the test patterns used elsewhere in the same test file?

        4. **Check for similar patterns**: Are there other code paths with the same
           vulnerability? If the bug was a missing nil check, are there other places where
           the same variable is dereferenced without a check? If the bug was a race condition,
           are there other threads or concurrent tasks accessing the same shared state? List any related
           locations and whether they need separate fixes.

        5. **Assess production safety**: Consider:
           - Does the fix change any public API signatures?
           - Does it change any configuration defaults?
           - Does it affect data formats, serialization, or storage?
           - Could it cause issues during rolling deployment?
           - Is the fix backward-compatible?

        6. **Write the verdict**: Produce a clear recommendation:
           - **GO**: The fix is minimal, correct, well-tested, and safe to deploy
           - **NO-GO**: Explain exactly what is wrong and what must change before shipping
           - **CONDITIONAL GO**: The fix is safe but follow-up items should be tracked

        ## Constraints and Anti-patterns

        - Do NOT rubber-stamp the fix. Assume it is wrong until proven otherwise.
        - Do NOT suggest improvements or refactoring — that is out of scope for a hotfix
          review. Only evaluate correctness and safety.
        - Do NOT evaluate code quality beyond what is relevant to the fix's correctness.
        - Do NOT modify any files — this is a read-only verification step.
        - Do NOT be lenient because "the tests pass." Tests can pass for the wrong reasons.

        ## Output Format

        Produce the verdict as a structured markdown document:
        - **Verdict**: GO / NO-GO / CONDITIONAL GO
        - **Summary**: One paragraph explaining the decision
        - **Fix Analysis**: What was changed and whether it addresses the root cause
        - **Regression Test Analysis**: Whether the test is adequate
        - **Blast Radius Check**: Similar patterns and whether they are covered
        - **Production Safety**: Any deployment concerns
        - **Follow-up Items**: (if any) Issues to track after the hotfix ships

        ## Quality Bar

        A good verification catches real problems that tests cannot — a fix that passes
        tests but changes API semantics, a regression test that tests the wrong code path,
        or a similar vulnerability in an adjacent module. A bad verification either rubber-
        stamps everything with "looks good" or raises false concerns about style and naming
        that do not affect correctness or safety.
    output_artifacts:
      - name: verdict
        path: .wave/output/verdict.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .wave/contracts/verification-criteria.md
        source: .wave/output/verdict.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: rework
        rework_step: fix-retry
