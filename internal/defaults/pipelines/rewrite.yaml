kind: WavePipeline
metadata:
  name: rewrite
  description: "Analyze and rewrite poorly documented issues"
  release: true

input:
  source: cli
  example: "re-cinq/wave 42 or https://github.com/re-cinq/wave/issues/42"
  schema:
    type: string
    description: "Repository with optional issue number, or full issue URL"

requires:
  tools:
    - "{{ forge.cli_tool }}"

steps:
  - id: scan-and-score
    persona: "{{ forge.prefix }}-analyst"
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        You are working on a **{{ forge.type }}** repository. Use the **{{ forge.cli_tool }}** CLI.

        Input: {{ input }}

        Step 1: Parse the input format.
        - If URL → extract <REPO> and <NUM>
          - GitHub: https://github.com/OWNER/REPO/issues/NUM
          - GitLab: https://gitlab.com/OWNER/REPO/-/issues/NUM
          - Bitbucket: https://bitbucket.org/WORKSPACE/REPO/issues/NUM
          - Gitea: https://gitea.example.com/OWNER/REPO/issues/NUM
        - If "owner/repo NUM" → extract <REPO> and <NUM>
        - If "owner/repo" alone → batch mode, use {{ input }} as <REPO>

        Step 2: Fetch issues via the appropriate CLI.

        **GitHub**:
        - Single: gh issue view <NUM> --repo <REPO> --json number,title,body,labels,url
        - Batch: gh issue list --repo <REPO> --limit 10 --json number,title,body,labels,url

        **GitLab**:
        - Single: glab issue view <NUM> --repo <REPO> --output json
        - Batch: glab issue list --repo <REPO> --per-page 10 --output json

        **Bitbucket**:
        - Single:
          curl -s -H "Authorization: Bearer $BB_TOKEN" \
            "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues/NUM" \
            | jq '{id, title, content: .content.raw, kind, url: .links.html.href}'
        - Batch:
          curl -s -H "Authorization: Bearer $BB_TOKEN" \
            "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues?pagelen=10" \
            | jq '[.values[] | {id, title, content: .content.raw, kind, url: .links.html.href}]'

        **Gitea**:
        - Single: tea issues view <NUM> --repo <REPO> --output json
        - Batch: tea issues list --repo <REPO> --limit 10 --output json

        IMPORTANT: If a specific issue number was parsed from the input but the fetch
        fails (not found, permissions error), STOP. Output JSON with repository set
        to <REPO>, issues_to_enhance as empty array, and total_to_enhance: 0.
        Do NOT fall back to batch mode when a specific issue was requested.

        Step 3: Score each issue quality (0-100) on title clarity, description completeness, labels, and acceptance criteria.

        Note: Bitbucket uses "kind" (bug/enhancement/proposal/task) instead of labels.
        Map labels to appropriate kind values when working with Bitbucket.

        Step 4: For issues scoring below 70, create an enhancement plan with:
        - suggested_title, body_template (preserving original content), suggested_labels, enhancements list

        Output JSON with repository (owner/repo string), issues_to_enhance array, and total_to_enhance.
    output_artifacts:
      - name: enhancement_plan
        path: .wave/artifact.json
        type: json
        required: true
    retry:
      max_attempts: 1
    handover:
      contract:
        type: json_schema
        schema_path: .wave/contracts/enhancement-plan.schema.json
        validate: true
        must_pass: true
        allow_recovery: true
        recovery_level: progressive
        progressive_validation: false

  - id: apply-enhancements
    persona: "{{ forge.prefix }}-enhancer"
    dependencies: [scan-and-score]
    memory:
      inject_artifacts:
        - step: scan-and-score
          artifact: enhancement_plan
          as: plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        You are working on a **{{ forge.type }}** repository. Use the **{{ forge.cli_tool }}** CLI.

        Read the "repository" field from the plan artifact to get <REPO>.

        For each issue in issues_to_enhance, apply the enhancements:

        **GitHub**:
        1. Apply title: gh issue edit <NUM> --repo <REPO> --title 'suggested_title'
        2. Apply body — write to temp file first, then apply:
           cat > /tmp/issue-body.md <<'BODY_EOF'
           <body_template content>
           BODY_EOF
           gh issue edit <NUM> --repo <REPO> --body-file /tmp/issue-body.md
        3. Add labels: gh issue edit <NUM> --repo <REPO> --add-label "label1,label2"
        4. Capture URL: gh issue view <NUM> --repo <REPO> --json url --jq .url

        **GitLab**:
        1. Apply title: glab issue update <NUM> --repo <REPO> --title "suggested_title"
        2. Apply body:
           cat > /tmp/issue-body.md <<'BODY_EOF'
           <body_template content>
           BODY_EOF
           glab issue update <NUM> --repo <REPO> --description "$(cat /tmp/issue-body.md)"
        3. Add labels: glab issue update <NUM> --repo <REPO> --label "label1,label2"
        4. Capture URL: glab issue view <NUM> --repo <REPO> --output json | jq -r '.web_url'

        **Bitbucket**:
        1. Write the update payload to a temp file:
           cat > /tmp/bb-payload.json << 'EOF'
           {"title":"suggested_title","content":{"raw":"body_template","markup":"markdown"},"kind":"appropriate_kind"}
           EOF
        2. Apply the update via PUT:
           curl -s -X PUT -H "Authorization: Bearer $BB_TOKEN" -H "Content-Type: application/json" \
             -d @/tmp/bb-payload.json \
             "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues/NUM" \
             | jq '{id, title, state, kind}'
        3. Verify the update by re-fetching:
           curl -s -H "Authorization: Bearer $BB_TOKEN" \
             "https://api.bitbucket.org/2.0/repositories/WORKSPACE/REPO/issues/NUM" \
             | jq '{id, title, url: .links.html.href}'

        Note: Bitbucket uses "kind" (bug/enhancement/proposal/task) instead of labels.
        Map any suggested_labels to the appropriate kind value in the PUT payload.

        **Gitea**:
        1. Apply title: tea issues edit <NUM> --repo <REPO> --title "suggested_title"
        2. Apply body:
           cat > /tmp/issue-body.md <<'BODY_EOF'
           <body_template content>
           BODY_EOF
           tea issues edit <NUM> --repo <REPO> --body "$(cat /tmp/issue-body.md)"
        3. Add labels: tea issues edit <NUM> --repo <REPO> --labels "label1,label2"
        4. Capture URL: tea issues view <NUM> --repo <REPO> --output json | jq -r '.html_url'

        Output JSON with enhanced_issues (issue_number, success, changes_made, url),
        total_attempted, total_successful.
    output_artifacts:
      - name: enhancement_results
        path: .wave/artifact.json
        type: json
        required: true
    outcomes:
      - type: issue
        extract_from: .wave/artifact.json
        json_path: .enhanced_issues[*].url
        label: "Enhanced Issue"
    retry:
      max_attempts: 1
    handover:
      contract:
        type: json_schema
        schema_path: .wave/contracts/enhancement-results.schema.json
        validate: true
        must_pass: true
        allow_recovery: true
        recovery_level: progressive
        progressive_validation: false
