kind: WavePipeline
metadata:
  name: ops-pr-review
  description: "Pull request code review with automated security and quality analysis"
  release: true

chat_context:
  artifact_summaries:
    - diff
    - security
    - quality
    - verdict
  suggested_questions:
    - "What issues were found in the review?"
    - "Are there any blocking concerns that must be addressed before merging?"
    - "What should be fixed before the next review cycle?"
  focus_areas:
    - "Review findings and severity"
    - "Code quality and maintainability"
    - "Security concerns and vulnerabilities"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  example: "https://github.com/owner/repo/pull/42"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: diff-analysis
    persona: navigator
    contexts: [execution]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        Analyze the code changes for: {{ input }}

        ## Step 1: Extract PR Metadata

        First, fetch PR metadata to populate the `pr_metadata` field in the output:
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} view {{ input }} --json number,headRefName,baseRefName,url
        ```
        Extract the number, url, headRefName (→ head_branch), and baseRefName (→ base_branch).

        ## Step 2: Checkout the PR Branch

        Checkout the PR's head branch to ensure you analyze the correct code:
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} checkout {{ input }}
        ```

        ## Step 3: Analyze Changes

        1. Identify all modified files and their purposes
        2. Map the change scope (which modules/packages affected)
        3. Find related tests that should be updated
        4. Check for breaking API changes

        Produce a structured result matching the contract schema.
        The `pr_metadata` field must contain the PR number, URL, head branch, and base branch.
    output_artifacts:
      - name: diff
        path: .wave/output/diff-analysis.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/diff-analysis.json
        schema_path: .wave/contracts/diff-analysis.schema.json
        on_failure: retry

  - id: security-review
    persona: reviewer
    contexts: [security]
    dependencies: [diff-analysis]
    memory:
      inject_artifacts:
        - step: diff-analysis
          artifact: diff
          as: changes
    exec:
      type: prompt
      source: |
        Security review of the PR changes.

        Check for:
        1. SQL injection, XSS, CSRF vulnerabilities
        2. Hardcoded secrets or credentials
        3. Insecure deserialization
        4. Missing input validation
        5. Authentication/authorization gaps
        6. Sensitive data exposure

        Output findings with severity (CRITICAL/HIGH/MEDIUM/LOW).
    output_artifacts:
      - name: security
        path: .wave/output/security-review.md
        type: markdown
    handover:
      contract:
        type: llm_judge
        source: .wave/output/security-review.md
        model: cheapest
        criteria:
          - "Identifies injection vulnerabilities (SQL, command, XSS) if present in the diff"
          - "Checks for hardcoded credentials or secrets"
          - "Assesses authentication and authorization correctness"
          - "Findings include severity levels and specific file references"
        threshold: 0.75
        on_failure: continue

  - id: quality-review
    persona: reviewer
    contexts: [validation]
    dependencies: [diff-analysis]
    memory:
      inject_artifacts:
        - step: diff-analysis
          artifact: diff
          as: changes
    exec:
      type: prompt
      source: |
        Quality review of the PR changes.

        Check for:
        1. Error handling completeness
        2. Edge cases not covered
        3. Code duplication
        4. Naming consistency
        5. Missing or inadequate tests
        6. Performance implications
        7. Documentation gaps

        Output findings with severity and suggestions.
    output_artifacts:
      - name: quality
        path: .wave/output/quality-review.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/quality-review.md

  - id: summary
    persona: summarizer
    model: cheapest
    dependencies: [security-review, quality-review]
    memory:
      inject_artifacts:
        - step: security-review
          artifact: security
          as: security_findings
        - step: quality-review
          artifact: quality
          as: quality_findings
    exec:
      type: prompt
      source: |
        Synthesize the review findings into a final verdict.

        Produce a structured JSON result matching the contract schema.

        Use APPROVE only when there are no critical or major issues.
        Use REQUEST_CHANGES when there are blocking issues that must be fixed.
        Use COMMENT for non-blocking observations.
        Use REJECT only for fundamental design problems.
    output_artifacts:
      - name: verdict
        path: .wave/output/review-verdict.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .wave/output/review-verdict.json
        schema_path: .wave/contracts/shared-review-verdict.schema.json
        on_failure: skip

  - id: publish
    persona: "{{ forge.type }}-commenter"
    dependencies: [summary]
    memory:
      inject_artifacts:
        - step: summary
          artifact: verdict
          as: review_summary
        - step: diff-analysis
          artifact: diff
          as: pr_context
    exec:
      type: prompt
      source: |
        Post the code review as a PR comment.

        1. Read the `review_summary` artifact — it contains the structured review verdict
        2. Read the `pr_context` artifact to get the PR number for the comment command
        3. Format the review verdict into a well-structured, human-readable PR comment
        4. Post it using: {{ forge.cli_tool }} {{ forge.pr_command }} comment <PR_NUMBER> --body-file /tmp/pr-review-comment.md

    output_artifacts:
      - name: publish-result
        path: .wave/output/publish-result.json
        type: json
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/publish-result.json
        schema_path: .wave/contracts/gh-pr-comment-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: url
        extract_from: .wave/output/publish-result.json
        json_path: .comment_url
        label: "Review Comment"
