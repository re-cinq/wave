kind: WavePipeline
metadata:
  name: impl-issue-core
  description: "Core implementation pipeline — assess, plan, implement. No PR creation. For use in composition pipelines."
  release: false

chat_context:
  artifact_summaries:
    - assessment
    - impl-plan
  suggested_questions:
    - "Would you like to review the implementation changes?"
    - "Are there any failing tests to investigate?"
  focus_areas:
    - "Code changes and implementation quality"
    - "Test results and coverage"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  schema:
    type: string
    description: "GitHub repository and issue number"
  example: "re-cinq/wave 42"

steps:
  - id: fetch-assess
    persona: implementer
    contexts: [configuration]
    model: cheapest
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/fetch-assess.md
    output_artifacts:
      - name: assessment
        path: .wave/output/issue-assessment.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/issue-assessment.json
        schema_path: .wave/contracts/issue-assessment.schema.json
        must_pass: true
        on_failure: retry

  - id: plan
    persona: implementer
    dependencies: [fetch-assess]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
      base: main
    exec:
      type: prompt
      source_path: .wave/prompts/implement/plan.md
    output_artifacts:
      - name: impl-plan
        path: .wave/output/impl-plan.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .wave/output/impl-plan.json
        schema_path: .wave/contracts/issue-impl-plan.schema.json
        must_pass: true
        on_failure: retry

  - id: implement
    persona: craftsman
    contexts: [execution, delivery]
    thread: impl
    dependencies: [plan]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
        - step: plan
          artifact: impl-plan
          as: impl_plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/implement.md
    retry:
      policy: aggressive
      max_attempts: 3
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer
