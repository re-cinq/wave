kind: WavePipeline
metadata:
  name: audit-dead-code-issue
  description: >-
    Scan the codebase for dead code (unused exports, unreachable branches,
    orphaned files, stale tests, commented-out blocks) and create a GitHub
    issue with a structured task list of findings. Use this for periodic
    hygiene checks when you want a tracked issue rather than an immediate PR.
    Each finding includes confidence level, location, and suggested action.
  release: false

requires:
  tools:
    - gh

skills:
  - software-design

input:
  source: cli
  type: string
  example: "scan all packages for dead code and report findings"

chat_context:
  artifact_summaries:
    - findings
    - issue-result
  suggested_questions:
    - "How many dead code items were found?"
    - "Which findings are highest confidence?"
    - "Was the GitHub issue created successfully?"
  focus_areas:
    - "Dead code findings by type and confidence"
    - "Issue creation status"

pipeline_outputs:
  findings:
    step: create-issue
    artifact: issue-result
    type: findings_report

steps:
  - id: scan
    persona: navigator
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Perform a comprehensive scan for dead or redundant code across the codebase, producing verified findings that will be formatted into a GitHub issue with a structured task list. Unlike the audit-dead-code pipeline (which removes code directly), this pipeline creates a trackable issue for human-driven remediation. The findings must be accurate enough to serve as a checklist that developers can work through.

        ## Context

        This is the first step of a three-step pipeline (scan, compose-report, create-issue). The compose-report step will format these findings as a GitHub-ready markdown task list. The create-issue step will publish it as a tracked issue. Because the issue will be used as a work-tracking artifact, findings should include actionable detail: what to remove, where it is, and whether it is safe to remove without further investigation.

        Scope: {{ input }}

        If the scope is empty, scan all packages under internal/ and cmd/. If a specific directory or description is provided, focus the scan accordingly but verify cross-references against the full codebase.

        ## Requirements

        Scan systematically for each of these dead code categories:

        1. **Unused exports**: For every exported function, type, constant, or variable in each package within scope, search the entire codebase for references outside the declaring package. Use Grep with exact symbol names. A symbol is dead if zero external references exist after verification.

        2. **Unreachable code**: Search for code after unconditional return, panic(), or os.Exit() statements. Identify switch/select cases that can never be reached. Look for if-else branches guarded by constant conditions that always evaluate the same way.

        3. **Orphaned files**: Identify source files whose module or package is never imported by any other file in the project. Also check for non-source files (configs, scripts) not referenced from any source code.

        4. **Redundant code**: Find duplicate functions with identical or near-identical signatures and bodies across different packages. Identify wrapper functions that add no value. Look for copy-paste blocks of 10+ lines appearing in multiple locations.

        5. **Stale tests**: Find test functions that reference symbols that no longer exist. Identify tests with t.Skip() that reference resolved issues. Look for tests that assert nothing meaningful.

        6. **Unused dependencies**: Check for unused imports where the side effect is no longer needed. Check the project's dependency manifest for dependencies not imported anywhere in the codebase.

        7. **Commented-out code**: Search for blocks of 3+ consecutive commented lines containing code syntax. These should be deleted since git preserves history.

        8. **Duplicate signatures**: Find functions with identical signatures (same name, same parameter types, same return types) across different packages that could be consolidated into a shared location.

        ### Verification Protocol

        For each candidate finding, verify it is truly dead:
        - Grep for all references across the entire codebase (internal/, cmd/, and any other source directories)
        - Check for reflect-based or string-based usage (search for the symbol name as a string literal)
        - Check if the symbol exists to satisfy an interface (find the interface definition and verify)
        - Check for build tag conditional compilation or platform-specific build constraints
        - Assign confidence: HIGH (zero references, thorough search), MEDIUM (references only in tests, or indirect usage patterns)

        Only include findings with HIGH or MEDIUM confidence. Skip LOW confidence candidates entirely.

        ## Constraints and Anti-patterns

        - Do NOT include findings where the symbol is used by an interface implementation, even if the interface itself has few callers.
        - Do NOT report initialization functions, entry points, or standard interface method implementations as dead code.
        - Do NOT modify any files. The workspace is read-only.
        - Do NOT report more than 50 findings. If more candidates exist, keep the highest-confidence ones and note the truncation.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good scan produces a task list where a developer can confidently act on HIGH-confidence, safe_to_remove=true items without further research, and knows exactly what additional investigation is needed for MEDIUM-confidence items. Each finding includes the specific Grep pattern used and its output (or absence thereof). A bad scan reports items without verification, mixes low-confidence guesses with confirmed findings, or provides descriptions too vague to act on.
    output_artifacts:
      - name: findings
        path: .agents/output/findings.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/findings.json
        schema_path: .agents/contracts/shared-findings.schema.json
        on_failure: skip

  - id: compose-report
    persona: navigator
    model: cheapest
    dependencies: [scan]
    memory:
      inject_artifacts:
        - step: scan
          artifact: findings
          as: findings
    exec:
      type: prompt
      source: |
        ## Objective

        Transform the structured JSON scan findings into a polished, GitHub-ready markdown report suitable for publishing as a trackable issue. The report must organize findings into a clear task list that developers can work through checkbox by checkbox, with enough context per item to act without re-running the scan. If no findings exist, produce a clean-bill-of-health message instead.

        ## Context

        This is the second step of a three-step pipeline (scan, compose-report, create-issue). The scan step has produced findings injected as the "findings" artifact. The create-issue step will publish this report as a GitHub issue body. The report format must be valid GitHub-flavored markdown, with task checkboxes (`- [ ]`) that become interactive in the GitHub issue interface.

        Read the injected findings artifact first. Parse the findings array and summary statistics.

        ## Requirements

        ### Handle Zero Findings

        If the scan found zero findings (empty findings array or total_findings == 0):
        - Write a short "No dead code found" message as the report content
        - Also produce an issue result JSON with skipped=true and reason="clean"
        - Exit early; do not compose the full report structure

        ### Compose the Full Report

        If findings exist, produce the report as markdown with these sections:

        1. **Header and metadata**: Report title, scan date (from the findings timestamp), and total finding count.

        2. **Summary by Type**: A markdown table counting findings by category (unused_export, unreachable, orphaned, redundant, stale_test, unused_dep, commented_out, duplicate_signature). Omit rows for categories with zero findings.

        3. **Summary by Suggested Action**: A markdown table counting findings by recommended action (remove, consolidate, investigate). This helps developers estimate the work breakdown.

        4. **Summary by Confidence**: A markdown table showing high vs medium confidence counts. This helps prioritize which items to tackle first.

        5. **Task List**: The core of the report. For each finding, sorted by confidence (HIGH first, then MEDIUM), then by severity (high first, then medium, then low), render a task checkbox line:
           ```
           - [ ] **[DC-001]** (`type`, `confidence`) `file:line` -- description
             Action: `suggested_action` | Safe to remove: `safe_to_remove`
           ```
           The checkbox format (`- [ ]`) is critical because GitHub renders these as interactive checkboxes in issue bodies, allowing developers to track progress.

        6. **Footer**: Attribution line with link to Wave.

        ### Formatting Rules

        - Use exact finding IDs (DC-001, DC-002, etc.) consistently so they can be referenced in commits and PRs
        - Include the file:line location for every finding so developers can navigate directly to the code
        - Keep each task list item to 2 lines maximum (title line + detail line)
        - Use backtick formatting for code identifiers (type names, file paths, function names)
        - Ensure the markdown renders correctly in GitHub (no raw HTML, no unsupported syntax)

        ## Constraints and Anti-patterns

        - Do NOT rewrite or editorialize the findings. Use the descriptions from the scan results verbatim.
        - Do NOT add findings that were not in the scan results.
        - Do NOT omit findings from the task list. Every finding in the scan results must appear in the report.
        - Do NOT use emoji or decorative formatting. Keep the report professional and scannable.
        - Do NOT nest task lists. Each finding gets a single top-level checkbox.

        ## Output Format

        The report must be valid GitHub-flavored markdown that renders correctly when used as a GitHub issue body.

        ## Quality Bar

        A good report allows a developer to open the GitHub issue, scan the summary tables to understand the scope, then work through the task list top-to-bottom, checking off items as they are addressed. Each item has enough context (file:line, action, safety assessment) to act immediately. A bad report buries findings in prose paragraphs, omits file locations, or uses a format that does not render as interactive checkboxes in GitHub.
    output_artifacts:
      - name: report
        path: .agents/output/report.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/report.md

  - id: create-issue
    persona: craftsman
    model: cheapest
    dependencies: [compose-report]
    memory:
      inject_artifacts:
        - step: scan
          artifact: findings
          as: findings
        - step: compose-report
          artifact: report
          as: report
    exec:
      type: prompt
      source: |
        ## Objective

        Publish the dead code report as a GitHub issue, making the findings trackable and assignable. The issue should have a descriptive title including the finding count, the code-quality label (if available), and the full report as the issue body. If no findings were found (clean codebase), skip issue creation entirely and record the skip in the result JSON.

        ## Context

        This is the third and final step of the audit-dead-code-issue pipeline (scan, compose-report, create-issue). The compose-report step has produced a markdown report injected as the "report" artifact, and the scan findings are injected as the "findings" artifact. This step publishes the report to GitHub as a trackable issue and captures the result for pipeline outcomes.

        Read the injected report artifact first. Check whether it indicates a clean scan (no findings) or contains the full task list report.

        ## Requirements

        ### Handle Clean Scan

        If the report content indicates no dead code was found (contains "No dead code found" or similar clean-bill-of-health message):
        - Do NOT create a GitHub issue
        - Produce the result JSON with skipped=true and reason="clean"
        - Exit early

        ### Detect Repository

        Run: `{{ forge.cli_tool }} repo view --json nameWithOwner --jq .nameWithOwner`

        Store the result for inclusion in the result JSON.

        ### Create the Issue

        Read the findings artifact to get the total finding count. Use this to compose a descriptive issue title:

        ```bash
        {{ forge.cli_tool }} issue create \
          --title "chore: dead code report (N findings)" \
          --body-file .agents/artifacts/report \
          --label "code-quality"
        ```

        Replace N with the actual finding count from the scan results.

        If the `code-quality` label does not exist on the repository, retry without the label:
        ```bash
        {{ forge.cli_tool }} issue create \
          --title "chore: dead code report (N findings)" \
          --body-file .agents/artifacts/report
        ```

        If the forge CLI command fails for any other reason (network error, authentication issue), log the error and report it in the result JSON. Do not retry indefinitely.

        ### Capture Result

        Parse the output of the issue create command to extract the issue URL and number. Produce a JSON status report matching the dead-code-issue-result contract schema. Include:
        - `issue.url`: the full GitHub issue URL
        - `issue.number`: the issue number
        - `issue.title`: the issue title as created
        - `finding_count`: the total number of findings from the scan
        - `repository`: the owner/repo string
        - `skipped`: false (issue was created)
        - `created_at`: ISO 8601 timestamp

        ## Constraints and Anti-patterns

        - Do NOT modify the report content. Publish it exactly as the compose-report step produced it.
        - Do NOT create duplicate issues. If running this pipeline multiple times, the issue will have a different title each time (due to pipeline_id), but the content may overlap. This is acceptable; deduplication is the user's responsibility.
        - Do NOT add assignees or milestones. The issue is created for triage; assignment is a human decision.
        - Do NOT include Co-Authored-By or AI attribution in the issue.
        - Do NOT spawn Task subagents. Work directly in the main context.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good issue creation step produces an issue with a clear, count-inclusive title that communicates the scope at a glance, the full report as the body with interactive checkboxes, and a result JSON that downstream steps or outcomes can extract the issue URL from. A bad issue creation step creates an issue with a generic title, loses the report formatting, or fails silently without recording the failure in the result JSON.
    output_artifacts:
      - name: issue-result
        path: .agents/output/issue-result.json
        type: json
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/issue-result.json
        schema_path: .agents/contracts/dead-code-issue-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: issue
        extract_from: .agents/output/issue-result.json
        json_path: .issue.url
        label: "Dead Code Issue"
