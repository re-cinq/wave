kind: WavePipeline
metadata:
  name: impl-research
  description: "Research a GitHub issue, implement the solution, then review the PR"
  category: composition
  release: true

input:
  source: cli
  example: "re-cinq/wave 42"
  schema:
    type: string
    description: "GitHub issue reference (owner/repo number)"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[impl-research] started run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[impl-research] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: research
    pipeline: plan-research
    input: "{{input}}"

  - id: implement
    dependencies: [research]
    pipeline: impl-speckit
    input: "{{input}}"

  - id: review
    dependencies: [implement]
    pipeline: ops-pr-review
    input: "{{input}}"
