kind: WavePipeline
metadata:
  name: ops-pr-review-core
  description: >-
    Core pull request review building block that performs diff analysis, security
    scanning, code quality assessment, and slop detection, then synthesizes a
    verdict. Does not post comments or interact with the forge. Designed for
    embedding in composition pipelines (such as ops-pr-review) that add their
    own publishing step.
  release: false

chat_context:
  artifact_summaries:
    - diff
    - security
    - quality
    - slop
    - verdict
  suggested_questions:
    - "What issues were found in the review?"
    - "Are there any blocking concerns that must be addressed before merging?"
  focus_areas:
    - "Review findings and severity"
    - "Code quality and maintainability"
    - "Security concerns and vulnerabilities"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  type: pr_ref
  example: "https://github.com/owner/repo/pull/42"

pipeline_outputs:
  verdict:
    step: summary
    artifact: verdict
    type: findings_report
  diff:
    step: diff-analysis
    artifact: diff
    type: findings_report

steps:
  - id: diff-analysis
    persona: navigator
    contexts: [execution]
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Analyze all code changes in a pull request to produce a structured diff analysis
        that the security-review and quality-review steps will consume. You must identify
        every modified file, map which modules and packages are affected, determine
        whether related tests exist and need updating, and flag potential breaking API
        changes. This is the core review variant — it produces a verdict artifact but
        does NOT publish comments to the forge. Composition pipelines handle publishing.

        PR: {{ input }}

        ## Context

        This is the first step of the ops-pr-review-core pipeline. No prior artifacts
        exist. You have read-only access to the project directory and access to the forge
        CLI. The security-review and quality-review steps will receive your output as
        their primary input. Completeness here directly determines review quality
        downstream.

        ## Requirements

        ### Step 1: Extract PR Metadata

        Fetch PR metadata:
        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} view {{ input }} --json number,headRefName,baseRefName,url
        ```
        Extract: number, URL, headRefName (map to `head_branch`), baseRefName (map to
        `base_branch`). These are required by the contract schema.

        ### Step 2: Checkout the PR Branch

        ```bash
        {{ forge.cli_tool }} {{ forge.pr_command }} checkout {{ input }}
        ```
        Analyze the actual head branch code, not the base.

        ### Step 3: Perform Structural Analysis

        Run `git diff <base_branch>...HEAD` and for each changed file:
        1. **Classify the change**: new, modified, deleted, renamed.
        2. **Identify purpose**: source, test, config, CI, docs, schema.
        3. **Map the package/module**: which package does this file belong to?
        4. **Count magnitude**: lines added, lines removed, net change.
        5. **Check test coverage**: does a corresponding test file exist? Was it modified?
        6. **Detect breaking changes**: renamed/removed exports, changed signatures,
           modified interfaces, removed struct fields.
        7. **Flag cross-cutting concerns**: error handling patterns, logging, security-
           sensitive paths, configuration changes.

        ### Step 4: Produce Output

        Produce output matching the contract schema. Include `pr_metadata` with number,
        URL, head branch, and base branch.

        ## Constraints and Anti-patterns

        - Do NOT evaluate code quality or security. Structural analysis only.
        - Do NOT modify any files. Read-only step.
        - Do NOT skip any file type. Every changed file must appear in the output.
        - Do NOT guess package membership. Read actual import paths.
        - Avoid flat file lists. Group by package/module for context.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good analysis lets reviewers understand PR scope in 30 seconds: file count,
        affected packages, test coverage, and breaking changes. A bad analysis is a
        flat list without classification or misses test coverage gaps.
    output_artifacts:
      - name: diff
        path: .agents/output/diff-analysis.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/diff-analysis.json
        schema_path: .agents/contracts/diff-analysis.schema.json
        on_failure: warn

  - id: security-review
    persona: reviewer
    thread: review-security
    model: balanced
    contexts: [security]
    dependencies: [diff-analysis]
    memory:
      inject_artifacts:
        - step: diff-analysis
          artifact: diff
          as: changes
    exec:
      type: prompt
      source: |
        ## Objective

        Perform a focused security review of the code changes in this pull request.
        Identify vulnerabilities, credential exposure, injection risks, authentication
        gaps, and unsafe data handling. Every finding must reference a specific file and
        line, include a severity rating, and provide a concrete remediation. This is the
        core variant — the verdict is consumed by composition pipelines, not posted
        directly.

        ## Context

        The injected `changes` artifact contains the structured diff analysis with every
        changed file, its classification, package membership, and test coverage status.
        Focus your review on changed files only.

        ## Requirements

        For each changed file, check these security concerns. Read actual source code,
        not just the diff — vulnerabilities can exist in surrounding context.

        1. **Injection vulnerabilities**: SQL injection (string concatenation in queries),
           command injection (unsanitized input in exec calls), XSS (unescaped user input
           in templates), path traversal (user-controlled file paths).

        2. **Hardcoded secrets**: API keys, passwords, tokens, private keys in source.
           Check string literals, constants, and config defaults. Check test files too.

        3. **Insecure deserialization**: Unmarshaling untrusted input without validation,
           unsafe deserializers on user input, deserializing into interface{} types.

        4. **Missing input validation**: External input handlers without type, length,
           range, or format validation. Inputs flowing into security-sensitive operations.

        5. **Authentication/authorization gaps**: Missing auth on new endpoints, incorrect
           permission checks, token handling without expiry, session issues.

        6. **Sensitive data exposure**: Logging credentials or PII, error messages leaking
           internal state, debug endpoints, over-broad response bodies.

        7. **Cryptographic issues**: Deprecated algorithms (MD5, SHA1 for security), weak
           key lengths, hardcoded IVs/salts, missing TLS verification.

        For each finding, produce a structured entry with: severity, file path,
        line number (or line range), a clear description of the vulnerability and
        its exploitation scenario, and a concrete remediation recommendation. Be specific — "sanitize input" is not sufficient;
        "use parameterized queries via sql.DB.Query instead of string concatenation in
        handler.go:45" is.

        If no security issues are found, explicitly state that the changes appear secure.
        List every security category you checked so the reader knows the review was
        thorough. A clean security review with documented checks is a valuable finding —
        it is not a failure to find nothing.

        ## Constraints and Anti-patterns

        - Do NOT flag style or quality issues. This is a security-focused review only.
          Code quality is covered by the quality-review step.
        - Do NOT inflate severity. A missing Content-Type header is LOW, not HIGH. A
          missing CSRF token on a state-changing endpoint is HIGH.
        - Do NOT skip test files. Test files can contain real credentials accidentally
          committed, or reveal security assumptions that are wrong.
        - Do NOT report pre-existing vulnerabilities unless this PR makes them worse or
          more exploitable by changing the surrounding code.
        - Verify that flagged code actually handles untrusted input before calling it a
          vulnerability. Not every string concatenation is SQL injection — only those
          where the string comes from user input.
        - Do NOT flag standard library usage as insecure without evidence. For example,
          Go's html/template auto-escapes by default.

        ## Output Format

        Produce a markdown report with these sections:
        - **H2: Security Review Summary** — total finding count by severity, one-line
          verdict (e.g., "No critical vulnerabilities found; 2 medium-severity input
          validation gaps identified")
        - **H2: Findings** — one H3 per finding with severity, file, line, description,
          exploitation scenario, and remediation
        - **H2: Areas Checked** — bulleted list of every security category examined,
          even if no findings were produced in that category

        ## Quality Bar

        A good security review has zero false positives, catches real vulnerabilities
        with precise file/line references, provides actionable remediation suggestions,
        and documents what was checked even when clean. A bad security review flags every
        string concatenation as "possible injection" without verifying input sources,
        reports no findings without listing what was examined, or misses obvious issues
        like hardcoded tokens in test fixtures.
    output_artifacts:
      - name: security
        path: .agents/output/security-review.md
        type: markdown
    handover:
      contract:
        type: llm_judge
        source: .agents/output/security-review.md
        model: cheapest
        criteria:
          - "Identifies injection vulnerabilities (SQL, command, XSS) if present in the diff"
          - "Checks for hardcoded credentials or secrets"
          - "Assesses authentication and authorization correctness"
          - "Findings include severity levels and specific file references"
        threshold: 0.75
        on_failure: continue

  - id: quality-review
    persona: reviewer
    thread: review-quality
    model: balanced
    contexts: [validation]
    dependencies: [diff-analysis]
    memory:
      inject_artifacts:
        - step: diff-analysis
          artifact: diff
          as: changes
    exec:
      type: prompt
      source: |
        ## Objective

        Perform a code quality review of the changes in this pull request, focusing on
        error handling, edge cases, code duplication, naming consistency, test adequacy,
        performance, and documentation. Each finding must reference a specific file and
        line, include severity, and provide a concrete suggestion. This is the core
        variant — the verdict feeds composition pipelines, not direct forge comments.

        ## Context

        The injected `changes` artifact contains the structured diff analysis with every
        changed file, package membership, and test coverage status. Read this artifact
        first to understand scope.

        ## Requirements

        Examine each changed file across these quality dimensions. Read actual source
        code for context, not the diff in isolation.

        1. **Error handling**: Are all error returns checked? Are errors wrapped with
           context (`fmt.Errorf("doing X: %w", err)`)? Bare `return err` losing context?
           Silently swallowed errors (`_ = fn()`)? Appropriate panic/recover usage?

        2. **Edge cases**: Nil/null inputs, empty collections, zero values, negative
           numbers, concurrent access, context cancellation, network timeouts. For each
           edge case found, note whether a test covers it.

        3. **Code duplication**: Copy-pasted blocks that should be extracted. Check
           within PR and against existing code. Minor boilerplate (2-3 lines) is
           acceptable; significant logic duplication (10+ lines) should be flagged.

        4. **Naming consistency**: Do new identifiers follow project conventions? Check
           functions, variables, constants, packages against existing code. Flag
           inconsistencies in casing, abbreviations, or naming patterns.

        5. **Test adequacy**: For each changed source file, do tests exist? Do they cover
           new/modified paths? Flag functions with no coverage and tests that only cover
           the happy path.

        6. **Performance**: Large allocations in hot paths, unbounded loops, O(n^2) on
           large inputs, missing timeouts, unnecessary serialization cycles.

        7. **Documentation**: New exports documented? Complex algorithms explained?
           Non-obvious decisions commented? Stale comments that no longer match code?

        For each finding, produce a structured entry with: severity (HIGH for
        correctness risks, MEDIUM for maintainability concerns, LOW for style or
        best-practice suggestions), file path, line number, a clear description of the
        issue and its potential impact, and a concrete improvement suggestion. Be
        specific — "add error handling" is not sufficient; "wrap the error from
        os.ReadFile at config.go:67 with fmt.Errorf to include the file path in the
        error message" is.

        ## Constraints and Anti-patterns

        - Do NOT duplicate findings from the security review. Quality and security are
          separate concerns. If something is a security vulnerability, the security
          review will catch it.
        - Do NOT flag subjective style preferences (tab vs spaces, brace placement)
          unless the project has a documented style guide that is being violated.
        - Do NOT flag auto-generated files (protobuf stubs, swagger codegen, etc.) for
          quality issues. These are not meant to be hand-maintained.
        - Do NOT review files that were not changed by this PR. Pre-existing quality
          issues are out of scope.
        - Focus on findings that affect correctness, maintainability, or performance.
          Cosmetic preferences without functional impact should be omitted or marked as
          LOW severity.
        - Do NOT flag every function without a doc comment. Focus on exported functions
          with non-obvious behavior.

        ## Output Format

        Produce a markdown report with these sections:
        - **H2: Quality Review Summary** — total finding count by severity, one-line
          quality assessment
        - **H2: Findings** — one H3 per finding with severity, file, line, description,
          impact, and suggestion
        - **H2: Test Coverage Assessment** — for each changed source file, note whether
          tests exist, whether they were updated in this PR, and any coverage gaps

        ## Quality Bar

        A good quality review catches issues that would cause maintenance headaches or
        runtime failures, provides actionable suggestions with specific code references,
        and correctly identifies test coverage gaps. The findings should be things a
        senior developer would flag in a real code review. A bad quality review nitpicks
        formatting and comment style, flags every missing doc comment as a documentation
        gap, or misses genuine error handling problems while fixating on variable naming.
    output_artifacts:
      - name: quality
        path: .agents/output/quality-review.md
        type: markdown
    handover:
      contract:
        type: agent_review
        persona: navigator
        criteria_path: .agents/contracts/quality-review-criteria.md
        source: .agents/output/quality-review.md
        model: cheapest
        token_budget: 8000
        timeout: 90s
        on_failure: continue

  - id: slop-review
    persona: reviewer
    thread: review-slop
    model: balanced
    contexts: [validation]
    dependencies: [diff-analysis]
    memory:
      inject_artifacts:
        - step: diff-analysis
          artifact: diff
          as: changes
    exec:
      type: prompt
      source: |
        ## Objective

        Perform a "slop review" of the PR changes — a focused check for code that is
        dead, duplicated, unfinished, or architecturally misplaced. This review targets
        the kind of low-quality code that accumulates when changes are made hastily or
        without full understanding of the existing architecture. The slop review is
        specifically looking for code that should not have been written, not code that
        was written badly (that is the quality review's job). This is the core variant —
        the findings feed into the summary step rather than being posted directly.

        ## Context

        The injected `changes` artifact contains the structured diff analysis from the
        diff-analysis step. Read this artifact to understand which files were changed and
        their package membership. Then read the actual source code to evaluate each
        concern.

        ## Requirements

        Examine each changed file and evaluate these slop indicators:

        1. **Dead code**: Functions, methods, constants, or variables added by this PR
           that are never called or referenced. Check both within the changed files and
           across the package. Exported symbols that are part of a public API may not
           have callers yet — flag these only if they appear to be orphaned (no tests,
           no documentation, no obvious future use).

        2. **Duplicate code**: Code in this PR that duplicates existing functionality
           elsewhere in the codebase. This is different from the quality review's
           duplication check — here you are looking for whole-function or whole-feature
           duplication, not just repeated code blocks. Did the author reimplement
           something that already exists in a utility package?

        3. **Unfinished features**: TODO comments, stub implementations, commented-out
           code, or feature flags that are never toggled. Code paths that handle one
           case but have an empty `else` or `default` branch. Functions that return
           hardcoded values where real logic should be.

        4. **Glue code and glue tests**: Adapter code or test wrappers that exist only
           to connect two things that should be connected more directly. Tests that test
           the glue rather than the actual behavior. Tests that mock so many dependencies
           that they test nothing real.

        5. **Architectural misfits**: Code placed in the wrong package or module. A
           handler function in a model package. Business logic in a transport layer.
           Database queries in an HTTP handler. Check against the project's package
           structure and naming conventions to identify misplacements.

        6. **Half-baked abstractions**: Interfaces with one implementation, generic
           frameworks used for one case, or abstraction layers that add complexity
           without enabling any actual variation. Premature generalization is slop.

        For each finding, record:
        - **Severity**: HIGH (will cause confusion or maintenance burden), MEDIUM
          (code smell that should be addressed), LOW (minor slop, acceptable for now)
        - **File and line**: exact location
        - **Description**: what the slop is and why it matters
        - **Suggestion**: what to do instead (remove, merge, relocate, simplify)

        ## Constraints and Anti-patterns

        - Do NOT duplicate quality or security findings. Slop review covers different
          concerns.
        - Do NOT flag intentional scaffolding or placeholder code if the PR description
          mentions it as work-in-progress.
        - Do NOT flag code as "dead" if it is exported and part of a public API — it may
          have external callers.
        - Do NOT report the absence of features as slop. Slop is about what IS there
          that should not be, not what is missing.
        - Avoid being overly aggressive. Not every abstraction is premature, and not
          every test helper is glue. Use judgment.

        ## Output Format

        Produce a markdown report with:
        - **H2: Slop Review Summary** — finding count by category, one-line assessment
        - **H2: Findings** — one H3 per finding with all fields
        - **H2: Architecture Observations** — notes on how the changes fit (or don't)
          into the existing codebase structure

        ## Quality Bar

        A good slop review catches code that will become a maintenance burden — dead
        functions nobody calls, duplicate logic that will drift out of sync, or code
        placed in the wrong layer. A bad slop review flags every utility function as
        "unnecessary abstraction" or every TODO as "unfinished feature" without
        understanding the project's development stage and conventions.
    output_artifacts:
      - name: slop
        path: .agents/output/slop-review.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/slop-review.md

  - id: summary
    persona: summarizer
    model: balanced
    dependencies: [security-review, quality-review, slop-review]
    memory:
      inject_artifacts:
        - step: security-review
          artifact: security
          as: security_findings
        - step: quality-review
          artifact: quality
          as: quality_findings
        - step: slop-review
          artifact: slop
          as: slop_findings
    exec:
      type: prompt
      source: |
        ## Objective

        Synthesize findings from three parallel review tracks (security, quality, and
        slop) into a single, coherent review verdict. Weigh findings by severity,
        deduplicate across review tracks, resolve contradictions, and produce a final
        recommendation. This is the core variant — the verdict JSON is consumed by
        composition pipelines (such as ops-pr-review) that handle their own publishing.
        No comments are posted to the forge in this step.

        ## Context

        Three artifacts are injected:
        - `security_findings`: Security review markdown with findings categorized by
          severity.
        - `quality_findings`: Quality review markdown with error handling, testing, and
          performance findings.
        - `slop_findings`: Slop review markdown with dead code, duplication, and
          architectural misfit findings.

        Read ALL three artifacts before forming a verdict.

        ## Requirements

        ### Step 1: Parse All Findings

        Extract every finding from each review artifact. For each, note its source
        (security, quality, or slop), severity, file, and description.

        ### Step 2: Deduplicate

        Check for findings that appear in multiple reviews (e.g., a missing input
        validation flagged by both security and quality). Keep the higher-severity
        version and note the sources.

        ### Step 3: Determine the Verdict

        Apply these decision rules strictly:

        - **APPROVE**: Use ONLY when there are zero CRITICAL or HIGH findings across all
          three reviews. MEDIUM and LOW findings alone do not block approval.
        - **REQUEST_CHANGES**: Use when there are HIGH findings that must be fixed before
          merge, but the overall approach is sound.
        - **COMMENT**: Use for PRs where all findings are MEDIUM or LOW and are
          non-blocking observations only.
        - **REJECT**: Use ONLY for fundamental design problems — the PR's approach is
          wrong, not just its implementation. This should be rare.

        ### Step 4: Compose the Verdict JSON

        Include:
        - `verdict`: APPROVE | REQUEST_CHANGES | COMMENT | REJECT
        - `summary`: 2-3 sentence overall assessment
        - `critical_findings`: array of CRITICAL findings
        - `major_findings`: array of HIGH findings
        - `minor_findings`: array of MEDIUM/LOW findings
        - `positive_notes`: what the PR does well (always at least one)

        ## Constraints and Anti-patterns

        - Do NOT approve a PR with CRITICAL findings present, regardless of other factors.
          A single CRITICAL finding is an automatic REQUEST_CHANGES at minimum.
        - Do NOT reject for implementation quality issues. REJECT is reserved exclusively
          for fundamental design problems where the approach is wrong, not just the
          implementation. Use REQUEST_CHANGES for fixable issues.
        - Do NOT add new findings in this step. Synthesize only what the review steps
          already found.
        - Do NOT inflate severity during synthesis. If a review rated a finding as MEDIUM,
          do not upgrade it to HIGH in the verdict.
        - Do NOT produce an empty `positive_notes` array. Every PR has something done
          right — clean commit messages, well-structured tests, clear naming, correct
          error handling. Find at least one genuine strength.
        - Do NOT produce a verdict that contradicts the findings. If all reviews are
          clean (no HIGH or CRITICAL findings), the verdict should be APPROVE or COMMENT,
          not REQUEST_CHANGES.

        ## Output Format

        Produce output matching the contract schema.

        ## Quality Bar

        A good verdict correctly reflects the severity distribution across all three
        reviews, provides a clear recommendation that matches the findings, and includes
        balanced commentary (issues AND strengths). A bad verdict contradicts the findings
        (approving despite critical issues, or rejecting over minor style concerns),
        ignores an entire review track, or produces a generic summary that could apply
        to any PR.
    output_artifacts:
      - name: verdict
        path: .agents/output/review-verdict.json
        type: json
    handover:
      contract:
        type: json_schema
        source: .agents/output/review-verdict.json
        schema_path: .agents/contracts/shared-review-verdict.schema.json
        on_failure: skip
