kind: WavePipeline
metadata:
  name: impl-review-loop
  description: "Self-correcting implementâ†’reviewâ†’fix loop until review passes"
  category: composition
  release: true

skills:
  - "{{ project.skill }}"
  - gh-cli

input:
  source: cli
  example: "https://github.com/owner/repo/issues/42"

steps:
  - id: implement-and-review
    pipeline: impl-issue
    input: "{{ input }}"
    loop:
      max_iterations: 3
      until: "{{ review.output.verdict == 'APPROVE' }}"
      steps:
        - id: review
          pipeline: ops-pr-review
          input: "{{ implement-and-review.output.pr_url }}"
