kind: WavePipeline
metadata:
  name: impl-review-loop
  description: >-
    Implement a GitHub issue, review the PR, and rework if needed in a closed
    loop. Chains impl-issue into ops-pr-review, then conditionally triggers
    rework and re-review when changes are requested. The loop terminates on
    approval, comment-only feedback, or after one rework cycle. Use this for
    hands-off issue-to-merge workflows.
  category: composition
  release: true

input:
  source: cli
  example: "https://github.com/owner/repo/issues/42"

steps:
  - id: implement
    pipeline: impl-issue-core
    input: "{{ input }}"

  - id: create-pr
    pipeline: wave-land
    input: "{{ input }}"
    dependencies: [implement]

  - id: review-fix
    dependencies: [create-pr]
    pipeline: ops-pr-review-core
    input: "{{ create-pr.output.pr_url }}"
    loop:
      max_iterations: 3
      until: "{{ review-fix.output.verdict == 'APPROVE' }}"
      steps:
        - id: fix
          pipeline: impl-issue-core
          input: "Fix based on review feedback: {{ review-fix.output.verdict }}"
        - id: re-review
          pipeline: ops-pr-review-core
          input: "{{ create-pr.output.pr_url }}"
