kind: WavePipeline
metadata:
  name: scope
  description: "Decompose an epic into well-scoped child issues"
  release: true

input:
  source: cli
  example: "re-cinq/wave 184"
  schema:
    type: string
    description: "Repository with epic issue number (e.g. 'owner/repo 42')"

requires:
  tools:
    - "{{ forge.cli_tool }}"

steps:
  - id: fetch-epic
    persona: "{{ forge.prefix }}-analyst"
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        MANDATORY: You MUST call the Bash tool. NEVER say the CLI tool is not installed without trying.

        You are working on a **{{ forge.type }}** repository. Use the **{{ forge.cli_tool }}** CLI tool.

        Input: {{ input }}

        Parse the input: extract the repo (first token) and the epic issue number (second token).

        Execute these commands using the Bash tool:

        1. Verify the CLI tool works:
           {{ forge.cli_tool }} --version

        2. Fetch the epic issue with full details.

           **GitHub**: gh issue view <NUMBER> --repo <REPO> --json number,title,body,labels,url,comments,author,state
           **GitLab**: glab issue view <NUMBER> --repo <REPO> --output json
           **Bitbucket**: curl -s -H "Authorization: Bearer $BB_TOKEN" "https://api.bitbucket.org/2.0/repositories/<WORKSPACE>/<REPO>/issues/<NUMBER>"
           **Gitea**: tea issues view <NUMBER> --repo <REPO> --output json

        3. List existing open issues to check for duplicates.

           **GitHub**: gh issue list --repo <REPO> --limit 50 --json number,title,labels,url
           **GitLab**: glab issue list --repo <REPO> --per-page 50 --output json
           **Bitbucket**: curl -s -H "Authorization: Bearer $BB_TOKEN" "https://api.bitbucket.org/2.0/repositories/<WORKSPACE>/<REPO>/issues?q=state=%22open%22&pagelen=50"
           **Gitea**: tea issues list --repo <REPO> --limit 50 --output json

        After getting REAL results from Bash, analyze the epic:
        - Determine if this is truly an epic/umbrella issue (contains multiple work items)
        - Identify the key themes and work areas
        - Estimate overall complexity
        - Count how many sub-issues should be created (3-10)
        - List existing issues to avoid creating duplicates
    output_artifacts:
      - name: epic_assessment
        path: .wave/artifact.json
        type: json
        required: true
    retry:
      max_attempts: 1
    handover:
      contract:
        type: json_schema
        schema_path: .wave/contracts/epic-assessment.schema.json
        validate: true
        must_pass: true
        allow_recovery: true
        recovery_level: progressive
        progressive_validation: false

  - id: scope-and-create
    persona: "{{ forge.prefix }}-scoper"
    dependencies: [fetch-epic]
    memory:
      inject_artifacts:
        - step: fetch-epic
          artifact: epic_assessment
          as: assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        CRITICAL: You MUST use the Bash tool for all commands. Do NOT generate fake output.

        You are working on a **{{ forge.type }}** repository. Use the **{{ forge.cli_tool }}** CLI.

        The assessment artifact contains the epic analysis. Use it to create well-scoped child issues.

        Input: {{ input }}
        Parse the repo from the input (first token).

        Step 1: Verify CLI works:
        {{ forge.cli_tool }} --version

        Step 2: For each planned sub-issue, write the body to a temp file and create the issue:

        **GitHub**:
        cat > /tmp/issue-body.md <<'ISSUE_EOF'
        <body content here>
        ISSUE_EOF
        gh issue create --repo <REPO> --title '<title>' --body-file /tmp/issue-body.md --label "<labels>"

        **GitLab**:
        cat > /tmp/issue-body.md <<'ISSUE_EOF'
        <body content here>
        ISSUE_EOF
        glab issue create --repo <REPO> --title '<title>' --description "$(cat /tmp/issue-body.md)" --label '<labels>'

        **Bitbucket**:
        cat > /tmp/bb-issue.json <<'ISSUE_EOF'
        {"title":"<title>","content":{"raw":"<body>","markup":"markdown"},"kind":"<kind>"}
        ISSUE_EOF
        curl -s -X POST -H "Authorization: Bearer $BB_TOKEN" -H "Content-Type: application/json" -d @/tmp/bb-issue.json "https://api.bitbucket.org/2.0/repositories/<WORKSPACE>/<REPO>/issues"

        **Gitea**:
        cat > /tmp/issue-body.md <<'ISSUE_EOF'
        <body content here>
        ISSUE_EOF
        tea issues create --repo <REPO> --title '<title>' --body "$(cat /tmp/issue-body.md)" --labels '<labels>'

        Each sub-issue body MUST include:
        - A "Parent: #<epic_number>" reference line
        - A clear Summary section
        - Acceptance Criteria as a checkbox list
        - Dependencies on other sub-issues if applicable
        - Scope Notes for what is explicitly excluded

        Step 3: After creating all issues, capture each issue's number and URL from the creation output.

        Step 4: Record the results with fields: parent_issue (number, url, repository),
        created_issues (array of number, title, url, labels, success, complexity, dependencies),
        total_created, total_failed.
    output_artifacts:
      - name: scope_plan
        path: .wave/artifact.json
        type: json
        required: true
    outcomes:
      - type: issue
        extract_from: .wave/artifact.json
        json_path: .created_issues[*].url
        label: "First Sub-Issue"
    retry:
      max_attempts: 1
    handover:
      contract:
        type: json_schema
        schema_path: .wave/contracts/scope-plan.schema.json
        validate: true
        must_pass: true
        allow_recovery: true
        recovery_level: progressive
        progressive_validation: false

  - id: verify-report
    persona: "{{ forge.prefix }}-analyst"
    dependencies: [scope-and-create]
    memory:
      inject_artifacts:
        - step: scope-and-create
          artifact: scope_plan
          as: results
        - step: fetch-epic
          artifact: epic_assessment
          as: assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        Verify the created sub-issues and compile a verification report.

        You are working on a **{{ forge.type }}** repository. Use the **{{ forge.cli_tool }}** CLI.

        Input: {{ input }}
        Parse the repo (first token) and epic number (second token).

        Step 1: For each created issue in the results, verify it exists:

        **GitHub**: gh issue view <N> --repo <REPO> --json number,title,body,labels
        **GitLab**: glab issue view <N> --repo <REPO> --output json
        **Bitbucket**: curl -s -H "Authorization: Bearer $BB_TOKEN" "https://api.bitbucket.org/2.0/repositories/<WORKSPACE>/<REPO>/issues/<N>"
        **Gitea**: tea issues view <N> --repo <REPO> --output json

        Check that each issue:
        - Exists and is open
        - Has acceptance criteria in the body
        - References the parent epic

        Step 2: This step is READ-ONLY. Do NOT post comments -- the analyst
        persona does not have write permissions. Instead, include a pre-rendered markdown
        summary in the output JSON that a commenter persona could post later.

        Create a markdown summary with a checklist of all sub-issues (- [ ] #<number> <title>).

        Step 3: Compile the verification report with fields:
        parent_issue (number, url), verified_issues (array of number, title, url, exists,
        has_acceptance_criteria, references_parent), summary (total_verified, total_valid,
        total_issues_created, comment_posted, comment_url).
    output_artifacts:
      - name: scope_report
        path: .wave/artifact.json
        type: json
        required: true
    retry:
      max_attempts: 1
    handover:
      contract:
        type: json_schema
        schema_path: .wave/contracts/scope-report.schema.json
        validate: true
        must_pass: true
        allow_recovery: true
        recovery_level: progressive
        progressive_validation: false
