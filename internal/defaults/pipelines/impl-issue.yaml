kind: WavePipeline
metadata:
  name: impl-issue
  description: >-
    End-to-end GitHub issue implementation. Fetches the issue, assesses
    feasibility and complexity, generates an implementation plan, writes code
    in an isolated worktree, and opens a pull request. Use this as the default
    pipeline for issue-driven work that does not require upfront research or
    formal specification.
  release: true

chat_context:
  artifact_summaries:
    - assessment
    - impl-plan
    - pr-result
  suggested_questions:
    - "Would you like to review the changes in the pull request?"
    - "Are there any failing tests to investigate?"
    - "Should we refine the implementation or add more test coverage?"
  focus_areas:
    - "Code changes and implementation quality"
    - "Test results and coverage"
    - "PR status and review readiness"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  type: issue_ref
  schema:
    type: string
    description: "GitHub repository and issue number (accepts typed issue_ref or 'owner/repo number' text)"
  example: "re-cinq/wave 42"

pipeline_outputs:
  pr:
    step: create-pr
    artifact: pr-result
    type: pr_ref

steps:
  - id: fetch-assess
    persona: implementer
    contexts: [configuration]
    model: cheapest
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .agents/prompts/implement/fetch-assess.md
    output_artifacts:
      - name: assessment
        path: .agents/output/issue-assessment.json
        type: json
    retry:
      policy: patient
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/issue-assessment.json
        schema_path: .agents/contracts/issue-assessment.schema.json
        must_pass: true
        on_failure: retry

  - id: plan
    # No contexts: field — inherit-all behavior: all ontology contexts defined in wave.yaml
    # are automatically injected. This gives the planner the full domain picture.
    # See AGENTS.md § "Ontology Context Injection" for details.
    persona: implementer
    model: balanced
    dependencies: [fetch-assess]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
      base: main
    exec:
      type: prompt
      source_path: .agents/prompts/implement/plan.md
    output_artifacts:
      - name: impl-plan
        path: .agents/output/impl-plan.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contracts:
        - type: json_schema
          source: .agents/output/impl-plan.json
          schema_path: .agents/contracts/issue-impl-plan.schema.json
          must_pass: true
          on_failure: retry
        - type: agent_review
          persona: reviewer
          criteria_path: .agents/contracts/plan-review-criteria.md
          source: .agents/output/impl-plan.json
          model: cheapest
          token_budget: 6000
          timeout: 90s
          on_failure: rework

  - id: implement
    persona: craftsman
    model: balanced
    contexts: [execution, delivery]
    thread: impl
    dependencies: [plan]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
        - step: plan
          artifact: impl-plan
          as: impl_plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .agents/prompts/implement/implement.md
    retry:
      policy: aggressive
      max_attempts: 2
      on_failure: rework
      rework_step: fix-implement
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        must_pass: true
        on_failure: retry
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: fix-implement
    persona: craftsman
    model: balanced
    rework_only: true
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        REWORK — fix the specific failure from the implementation step.

        ## Objective

        The implementation step failed its contract (test suite did not pass, or the agent
        review flagged critical issues). Your job is to diagnose the exact failure and apply
        the minimum fix required to pass the contract. You are NOT reimplementing the issue
        — you are surgically fixing what went wrong in the previous attempt.

        ## Context

        The failure context has been injected as an artifact. It contains the error output
        from the contract check — typically one of:
        - Test failure messages with file paths and assertion details
        - Compilation errors with file and line numbers
        - Agent review feedback identifying specific problems in the diff
        You are working on the same worktree branch (`{{ pipeline_id }}`) where the
        implementation was attempted. All previous changes are still present on disk.

        ## Requirements

        1. **Read the failure context**: Understand exactly what failed. Parse the error
           output to identify:
           - Which test(s) failed and why
           - Which file(s) contain the problem
           - Whether it is a compilation error, test assertion failure, or logic error

        2. **Diagnose the root cause**: Do not guess. Read the failing code, trace the
           execution path, and understand WHY it failed. Common causes include:
           - Missing error handling or nil checks
           - Incorrect function signatures not matching interface requirements
           - Import cycles or missing imports
           - Test assertions that do not match actual behavior
           - Race conditions in concurrent code
           - Off-by-one errors in index calculations

        3. **Apply the minimal fix**: Change only what is necessary to resolve the failure.
           If a test is failing because the implementation is wrong, fix the implementation.
           If a test is failing because the test expectation is incorrect (and the
           implementation behavior is verified correct), fix the test — but only with clear
           justification.

        4. **Verify the fix**: Run the specific failing test first to confirm it passes,
           then run the full test suite to ensure no regressions were introduced.

        5. **Commit the fix**: Stage only the changed files and commit with a message that
           explains what was fixed: `fix: <description of what failed and how it was resolved>`

        ## Constraints and Anti-patterns

        - Do NOT rewrite the entire implementation. Fix only the specific failure.
        - Do NOT delete tests that are failing — fix the underlying issue instead.
        - Do NOT add broad error-swallowing patterns to make tests pass.
        - Do NOT modify files unrelated to the failure.
        - Do NOT introduce new features or improvements — this is a fix-only step.
        - Do NOT use `git add -A` or `git add .` — stage specific files only.
        - Keep the diff as small as possible. Every line changed must be justified by the
          failure diagnosis.

        ## Output Format

        No explicit output artifact is required beyond the committed fix. The contract
        will re-run the test suite and agent review to verify the fix.

        ## Quality Bar

        A good rework fixes the exact problem in 1-10 lines of code and passes all
        contracts on the first try. A bad rework makes sweeping changes, introduces new
        failures, or masks the underlying problem with error suppression instead of
        fixing it.
    retry:
      policy: aggressive
      max_attempts: 2
    handover:
      contracts:
        - type: test_suite
          command: "{{ project.contract_test_command }}"
          must_pass: true
          on_failure: fail
        - type: agent_review
          persona: navigator
          criteria_path: .agents/contracts/impl-review-criteria.md
          model: cheapest
          token_budget: 8000
          timeout: 90s
          context:
            - source: git_diff
          on_failure: warn

  - id: create-pr
    persona: "{{ forge.type }}-commenter"
    model: cheapest
    contexts: [delivery]
    dependencies: [implement]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .agents/prompts/implement/create-pr.md
    output_artifacts:
      - name: pr-result
        path: .agents/output/pr-result.json
        type: json
    retry:
      policy: standard
      max_attempts: 2
    handover:
      contract:
        type: json_schema
        source: .agents/output/pr-result.json
        schema_path: .agents/contracts/pr-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: pr
        extract_from: .agents/output/pr-result.json
        json_path: .pr_url
        label: "Pull Request"
