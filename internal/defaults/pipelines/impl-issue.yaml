kind: WavePipeline
metadata:
  name: impl-issue
  description: "Implement an issue end-to-end: fetch, assess, plan, implement, test/fix loop, create PR"
  release: true

chat_context:
  artifact_summaries:
    - assessment
    - impl-plan
    - pr-result
  suggested_questions:
    - "Would you like to review the changes in the pull request?"
    - "Are there any failing tests to investigate?"
    - "Should we refine the implementation or add more test coverage?"
  focus_areas:
    - "Code changes and implementation quality"
    - "Test results and coverage"
    - "PR status and review readiness"

skills:
  - "{{ project.skill }}"
  - gh-cli
  - software-design

requires:
  tools:
    - gh

input:
  source: cli
  schema:
    type: string
    description: "GitHub repository and issue number"
  example: "re-cinq/wave 42"

steps:
  - id: fetch-assess
    persona: implementer
    model: claude-haiku-4-5
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/fetch-assess.md
    output_artifacts:
      - name: assessment
        path: .wave/output/issue-assessment.json
        type: json
    retry:
      policy: standard
    handover:
      contract:
        type: json_schema
        source: .wave/output/issue-assessment.json
        schema_path: .wave/contracts/issue-assessment.schema.json
        must_pass: true
        on_failure: retry

  - id: plan
    persona: implementer
    dependencies: [fetch-assess]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
      base: main
    exec:
      type: prompt
      source_path: .wave/prompts/implement/plan.md
    output_artifacts:
      - name: impl-plan
        path: .wave/output/impl-plan.json
        type: json
    retry:
      policy: standard
    handover:
      contract:
        type: json_schema
        source: .wave/output/impl-plan.json
        schema_path: .wave/contracts/issue-impl-plan.schema.json
        must_pass: true
        on_failure: retry

  - id: implement
    persona: craftsman
    dependencies: [plan]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
        - step: plan
          artifact: impl-plan
          as: impl_plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/implement.md
    retry:
      policy: standard
    handover:
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: test
    persona: craftsman
    dependencies: [implement]
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        Run the project test suite to validate the implementation:
        ```bash
        {{ project.contract_test_command }}
        ```

        If all tests pass, confirm the implementation is correct.
        If any tests fail, capture the complete error output for debugging.
    handover:
      contract:
        type: test_suite
        command: "{{ project.contract_test_command }}"
        on_failure: fail
    edges:
      - target: create-pr
        condition: "outcome=success"
      - target: fix

  - id: fix
    persona: craftsman
    dependencies: [test]
    max_visits: 3
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
        - step: plan
          artifact: impl-plan
          as: impl_plan
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        The test suite failed. Analyze the test failures and fix the implementation.

        Focus on fixing only the failing tests — do not refactor or add unrelated features.
        After making fixes, the pipeline will automatically re-run the tests.
    retry:
      policy: standard
    edges:
      - target: test
    handover:
      compaction:
        trigger: "token_limit_80%"
        persona: summarizer

  - id: create-pr
    persona: "{{ forge.type }}-commenter"
    dependencies: [test]
    memory:
      inject_artifacts:
        - step: fetch-assess
          artifact: assessment
          as: issue_assessment
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source_path: .wave/prompts/implement/create-pr.md
    output_artifacts:
      - name: pr-result
        path: .wave/output/pr-result.json
        type: json
    retry:
      policy: standard
    handover:
      contract:
        type: json_schema
        source: .wave/output/pr-result.json
        schema_path: .wave/contracts/pr-result.schema.json
        must_pass: true
        on_failure: retry
    outcomes:
      - type: pr
        extract_from: .wave/output/pr-result.json
        json_path: .pr_url
        label: "Pull Request"
