kind: WavePipeline
metadata:
  name: audit-dx
  description: >-
    Evaluate developer experience across setup, code navigation, testing,
    debugging, API surface, extensibility, and CI/CD. Use this to identify
    friction points for new contributors and integrators. Produces a
    severity-rated report with specific improvement recommendations for each
    DX area.
  release: true

skills:
  - software-design

input:
  source: cli
  example: "audit the contributor onboarding experience"
  schema:
    type: string
    description: "DX area to audit: onboarding, testing, ci, api, or empty for full audit"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What are the biggest DX friction points?"
    - "Which improvements would have the most impact for new contributors?"
    - "How does the setup experience compare to best practices?"
  focus_areas:
    - "Developer experience friction points"
    - "Improvement recommendations by area"

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

pipeline_outputs:
  findings:
    step: audit
    artifact: findings

steps:
  - id: audit
    persona: navigator
    contexts: [quality]
    max_concurrent_agents: 3
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Evaluate the developer experience (DX) of this project across all major areas
        that affect contributor productivity and satisfaction. Your audit should feel
        like a structured walkthrough from the perspective of a new contributor arriving
        with no prior context — what works smoothly, what confuses, and what blocks
        progress entirely. The user's specific focus area is: {{ input }}. If no
        specific area is given, perform a comprehensive audit across all areas.

        ## Context

        This is a standalone DX audit step. No prior artifacts exist. You have
        read-only access to the entire project. Your report will be the sole output
        artifact. A downstream consumer may use this report to prioritize DX
        improvements, so findings must be specific, actionable, and prioritized by
        impact on contributor velocity.

        ## Evaluation Areas

        1. **Setup experience**: Can a new contributor get running in under 15 minutes?
           Check README clarity, installation instructions, dependency management,
           Makefile/build scripts, IDE configuration hints, and whether `git clone`
           followed by the documented steps actually works.

        2. **Code navigation**: Is the codebase easy to navigate without prior knowledge?
           Check package organization, naming conventions, godoc/documentation comments,
           directory structure rationale, and whether a newcomer can find the right
           file for a given task without extensive searching.

        3. **Testing**: Is it easy to write, run, and understand tests?
           Check test helpers, mock/fixture infrastructure, test naming patterns,
           coverage tooling, how to run a single test vs the full suite, and whether
           the test failure output is actionable.

        4. **Debugging**: Can developers diagnose issues efficiently?
           Check logging verbosity and structure, debug flags, error message quality,
           stack trace readability, and whether common failure modes produce helpful
           diagnostic output.

        5. **API surface**: Is the internal API surface clean and well-bounded?
           Check exported vs unexported symbols, interface segregation, type safety at
           boundaries, and whether the public API is stable enough for external consumers.

        6. **Extensibility**: Can developers add new features without modifying core code?
           Check plugin points, configuration hooks, registration patterns, and whether
           adding a new pipeline, persona, or contract requires touching unrelated files.

        7. **CI/CD**: Is the CI pipeline fast, reliable, and helpful?
           Check test execution time, flaky test frequency, build reproducibility,
           PR feedback speed, and whether CI failures produce clear actionable messages.

        ## Requirements

        1. Read the project's README, CONTRIBUTING guide, and any setup documentation
           first to understand the intended developer workflow.
        2. For each evaluation area, examine at least 3-5 concrete files or
           configurations that demonstrate the current state.
        3. Rate each area on a severity scale: excellent / good / fair / poor.
        4. For every finding rated "fair" or "poor", provide a specific file path and
           line reference where the issue manifests.
        5. Include at least one positive finding per area — acknowledge what works
           well, not just what's broken.

        ## Constraints and Anti-patterns

        - Do NOT produce a generic checklist of best practices. Every finding must be
          grounded in an actual file, configuration, or behavior observed in this
          project.
        - Do NOT rate areas without evidence. "Looks fine" is not an audit finding —
          cite the specific files you checked and what you found.
        - Do NOT confuse project maturity with DX quality. A young project can have
          excellent DX; a mature project can have terrible DX. Evaluate the experience,
          not the age.
        - Do NOT skip areas because "not applicable." If an area has nothing to
          audit (e.g., no CI pipeline), report that absence as a finding.
        - Do NOT include implementation suggestions for issues outside the audit scope.
          Focus on identifying and prioritizing problems.

        ## Output Format

        A markdown report at `.wave/output/findings.md` with these sections:
        - **Executive Summary** (2-3 sentences: overall DX rating and top concern)
        - **Area-by-Area Findings** (one subsection per area, each with severity badge,
          evidence citations, and improvement recommendations)
        - **Quick Wins** (highest-impact, lowest-effort fixes — maximum 5)
        - **Prioritized Roadmap** (ordered list of improvements by impact)

        ## Quality Bar

        An excellent audit reads like a new contributor's honest journal from their
        first week on the project. It should be specific enough that a maintainer can
        immediately open the cited files and start fixing the top 3 issues. Generic
        praise or ungrounded criticism fails the quality bar.
    output_artifacts:
      - name: findings
        path: .wave/output/findings.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .wave/output/findings.md
