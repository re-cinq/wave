# Smoke test: claude adapter native skill provisioning
#
# Verifies that Wave provisions the wave-smoke-test fixture skill into
# <workspace>/.claude/skills/wave-smoke-test/SKILL.md and that the claude
# adapter's native `Skill` tool can lazy-load and activate it.
#
# Expected behavior:
#   - Wave copies .agents/skills/wave-smoke-test/ → <workspace>/.claude/skills/
#   - Sentinel file `.wave-managed` is dropped alongside SKILL.md
#   - Agent invokes Skill tool, reads SKILL.md, emits the sentinel string
#   - Result content contains SMOKE_TEST_OK_4f7a2b1c (manual grep — see notes)
#
# Run: wave run wave-smoke-skills-claude (requires ANTHROPIC_API_KEY)

kind: WavePipeline
metadata:
  name: wave-smoke-skills-claude
  description: >-
    Smoke test for claude adapter native skill provisioning. Activates the
    wave-smoke-test fixture skill via the Skill tool and verifies the
    sentinel string round-trips to result content.
  release: false
  category: wave

input:
  source: cli
  example: "verify claude skills provisioning"

steps:
  - id: invoke-skill
    persona: implementer
    adapter: claude
    model: cheapest
    skills: [wave-smoke-test]
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        Activate the `wave-smoke-test` skill via your native Skill tool.
        Read its SKILL.md to find the activation sentinel, then write
        EXACTLY that sentinel string (and nothing else) to a file named
        `smoke-result` in the current working directory. Then stop.
    output_artifacts:
      - name: smoke-result
        path: smoke-result
        type: text
    handover:
      contract:
        type: test_suite
        command: "grep -q SMOKE_TEST_OK_4f7a2b1c smoke-result"
        must_pass: true
        on_failure: fail
