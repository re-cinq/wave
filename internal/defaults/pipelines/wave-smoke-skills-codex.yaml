# Smoke test: codex adapter native skill provisioning
#
# Verifies that Wave provisions wave-smoke-test into
# <workspace>/.agents/skills/wave-smoke-test/SKILL.md and that codex's
# native `/skills` (or $skill_name) command lazy-loads and activates it.

kind: WavePipeline
metadata:
  name: wave-smoke-skills-codex
  description: >-
    Smoke test for codex adapter native skill provisioning. Activates the
    wave-smoke-test fixture skill and verifies the sentinel string round-trips.
  release: false
  category: wave

input:
  source: cli
  type: string
  example: "verify codex skills provisioning"

steps:
  - id: invoke-skill
    persona: implementer
    adapter: codex
    model: cheapest
    skills: [wave-smoke-test]
    workspace:
      type: worktree
      branch: "{{ pipeline_id }}"
    exec:
      type: prompt
      source: |
        Activate the `wave-smoke-test` skill via the `/skills` command.
        Read its SKILL.md to find the activation sentinel, then write
        EXACTLY that sentinel string (and nothing else) to a file named
        `smoke-result` in the current working directory. Then stop.
    output_artifacts:
      - name: smoke-result
        path: smoke-result
        type: text
    handover:
      contract:
        type: test_suite
        command: "grep -q SMOKE_TEST_OK_4f7a2b1c smoke-result"
        must_pass: true
        on_failure: fail
