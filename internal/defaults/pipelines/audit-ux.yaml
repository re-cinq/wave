kind: WavePipeline
metadata:
  name: audit-ux
  description: >-
    Evaluate user experience across CLI, TUI, documentation, and workflows.
    Assesses discoverability, error message quality, progressive disclosure,
    consistency, feedback mechanisms, recovery options, and documentation
    alignment. Use this to find friction points from the end-user perspective
    and produce severity-rated improvement recommendations.
  release: true

skills:
  - software-design

input:
  source: cli
  example: "audit the CLI onboarding flow for new users"
  schema:
    type: string
    description: "UX area to audit: cli, tui, docs, onboarding, or empty for full audit"

chat_context:
  artifact_summaries:
    - findings
  suggested_questions:
    - "What are the biggest UX friction points?"
    - "Which error messages need improvement?"
    - "How can discoverability be enhanced?"
  focus_areas:
    - "User experience friction points"
    - "Error message quality and recovery options"

pipeline_outputs:
  findings:
    step: audit
    artifact: findings

steps:
  - id: audit
    persona: navigator
    contexts: [quality]
    max_concurrent_agents: 3
    model: cheapest
    workspace:
      mount:
        - source: ./
          target: /project
          mode: readonly
    exec:
      type: prompt
      source: |
        ## Objective

        Evaluate the end-user experience across all user-facing surfaces: CLI commands, TUI interactions, documentation, error messages, and workflows. Produce a severity-rated report identifying friction points from the perspective of someone using the product (not developing it), with specific improvement recommendations that would make the product more intuitive, forgiving, and self-documenting.

        ## Context

        This is a single-step analysis pipeline focused on the user experience (as opposed to the developer experience covered by audit-dx). The codebase is mounted read-only at /project. The caller may provide a specific UX area to audit (e.g., "cli", "tui", "docs", "onboarding") or leave the input empty for a full audit. No prior pipeline steps feed into this step.

        Focus area: {{ input }}

        If the input specifies a single area, perform a deep audit of that area. If the input is empty or general, perform a breadth-first audit covering all seven criteria below, then go deeper on the criteria with the most significant findings.

        ## Requirements

        Evaluate each of the following UX criteria by examining the actual implementation, not by making assumptions:

        1. **Discoverability**: Assess whether users can find features without reading documentation. Read all --help output for CLI commands (check cmd/ for cobra command definitions and their Short/Long/Example fields). Verify that help text covers all important flags and provides realistic examples. Check whether error messages suggest relevant commands when a user invokes something incorrectly (e.g., "did you mean...?" suggestions). Look for command aliases and shortcuts. Assess: If a user types `wave` with no arguments, does the output guide them to the next step?

        2. **Error experience**: Audit every error path you can find in the CLI and TUI code. Check whether error messages explain what went wrong, why it went wrong, and what the user can do about it. Look for raw error strings that bubble up to users (e.g., "open /path/to/file: no such file or directory" without context). Verify that errors from external tools (git, gh, docker) are wrapped with user-friendly context. Check exit codes for consistency. Assess: When something fails, does the user know exactly what to fix?

        3. **Progressive disclosure**: Evaluate whether the interface reveals complexity gradually. Check that commands have sensible defaults so the simplest invocation works. Verify that advanced options are documented but not required. Look for "guided mode" vs "expert mode" paths. Check whether the onboarding wizard (if present) introduces concepts incrementally. Assess: Can a user accomplish the most common workflow with zero flags, and discover advanced features naturally?

        4. **Consistency**: Check that patterns are uniform across all commands. Verify that similar flags have the same names across commands (e.g., --output, --format, --verbose are consistent). Check that output formats (JSON, table, plain text) follow the same structure across commands. Verify that exit codes follow a consistent scheme. Look for cases where similar operations behave differently in different contexts.

        5. **Feedback and progress**: Evaluate whether the system communicates what it is doing during long-running operations. Check for spinners, progress bars, or status messages during pipeline execution, agent spawning, and file operations. Look for completion indicators that confirm success. Check whether the user can tell what stage a pipeline is in during execution. Assess: During a 5-minute pipeline run, does the user have any indication of progress?

        6. **Recovery from mistakes**: Check whether users can recover from errors without starting over. Look for: dry-run modes (--dry-run), confirmation prompts before destructive operations (git force push, file deletion, branch reset), undo capabilities or instructions for reversing actions, and resume functionality for interrupted operations. Assess: If a user accidentally runs the wrong pipeline, what happens? Can they interrupt and resume?

        7. **Documentation alignment**: Cross-reference the documentation in docs/ and README.md with the actual CLI implementation. Verify that documented commands, flags, and examples match the code. Check that the documentation's mental model of how the product works matches the actual execution flow. Look for features that exist in code but are not documented, and documented features that no longer exist.

        For each finding, provide:
        - Severity: critical (blocks usage entirely), high (causes confusion that leads to wrong actions), medium (suboptimal but user can work around it), low (polish opportunity)
        - Current behavior: what actually happens, with specific file:line references and reproduction steps
        - Expected behavior: what the user would reasonably expect
        - Suggested fix: concrete improvement with effort estimate (trivial/small/medium/large)

        ## Constraints and Anti-patterns

        - Do NOT audit internal API design or code architecture. This is about the end-user experience only.
        - Do NOT recommend adding features. Focus on improving the experience of existing features.
        - Do NOT modify any files. The workspace is read-only.
        - Do NOT base findings on aesthetic preferences. Ground every finding in a usability principle (discoverability, learnability, error recovery, consistency).
        - Avoid reporting issues that affect only power users who have already learned the system. Prioritize the experience of new and intermediate users.

        ## Output Format

        Produce a markdown report with:
        - **UX Health Summary**: One-line rating for each of the 7 criteria (Good / Needs Work / Poor).
        - **Critical and High Findings**: Detailed analysis with reproduction steps, expected behavior, and fix proposal.
        - **Medium and Low Findings**: Briefer treatment with the same structure.
        - **Top 5 Quick Wins**: Low-effort improvements with the highest UX payoff.
        - **Personas Affected**: Which user personas (new user, power user, CI integrator) are most impacted by the findings.

        ## Quality Bar

        A good UX audit simulates the user's journey through specific tasks and identifies concrete friction points with reproduction steps ("running `wave run` with no arguments produces an unhelpful error on line 47 of run.go"). A bad audit lists generic UX principles without checking whether they apply, or focuses on cosmetic issues while ignoring blocking usability problems.
    output_artifacts:
      - name: findings
        path: .agents/output/findings.md
        type: markdown
    handover:
      contract:
        type: non_empty_file
        source: .agents/output/findings.md
