kind: WavePipeline
metadata:
  name: audit-quality-loop
  description: >-
    Iterative quality improvement loop that supervises completed work, applies
    improvements if quality is insufficient, and re-checks until the
    supervision verdict passes or the maximum iteration count is reached.
    Composes ops-supervise and impl-improve in a feedback loop. Use this when
    you want automated quality convergence rather than a single-pass review.
  category: composition
  release: true

skills:
  - software-design

input:
  source: cli
  example: "last pipeline run"
  schema:
    type: string
    description: "Work reference to evaluate"

chat_context:
  artifact_summaries:
    - quality-check
  suggested_questions:
    - "How many iterations were needed to converge on quality?"
    - "What improvements were applied?"
    - "Did the supervision verdict pass?"
  focus_areas:
    - "Quality convergence iterations"
    - "Improvement effectiveness"

pipeline_outputs:
  quality-check:
    step: quality-check
    artifact: verdict

hooks:
  - name: log-start
    event: run_start
    type: command
    command: "echo '[{{ pipeline_name }}] started run={{ pipeline_id }} input={{ input }}' >> .wave/output/hook-log.txt"
    blocking: false
  - name: log-complete
    event: run_completed
    type: command
    command: "echo '[{{ pipeline_name }}] completed run={{ pipeline_id }}' >> .wave/output/hook-log.txt"
    blocking: false

steps:
  - id: quality-check
    pipeline: ops-supervise
    input: "{{input}}"
    loop:
      max_iterations: 3
      until: "{{supervise.output.verdict}}"
      steps:
        - id: improve
          pipeline: impl-improve
          input: "{{input}}"
        - id: recheck
          pipeline: ops-supervise
          input: "{{input}}"
