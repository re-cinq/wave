adapters:
    claude:
        binary: claude
        default_model: sonnet
        default_permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
    codex:
        binary: codex
        default_model: o3
        default_permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
    gemini:
        binary: gemini
        default_model: gemini-2.5-flash-lite
        default_permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
    opencode:
        binary: opencode
        default_model: zai-coding-plan/glm-5-turbo
        default_permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
apiVersion: v1
kind: WaveManifest
metadata:
    description: A Wave multi-agent project
    name: wave
personas:
    auditor:
        adapter: ""
        description: Security review and quality assurance
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/auditor.md
        temperature: 0.1
    craftsman:
        adapter: ""
        description: Code implementation and testing
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/craftsman.md
        temperature: 0.7
    github-analyst:
        adapter: ""
        description: GitHub issue analysis and scanning
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/github-analyst.md
        temperature: 0.1
    github-commenter:
        adapter: ""
        description: Posts comments on GitHub issues and pull requests, creates PRs
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/github-commenter.md
        temperature: 0.2
    github-scoper:
        adapter: ""
        description: GitHub epic analysis, decomposition, and sub-issue creation
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/github-scoper.md
        temperature: 0.1
    implementer:
        adapter: ""
        description: Execution specialist for code changes and structured output
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/implementer.md
        temperature: 0.3
    navigator:
        adapter: ""
        description: Read-only codebase exploration and analysis
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/navigator.md
        temperature: 0.1
    onboarder:
        adapter: ""
        description: Project introspection and .agents/* overlay generation
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/onboarder.md
        temperature: 0.4
    philosopher:
        adapter: ""
        description: Architecture design and specification
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/philosopher.md
        temperature: 0.3
    planner:
        adapter: ""
        description: Task breakdown and planning
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/planner.md
        temperature: 0.2
    provocateur:
        adapter: ""
        description: Creative challenger for divergent thinking and complexity hunting
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/provocateur.md
        temperature: 0.8
    researcher:
        adapter: ""
        description: Deep codebase research and analysis
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/researcher.md
        temperature: 0.1
    reviewer:
        adapter: ""
        description: Code review and quality checks
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/reviewer.md
        temperature: 0.1
    summarizer:
        adapter: ""
        description: Context compaction for relay handoffs
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/summarizer.md
        temperature: 0
    synthesizer:
        adapter: ""
        description: Structured synthesis of analysis findings into actionable JSON proposals
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/synthesizer.md
        temperature: 0.2
    validator:
        adapter: ""
        description: Skeptical analysis and verification of findings against source code
        permissions:
            allowed_tools:
                - '*'
            deny: []
        system_prompt_file: .agents/personas/validator.md
        temperature: 0.1
project:
    build_command: go build ./...
    flavour: go
    format_command: gofmt -l .
    language: go
    lint_command: go vet ./...
    skill: golang
    source_glob: '*.go'
    test_command: go test ./...
runtime:
    sandbox:
        enabled: true
        backend: none  # host-side execution for claude adapter
        env_passthrough:
            - ANTHROPIC_BASE_URL
            - ANTHROPIC_AUTH_TOKEN
            - ANTHROPIC_MODEL
            - ANTHROPIC_DEFAULT_SONNET_MODEL
            - ANTHROPIC_DEFAULT_OPUS_MODEL
            - ANTHROPIC_DEFAULT_HAIKU_MODEL
    audit:
        log_all_file_operations: false
        log_all_tool_calls: true
        log_dir: .agents/traces/
    default_timeout_minutes: 30
    max_concurrent_workers: 5
    meta_pipeline:
        max_depth: 2
        max_total_steps: 20
        max_total_tokens: 500000
        timeout_minutes: 60
    relay:
        strategy: summarize_to_checkpoint
        token_threshold_percent: 80
    workspace_root: .agents/workspaces
