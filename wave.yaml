runtime:
    audit:
        log_all_file_operations: false
        log_all_tool_calls: true
        log_dir: .agents/traces/
    default_timeout_minutes: 90
    stall_timeout: 10m
    max_concurrent_workers: 5
    meta_pipeline:
        max_depth: 2
        max_total_steps: 20
        max_total_tokens: 500000
        timeout_minutes: 60
    relay:
        strategy: summarize_to_checkpoint
        token_threshold_percent: 80
    timeouts:
        step_default_minutes: 15
        relay_compaction_minutes: 5
        meta_default_minutes: 30
        skill_install_seconds: 120
        skill_cli_seconds: 120
        skill_http_seconds: 120
        skill_http_header_seconds: 30
        skill_publish_seconds: 30
        process_grace_seconds: 3
        stdout_drain_seconds: 1
        gate_approval_hours: 24
        gate_poll_interval_seconds: 30
        gate_poll_timeout_minutes: 30
        git_command_seconds: 30
        forge_api_seconds: 15
        retry_max_delay_seconds: 60
    workspace_root: .agents/workspaces
    cost:
        enabled: true
        budget_ceiling: 50.0
        warn_at: 25.0
    routing:
        auto_route: true
# Evolution trigger thresholds (Phase 3.3 / issue #1612). Defaults shown — uncomment to override.
# evolution:
#     enabled: true              # master switch (default: true)
#     every_n_window: 10         # rows per half-window for judge-score median compare
#     every_n_judge_drop: 0.1    # min median judge_score drop to fire every-N
#     drift_window: 20           # rows for contract_pass drift heuristic
#     drift_pass_drop: 0.15      # min absolute pass-rate drop to fire drift
#     retry_window: 10           # rows for retry-rate heuristic
#     retry_avg_threshold: 2.0   # avg retry_count over retry_window to fire retry-rate
