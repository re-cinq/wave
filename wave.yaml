apiVersion: v1
kind: WaveManifest
metadata:
    description: A Wave multi-agent project
    name: wave-project
    forge: github
project:
    language: go
    test_command: "go test ./..."
    # Disable gpgsign for test-suite sub-commits (e.g. worktree tests that
    # call `git commit`). A broken user gpg/keyboxd config must not fail
    # the test suite.
    contract_test_command: "env GIT_CONFIG_NOSYSTEM=1 GIT_CONFIG_GLOBAL=/dev/null go test ./..."
    lint_command: "go vet ./..."
    build_command: "go build ./..."
    source_glob: "*.go"
adapters:
    claude:
        binary: claude
        default_model: sonnet
        default_permissions:
            allowed_tools:
                - Read
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - CLAUDE.md
            - AGENTS.md
            - .claude/settings.json
    gemini:
        binary: gemini
        default_model: gemini-2.5-flash-lite
        default_permissions:
            allowed_tools:
                - Read
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
    opencode:
        binary: opencode
        default_model: opencode/big-pickle
        tier_models:
            cheapest: default
            balanced: default
            strongest: default
        default_permissions:
            allowed_tools:
                - Read
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
    opencode-qwen:
        binary: opencode-patched
        default_model: ollama/qwen3.5:27b
        tier_models:
            cheapest: ollama/qwen3.5:27b
            balanced: ollama/qwen3.5:27b
            strongest: ollama/qwen3.5:27b
        default_permissions:
            allowed_tools:
                - Read
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
    opencode-glm:
        binary: opencode-patched
        default_model: ollama/glm-4.7-flash
        tier_models:
            cheapest: ollama/glm-4.7-flash
            balanced: ollama/glm-4.7-flash
            strongest: ollama/glm-4.7-flash
        default_permissions:
            allowed_tools:
                - Read
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - AGENTS.md
