version: "2"

linters:
  default: standard
  enable:
    - unparam
    - wastedassign
    - gocritic
    - nolintlint
    - depguard
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
    depguard:
      rules:
        # Rule 1: Domain and Infrastructure packages must not import Presentation packages.
        # Known violation excluded: doctor → onboarding (ADR-003).
        no-presentation-reverse:
          files:
            - "**/internal/pipeline/**"
            - "**/internal/adapter/**"
            - "**/internal/contract/**"
            - "**/internal/relay/**"
            - "**/internal/deliverable/**"
            - "**/internal/preflight/**"
            - "**/internal/recovery/**"
            - "**/internal/skill/**"
            - "**/internal/defaults/**"
            - "**/internal/suggest/**"
            - "**/internal/state/**"
            - "**/internal/workspace/**"
            - "**/internal/worktree/**"
            - "**/internal/forge/**"
            - "**/internal/github/**"
          deny:
            - pkg: "github.com/recinq/wave/internal/display"
              desc: "Layer violation: Domain/Infrastructure must not import Presentation (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/tui"
              desc: "Layer violation: Domain/Infrastructure must not import Presentation (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/webui"
              desc: "Layer violation: Domain/Infrastructure must not import Presentation (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/onboarding"
              desc: "Layer violation: Domain/Infrastructure must not import Presentation (ADR-003)"
        # ADR-009 note: ontology bounded-context isolation is enforced by
        # convention, not depguard. The invariants are:
        #   - Only internal/ontology may read/write the .agents/.ontology-stale
        #     sentinel, own the "wave-ctx-*" skill path convention, or emit
        #     the [ONTOLOGY_*] audit trace lines.
        #   - Other packages must consume ontology.Service, not inline helpers.
        # These are string-literal rules depguard cannot express. See the
        # package doc in internal/ontology/service.go.

        # Rule 2: Infrastructure packages must not import Domain packages.
        infrastructure-no-domain:
          files:
            - "**/internal/state/**"
            - "**/internal/workspace/**"
            - "**/internal/worktree/**"
            - "**/internal/forge/**"
            - "**/internal/github/**"
          deny:
            - pkg: "github.com/recinq/wave/internal/pipeline"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/adapter"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/contract"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/relay"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/deliverable"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/preflight"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/recovery"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/skill"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/defaults"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/suggest"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
            - pkg: "github.com/recinq/wave/internal/doctor"
              desc: "Layer violation: Infrastructure must not import Domain (ADR-003)"
  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      # Non-blocking fire-and-forget hook calls — errors are intentionally ignored
      # because hooks must never block pipeline execution.
      - linters: [errcheck]
        text: "RunHooks"
      # Audit/observability calls that must not block execution on failure.
      - linters: [errcheck]
        text: "LogContractResult|RecordPerformanceMetric|RecordWebhookDelivery"
      # fmt.Sscanf / fmt.Fprintf to strings.Builder in webui — errors are impossible
      # for in-memory targets and checked inline when they matter.
      - linters: [errcheck]
        text: "fmt\\.Sscanf|WriteString\\(fmt\\.Sprintf"
      # staticcheck QF1012: WriteString(fmt.Sprintf(...)) vs fmt.Fprintf — cosmetic,
      # not a correctness issue; generated code often uses this pattern.
      - linters: [staticcheck]
        text: "QF1012"
